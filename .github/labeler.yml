      - any-glob-to-any-file:
          - 'IccProfLib/**/*'
          - 'IccXML/**/*'
          - 'IccJSON/**/*'
          - 'Tools/**/*.{c,cc,cpp,cxx,h,hh,hpp}'

Documentation:
