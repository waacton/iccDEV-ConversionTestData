Source:
  - changed-files:
      - any-glob-to-any-file:
          - 'IccProfLib/**/*'
          - 'IccXML/**/*'
          - 'IccJSON/**/*'
          - 'Tools/**/*.{c,cc,cpp,cxx,h,hh,hpp}'

Documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - 'docs/**/*.md'
          - 'README*'
          - 'CHANGELOG*'
          - 'CONTRIBUTING*'
          - 'SECURITY*'

Configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.cmake'
          - '**/CMakeLists.txt'
          - '**/*.json'
          - '**/*.yml'
          - '**/*.yaml'

CI:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'

Scripts:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/scripts/**'
          - 'scripts/**'
          - '**/*.sh'
          - '**/*.ps1'

CodeQL:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/codeql-config.yml'
          - '.github/codeql-queries/**'
          - '.github/scripts/codeql-report.sh'
          - '.github/scripts/run-codeql-local.sh'
          - '.github/workflows/ci-codeql-security.yml'

SAST:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/codeql-config.yml'
          - '.github/codeql-queries/**'
          - '.github/workflows/ci-codeql-security.yml'
          - '.github/workflows/ci-pr-lint.yml'

Build:
  - changed-files:
      - any-glob-to-any-file:
          - 'Build/Cmake/**'
          - 'Build/Cmake/**/CMakeLists.txt'

Testing:
  - changed-files:
      - any-glob-to-any-file:
          - 'Testing/**'
          - 'Build/Cmake/Testing/**'
          - '.github/workflows/ci-*-tests.yml'

Profiles:
  - changed-files:
      - any-glob-to-any-file:
          - 'Testing/**/*.icc'
          - 'Testing/**/*.xml'
          - 'Testing/**/*.json'
          - 'contrib/BuildEnv/**'

Tools:
  - changed-files:
      - any-glob-to-any-file:
          - 'Tools/**'

Spec:
  - changed-files:
      - any-glob-to-any-file:
          - 'Spec/**'
          - 'docs/**/*spec*.md'

Docker:
  - changed-files:
      - any-glob-to-any-file:
          - '**/Dockerfile'
          - '**/*.dockerfile'
          - '.dockerignore'
          - '.github/workflows/ci-docker*.yml'

WASM:
  - changed-files:
      - any-glob-to-any-file:
          - 'Build/Cmake/**/*wasm*'
          - '.github/workflows/*wasm*.yml'
          - '.github/scripts/*wasm*'

vcpkg:
  - changed-files:
      - any-glob-to-any-file:
          - 'ports/**'
          - '**/vcpkg.json'
          - '**/vcpkg-configuration.json'
          - '.github/workflows/ci-vcpkg-ports.yml'

BREW:
  - changed-files:
      - any-glob-to-any-file:
          - '**/brew*'
          - '**/Homebrew*'

NPM:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'
          - '**/package.json'
          - '**/package-lock.json'
