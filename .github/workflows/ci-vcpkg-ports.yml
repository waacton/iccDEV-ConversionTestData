###############################################################
#
# ci-vcpkg-ports.yml - Cross-platform vcpkg port overlay test
#
# Validates that the ports/iccdev overlay installs correctly
# on Windows, Linux, and macOS via vcpkg.
#
# Last Updated 2026-04-05 23:48:42 UTC by David Hoyt
#
###############################################################

name: ci-vcpkg-ports

# Existing vcpkg verification rows intentionally exceed the default yamllint
# line length. Keep the disable local to this workflow.
# yamllint disable rule:line-length

on:
  push:
    branches: [master]
    paths:
      - 'ports/**'
      - '.github/workflows/ci-vcpkg-ports.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ports/**'
      - '.github/workflows/ci-vcpkg-ports.yml'
permissions:
  contents: read

concurrency:
  group: "ci-vcpkg-ports-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  vcpkg-overlay-test:
    name: "vcpkg overlay - ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-24.04, macos-14]

    steps:
      # Checkout (pinned SHA, no credentials)
      - name: Checkout repository
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      # Bootstrap vcpkg
      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # Pin vcpkg to builtin-baseline from vcpkg.json for reproducibility
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          git -C "$RUNNER_TEMP/vcpkg" checkout 1940ee77e81573713c0d364c42f5990172198be1
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          # Pin vcpkg to builtin-baseline from vcpkg.json for reproducibility
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          git -C "$env:RUNNER_TEMP\vcpkg" checkout 1940ee77e81573713c0d364c42f5990172198be1
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg"
      # Install port via overlay
      - name: Install iccdev port (Unix)
        if: runner.os != 'Windows'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          RUNNER_OS: ${{ runner.os }}
          VCPKG_ICCDEV_SOURCE: ${{ github.workspace }}
          VCPKG_KEEP_ENV_VARS: VCPKG_ICCDEV_SOURCE
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TRIPLET="$([ "$RUNNER_OS" = "macOS" ] && echo "arm64-osx" || echo "x64-linux")"
          if [ "$RUNNER_OS" = "Linux" ]; then
            export VCPKG_FORCE_SYSTEM_BINARIES=1
            echo "Using runner-provided CMake/Ninja for Linux vcpkg install"
          fi
          echo "::group::vcpkg install iccdev[tools,xml,json]"
          EXIT_CODE=0
          "$VCPKG_ROOT/vcpkg" install "iccdev[tools,xml,json]" \
            --overlay-ports="$GITHUB_WORKSPACE/ports" \
            --triplet "$TRIPLET" \
            --x-install-root="$RUNNER_TEMP/vcpkg-installed" \
            --clean-after-build \
            --classic \
            2>&1 || EXIT_CODE=$?
          echo "::endgroup::"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::vcpkg install failed (exit $EXIT_CODE)"
            echo "::group::vcpkg buildtrees log (last 80 lines)"
            tail -80 "$VCPKG_ROOT/buildtrees/iccdev/"*.log 2>/dev/null || echo "No buildtree logs found"
            echo "::endgroup::"
            exit "$EXIT_CODE"
          fi
      - name: Install iccdev port (Windows)
        if: runner.os == 'Windows'
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
          VCPKG_ICCDEV_SOURCE: ${{ github.workspace }}
          VCPKG_KEEP_ENV_VARS: VCPKG_ICCDEV_SOURCE
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Write-Host "::group::vcpkg install iccdev[tools,xml,json]"
          & "$env:VCPKG_ROOT\vcpkg.exe" install 'iccdev[tools,xml,json]' `
            --overlay-ports="$env:GITHUB_WORKSPACE\ports" `
            --triplet x64-windows `
            --x-install-root="$env:RUNNER_TEMP\vcpkg-installed" `
            --clean-after-build `
            --classic
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::endgroup::"
            Write-Host "::error::vcpkg install failed (exit $LASTEXITCODE)"
            Write-Host "::group::vcpkg buildtrees log (last 80 lines)"
            Get-ChildItem "$env:VCPKG_ROOT\buildtrees\iccdev\*.log" -ErrorAction SilentlyContinue |
              ForEach-Object { Get-Content $_ -Tail 80 }
            Write-Host "::endgroup::"
            throw "vcpkg install failed with exit code $LASTEXITCODE"
          }
          Write-Host "::endgroup::"
      # Verify installed artifacts
      - name: Verify installed artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # Load sanitizers (prefer script, inline fallback for shallow clones)
          if [ -f .github/scripts/sanitize-sed.sh ]; then
            source .github/scripts/sanitize-sed.sh
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi
          TRIPLET="$([ "$RUNNER_OS" = "macOS" ] && echo "arm64-osx" || echo "x64-linux")"
          PREFIX="$RUNNER_TEMP/vcpkg-installed/$TRIPLET"
          errors=0
          # Check headers
          if [ -d "$PREFIX/include/RefIccMAX/IccProfLib2" ]; then
            hdr_count=$(find "$PREFIX/include/RefIccMAX/IccProfLib2" -name '*.h' | wc -l)
            echo "[OK] IccProfLib2 headers: $hdr_count files"
          else
            echo "[FAIL] IccProfLib2 headers NOT found"
            errors=$((errors + 1))
          fi
          # Check libraries
          for lib in libIccProfLib2 libIccXML2 libIccJSON2; do
            if ls "$PREFIX/lib/"${lib}* 1>/dev/null 2>&1; then
              echo "[OK] $lib found"
            else
              echo "[FAIL] $lib NOT found"
              errors=$((errors + 1))
            fi
          done
          # Check cmake config
          if [ -f "$PREFIX/share/RefIccMAX/RefIccMAXConfig.cmake" ] || \
             [ -f "$PREFIX/share/reficcmax/RefIccMAXConfig.cmake" ]; then
            echo "[OK] CMake config found"
          else
            echo "[FAIL] CMake config NOT found"
            errors=$((errors + 1))
          fi
          # Check tools
          for tool in iccDumpProfile iccRoundTrip iccFromXml iccToXml iccFromJson iccToJson; do
            if [ -x "$PREFIX/tools/iccdev/$tool" ]; then
              echo "[OK] Tool $tool found"
            else
              echo "[FAIL] Tool $tool NOT found"
              errors=$((errors + 1))
            fi
          done
          # Summary
          {
            echo "## vcpkg Port Verification - $(sanitize_line "$RUNNER_OS")"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Headers | $([ -d "$PREFIX/include/RefIccMAX/IccProfLib2" ] && echo '[OK]' || echo '[FAIL]') |"
            echo "| Libraries | $(ls "$PREFIX/lib/"libIccProfLib2* >/dev/null 2>&1 && echo '[OK]' || echo '[FAIL]') |"
            echo "| CMake config | $([ -f "$PREFIX/share/RefIccMAX/RefIccMAXConfig.cmake" ] || [ -f "$PREFIX/share/reficcmax/RefIccMAXConfig.cmake" ] && echo '[OK]' || echo '[FAIL]') |"
            echo "| Tools | $([ -x "$PREFIX/tools/iccdev/iccDumpProfile" ] && echo '[OK]' || echo '[FAIL]') |"
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors verification checks failed"
            exit 1
          fi
          echo "All verification checks passed [OK]"
      - name: Verify installed artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          # Load sanitizer (prefer script, inline fallback for shallow clones)
          if (Test-Path ".github/scripts/sanitize.ps1") {
            . .github/scripts/sanitize.ps1
          } else {
            function Sanitize-Line([string]$s) {
              $s = $s -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;' -replace '"','&quot;'
              return $s
            }
          }
          $prefix = "$env:RUNNER_TEMP\vcpkg-installed\x64-windows"
          $errors = 0
          # Check headers
          $hdrDir = "$prefix\include\RefIccMAX\IccProfLib2"
          if (Test-Path $hdrDir) {
            $count = (Get-ChildItem $hdrDir -Filter *.h).Count
            Write-Host "[OK] IccProfLib2 headers: $count files"
          } else {
            Write-Host "[FAIL] IccProfLib2 headers NOT found"
            $errors++
          }
          # Check libraries
          foreach ($lib in @('IccProfLib2-static.lib','IccXML2-static.lib','IccJSON2-static.lib')) {
            if (Test-Path "$prefix\lib\$lib") {
              Write-Host "[OK] $lib found"
            } else {
              Write-Host "[FAIL] $lib NOT found"
              $errors++
            }
          }
          # Check cmake config
          $cmakeFound = (Test-Path "$prefix\share\RefIccMAX\RefIccMAXConfig.cmake") -or
                        (Test-Path "$prefix\share\reficcmax\RefIccMAXConfig.cmake")
          if ($cmakeFound) {
            Write-Host "[OK] CMake config found"
          } else {
            Write-Host "[FAIL] CMake config NOT found"
            $errors++
          }
          # Check tools
          foreach ($tool in @('iccDumpProfile.exe','iccRoundTrip.exe','iccFromXml.exe','iccToXml.exe','iccFromJson.exe','iccToJson.exe')) {
            if (Test-Path "$prefix\tools\iccdev\$tool") {
              Write-Host "[OK] Tool $tool found"
            } else {
              Write-Host "[FAIL] Tool $tool NOT found"
              $errors++
            }
          }
          # Summary
          $os = Sanitize-Line "Windows"
          $summary = @"
          ## vcpkg Port Verification - $os
          | Check | Result |
          |-------|--------|
          | Headers | $(if (Test-Path $hdrDir) {'[OK]'} else {'[FAIL]'}) |
          | Libraries | $(if (Test-Path "$prefix\lib\IccProfLib2-static.lib") {'[OK]'} else {'[FAIL]'}) |
          | CMake config | $(if ($cmakeFound) {'[OK]'} else {'[FAIL]'}) |
          | Tools | $(if (Test-Path "$prefix\tools\iccdev\iccDumpProfile.exe") {'[OK]'} else {'[FAIL]'}) |
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          if ($errors -gt 0) {
            Write-Error "$errors verification checks failed"
            exit 1
          }
          Write-Host "All verification checks passed [OK]"
  # Manifest mode test (VS-bundled vcpkg)
  vcpkg-manifest-test:
    name: "vcpkg manifest - windows-2022"
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create manifest test project
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $testDir = "$env:RUNNER_TEMP\manifest-test"
          New-Item -ItemType Directory -Path $testDir -Force | Out-Null
          # Find the VS-bundled vcpkg baseline
          $vsRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise",
            "C:\Program Files\Microsoft Visual Studio\2022\Professional",
            "C:\Program Files\Microsoft Visual Studio\2022\Community",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools"
          )
          $bundleJson = $null
          foreach ($root in $vsRoots) {
            $candidate = Join-Path $root "VC\vcpkg\vcpkg-bundle.json"
            if (Test-Path $candidate) {
              $bundleJson = Get-Content $candidate -Raw
              break
            }
          }
          if ($bundleJson) {
            $baseline = ($bundleJson | ConvertFrom-Json).embeddedsha
            Write-Host "Using VS-bundled vcpkg baseline: $baseline"
          } else {
            Write-Host "::warning::VS-bundled vcpkg not found, using fallback baseline"
            $baseline = "3af1d1e60af2b2abf55760538cd607829029b07a"
          }
          # vcpkg.json manifest
          @"
          {
            "name": "iccdev-manifest-test",
            "version-string": "1.0.0",
            "builtin-baseline": "$baseline",
            "dependencies": [ "iccdev" ],
            "overrides": [
              { "name": "iccdev", "version": "2.3.2.0" }
            ]
          }
          "@ | Set-Content "$testDir\vcpkg.json" -Encoding UTF8
          # CMakeLists.txt
          @"
          cmake_minimum_required(VERSION 3.21)
          project(iccdev-manifest-test LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(RefIccMAX CONFIG REQUIRED)
          add_executable(test-iccdev test.cpp)
          target_link_libraries(test-iccdev PRIVATE
              RefIccMAX::IccProfLib2
          )
          "@ | Set-Content "$testDir\CMakeLists.txt" -Encoding UTF8
          # Minimal test source
          @"
          #include <cstdio>
          #include "IccProfile.h"
          #include "IccProfLibVer.h"
          int main() {
              std::printf("IccProfLib: %s\n", ICCPROFLIBVER);
              CIccProfile p; p.InitHeader();
              std::printf("OK\n");
              return 0;
          }
          "@ | Set-Content "$testDir\test.cpp" -Encoding UTF8
          Write-Host "Test project created at $testDir"
      - name: CMake configure (manifest mode)
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
          VCPKG_ICCDEV_SOURCE: ${{ github.workspace }}
          VCPKG_KEEP_ENV_VARS: VCPKG_ICCDEV_SOURCE
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $testDir = "$env:RUNNER_TEMP\manifest-test"
          $vsRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise",
            "C:\Program Files\Microsoft Visual Studio\2022\Professional",
            "C:\Program Files\Microsoft Visual Studio\2022\Community",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools"
          )
          $toolchain = $null
          foreach ($root in $vsRoots) {
            $candidate = Join-Path $root "VC\vcpkg\scripts\buildsystems\vcpkg.cmake"
            if (Test-Path $candidate) {
              $toolchain = $candidate
              break
            }
          }
          if (-not $toolchain) {
            throw "VS 2022 bundled vcpkg toolchain not found; this job must run on a VS 2022 runner such as windows-2022."
          }
          Write-Host "Toolchain: $toolchain"
          cmake -B "$testDir\build" -S $testDir `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_OVERLAY_PORTS="$env:GITHUB_WORKSPACE\ports" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -G "Visual Studio 17 2022" -A x64
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed" }
      - name: Build test project
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          cmake --build "$env:RUNNER_TEMP\manifest-test\build" --config Release
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }
      - name: Run test executable
        timeout-minutes: 1
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $exe = "$env:RUNNER_TEMP\manifest-test\build\Release\test-iccdev.exe"
          if (-not (Test-Path $exe)) { throw "test-iccdev.exe not found" }
          $output = (& $exe 2>&1) -join "`n"
          Write-Host $output
          if ($LASTEXITCODE -ne 0) { throw "Test executable failed" }
          if ($output -notmatch "IccProfLib") { throw "Missing IccProfLib version output" }
          if ($output -notmatch "OK") { throw "Missing OK output" }
          Write-Host "[OK] Manifest mode test passed"
          # Load sanitizer for summary output
          if (Test-Path ".github/scripts/sanitize.ps1") {
            . .github/scripts/sanitize.ps1
          }
          # Summary
          $summary = @"
          ## vcpkg Manifest Mode - Windows
          | Check | Result |
          |-------|--------|
          | CMake configure | [OK] |
          | Build | [OK] |
          | Run | [OK] |
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
