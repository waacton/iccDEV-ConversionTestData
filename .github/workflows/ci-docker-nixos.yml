# Intent: Build and publish iccDEV NixOS Docker container
###############################################################

name: ci-docker-nixos

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

on:
  workflow_dispatch:
  push:
    branches: [master, dockerfiles]
    paths:
      - 'Dockerfile.nixos'
      - '.github/workflows/ci-docker-nixos.yml'

jobs:
  build:
    name: "Build iccDEV NixOS Docker"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/iccdev-nixos" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile.nixos
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@2d094306a78d7bde297684f0120dfb41969c38c2 # v0.22.2
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@c44148e5bf178192efd8947e07a0d439a356c60b # v3.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@b74e95116c27d38263fc426c93ebfca07aa6197b # v3.0.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iccdev-nixos-sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Load test image
        run: |
          set -euo pipefail
          # Pull the image we just pushed to GHCR (avoids building twice)
          docker pull "${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}"
          docker tag  "${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}" iccdev-nixos-test:latest

      - name: Verify tools
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TOOL_COUNT=$(docker run --rm iccdev-nixos-test:latest sh -c \
            'find /workspace/iccDEV/Build/Tools -type f -executable | wc -l')
          echo "Tools built: $TOOL_COUNT"
          if [ "$TOOL_COUNT" -lt 12 ]; then
            echo "::error::Expected at least 12 tools, found $TOOL_COUNT"
            exit 1
          fi
          echo "### NixOS Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tools: $(sanitize_line "$TOOL_COUNT")" >> "$GITHUB_STEP_SUMMARY"
          TOOL_LIST=$(docker run --rm iccdev-nixos-test:latest sh -c \
            'find /workspace/iccDEV/Build/Tools -type f -executable -exec basename {} \; | sort')
          {
            echo '```'
            sanitize_print "$TOOL_LIST"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test tool execution
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          FAILURES=0
          echo "### Tool Tests" >> "$GITHUB_STEP_SUMMARY"
          for tool in iccToXml iccFromXml iccDumpProfile iccRoundTrip; do
            OUT=$(docker run --rm iccdev-nixos-test:latest "$tool" 2>&1 || true)
            if echo "$OUT" | grep -qiE "Usage:|IccProfLib"; then
              echo "✅ $tool" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error::Tool test failed: $tool"
              echo "❌ $tool" >> "$GITHUB_STEP_SUMMARY"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES tool test(s) failed"
            exit 1
          fi

      - name: Test iccToXml profile conversion
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "### iccToXml Profile Conversion" >> "$GITHUB_STEP_SUMMARY"
          docker run --rm iccdev-nixos-test:latest sh -c '
            set -euo pipefail
            cd /workspace/iccDEV
            iccToXml Testing/sRGB_v4_ICC_preference.icc /tmp/sRGB_v4.xml
            test -s /tmp/sRGB_v4.xml || { echo "ERROR: output XML is empty"; exit 1; }
            ls -lh /tmp/sRGB_v4.xml
            echo "=== First 20 lines of XML output ==="
            head -20 /tmp/sRGB_v4.xml
          ' 2>&1 | tee /tmp/iccToXml-output.txt
          {
            echo '```'
            sanitize_print "$(cat /tmp/iccToXml-output.txt)"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: docker rmi iccdev-nixos-test:latest || true
