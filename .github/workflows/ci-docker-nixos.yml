name: ci-docker-nixos

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

on:
  workflow_dispatch:

jobs:
  build:
    name: "Build iccDEV NixOS Docker"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/iccdev-nixos" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.nixos
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@f0d33c151c04af6fcbf4363834e838fcc7c87783 # v0.22.2
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275 # v3.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@b74e95116c27d38263fc426c93ebfca07aa6197b # v3.0.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iccdev-nixos-sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Load test image
        env:
          BASH_ENV: /dev/null
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # Pull the image we just pushed to GHCR (avoids building twice)
          docker pull "${IMAGE_REF}"
          docker tag  "${IMAGE_REF}" iccdev-nixos-test:latest

      - name: Verify tools
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TOOL_COUNT=$(docker run --rm iccdev-nixos-test:latest sh -c \
            'find /workspace/iccDEV/Build/Tools -type f -executable | wc -l')
          echo "Tools built: $TOOL_COUNT"
          if [ "$TOOL_COUNT" -lt 12 ]; then
            echo "::error::Expected at least 12 tools, found $TOOL_COUNT"
            exit 1
          fi
          echo "### NixOS Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tools: $(sanitize_line "$TOOL_COUNT")" >> "$GITHUB_STEP_SUMMARY"
          TOOL_LIST=$(docker run --rm iccdev-nixos-test:latest sh -c \
            'find /workspace/iccDEV/Build/Tools -type f -executable -exec basename {} \; | sort')
          {
            echo '```'
            sanitize_print "$TOOL_LIST"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test tool execution
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          FAILURES=0
          echo "### Tool Tests" >> "$GITHUB_STEP_SUMMARY"
          for tool in iccToXml iccFromXml iccToJson iccFromJson iccDumpProfile iccRoundTrip; do
            OUT=$(docker run --rm iccdev-nixos-test:latest "$tool" 2>&1 || true)
            if grep -qiE "Usage:|IccProfLib" <<< "$OUT"; then
              echo "✅ $tool" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error::Tool test failed: $tool"
              echo "❌ $tool" >> "$GITHUB_STEP_SUMMARY"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES tool test(s) failed"
            exit 1
          fi

      - name: Test iccToXml profile conversion
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "### iccToXml Profile Conversion" >> "$GITHUB_STEP_SUMMARY"
          docker run --rm iccdev-nixos-test:latest sh -c '
            set -euo pipefail
            cd /workspace/iccDEV
            iccToXml Testing/sRGB_v4_ICC_preference.icc /tmp/sRGB_v4.xml
            test -s /tmp/sRGB_v4.xml || { echo "ERROR: output XML is empty"; exit 1; }
            ls -lh /tmp/sRGB_v4.xml
            echo "=== First 20 lines of XML output ==="
            head -20 /tmp/sRGB_v4.xml
          ' 2>&1 | tee /tmp/iccToXml-output.txt
          {
            echo '```'
            sanitize_print "$(cat /tmp/iccToXml-output.txt)"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: docker rmi iccdev-nixos-test:latest || true

  prune:
    name: "Prune old container versions"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old package versions
        env:
          BASH_ENV: /dev/null
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""

          ORG="InternationalColorConsortium"
          PACKAGE="iccdev-nixos"
          CUTOFF=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)

          echo "Pruning ${PACKAGE} versions older than ${CUTOFF}"

          gh api --paginate \
            "/orgs/${ORG}/packages/container/${PACKAGE}/versions" |
          jq -r --arg cutoff "${CUTOFF}" '
            .[] | select(
              (.created_at < $cutoff) and
              ((.metadata.container.tags | index("latest")) == null)
            ) | .id
          ' > /tmp/prune-ids.txt

          TOTAL=$(wc -l < /tmp/prune-ids.txt | tr -d ' ')
          if [ "${TOTAL}" -eq 0 ]; then
            echo "No versions to prune"
            exit 0
          fi

          echo "Found ${TOTAL} versions to prune"
          DELETED=0
          FAILED=0
          while IFS= read -r vid; do
            if gh api --method DELETE \
              "/orgs/${ORG}/packages/container/${PACKAGE}/versions/${vid}" \
              2>/dev/null; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done < /tmp/prune-ids.txt

          echo "Pruned ${DELETED}/${TOTAL} old versions (${FAILED} failed)"
          rm -f /tmp/prune-ids.txt
