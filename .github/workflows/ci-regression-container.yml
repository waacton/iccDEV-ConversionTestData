name: ci-regression-container

permissions:
  contents: read

on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile.ci-regression'
      - '.github/workflows/ci-regression-container.yml'
  workflow_dispatch:

concurrency:
  group: "regression-container-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: "Build regression dependency image"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/master' && 'ghcr-publish' || 'ci-validation' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Resolve image name
        id: image
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ ! "$owner" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid repository owner for image name" >&2
            exit 1
          fi

          printf 'name=ghcr.io/%s/iccdev-ci-regression\n' "$owner" >> "$GITHUB_OUTPUT"  # elements-sanitized

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          cache-binary: false

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile.ci-regression
          tags: ${{ steps.meta.outputs.tags }}
          no-cache: true
          pull: true
          load: ${{ github.ref != 'refs/heads/master' }}
          push: ${{ github.ref == 'refs/heads/master' }}
          provenance: ${{ github.ref == 'refs/heads/master' && 'mode=max' || 'false' }}
          sbom: ${{ github.ref == 'refs/heads/master' }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

      - name: Attest build provenance
        if: github.ref == 'refs/heads/master'
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275  # v3.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Smoke test image
        env:
          BASH_ENV: /dev/null
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          EXPECTED_REF_NAME: ${{ github.ref_name }}
          EXPECTED_SHA: ${{ github.sha }}
          PUBLISH_IMAGE: ${{ github.ref == 'refs/heads/master' }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          if [ "$PUBLISH_IMAGE" = "true" ]; then
            TEST_IMAGE="$IMAGE_REF"
          else
            TEST_IMAGE="$(printf '%s\n' "$IMAGE_TAGS" | sed -n '1p')"
          fi

          image_sha="$(docker image inspect "$TEST_IMAGE" \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          image_ref_label="$(docker image inspect "$TEST_IMAGE" \
            --format '{{ index .Config.Labels "org.opencontainers.image.ref.name" }}')"
          if [ "$image_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::Image revision mismatch: $image_sha != $EXPECTED_SHA"
            exit 1
          fi
          if [ "$image_ref_label" != "$EXPECTED_REF_NAME" ]; then
            echo "::error::Image ref mismatch: $image_ref_label != $EXPECTED_REF_NAME"
            exit 1
          fi

          docker run --rm "$TEST_IMAGE" bash -lc '
            set -euo pipefail
            command -v git clang clang++ cmake make realpath
            clang --version | sed -n "1p"
            clang++ --version | sed -n "1p"
            cmake --version | sed -n "1p"
            /usr/bin/time --version | sed -n "1p"
            printf "int main(void){return 0;}\n" > /tmp/asan-smoke.c
            clang -fsanitize=address,undefined,integer,bounds,null,float-divide-by-zero,alignment,vla-bound \
              -fno-omit-frame-pointer -g -O0 /tmp/asan-smoke.c -o /tmp/asan-smoke
            /tmp/asan-smoke
          '

          docker run --rm \
            -v "$PWD":/workspace/iccDEV-src:ro \
            "$TEST_IMAGE" bash -lc '
            set -euo pipefail
            work="$(mktemp -d)"
            git config --global --add safe.directory /workspace/iccDEV-src
            git config --global --add safe.directory /workspace/iccDEV-src/.git
            git clone /workspace/iccDEV-src "$work/iccDEV"
            cd "$work/iccDEV/Build"
            git branch && echo "---" && git log --oneline -1
            SAN_FLAGS="-fsanitize=address,undefined,integer,bounds,null,float-divide-by-zero,alignment,vla-bound"
            export CXXFLAGS="$SAN_FLAGS -fno-omit-frame-pointer -g -O0"
            export LDFLAGS="$SAN_FLAGS"
            CC=clang CXX=clang++ cmake Cmake \
              -DCMAKE_BUILD_TYPE=Debug \
              -DENABLE_ASAN=ON \
              -DENABLE_UBSAN=ON \
              -DENABLE_TOOLS=ON
            make -j"$(nproc)" iccDumpProfile
            cd ../Testing/
            echo "=== Updating PATH ==="
            for d in ../Build/Tools/*; do
              [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
            done
            printf "%s\n%s\n%s\n" \
              "unsigned-integer-overflow:*/IccMD5.cpp" \
              "shift-base:*/IccMD5.cpp" \
              "shift-exponent:*/IccMD5.cpp" > silence.txt
            test -x ./CreateAllProfiles.sh
            test -x ./RunTests.sh
            test -x ./HDR/mkprofiles.sh
            test -x ./Display/RunProtoTests.sh
            test -x ./hybrid/BuildAndTest.sh
            test -x ./CalcTest/checkInvalidProfiles.sh
            test -x ./mcs/updateprev.sh
            test -x ./mcs/updateprevWithBkgd.sh
          '

      - name: Scan test image
        env:
          BASH_ENV: /dev/null
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          PUBLISH_IMAGE: ${{ github.ref == 'refs/heads/master' }}
          TRIVY_IMAGE: aquasec/trivy@sha256:5c59e08f980b5d4d503329773480fcea2c9bdad7e381d846fbf9f2ecb8050f6b
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          TRIVY_CACHE="${RUNNER_TEMP:-/tmp}/trivy-regression-container-cache"
          rm -rf "$TRIVY_CACHE"
          mkdir -p "$TRIVY_CACHE"
          if [ "$PUBLISH_IMAGE" = "true" ]; then
            TEST_IMAGE="$IMAGE_REF"
          else
            TEST_IMAGE="$(printf '%s\n' "$IMAGE_TAGS" | sed -n '1p')"
          fi
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$TRIVY_CACHE":/root/.cache/ \
            "$TRIVY_IMAGE" \
            image --scanners vuln,secret --ignore-unfixed \
            --severity HIGH,CRITICAL --exit-code 1 "$TEST_IMAGE"

      - name: Generate summary
        env:
          BASH_ENV: /dev/null
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          {
            echo "### ci-regression container"
            echo ""
            echo "| Component | Value |"
            echo "|-----------|-------|"
            echo "| Image | \`${IMAGE_NAME}\` |"
            echo "| Digest | \`${IMAGE_DIGEST}\` |"
            echo "| Dockerfile | \`Dockerfile.ci-regression\` |"
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized
