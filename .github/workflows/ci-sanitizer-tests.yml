#
# Intent: Test sanitize-sed.sh and PowerShell sanitizer
#
# Last Updated: 2026-03-02 01:07Z by David Hoyt
#
#               Runs .github/tests/test_sanitization.sh,
#               test-xss-signatures.sh, and test-xss-extended.sh
#               against the canonical sanitize-sed.sh v3.
#
###############################################################

name: "ci-sanitizer-tests"

# Existing defense-layer table rows intentionally exceed the default yamllint
# line length. Keep the disable local to this workflow.
# yamllint disable rule:line-length

permissions:
  contents: read

env:
  TRUSTED_SCRIPTS: ${{ github.workspace }}/trusted/.github/scripts

on:
  push:
    branches: [master]
    paths:
      - '.github/scripts/sanitize-sed.sh'
      - '.github/tests/**'
      - '.github/workflows/ci-sanitizer-tests.yml'

  pull_request:
    branches: [master]
    paths:
      - '.github/scripts/sanitize-sed.sh'
      - '.github/tests/**'
      - '.github/workflows/ci-sanitizer-tests.yml'

concurrency:
  group: sanitizer-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bash-tests:
    name: Bash Sanitizer Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Harden Bash Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      # preflight: allow-pr-script-execution reason=sanitizer-under-test
      - name: Verify sanitize-sed.sh exists
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          if [ ! -r .github/scripts/sanitize-sed.sh ]; then
            echo "ERROR: sanitize-sed.sh not found" >&2
            exit 1
          fi
          source .github/scripts/sanitize-sed.sh
          echo "Sanitizer version: $(sanitizer_version)"

      # preflight: allow-pr-script-execution reason=sanitizer-under-test
      - name: Run core sanitization tests
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          bash .github/tests/test_sanitization.sh

      # preflight: allow-pr-script-execution reason=sanitizer-under-test
      - name: Run XSS signature tests
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          bash .github/tests/test-xss-signatures.sh

      # preflight: allow-pr-script-execution reason=sanitizer-under-test
      - name: Run extended XSS tests
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          bash .github/tests/test-xss-extended.sh

      # preflight: allow-pr-script-execution reason=sanitizer-under-test
      - name: "Reproduce trivy#10253 attack pattern"
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          # Simulate a malicious branch ref containing hidden Unicode
          # chars from the aquasecurity/trivy#10253 PR attack.
          # The real attack used github.head_ref directly in a run: block,
          # where hidden chars in the ref enabled shell injection.
          # Keep this workflow ASCII by passing the payload as hex and
          # reconstructing it at runtime before sanitizing.
          SIMULATED_HEAD_REF_HEX: "666561747572652ff09fa496f09fa69e2d68696464656e2d6368617273"
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          SIMULATED_HEAD_REF="$(printf '%s' "${SIMULATED_HEAD_REF_HEX}" | xxd -r -p)"

          echo "=== trivy#10253 Attack Reproduction ==="
          echo ""
          echo "Simulated malicious head_ref (hex payload via env: block):"
          echo "  raw: ${SIMULATED_HEAD_REF}"
          echo ""

          # Defense layer 1: never interpolate github.head_ref directly in run.
          echo "[OK] Defense 1: no direct head_ref interpolation in run block"

          # Defense layer 2: sanitize_ref strips non-ASCII
          SAFE_REF=$(sanitize_ref "${SIMULATED_HEAD_REF}")
          echo "  sanitize_ref: [${SAFE_REF}]"
          if [[ "${SAFE_REF}" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "[OK] Defense 2: sanitize_ref - ASCII-only output"
          else
            echo "[FAIL] sanitize_ref produced non-ASCII output"
            exit 1
          fi

          # Defense layer 3: sanitize_line strips Unicode controls
          SAFE_LINE=$(sanitize_line "${SIMULATED_HEAD_REF}")
          echo "  sanitize_line: [${SAFE_LINE}]"
          echo "[OK] Defense 3: sanitize_line - Unicode controls stripped"

          # Test with actual hidden chars from the screenshot
          # \ud83e\udd16 = U+1F916, \ud83e\udd9e = U+1F99E
          ATTACK_REF=$(printf 'refs/heads/fix\xf0\x9f\xa4\x96\xf0\x9f\xa6\x9e')
          SAFE=$(sanitize_ref "${ATTACK_REF}")
          echo ""
          echo "  Attack ref with emoji surrogates:"
          echo "  raw hex: $(printf '%s' "${ATTACK_REF}" | xxd -p)"
          echo "  sanitized: [${SAFE}]"
          if [[ "${SAFE}" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "[OK] Emoji surrogates stripped to ASCII"
          else
            echo "[FAIL] non-ASCII survived sanitize_ref"
            exit 1
          fi

          # Test bidi override + command injection attempt
          BIDI_ATTACK="$(printf '%s' "666561747572652fe280ae24286375726c206576696c2e636f6d29e280ac" | xxd -r -p)"
          SAFE_BIDI=$(sanitize_ref "${BIDI_ATTACK}")
          DOLLAR_PAREN="\$("
          echo ""
          echo "  Bidi + command injection attempt:"
          echo "  sanitized: [${SAFE_BIDI}]"
          if [[ "${SAFE_BIDI}" != *"${DOLLAR_PAREN}"* ]]; then
            echo "[OK] Command injection neutralized"
          else
            echo "[FAIL] shell metacharacters survived"
            exit 1
          fi

          echo ""
          echo "=== All trivy#10253 defenses verified ==="

      - name: Checkout trusted sanitizer helpers
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          path: trusted
          sparse-checkout: .github/scripts
          fetch-depth: 1
          persist-credentials: false

      - name: Generate step summary
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          if [ ! -r "$TRUSTED_SCRIPTS/sanitize-sed.sh" ]; then
            echo "sanitize-sed.sh missing - cannot generate summary" >&2
            exit 0
          fi
          # shellcheck disable=SC1090
          source "$TRUSTED_SCRIPTS/sanitize-sed.sh"
          {
            echo "## Sanitizer Test Results"
            echo ""
            echo "| Suite | Description | Status |"
            echo "|-------|-------------|--------|"
            echo "| test_sanitization.sh | Core + shell injection + boundary tests | PASS |"
            echo "| test-xss-signatures.sh | XSS vector neutralization tests | PASS |"
            echo "| test-xss-extended.sh | Combined + control char fuzzing tests | PASS |"
            echo "| trivy#10253 reproduction | Hidden Unicode in branch ref | PASS |"
            echo ""
            echo "### Defense Layers Against Hidden Unicode Attack (trivy#10253)"
            echo ""
            echo "| Layer | Mechanism | What It Stops |"
            echo "|-------|-----------|---------------|"
            echo "| 1. env: block | All context expressions (github.head_ref etc.) in env:, not run: | Shell interpretation of hidden chars |"
            echo "| 2. sanitize_ref() | ASCII allowlist \`[A-Za-z0-9._/-]\` | All non-ASCII including emoji surrogates |"
            echo "| 3. sanitize_line() | Strips U+200B-200F, U+202A-202F, U+2060-2069, U+FEFF | Bidi overrides, zero-width chars, BOM |"
            echo "| 4. Canonicalize() + env: block | PowerShell filters control/bidi ranges; env: block prevents shell interpretation | Windows protection without claiming emoji or metacharacter stripping |"
            echo ""
            echo "**Sanitizer version:** \`$(sanitizer_version)\`"
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

  powershell-tests:
    name: PowerShell Sanitizer Tests
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Verify PowerShell Canonicalize function
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          $ErrorActionPreference = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          # Define Canonicalize inline (matches ci-pr-win.yml)
          function Canonicalize([string]$s) {
              if (-not $s) { return "" }
              $s = $s.Trim()
              $s = $s.Replace("`r","").Replace("`n","")
              $s = -join ($s.ToCharArray() | Where-Object {
                  $c = [int]$_
                  $c -ge 32 -and $c -ne 127 -and
                  -not ($c -ge 0x200B -and $c -le 0x200F) -and
                  -not ($c -ge 0x2028 -and $c -le 0x202F) -and
                  -not ($c -ge 0x2060 -and $c -le 0x2069) -and
                  $c -ne 0xFEFF -and
                  -not ($c -ge 0xFFF9 -and $c -le 0xFFFB)
              })
              return $s
          }

          $pass = 0
          $fail = 0

          function Assert-Eq {
              param([string]$Name, [string]$Expected, [string]$Actual)
              if ($Actual -eq $Expected) {
                  Write-Host "  PASS: $Name" -ForegroundColor Green
                  $script:pass++
              } else {
                  Write-Host "  FAIL: $Name" -ForegroundColor Red
                  Write-Host "    Expected: [$Expected]"
                  Write-Host "    Actual:   [$Actual]"
                  $script:fail++
              }
          }

          Write-Host "=== PowerShell Canonicalize Tests ==="

          # Basic
          Assert-Eq "Clean string" "hello world" (Canonicalize "hello world")
          Assert-Eq "Empty string" "" (Canonicalize "")

          # Control chars
          Assert-Eq "Null byte" "testvalue" (Canonicalize "test$([char]0)value")
          Assert-Eq "CR/LF" "line1line2" (Canonicalize "line1`r`nline2")
          Assert-Eq "Bell char" "testbell" (Canonicalize "test$([char]7)bell")

          # Unicode bidi (Pattern 1)
          Assert-Eq "Bidi RLO (U+202E)" "safetext" (Canonicalize "safe$([char]0x202E)text")
          Assert-Eq "Bidi LRE (U+202A)" "normaltext" (Canonicalize "normal$([char]0x202A)text")
          Assert-Eq "Bidi LRI (U+2066)" "leftright" (Canonicalize "left$([char]0x2066)right")
          Assert-Eq "Bidi PDI (U+2069)" "ab" (Canonicalize "a$([char]0x2069)b")

          # Zero-width chars (Pattern 2)
          Assert-Eq "ZWS (U+200B)" "isAdmin" (Canonicalize "is$([char]0x200B)Admin")
          Assert-Eq "ZWNJ (U+200C)" "password" (Canonicalize "pass$([char]0x200C)word")
          Assert-Eq "ZWJ (U+200D)" "runcommand" (Canonicalize "run$([char]0x200D)command")
          Assert-Eq "BOM (U+FEFF)" "malicious" (Canonicalize "$([char]0xFEFF)malicious")
          Assert-Eq "Word joiner (U+2060)" "testvalue" (Canonicalize "test$([char]0x2060)value")

          # Interlinear annotation
          Assert-Eq "U+FFF9" "ab" (Canonicalize "a$([char]0xFFF9)b")
          Assert-Eq "U+FFFB" "cd" (Canonicalize "c$([char]0xFFFB)d")

          # Homoglyphs preserved (valid Unicode letters)
          $cyrillic_o = [char]0x043E
          Assert-Eq "Cyrillic preserved" "micr${cyrillic_o}soft" (Canonicalize "micr${cyrillic_o}soft")

          # trivy#10253: emoji surrogates in branch ref
          $robot = [char]::ConvertFromUtf32(0x1F916)
          $lobster = [char]::ConvertFromUtf32(0x1F99E)
          $attackRef = "feature/${robot}${lobster}-test"
          $result = Canonicalize $attackRef
          Write-Host "  trivy#10253 emoji ref: [$result]"
          Write-Host "  (emoji preserved - defense is env: block, not char strip)"

          # Shell metacharacter injection (Canonicalize preserves these -
          # defense is env: block indirection, not char stripping)
          Assert-Eq "Dollar-paren preserved" 'test$(whoami)end' (Canonicalize 'test$(whoami)end')
          Assert-Eq "Backtick preserved" 'test`id`end' (Canonicalize 'test`id`end')
          Assert-Eq "Pipe preserved" 'test|cat' (Canonicalize 'test|cat')
          Assert-Eq "Semicolon preserved" 'test;ls' (Canonicalize 'test;ls')

          # Newline injection
          $nl_input = "line1`nline2"
          $nl_result = Canonicalize $nl_input
          Assert-Eq "Newline stripped" "line1line2" $nl_result

          # Tab character
          $tab_input = "col1`tcol2"
          $tab_result = Canonicalize $tab_input
          Assert-Eq "Tab stripped" "col1col2" $tab_result

          # Line separator U+2028, Paragraph separator U+2029
          Assert-Eq "Line separator (U+2028)" "ab" (Canonicalize "a$([char]0x2028)b")
          Assert-Eq "Para separator (U+2029)" "cd" (Canonicalize "c$([char]0x2029)d")

          Write-Host ""
          Write-Host "Results: $pass passed, $fail failed"
          if ($fail -gt 0) { exit 1 }
          Write-Host "All PowerShell tests passed!" -ForegroundColor Green
