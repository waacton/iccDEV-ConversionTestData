###############################################################
#
# Copyright (c) 2026 International Color Consortium.
#                 All rights reserved.
#                 https://color.org
#
# Intent: Build iccDEV with ASAN+UBSAN instrumentation,
#         generate all test profiles, then exercise every
#         CLI tool with the widest possible option coverage.
#         Continue on individual test failure and report ALL
#         findings at the end.
#
# Hardening:
#   - sanitize-sed.sh sourced in every step
#   - BASH_ENV=/dev/null to block .bashrc injection
#   - Pinned action SHAs (no floating tags)
#   - persist-credentials: false on checkout
#   - All user-controllable inputs neutralized via env: block
#   - Minimal permissions (contents: read)
#
# Coverage:
#   - CreateAllProfiles.sh (80 profiles from XML)
#   - HDR/mkprofiles.sh (10 HDR profiles)
#   - CalcTest/checkInvalidProfiles.sh (77 invalid profile checks)
#   - RunTests.sh (19 named color / PCC / spectral tests)
#   - Display/RunProtoTest.sh (6 Rec2020 spectral tests)
#   - iccDumpProfile: ALL tags on every generated profile
#   - iccToXml: every generated profile
#   - iccFromXml: XML round-trip on every generated profile
#   - iccRoundTrip: intents 0-3 + MPE on sRGB profile
#   - iccFromCube: identity and warm-film .cube files
#   - iccApplyNamedCmm: 5 encodings, 4 intents, chained profiles
#   - iccApplyToLink: DeviceLink v4/v5, .cube output, varied LUT sizes
#   - iccApplySearch: sRGB self-search with init
#   - iccTiffDump: spectral TIFF from hybrid/Data
#   - iccSpecSepToTiff: spectral separation pipeline
#   - Image tools: usage/help check
#   - Identity curve regression (PR #728)
#
###############################################################

name: iccDEV Tool Tests

permissions:
  contents: read

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: iccdev-tool-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tool-tests:
    name: "iccDEV Tools - ASAN+UBSAN"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Harden Bash environment
        env:
          BASH_ENV: /dev/null
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Ref:    ${WORKFLOW_REF}"
          echo "Commit: ${WORKFLOW_SHA}"

      - name: Install build dependencies
        env:
          BASH_ENV: /dev/null
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            clang-18 clang++-18 llvm-18 \
            libxml2-dev libtiff-dev libjpeg-dev libpng-dev \
            zlib1g-dev liblzma-dev nlohmann-json3-dev \
            libwxgtk3.2-dev wx-common libssl-dev libclang-rt-18-dev

      - name: Build iccDEV (Debug + ASAN + UBSAN)
        env:
          BASH_ENV: /dev/null
          CC: clang-18
          CXX: clang++-18
          UBSAN_IGNORELIST: .github/ci/ubsan-ignorelist.txt
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          IGNORELIST_FLAG=""
          if [[ -f "${UBSAN_IGNORELIST}" ]]; then
            IGNORELIST_FLAG="-fsanitize-ignorelist=$(pwd)/${UBSAN_IGNORELIST}"
          fi

          mkdir -p build && cd build
          cmake ../Build/Cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined,integer -fno-omit-frame-pointer -O0 -g3 ${IGNORELIST_FLAG}" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined,integer -fno-omit-frame-pointer -O0 -g3 -std=c++17 ${IGNORELIST_FLAG}" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined,integer" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined,integer" \
            -DENABLE_TOOLS=ON \
            -DENABLE_SHARED_LIBS=ON \
            -Wno-dev
          make -j"$(nproc)"

          echo ""
          echo "=== Built Tool Binaries ==="
          TOOL_COUNT=0
          for tool_dir in Tools/*/; do
            dir_name="$(basename "$tool_dir")"
            tool_bin_name="$(echo "${dir_name:0:1}" | tr '[:upper:]' '[:lower:]')${dir_name:1}"
            tool_bin="$tool_dir/$tool_bin_name"
            if [ -x "$tool_bin" ]; then
              TOOL_COUNT=$((TOOL_COUNT + 1))
              echo "  [OK] $tool_bin_name"
            fi
          done
          echo "Built $TOOL_COUNT tool binaries"

      - name: Generate test profiles (CreateAllProfiles + HDR)
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "detect_leaks=0,halt_on_error=0"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          for d in "${WORKSPACE_DIR}"/build/Tools/*/; do
            [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
          done

          echo "=== CreateAllProfiles.sh ==="
          cd "${WORKSPACE_DIR}/Testing"
          timeout 300 sh CreateAllProfiles.sh 2>&1 || {
            rc=$?
            echo "WARN: CreateAllProfiles.sh exited $rc"
          }
          PROFILE_COUNT=$(find . -name '*.icc' | wc -l)
          echo "Generated $PROFILE_COUNT profiles in Testing/"

          echo ""
          echo "=== HDR/mkprofiles.sh ==="
          cd "${WORKSPACE_DIR}/Testing/HDR"
          timeout 120 sh mkprofiles.sh 2>&1 || {
            rc=$?
            echo "WARN: HDR/mkprofiles.sh exited $rc"
          }
          HDR_COUNT=$(find . -name '*.icc' | wc -l)
          echo "Generated $HDR_COUNT HDR profiles"

          echo ""
          echo "=== Total profile inventory ==="
          find "${WORKSPACE_DIR}/Testing" -name '*.icc' | wc -l

      - name: "Test 1: iccDumpProfile ALL on every generated profile"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          DUMP="${WORKSPACE_DIR}/build/Tools/IccDumpProfile/iccDumpProfile"
          OUTDIR="/tmp/iccdev-tool-output/dump-all"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0; TOTAL=0
          while IFS= read -r icc; do
            TOTAL=$((TOTAL + 1))
            base="$(basename "$icc" .icc)"
            logf="$OUTDIR/${base}.log"
            timeout 30 "$DUMP" "$icc" ALL > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $base"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $base"
            else
              PASS=$((PASS + 1))
            fi
          done < <(find "${WORKSPACE_DIR}/Testing" -name '*.icc' -type f | sort)

          echo ""
          echo "iccDumpProfile ALL: $TOTAL tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 2: iccDumpProfile -v (validation mode) on every profile"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          DUMP="${WORKSPACE_DIR}/build/Tools/IccDumpProfile/iccDumpProfile"
          OUTDIR="/tmp/iccdev-tool-output/dump-validate"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0; TOTAL=0
          while IFS= read -r icc; do
            TOTAL=$((TOTAL + 1))
            base="$(basename "$icc" .icc)"
            logf="$OUTDIR/${base}.log"
            timeout 30 "$DUMP" -v "$icc" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $base"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $base"
            else
              PASS=$((PASS + 1))
            fi
          done < <(find "${WORKSPACE_DIR}/Testing" -name '*.icc' -type f | sort)

          echo ""
          echo "iccDumpProfile -v: $TOTAL tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 3: iccToXml on every generated profile"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          TOXML="${WORKSPACE_DIR}/build/Tools/IccToXml/iccToXml"
          OUTDIR="/tmp/iccdev-tool-output/toxml"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0; READ_FAIL=0; TOTAL=0
          while IFS= read -r icc; do
            TOTAL=$((TOTAL + 1))
            base="$(basename "$icc" .icc)"
            xmlout="$OUTDIR/${base}.xml"
            logf="$OUTDIR/${base}.log"
            timeout 30 "$TOXML" "$icc" "$xmlout" > "$logf" 2>&1 && rc=0 || rc=$?
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $base"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $base"
            elif grep -q "Unable to read" "$logf" 2>/dev/null; then
              READ_FAIL=$((READ_FAIL + 1)); FAIL=$((FAIL + 1))
              echo "  [READ_FAIL] $base"
            elif [ "$rc" -ne 0 ]; then
              FAIL=$((FAIL + 1))
              echo "  [EXIT $rc] $base"
            elif [ ! -s "$xmlout" ]; then
              FAIL=$((FAIL + 1))
              echo "  [EMPTY] $base"
            else
              PASS=$((PASS + 1))
            fi
          done < <(find "${WORKSPACE_DIR}/Testing" -name '*.icc' -type f | sort)

          echo ""
          echo "iccToXml: $TOTAL tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN READ_FAIL=$READ_FAIL)"

      - name: "Test 4: iccFromXml round-trip (XML->ICC) on successful conversions"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          FROMXML="${WORKSPACE_DIR}/build/Tools/IccFromXml/iccFromXml"
          OUTDIR="/tmp/iccdev-tool-output/fromxml-rt"
          XMLDIR="/tmp/iccdev-tool-output/toxml"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0; TOTAL=0
          for xmlf in "$XMLDIR"/*.xml; do
            [ -f "$xmlf" ] || continue
            [ -s "$xmlf" ] || continue
            TOTAL=$((TOTAL + 1))
            base="$(basename "$xmlf" .xml)"
            iccout="$OUTDIR/${base}_rt.icc"
            logf="$OUTDIR/${base}.log"
            timeout 30 "$FROMXML" "$xmlf" "$iccout" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $base"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $base"
            else
              PASS=$((PASS + 1))
            fi
          done

          echo ""
          echo "iccFromXml RT: $TOTAL tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 5: iccRoundTrip (intents 0-3 + MPE)"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          RT="${WORKSPACE_DIR}/build/Tools/IccRoundTrip/iccRoundTrip"
          OUTDIR="/tmp/iccdev-tool-output/roundtrip"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0

          # Test sRGB with all 4 intents + MPE flag
          SRGB="${WORKSPACE_DIR}/Testing/Display/sRGB_D65_MAT.icc"
          if [ ! -f "$SRGB" ]; then
            SRGB="$(find "${WORKSPACE_DIR}/Testing" -name 'sRGB_D65_MAT.icc' -type f | sed -n '1,1p')"
          fi

          run_rt() {
            local label="$1"; shift
            local logf="$OUTDIR/rt-${label}.log"
            timeout 30 "$RT" "$@" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $label"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $label"
            else
              PASS=$((PASS + 1))
              echo "  [OK]    $label"
            fi
          }

          if [ -n "${SRGB:-}" ] && [ -f "$SRGB" ]; then
            run_rt "sRGB-intent0" "$SRGB" 0
            run_rt "sRGB-intent1" "$SRGB" 1
            run_rt "sRGB-intent2" "$SRGB" 2
            run_rt "sRGB-intent3" "$SRGB" 3
            run_rt "sRGB-MPE"     "$SRGB" 1 1
          fi

          # Test a few diverse profiles
          for p in CMYK-3DLUTs/CMYK-3DLUTs.icc Display/Rec2020rgbSpectral.icc Display/LCDDisplay.icc; do
            pf="${WORKSPACE_DIR}/Testing/$p"
            if [ -f "$pf" ]; then
              pbase="$(basename "$pf" .icc)"
              run_rt "${pbase}-intent1" "$pf" 1
            fi
          done

          echo ""
          echo "iccRoundTrip: $((PASS + FAIL)) tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 6: iccApplyNamedCmm (encodings, intents, chains)"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          APPLYCMM="${WORKSPACE_DIR}/build/Tools/IccApplyNamedCmm/iccApplyNamedCmm"
          OUTDIR="/tmp/iccdev-tool-output/applynamedcmm"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0

          SRGB="${WORKSPACE_DIR}/Testing/Display/sRGB_D65_MAT.icc"

          # Create simple RGB test data (3 lines: black, white, mid-gray)
          TESTDATA="/tmp/iccdev-tool-output/rgb-test-data.txt"
          printf "0 0 0\n255 255 255\n128 128 128\n" > "$TESTDATA"

          run_cmm() {
            local label="$1"; shift
            local logf="$OUTDIR/cmm-${label}.log"
            timeout 30 "$APPLYCMM" "$@" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $label"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $label"
            else
              PASS=$((PASS + 1))
              echo "  [OK]    $label"
            fi
          }

          if [ -f "$SRGB" ]; then
            # Encoding sweep: 0=Value 1=Percent 2=UnitFloat 3=Float 5=16Bit
            for enc in 0 1 2 3 5; do
              run_cmm "sRGB-enc${enc}" "$TESTDATA" "$enc" 0 "$SRGB" 1
            done
            # Intent sweep: 0=Perceptual 1=Relative 2=Saturation 3=Absolute
            for intent in 0 1 2 3; do
              run_cmm "sRGB-intent${intent}" "$TESTDATA" 0 0 "$SRGB" "$intent"
            done
            # Interpolation: 0=Linear 1=Tetrahedral
            run_cmm "sRGB-interp1" "$TESTDATA" 0 1 "$SRGB" 1
            # Chained: sRGB -> sRGB
            run_cmm "sRGB-chain" "$TESTDATA" 0 0 "$SRGB" 1 "$SRGB" 1
          fi

          # CMYK data test
          CMYK="${WORKSPACE_DIR}/Testing/CMYK-3DLUTs/CMYK-3DLUTs.icc"
          if [ -f "$CMYK" ]; then
            CMYKDATA="/tmp/iccdev-tool-output/cmyk-test-data.txt"
            printf "0 0 0 0\n100 0 0 0\n0 100 0 0\n0 0 100 0\n0 0 0 100\n" > "$CMYKDATA"
            run_cmm "CMYK-enc0" "$CMYKDATA" 0 0 "$CMYK" 1
          fi

          echo ""
          echo "iccApplyNamedCmm: $((PASS + FAIL)) tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 7: iccApplyToLink (DeviceLink + .cube output)"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          LINK="${WORKSPACE_DIR}/build/Tools/IccApplyToLink/iccApplyToLink"
          OUTDIR="/tmp/iccdev-tool-output/applytolink"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0

          SRGB="${WORKSPACE_DIR}/Testing/Display/sRGB_D65_MAT.icc"

          run_link() {
            local label="$1"; shift
            local logf="$OUTDIR/link-${label}.log"
            timeout 60 "$LINK" "$@" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $label"
            elif grep -q "runtime error:" "$logf" 2>/dev/null; then
              UBSAN=$((UBSAN + 1)); FAIL=$((FAIL + 1))
              echo "  [UBSAN] $label"
            else
              PASS=$((PASS + 1))
              echo "  [OK]    $label"
            fi
          }

          if [ -f "$SRGB" ]; then
            # link_type=0 (DeviceLink v4), varied LUT sizes
            run_link "v4-lut9"  "$OUTDIR/link_v4_9.icc"  0 9  0 "sRGB-9"  0.0 1.0 0 0 "$SRGB" 1
            run_link "v4-lut17" "$OUTDIR/link_v4_17.icc" 0 17 0 "sRGB-17" 0.0 1.0 0 0 "$SRGB" 1
            run_link "v4-lut33" "$OUTDIR/link_v4_33.icc" 0 33 0 "sRGB-33" 0.0 1.0 0 0 "$SRGB" 1
            # link_type=0, option=1 (v5)
            run_link "v5-lut17" "$OUTDIR/link_v5_17.icc" 0 17 1 "sRGB-v5" 0.0 1.0 0 0 "$SRGB" 1
            # .cube output (link_type=1)
            run_link "cube-lut9" "$OUTDIR/srgb.cube" 1 9 6 "sRGB-cube" 0.0 1.0 0 0 "$SRGB" 1
            # Tetrahedral interpolation
            run_link "tet-lut9" "$OUTDIR/link_tet.icc" 0 9 0 "sRGB-tet" 0.0 1.0 0 1 "$SRGB" 1
            # first_transform=1 (destination space first)
            run_link "dst-first" "$OUTDIR/link_dst.icc" 0 9 0 "sRGB-dst" 0.0 1.0 1 0 "$SRGB" 1
          fi

          echo ""
          echo "iccApplyToLink: $((PASS + FAIL)) tested, $PASS pass, $FAIL fail (ASAN=$ASAN UBSAN=$UBSAN)"

      - name: "Test 8: iccFromCube (.cube LUT import)"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          FROMCUBE="${WORKSPACE_DIR}/build/Tools/IccFromCube/iccFromCube"
          OUTDIR="/tmp/iccdev-tool-output/fromcube"
          mkdir -p "$OUTDIR"

          PASS=0; FAIL=0; ASAN=0; UBSAN=0

          run_cube() {
            local label="$1"; shift
            local logf="$OUTDIR/cube-${label}.log"
            timeout 30 "$FROMCUBE" "$@" > "$logf" 2>&1 || true
            if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
              ASAN=$((ASAN + 1)); FAIL=$((FAIL + 1))
              echo "  [ASAN]  $label"
