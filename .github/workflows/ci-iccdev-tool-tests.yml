# Intent: Reusable iccDEV ASAN+UBSAN tool regression gate.
#         Builds the CMake/CTest test surface and runs the
#         script-backed suites through standard CTest entry points.
#
###############################################################

name: ci-regression-checks

permissions:
  contents: read
  packages: read

on:
  workflow_call:
    inputs:
      run_hybrid_timing:
        description: 'Run the hybrid iccApplyProfiles timing matrix'
        required: false
        default: false
        type: boolean
      hybrid_timing_threads:
        description: 'Comma-separated iccApplyProfiles thread variants'
        required: false
        default: 'baseline,2,4,8'
        type: string
      hybrid_timing_timeout:
        description: 'Timeout in seconds for each timing variant'
        required: false
        default: '60'
        type: string
      hybrid_timing_cases:
        description: 'Comma-separated hybrid timing cases'
        required: false
        default: 'cmykw,kw-mcs'
        type: string
      hybrid_timing_band_rows:
        description: 'Optional row band height for hybrid timing'
        required: false
        default: ''
        type: string
      hybrid_timing_instrument:
        description: 'Emit iccApplyProfiles and CMM timing instrumentation'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      run_hybrid_timing:
        description: 'Run the hybrid iccApplyProfiles timing matrix'
        required: false
        default: true
        type: boolean
      hybrid_timing_threads:
        description: 'Comma-separated iccApplyProfiles thread variants'
        required: false
        default: 'baseline,2,4,8'
        type: string
      hybrid_timing_timeout:
        description: 'Timeout in seconds for each timing variant'
        required: false
        default: '60'
        type: string
      hybrid_timing_cases:
        description: 'Comma-separated hybrid timing cases'
        required: false
        default: 'cmykw,kw-mcs'
        type: string
      hybrid_timing_band_rows:
        description: 'Optional row band height for hybrid timing'
        required: false
        default: ''
        type: string
      hybrid_timing_instrument:
        description: 'Emit iccApplyProfiles and CMM timing instrumentation'
        required: false
        default: false
        type: boolean
      thread_linkage_build_type:
        description: 'Build type for the manual RefIccMAX thread linkage check'
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo
      thread_linkage_ipo:
        description: 'Enable CMAKE_INTERPROCEDURAL_OPTIMIZATION for the manual check'
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tool-tests:
    name: "iccDEV Tools - CTest ASAN+UBSAN"
    runs-on: ubuntu-24.04
    container:
      # yamllint disable rule:line-length
      image: ghcr.io/internationalcolorconsortium/iccdev-ci-regression@sha256:9e41dbc8e0fef8b06ebd932154214dcc65b0331fcf6188a89ce0989439608c76
      # yamllint enable rule:line-length
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    timeout-minutes: 45
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    env:
      BASH_ENV: /dev/null
      BUILD_DIR: build

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Harden Bash environment
        env:
          BASH_ENV: /dev/null
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Ref:    ${WORKFLOW_REF}"
          echo "Commit: ${WORKFLOW_SHA}"

      - name: Verify regression container dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          clang-18 --version | sed -n '1p'
          clang++-18 --version | sed -n '1p'
          cmake --version | sed -n '1p'
          /usr/bin/time --version | sed -n '1p'

      - name: Configure iccDEV CTest build
        env:
          BASH_ENV: /dev/null
          CC: clang-18
          CXX: clang++-18
          UBSAN_IGNORELIST: .github/ci/ubsan-ignorelist.txt
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake -S Build/Cmake -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_FLAGS="-O0 -g3" \
            -DCMAKE_CXX_FLAGS="-O0 -g3 -std=c++17" \
            -DENABLE_ASAN=ON \
            -DENABLE_UBSAN=ON \
            -DENABLE_INTEGER_SANITIZER=ON \
            -DSANITIZER_RECOVER=ON \
            -DUBSAN_IGNORELIST="${GITHUB_WORKSPACE}/${UBSAN_IGNORELIST}" \
            -DENABLE_TOOLS=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_WXWIDGETS=OFF \
            -DENABLE_SHARED_LIBS=ON \
            -DENABLE_STATIC_LIBS=ON \
            -Wno-dev

      - name: Build iccDEV tools
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake --build "${BUILD_DIR}" --parallel "$(nproc)" 2>&1 | tee "${BUILD_DIR}/build.log"
          WARNING_COUNT=$(grep -cE 'warning:' "${BUILD_DIR}/build.log" || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "::warning title=Compiler Warnings::${WARNING_COUNT} warning(s) detected"
            grep -E 'warning:' "${BUILD_DIR}/build.log" | sort -u | sed -n '1,20p'
          else
            echo "[OK] Zero compiler warnings"
          fi

      - name: List CTest suites
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          CTEST_LIST="${BUILD_DIR}/ctest-list.txt"
          ctest --test-dir "${BUILD_DIR}" -N --no-tests=error | tee "${CTEST_LIST}"

      - name: Build CTest helper binaries
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake --build "${BUILD_DIR}" --target build-test-binaries --parallel "$(nproc)"

      - name: Run CTest tool suites
        env:
          BASH_ENV: /dev/null
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          ctest --test-dir "${BUILD_DIR}" \
            --output-on-failure \
            --label-exclude "slow" \
            --no-tests=error \
            --output-junit "${BUILD_DIR}/ctest-results.xml"

      - name: Run hybrid iccApplyProfiles timing matrix
        if: ${{ inputs.run_hybrid_timing }}
        env:
          BASH_ENV: /dev/null
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
          HYBRID_TIMING_THREADS_INPUT: ${{ inputs.hybrid_timing_threads || 'baseline,2,4,8' }}
          HYBRID_TIMING_TIMEOUT_INPUT: ${{ inputs.hybrid_timing_timeout || '60' }}
          HYBRID_TIMING_CASES_INPUT: ${{ inputs.hybrid_timing_cases || 'cmykw,kw-mcs' }}
          HYBRID_TIMING_BAND_ROWS_INPUT: ${{ inputs.hybrid_timing_band_rows || '' }}
          HYBRID_TIMING_INSTRUMENT_INPUT: ${{ inputs.hybrid_timing_instrument && '1' || '0' }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          ICCDEV_TOOLS_DIR="$GITHUB_WORKSPACE/${BUILD_DIR}/Tools" \
          ICCDEV_TESTING_DIR="$GITHUB_WORKSPACE/Testing" \
          ICCDEV_TEST_OUTDIR="$GITHUB_WORKSPACE/${BUILD_DIR}/Testing/ctest-output/hybrid-applyprofiles-timing" \
          HYBRID_TIMING_THREADS="$HYBRID_TIMING_THREADS_INPUT" \
          HYBRID_TIMING_TIMEOUT="$HYBRID_TIMING_TIMEOUT_INPUT" \
          HYBRID_TIMING_CASES="$HYBRID_TIMING_CASES_INPUT" \
          HYBRID_TIMING_BAND_ROWS="$HYBRID_TIMING_BAND_ROWS_INPUT" \
          HYBRID_TIMING_INSTRUMENT="$HYBRID_TIMING_INSTRUMENT_INPUT" \
            .github/scripts/iccdev-hybrid-applyprofiles-timing.sh

      - name: Generate summary
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [ -f "$SANITIZER" ]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          test_cmd="ctest --test-dir build --output-on-failure --label-exclude slow --no-tests=error"
          timing_report="${BUILD_DIR}/Testing/ctest-output/hybrid-applyprofiles-timing/hybrid-applyprofiles-timing.tsv"
          container_ref="ghcr.io/internationalcolorconsortium/iccdev-ci-regression@"
          container_ref+="sha256:9e41dbc8e0fef8b06ebd932154214dcc65b0331fcf6188a89ce0989439608c76"

          {
            echo "### iccDEV CTest Tool Suites"
            echo ""
            echo "| Component | Value |"
            echo "|-----------|-------|"
            echo "| Runner | ubuntu-24.04 |"
            echo "| Container | \`$(sanitize_line "$container_ref")\` |"
            echo "| Compiler | $(sanitize_line "$(clang-18 --version 2>/dev/null | sed -n '1,1p')") |"
            echo "| CMake | $(sanitize_line "$(cmake --version 2>/dev/null | sed -n '1,1p')") |"
            echo "| Commit | $(sanitize_line "$(git log --oneline -1 | tr -cd '[:print:]')") |"
            echo "| Test command | \`${test_cmd}\` |"
            echo ""
            echo "### Manual Reproduction"
            echo ""
            echo '```bash'
            echo "cmake -S Build/Cmake -B build -DCMAKE_BUILD_TYPE=Debug \\"
            echo "  -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 \\"
            echo "  -DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DENABLE_INTEGER_SANITIZER=ON \\"
            echo "  -DSANITIZER_RECOVER=ON -DENABLE_TOOLS=ON -DENABLE_TESTS=ON \\"
            echo "  -DENABLE_WXWIDGETS=OFF -DENABLE_SHARED_LIBS=ON -DENABLE_STATIC_LIBS=ON"
            echo "cmake --build build --parallel \"\$(nproc)\""
            echo "ctest --test-dir build --output-on-failure --label-exclude slow --no-tests=error"
            echo "ctest --test-dir build -R '^iccdev\\.hybrid-pipeline$' --output-on-failure --no-tests=error"
            echo '```'
            if [ -f "$timing_report" ]; then
              echo ""
              echo "## Hybrid \`iccApplyProfiles\` Timing"
              echo ""
              date -u '+%Y-%m-%d %H:%M:%S UTC'
              echo ""
              printf '| %-10s | %-8s | %-7s | %-6s | %-9s | %-6s | %-8s | %-6s | %-13s | %-7s | %-9s |\n' \
                "Case" "Threads" "Command" "Status" "Elapsed s" "User s" \
                "System s" "RSS KB" "Minor faults" "Vol ctx" "Invol ctx"
              printf '%s%s\n' \
                '|------------|----------|---------|--------|-----------|--------|' \
                '-----------|--------|---------------|----------|------------|'
              tail -n +2 "$timing_report" | while IFS=$'\t' read -r \
                case_name threads command_name status elapsed_s user_s system_s \
                rss faults vol_ctx invol_ctx _log_path; do
                printf '| %-10s | %-8s | %-7s | %-6s | %-9s | %-6s | %-8s | %-6s | %-13s | %-7s | %-9s |\n' \
                  "$(sanitize_line "$case_name")" \
                  "$(sanitize_line "$threads")" \
                  "$(sanitize_line "$command_name")" \
                  "$(sanitize_line "$status")" \
                  "$(sanitize_line "$elapsed_s")" \
                  "$(sanitize_line "$user_s")" \
                  "$(sanitize_line "$system_s")" \
                  "$(sanitize_line "$rss")" \
                  "$(sanitize_line "$faults")" \
                  "$(sanitize_line "$vol_ctx")" \
                  "$(sanitize_line "$invol_ctx")"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

  json-issue-1230:
    name: "Issue 1230 - ${{ matrix.os_name }} ${{ matrix.compiler }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: ubuntu-x64
            runner: ubuntu-24.04
            arch: x86_64
            compiler: clang
            asan: "ON"
            integer_sanitizer: "ON"
          - os_name: ubuntu-x64
            runner: ubuntu-24.04
            arch: x86_64
            compiler: gcc
            asan: "OFF"
            integer_sanitizer: "OFF"
          - os_name: macos-x64
            runner: macos-15-intel
            arch: x86_64
            compiler: clang
            asan: "ON"
            integer_sanitizer: "ON"
          - os_name: macos-x64
            runner: macos-15-intel
            arch: x86_64
            compiler: gcc
            asan: "OFF"
            integer_sanitizer: "OFF"
          - os_name: macos-arm64
            runner: macos-15
            arch: arm64
            compiler: clang
            asan: "ON"
            integer_sanitizer: "ON"
          - os_name: macos-arm64
            runner: macos-15
            arch: arm64
            compiler: gcc
            asan: "OFF"
            integer_sanitizer: "OFF"
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    env:
      BASH_ENV: /dev/null
      BUILD_DIR: build-issue-1230

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Verify runner architecture
        env:
          BASH_ENV: /dev/null
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          actual_arch="$(uname -m)"
          echo "Runner architecture: ${actual_arch}"
          if [ "$actual_arch" != "$EXPECTED_ARCH" ]; then
            msg="expected ${EXPECTED_ARCH}, got ${actual_arch}"
            echo "::error title=Runner architecture::${msg}"
            exit 1
          fi

      - name: Install issue 1230 dependencies
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
          RUNNER_OS_NAME: ${{ runner.os }}
          DEBIAN_FRONTEND: noninteractive
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          case "$RUNNER_OS_NAME" in
            Linux)
              bash .github/scripts/ci-safe-apt-update.sh
              sudo apt-get install -y --no-install-recommends \
                build-essential cmake \
                clang-18 clang++-18 gcc g++ \
                libxml2-dev libtiff-dev libjpeg-dev libpng-dev \
                zlib1g-dev liblzma-dev nlohmann-json3-dev
              ;;
            macOS)
              packages=(cmake llvm libpng libtiff libxml2 nlohmann-json jpeg-turbo)
              if [ "$MATRIX_COMPILER" = "gcc" ]; then
                packages+=(gcc)
              fi

              missing=()
              for package in "${packages[@]}"; do
                if ! brew list --versions "$package" >/dev/null 2>&1; then
                  missing+=("$package")
                fi
              done
              if [ "${#missing[@]}" -gt 0 ]; then
                brew install "${missing[@]}"
              fi

              brew_prefix="$(brew --prefix)"
              pkg_config_path="${brew_prefix}/lib/pkgconfig"
              pkg_config_path+=":${brew_prefix}/opt/libxml2/lib/pkgconfig"
              {
                echo "CMAKE_PREFIX_PATH=${brew_prefix}"
                echo "PKG_CONFIG_PATH=${pkg_config_path}"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error title=Unsupported runner OS::$RUNNER_OS_NAME"
              exit 1
              ;;
          esac

      - name: Resolve compiler
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          if [ "$MATRIX_COMPILER" = "gcc" ]; then
            for cc_candidate in gcc-15 gcc-14 gcc-13 gcc; do
              if command -v "$cc_candidate" >/dev/null 2>&1; then
                cc="$cc_candidate"
                break
              fi
            done
            for cxx_candidate in g++-15 g++-14 g++-13 g++; do
              if command -v "$cxx_candidate" >/dev/null 2>&1; then
                cxx="$cxx_candidate"
                break
              fi
            done
          elif [ "$RUNNER_OS_NAME" = "Linux" ]; then
            cc=clang-18
            cxx=clang++-18
          else
            llvm_prefix="$(brew --prefix llvm 2>/dev/null || true)"
            if [ -x "$llvm_prefix/bin/clang" ] && [ -x "$llvm_prefix/bin/clang++" ]; then
              cc="$llvm_prefix/bin/clang"
              cxx="$llvm_prefix/bin/clang++"
            else
              cc=clang
              cxx=clang++
            fi
          fi

          if [ -z "${cc:-}" ] || [ -z "${cxx:-}" ]; then
            msg="unable to resolve $MATRIX_COMPILER"
            echo "::error title=Compiler resolution::${msg}"
            exit 1
          fi

          issue1230_enable_ubsan=ON
          issue1230_enable_float_sanitizer=ON

          if [ "$RUNNER_OS_NAME" = "macOS" ] && [ "$MATRIX_COMPILER" = "gcc" ]; then
            runtime_dir=""
            runtime_probe="$("$cxx" -print-file-name=libubsan.dylib)"
            if [ -f "$runtime_probe" ]; then
              runtime_dir="$(dirname "$runtime_probe")"
            fi

            if [ -z "$runtime_dir" ]; then
              brew_gcc_prefix="$(brew --prefix gcc 2>/dev/null || true)"
              runtime_file=""
              for candidate in \
                "$brew_gcc_prefix/lib/gcc/current" \
                "$brew_gcc_prefix/lib/gcc/15"; do
                if [ -f "$candidate/libubsan.dylib" ]; then
                  runtime_dir="$candidate"
                  break
                fi
                runtime_file="$(
                  find "$candidate" \
                    \( -name 'libubsan*.dylib' -o -name 'libubsan*.a' \) \
                    -print -quit 2>/dev/null || true
                )"
                if [ -n "$runtime_file" ]; then
                  runtime_link="${RUNNER_TEMP:-/tmp}/iccdev-gcc-runtime"
                  mkdir -p "$runtime_link"
                  case "$runtime_file" in
                    *.dylib)
                      ln -sf "$runtime_file" "$runtime_link/libubsan.dylib"
                      ;;
                    *.a)
                      ln -sf "$runtime_file" "$runtime_link/libubsan.a"
                      ;;
                  esac
                  runtime_dir="$runtime_link"
                  break
                fi
              done
            fi

            if [ -z "$runtime_dir" ]; then
              issue1230_enable_ubsan=OFF
              issue1230_enable_float_sanitizer=OFF
              notice="macOS GCC libubsan unavailable; "
              notice+="running fail-closed replay without sanitizer flags"
              echo "::notice title=GCC runtime::${notice}"
            else
              {
                printf 'LIBRARY_PATH=%s%s\n' \
                  "$runtime_dir" "${LIBRARY_PATH:+:${LIBRARY_PATH}}"
                printf 'DYLD_LIBRARY_PATH=%s%s\n' \
                  "$runtime_dir" "${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}"
              } >> "$GITHUB_ENV"
            fi
          fi

          {
            echo "CC=$cc"
            echo "CXX=$cxx"
            echo "ISSUE1230_ENABLE_UBSAN=$issue1230_enable_ubsan"
            key="ISSUE1230_ENABLE_FLOAT_SANITIZER"
            printf '%s=%s\n' "$key" "$issue1230_enable_float_sanitizer"
          } >> "$GITHUB_ENV"

          "$cc" --version | sed -n '1p'
          "$cxx" --version | sed -n '1p'

      - name: Configure issue 1230 CTest build
        env:
          BASH_ENV: /dev/null
          MATRIX_ASAN: ${{ matrix.asan }}
          MATRIX_INTEGER_SANITIZER: ${{ matrix.integer_sanitizer }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
          UBSAN_IGNORELIST: .github/ci/ubsan-ignorelist.txt
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          enable_ubsan="${ISSUE1230_ENABLE_UBSAN:-ON}"
          enable_float_sanitizer="${ISSUE1230_ENABLE_FLOAT_SANITIZER:-ON}"

          ignorelist_arg=""
          if [ "$MATRIX_COMPILER" = "clang" ]; then
            ignorelist_arg="-DUBSAN_IGNORELIST=${GITHUB_WORKSPACE}/${UBSAN_IGNORELIST}"
          fi

          cmake -S Build/Cmake -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS="-O0 -g3" \
            -DCMAKE_CXX_FLAGS="-O0 -g3 -std=c++17" \
            -DENABLE_ASAN="${MATRIX_ASAN}" \
            -DENABLE_UBSAN="${enable_ubsan}" \
            -DENABLE_INTEGER_SANITIZER="${MATRIX_INTEGER_SANITIZER}" \
            -DENABLE_FLOAT_SANITIZER="${enable_float_sanitizer}" \
            -DSANITIZER_RECOVER=ON \
            ${ignorelist_arg:+"$ignorelist_arg"} \
            -DENABLE_TOOLS=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_WXWIDGETS=OFF \
            -DENABLE_SHARED_LIBS=ON \
            -DENABLE_STATIC_LIBS=OFF \
            -Wno-dev

      - name: Build issue 1230 target
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [ -z "$jobs" ]; then
            jobs="$(sysctl -n hw.logicalcpu)"
          fi
          cmake --build "${BUILD_DIR}" \
            --target iccApplyProfiles \
            --parallel "$jobs"

      - name: Run issue 1230 regression
        env:
          BASH_ENV: /dev/null
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          ctest --test-dir "${BUILD_DIR}" \
            -R '^iccdev\.issue-1230-json-threads-regression$' \
            --output-on-failure \
            --no-tests=error

  thread-linkage:
    name: "RefIccMAX thread linkage - manual"
    if: ${{ inputs.thread_linkage_build_type != '' && inputs.thread_linkage_ipo != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    env:
      BASH_ENV: /dev/null
      BUILD_DIR: build-thread-linkage
      THREAD_LINKAGE_BUILD_TYPE: ${{ inputs.thread_linkage_build_type }}
      THREAD_LINKAGE_IPO: ${{ inputs.thread_linkage_ipo }}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install build dependencies
        env:
          BASH_ENV: /dev/null
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          bash .github/scripts/ci-safe-apt-update.sh
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            clang-18 clang++-18 llvm-18 \
            libxml2-dev libtiff-dev libjpeg-dev libpng-dev \
            zlib1g-dev liblzma-dev nlohmann-json3-dev

      - name: Check RefIccMAX thread linkage
        env:
          BASH_ENV: /dev/null
          CC: clang-18
          CXX: clang++-18
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          run_case() {
            local label="$1"
            shift
            echo "[START] ${label}"
            timeout 60s "$@"
            echo "[PASS] ${label}"
          }

          case "${THREAD_LINKAGE_BUILD_TYPE}" in
            Release|RelWithDebInfo)
              ;;
            *)
              echo "::error title=Invalid build type::${THREAD_LINKAGE_BUILD_TYPE}"
              exit 1
              ;;
          esac

          case "${THREAD_LINKAGE_IPO}" in
            true|True|TRUE|ON|on|1)
              ipo_value=ON
              ;;
            false|False|FALSE|OFF|off|0)
              ipo_value=OFF
              ;;
            *)
              echo "::error title=Invalid IPO value::${THREAD_LINKAGE_IPO}"
              exit 1
              ;;
          esac

          run_case "configure ${THREAD_LINKAGE_BUILD_TYPE} ipo=${ipo_value}" \
            cmake -S Build/Cmake -B "${BUILD_DIR}" \
              -DCMAKE_BUILD_TYPE="${THREAD_LINKAGE_BUILD_TYPE}" \
              -DCMAKE_C_COMPILER=clang-18 \
              -DCMAKE_CXX_COMPILER=clang++-18 \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION="${ipo_value}" \
              -DENABLE_LTO="${ipo_value}" \
              -DENABLE_SANITIZERS=OFF \
              -DENABLE_ASAN=OFF \
              -DENABLE_UBSAN=OFF \
              -DENABLE_INTEGER_SANITIZER=OFF \
              -DENABLE_FLOAT_SANITIZER=OFF \
              -DENABLE_TSAN=OFF \
              -DENABLE_MSAN=OFF \
              -DENABLE_LSAN=OFF \
              -DENABLE_TOOLS=ON \
              -DENABLE_TESTS=OFF \
              -DENABLE_WXWIDGETS=OFF \
              -DENABLE_SHARED_LIBS=ON \
              -DENABLE_STATIC_LIBS=ON \
              -Wno-dev

          run_case "build shared/static IccProfLib2 and iccApplyProfiles" \
            cmake --build "${BUILD_DIR}" \
              --target IccProfLib2 IccProfLib2-static iccApplyProfiles \
              --parallel "$(nproc)"

          run_case "inspect generated thread link interface" \
            grep -q 'INTERFACE_LINK_LIBRARIES "Threads::Threads"' \
              "${BUILD_DIR}/RefIccMAXTargets.cmake"

          run_case "inspect shared library link command" \
            grep -q 'IccCmmThread.cpp.o' \
              "${BUILD_DIR}/IccProfLib/CMakeFiles/IccProfLib2.dir/link.txt"

          run_case "inspect tool link command" \
            grep -q 'libIccProfLib2' \
              "${BUILD_DIR}/Tools/IccApplyProfiles/CMakeFiles/iccApplyProfiles.dir/link.txt"

          if grep -q -- '-pthread' \
              "${BUILD_DIR}/IccProfLib/CMakeFiles/IccProfLib2.dir/link.txt" \
              "${BUILD_DIR}/Tools/IccApplyProfiles/CMakeFiles/iccApplyProfiles.dir/link.txt"; then
            echo "[PASS] pthread flag expanded into generated link.txt"
          elif grep -q '^CMAKE_HAVE_LIBC_PTHREAD:INTERNAL=1$' "${BUILD_DIR}/CMakeCache.txt"; then
            echo "[PASS] pthread symbols resolved by libc; Threads::Threads remains exported"
          else
            echo "::error title=Thread linkage::No -pthread flag or libc pthread resolution found"
            exit 1
          fi

          echo "[PASS] RefIccMAX thread linkage check complete"
