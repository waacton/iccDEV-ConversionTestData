            timeout 60 "$V5DSP" "$LCD" "$CAT8_ICC" "$OUT_V4" > "$OUTDIR/v5dsp-cat8.log" 2>&1
            rc=$?
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/v5dsp-cat8.log" 2>/dev/null; then
              echo "  [ASAN]  v5DspObs LCDDisplay+Cat8Lab"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] v5DspObs LCDDisplay+Cat8Lab (exit $rc)"; failed=$((failed + 1))
            elif [ "$rc" -ne 0 ]; then
              echo "  [WARN]  v5DspObs LCDDisplay+Cat8Lab (exit $rc — may be expected for some observer pairings)"
            else
              echo "  [OK]    v5DspObs LCDDisplay+Cat8Lab (exit $rc)"; passed=$((passed + 1))
              # Validate output with iccDumpProfile
              if [ -x "$DUMP" ] && [ -f "$OUT_V4" ]; then
                timeout 30 "$DUMP" "$OUT_V4" > "$OUTDIR/dump-cat8obs.log" 2>&1
                if grep -q "ERROR: AddressSanitizer" "$OUTDIR/dump-cat8obs.log" 2>/dev/null; then
                  echo "  [ASAN]  iccDumpProfile on v4 output"; failed=$((failed + 1))
                else
                  echo "  [OK]    iccDumpProfile validates v4 output"; passed=$((passed + 1))
                fi
              fi
            fi
          fi

          # --- v5→v4 conversion: LCDDisplay + ICS observer ---
          ICS_OBS="${WORKSPACE_DIR}/Testing/ICS/XYZ_float-D65_2deg-Part1.icc"
          OUT_V4_ICS="$OUTDIR/LCDDisplayIcsObs.icc"
          if [ -f "$LCD" ] && [ -f "$ICS_OBS" ]; then
            timeout 60 "$V5DSP" "$LCD" "$ICS_OBS" "$OUT_V4_ICS" > "$OUTDIR/v5dsp-ics.log" 2>&1
            rc=$?
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/v5dsp-ics.log" 2>/dev/null; then
              echo "  [ASAN]  v5DspObs LCDDisplay+ICS observer"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] v5DspObs LCDDisplay+ICS observer (exit $rc)"; failed=$((failed + 1))
            elif [ "$rc" -ne 0 ]; then
              echo "  [WARN]  v5DspObs LCDDisplay+ICS observer (exit $rc)"
            else
              echo "  [OK]    v5DspObs LCDDisplay+ICS observer (exit $rc)"; passed=$((passed + 1))
            fi
          else
            echo "  [SKIP]  ICS observer test (profiles not found)"
          fi

          echo ""
          echo "v5DspObsToV4Dsp: $passed passed, $failed failed"
          if [ "$failed" -gt 0 ]; then exit 1; fi

      - name: "Test 18: Regression checks (bisect fixes)"
        if: always()
        env:
          BASH_ENV: /dev/null
          WORKSPACE_DIR: ${{ github.workspace }}
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0,symbolize=1,print_scariness=1"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          export LD_LIBRARY_PATH="${WORKSPACE_DIR}/build/IccProfLib:${WORKSPACE_DIR}/build/IccXML"
          OUTDIR="/tmp/iccdev-tool-output/regression-bisect"
          mkdir -p "$OUTDIR"

          FROMXML="${WORKSPACE_DIR}/build/Tools/IccFromXml/iccFromXml"
          TOXML="${WORKSPACE_DIR}/build/Tools/IccToXml/iccToXml"
          DUMP="${WORKSPACE_DIR}/build/Tools/IccDumpProfile/iccDumpProfile"
          passed=0 failed=0

          check_asan() {
            local logfile="$1" label="$2"
            if grep -q "ERROR: AddressSanitizer" "$logfile" 2>/dev/null; then
              echo "  [ASAN]  $label"; return 1
            fi
            return 0
          }

          echo "=== Regression Test 18: Bisect Fixes ==="
          echo ""

          # --- R1: NamedColor.xml sampleCount regression (b1722f9) ---
          echo "--- R1: NamedColor.xml sampleCount (#b1722f9) ---"
          NAMED_XML="${WORKSPACE_DIR}/Testing/Named/NamedColor.xml"
          NAMED_OUT="$OUTDIR/NamedColor.icc"
          if [ -f "$NAMED_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/Named"
            timeout 30 "$FROMXML" NamedColor.xml "$NAMED_OUT" > "$OUTDIR/r1-namedcolor.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if grep -q "doesn't match tint values" "$OUTDIR/r1-namedcolor.log" 2>/dev/null; then
              echo "  [FAIL] NamedColor.xml still has tint value mismatch"; failed=$((failed + 1))
            elif ! check_asan "$OUTDIR/r1-namedcolor.log" "NamedColor.xml fromXml"; then
              failed=$((failed + 1))
            elif [ -f "$NAMED_OUT" ]; then
              echo "  [OK]   NamedColor.xml parsed without tint mismatch"; passed=$((passed + 1))
            else
              echo "  [FAIL] NamedColor.xml did not produce output"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] NamedColor.xml not found"
          fi

          # --- R2: CMYK-3DLUTs.xml case-sensitive filenames (4aa5857) ---
          echo "--- R2: CMYK-3DLUTs.xml case-sensitive filenames (#4aa5857) ---"
          CMYK_XML="${WORKSPACE_DIR}/Testing/CMYK-3DLUTs/CMYK-3DLUTs.xml"
          CMYK_OUT="$OUTDIR/CMYK-3DLUTs.icc"
          if [ -f "$CMYK_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/CMYK-3DLUTs"
            timeout 60 "$FROMXML" CMYK-3DLUTs.xml "$CMYK_OUT" > "$OUTDIR/r2-cmyk3dluts.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if grep -q "Unable to parse" "$OUTDIR/r2-cmyk3dluts.log" 2>/dev/null; then
              echo "  [FAIL] CMYK-3DLUTs.xml has parse errors"; failed=$((failed + 1))
            elif ! check_asan "$OUTDIR/r2-cmyk3dluts.log" "CMYK-3DLUTs.xml fromXml"; then
              failed=$((failed + 1))
            elif [ -f "$CMYK_OUT" ]; then
              echo "  [OK]   CMYK-3DLUTs.xml parsed successfully"; passed=$((passed + 1))
            else
              echo "  [FAIL] CMYK-3DLUTs.xml did not produce output"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] CMYK-3DLUTs.xml not found"
          fi

          # --- R3: LaserProjector.xml EmissionCLUT (ba81cd9 / #768) ---
          echo "--- R3: LaserProjector.xml EmissionCLUT (#768) ---"
          LASER_XML="${WORKSPACE_DIR}/Testing/Display/LaserProjector.xml"
          LASER_OUT="$OUTDIR/LaserProjector.icc"
          if [ -f "$LASER_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/Display"
            timeout 120 "$FROMXML" LaserProjector.xml "$LASER_OUT" > "$OUTDIR/r3-laserprojector.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if grep -q "Error in setting the size of GridPoints" "$OUTDIR/r3-laserprojector.log" 2>/dev/null; then
              echo "  [FAIL] LaserProjector.xml EmissionCLUT GridPoints error"; failed=$((failed + 1))
            elif ! check_asan "$OUTDIR/r3-laserprojector.log" "LaserProjector.xml fromXml"; then
              failed=$((failed + 1))
            elif [ -f "$LASER_OUT" ]; then
              echo "  [OK]   LaserProjector.xml parsed (spectral EmissionCLUT ok)"; passed=$((passed + 1))
            else
              echo "  [FAIL] LaserProjector.xml did not produce output"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] LaserProjector.xml not found"
          fi

          # --- R4: SparseMatrixNamedColor.xml (#751) ---
          echo "--- R4: SparseMatrixNamedColor.xml (#751) ---"
          SPARSE_XML="${WORKSPACE_DIR}/Testing/Named/SparseMatrixNamedColor.xml"
          SPARSE_OUT="$OUTDIR/SparseMatrixNamedColor.icc"
          if [ -f "$SPARSE_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/Named"
            timeout 30 "$FROMXML" SparseMatrixNamedColor.xml "$SPARSE_OUT" > "$OUTDIR/r4-sparse.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if ! check_asan "$OUTDIR/r4-sparse.log" "SparseMatrixNamedColor.xml fromXml"; then
              failed=$((failed + 1))
            elif [ -f "$SPARSE_OUT" ]; then
              echo "  [OK]   SparseMatrixNamedColor.xml parsed successfully"; passed=$((passed + 1))
            else
              echo "  [FAIL] SparseMatrixNamedColor.xml did not produce output"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] SparseMatrixNamedColor.xml not found"
          fi

          # --- R5: Observer name round-trip (#736) ---
          echo "--- R5: Observer name round-trip (#736) ---"
          OBS_XML="${WORKSPACE_DIR}/Testing/PCC/CustomObserverLab_int-D65_2deg.xml"
          OBS_ICC="$OUTDIR/observer-roundtrip.icc"
          OBS_XML2="$OUTDIR/observer-roundtrip.xml"
          if [ -f "$OBS_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/PCC"
            timeout 30 "$FROMXML" "CustomObserverLab_int-D65_2deg.xml" "$OBS_ICC" > "$OUTDIR/r5-obs-fromxml.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if [ -f "$OBS_ICC" ]; then
              timeout 30 "$TOXML" "$OBS_ICC" "$OBS_XML2" > "$OUTDIR/r5-obs-toxml.log" 2>&1 || true
              if [ -f "$OBS_XML2" ]; then
                timeout 30 "$FROMXML" "$OBS_XML2" "$OUTDIR/observer-roundtrip2.icc" > "$OUTDIR/r5-obs-rt.log" 2>&1 || true
                if [ -f "$OUTDIR/observer-roundtrip2.icc" ]; then
                  echo "  [OK]   Observer name round-trip: XML->ICC->XML->ICC succeeded"; passed=$((passed + 1))
                else
                  echo "  [FAIL] Observer round-trip failed on second fromXml"; failed=$((failed + 1))
                fi
              else
                echo "  [FAIL] Observer round-trip failed on toXml"; failed=$((failed + 1))
              fi
            else
              echo "  [FAIL] Observer round-trip failed on first fromXml"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] CustomObserverLab_int-D65_2deg.xml not found"
          fi

          # --- R6: ColorantOrder Validate regression (#752) ---
          echo "--- R6: ColorantOrder Validate (#752) ---"
          SRGB_XML="${WORKSPACE_DIR}/Testing/Display/sRGB_D65_MAT-300lx.xml"
          SRGB_OUT="$OUTDIR/srgb-validate.icc"
          if [ -f "$SRGB_XML" ]; then
            cd "${WORKSPACE_DIR}/Testing/Display"
            timeout 30 "$FROMXML" "sRGB_D65_MAT-300lx.xml" "$SRGB_OUT" > "$OUTDIR/r6-srgb-fromxml.log" 2>&1 || true
            cd "${WORKSPACE_DIR}"
            if [ -f "$SRGB_OUT" ]; then
              timeout 30 "$DUMP" -v "$SRGB_OUT" > "$OUTDIR/r6-validate.log" 2>&1 || true
              if ! check_asan "$OUTDIR/r6-validate.log" "sRGB validation"; then
                failed=$((failed + 1))
              else
                echo "  [OK]   sRGB validation completed without sanitizer errors"; passed=$((passed + 1))
              fi
            else
              echo "  [FAIL] sRGB fromXml did not produce output"; failed=$((failed + 1))
            fi
          else
            echo "  [SKIP] sRGB_D65_MAT-300lx.xml not found"
          fi

          # --- R7: PoC #599 GBD signed-integer-overflow ---
          echo "--- R7: PoC #599 GBD signed-integer-overflow ---"
          POC_599="${WORKSPACE_DIR}/.github/ci/regression/poc-599-gbd-sio.icc"
          if [ -f "$POC_599" ]; then
            timeout 30 "$DUMP" "$POC_599" > "$OUTDIR/r7-poc599.log" 2>&1 || true
            rc=$?
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/r7-poc599.log" 2>/dev/null; then
              echo "  [ASAN]  PoC #599 triggered ASAN"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] PoC #599 crashed (exit $rc)"; failed=$((failed + 1))
            else
              echo "  [OK]    PoC #599 handled without ASAN (exit $rc)"; passed=$((passed + 1))
            fi
          else
            echo "  [SKIP] poc-599-gbd-sio.icc not found"
          fi

          # --- R8: PoC #744 ToneMapFunc HBO ---
          echo "--- R8: PoC #744 ToneMapFunc HBO ---"
          POC_744="${WORKSPACE_DIR}/.github/ci/regression/poc-744-tonemap-hbo.icc"
          if [ -f "$POC_744" ]; then
            timeout 30 "$DUMP" "$POC_744" ALL > "$OUTDIR/r8-poc744.log" 2>&1 || true
            rc=$?
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/r8-poc744.log" 2>/dev/null; then
              echo "  [ASAN]  PoC #744 triggered ASAN"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] PoC #744 crashed (exit $rc)"; failed=$((failed + 1))
            else
              echo "  [OK]    PoC #744 handled without ASAN (exit $rc)"; passed=$((passed + 1))
            fi
          else
            echo "  [SKIP] PoC #744 not found"
          fi

          # --- R9: PoC #763 cenc HUAF ---
          echo "--- R9: PoC #763 cenc profile HUAF ---"
          POC_763="${WORKSPACE_DIR}/.github/ci/regression/poc-763-cenc-huaf.icc"
          APPLYNAMEDCMM="${WORKSPACE_DIR}/build/Tools/IccApplyNamedCmm/iccApplyNamedCmm"
          if [ -f "$POC_763" ] && [ -x "$APPLYNAMEDCMM" ]; then
            timeout 30 "$DUMP" "$POC_763" > "$OUTDIR/r9-poc763-dump.log" 2>&1 || true
            rc=$?
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/r9-poc763-dump.log" 2>/dev/null; then
              echo "  [ASAN]  PoC #763 triggered ASAN on dump"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] PoC #763 crashed on dump (exit $rc)"; failed=$((failed + 1))
            else
              echo "  [OK]    PoC #763 dump handled cleanly (exit $rc)"; passed=$((passed + 1))
            fi
          else
            echo "  [SKIP] PoC #763 or iccApplyNamedCmm not found"
          fi

          # --- R10: PoC #769 unsigned integer overflow (offset+size) ---
          echo "--- R10: PoC #769 UIO offset+size bounds checks ---"
          POC_769_DIR="${WORKSPACE_DIR}/.github/ci/regression"
          POC_769_FILES=(
            "poc-769-IccProfile-1311-uio.icc"
            "poc-769-IccMpeCalc-4745-uio.icc"
            "poc-769-IccTagDict-633-uio.icc"
            "poc-769-iccDumpProfile-332-uio.icc"
          )
          poc769_pass=0 poc769_fail=0
          for poc in "${POC_769_FILES[@]}"; do
            poc_path="${POC_769_DIR}/${poc}"
            if [ -f "$poc_path" ]; then
              timeout 30 "$DUMP" "$poc_path" ALL > "$OUTDIR/r10-${poc}.log" 2>&1 || true
              rc=$?
              if grep -q "ERROR: AddressSanitizer" "$OUTDIR/r10-${poc}.log" 2>/dev/null; then
                echo "  [ASAN]  ${poc}"; poc769_fail=$((poc769_fail + 1))
              elif grep -q "runtime error.*unsigned integer overflow" "$OUTDIR/r10-${poc}.log" 2>/dev/null; then
                echo "  [UIO]   ${poc} (unsigned overflow still present)"; poc769_fail=$((poc769_fail + 1))
              elif [ "$rc" -ge 128 ]; then
                echo "  [CRASH] ${poc} (exit $rc)"; poc769_fail=$((poc769_fail + 1))
              else
                echo "  [OK]    ${poc} (exit $rc)"; poc769_pass=$((poc769_pass + 1))
              fi
            else
              echo "  [SKIP]  ${poc} not found"
            fi
          done
          echo "  #769 UIO: $poc769_pass passed, $poc769_fail failed"
          passed=$((passed + poc769_pass))
          failed=$((failed + poc769_fail))

          # --- R11: hybrid/BuildAndTest.sh spectral CLUT (#736 sub-c) ---
          echo "--- R11: hybrid/BuildAndTest.sh (spectral CLUT #736) ---"
          HYBRID_DIR="${WORKSPACE_DIR}/Testing/hybrid"
          if [ -f "$HYBRID_DIR/BuildAndTest.sh" ]; then
            export PATH
            for d in "${WORKSPACE_DIR}"/build/Tools/*/; do PATH="$d:$PATH"; done
            cd "$HYBRID_DIR"
            timeout 120 bash BuildAndTest.sh > "$OUTDIR/r10-hybrid.log" 2>&1
            rc=$?
            cd "${WORKSPACE_DIR}"
            if grep -q "ERROR: AddressSanitizer" "$OUTDIR/r10-hybrid.log" 2>/dev/null; then
              echo "  [ASAN]  hybrid/BuildAndTest.sh ASAN finding"; failed=$((failed + 1))
            elif [ "$rc" -ge 128 ]; then
              echo "  [CRASH] hybrid/BuildAndTest.sh crashed (exit $rc)"; failed=$((failed + 1))
            elif [ "$rc" -ne 0 ]; then
              echo "  [WARN]  hybrid/BuildAndTest.sh non-zero exit ($rc)"; passed=$((passed + 1))
            else
              echo "  [OK]    hybrid/BuildAndTest.sh passed (exit 0)"; passed=$((passed + 1))
            fi
          else
            echo "  [SKIP] hybrid/BuildAndTest.sh not found"
          fi

          echo ""
          echo "Regression checks: $passed passed, $failed failed"
          if [ "$failed" -gt 0 ]; then exit 1; fi

      - name: Generate comprehensive summary
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          if [ -f .github/scripts/sanitize-sed.sh ]; then
            source .github/scripts/sanitize-sed.sh
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          OUTDIR="/tmp/iccdev-tool-output"

          # Count ASAN and UBSAN across all logs
          ASAN_FILES=""
          UBSAN_FILES=""
          TOTAL_LOGS=0
          TOTAL_PASS=0
          TOTAL_FAIL=0
          TOTAL_READ_FAIL=0
          if [ -d "$OUTDIR" ]; then
            ASAN_FILES=$({ grep -rl "ERROR: AddressSanitizer" "$OUTDIR"/ 2>/dev/null || true; })
            UBSAN_FILES=$({ grep -rl "runtime error:" "$OUTDIR"/ 2>/dev/null || true; })
            TOTAL_LOGS=$(find "$OUTDIR" -name '*.log' -type f 2>/dev/null | wc -l)
            # Count pass/fail across per-profile logs (exit code in log content)
            for logf in "$OUTDIR"/*/*.log; do
              [ -f "$logf" ] || continue
              if grep -q "ERROR: AddressSanitizer" "$logf" 2>/dev/null; then
                TOTAL_FAIL=$((TOTAL_FAIL + 1))
              elif grep -q "runtime error:" "$logf" 2>/dev/null; then
                TOTAL_FAIL=$((TOTAL_FAIL + 1))
              elif grep -q "Unable to read" "$logf" 2>/dev/null; then
                TOTAL_READ_FAIL=$((TOTAL_READ_FAIL + 1))
                TOTAL_FAIL=$((TOTAL_FAIL + 1))
              else
                TOTAL_PASS=$((TOTAL_PASS + 1))
              fi
            done
          fi
          ASAN_COUNT=$(echo "$ASAN_FILES" | grep -c . 2>/dev/null || echo 0)
          UBSAN_COUNT=$(echo "$UBSAN_FILES" | grep -c . 2>/dev/null || echo 0)
          # Handle empty string giving count of 1
          [ -z "$ASAN_FILES" ] && ASAN_COUNT=0
          [ -z "$UBSAN_FILES" ] && UBSAN_COUNT=0

          # Determine overall verdict
          if [ "$ASAN_COUNT" -gt 0 ]; then
            VERDICT="FAIL (ASAN)"
          elif [ "$UBSAN_COUNT" -gt 0 ]; then
            VERDICT="FAIL (UBSAN)"
          elif [ "$TOTAL_READ_FAIL" -gt 0 ]; then
            VERDICT="WARN (read failures)"
          else
            VERDICT="PASS"
          fi

          {
            echo "## iccDEV Comprehensive Tool Tests"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Overall** | **$VERDICT** |"
            echo "| Runner | ubuntu-24.04 |"
            echo "| Compiler | clang-18 (Debug + ASAN + UBSAN) |"
            echo "| Commit | $(sanitize_line "$(git log --oneline -1 || echo 'N/A')") |"
            echo "| Total log files | $TOTAL_LOGS |"
            echo "| Profiles pass | $TOTAL_PASS |"
            echo "| Profiles fail | $TOTAL_FAIL |"
            echo "| Read failures | $TOTAL_READ_FAIL |"
            echo "| ASAN findings | $ASAN_COUNT |"
            echo "| UBSAN findings | $UBSAN_COUNT |"
            echo ""

            echo "### Test Phases"
            echo ""
            echo "| Phase | Test | Status |"
            echo "|-------|------|--------|"

            # Per-phase status from subdirectory logs
            declare -A PHASE_DIRS=(
              ["1"]="dump-all"
              ["2"]="dump-validate"
              ["3"]="toxml"
              ["4"]="fromxml"
              ["5"]="roundtrip"
              ["6"]="applynamedcmm"
              ["7"]="link"
              ["8"]="fromcube"
              ["9"]="runtests"
              ["10"]="calcinvalid"
              ["11"]="prototest"
              ["12"]="tiffdump"
              ["13"]="image-tools"
              ["14"]="regression"
              ["15"]="search"
              ["16"]="mcs"
              ["17"]="v5dspobs"
              ["18"]="regression-bisect"
            )
            declare -A PHASE_NAMES=(
              ["1"]="iccDumpProfile ALL on every generated profile"
              ["2"]="iccDumpProfile -v (validation) on every profile"
              ["3"]="iccToXml on every generated profile"
              ["4"]="iccFromXml round-trip on XML outputs"
              ["5"]="iccRoundTrip (intents 0-3 + MPE)"
              ["6"]="iccApplyNamedCmm (encodings, intents, chains)"
              ["7"]="iccApplyToLink (DeviceLink v4/v5, .cube, LUT sizes)"
              ["8"]="iccFromCube (.cube LUT import)"
              ["9"]="RunTests.sh (19 NamedColor/PCC/spectral/GSDF tests)"
              ["10"]="checkInvalidProfiles.sh (77 invalid profile checks)"
              ["11"]="RunProtoTest.sh (6 Rec2020 spectral tests)"
              ["12"]="iccTiffDump + iccSpecSepToTiff"
              ["13"]="Image tools (iccPngDump, iccJpegDump on real files)"
              ["14"]="Identity curve regression (PR 728)"
              ["15"]="iccApplySearch (CMM search optimization)"
              ["16"]="MCS regression (iccApplyProfiles TIFF pipeline)"
              ["17"]="iccV5DspObsToV4Dsp (v5 display to v4 conversion)"
              ["18"]="Regression checks (bisect fixes: 599,736,744,751,752,763,769)"
            )

            for phase in $(seq 1 18); do
              dir="${PHASE_DIRS[$phase]}"
              name="${PHASE_NAMES[$phase]}"
              pdir="$OUTDIR/$dir"
              if [ ! -d "$pdir" ]; then
                echo "| $phase | $name | SKIP |"
              elif grep -rq "ERROR: AddressSanitizer" "$pdir"/ 2>/dev/null; then
                pa=$(grep -rl "ERROR: AddressSanitizer" "$pdir"/ 2>/dev/null | wc -l)
                echo "| $phase | $name | ASAN ($pa files) |"
              elif grep -rq "runtime error:" "$pdir"/ 2>/dev/null; then
                pu=$(grep -rl "runtime error:" "$pdir"/ 2>/dev/null | wc -l)
                echo "| $phase | $name | UBSAN ($pu files) |"
              else
                lc=$(find "$pdir" -name '*.log' -type f 2>/dev/null | wc -l)
                echo "| $phase | $name | PASS ($lc logs) |"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$ASAN_COUNT" -gt 0 ] || [ "$UBSAN_COUNT" -gt 0 ]; then
            {
              echo ""
              echo "### Sanitizer Findings"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            # Collect all ASAN findings
            if [ -n "$ASAN_FILES" ]; then
              echo "$ASAN_FILES" | while IFS= read -r logf; do
                [ -f "$logf" ] || continue
                fname="$(basename "$logf" .log)"
                safe_fname="$(sanitize_line "$fname")"
                {
                  echo "**${safe_fname}** (ASAN)"
                  echo '```'
                  grep "ERROR: AddressSanitizer" "$logf" | sed -n '1,1p' | while IFS= read -r line; do
                    sanitize_line "$line"
                    echo ""
                  done
                  grep -E '^\s+#[0-3]' "$logf" | sed -n '1,4p' | while IFS= read -r line; do
                    sanitize_line "$line"
                    echo ""
                  done
                  echo '```'
                  echo ""
                } >> "$GITHUB_STEP_SUMMARY"
              done
            fi

            # Collect UBSAN findings (deduplicated by error type)
            if [ -n "$UBSAN_FILES" ]; then
              echo "**UBSAN Findings (unique):**" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$UBSAN_FILES" | while IFS= read -r logf; do
                [ -f "$logf" ] || continue
                grep "runtime error:" "$logf" 2>/dev/null
              done | sort -u | sed -n '1,20p' | while IFS= read -r line; do
                sanitize_line "$line"
                echo ""
              done >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            {
              echo ""
              echo "### Result: CLEAN"
              echo ""
              echo "0 ASAN findings, 0 UBSAN findings across all test phases."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: iccdev-comprehensive-tool-test-logs
          path: /tmp/iccdev-tool-output/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
