name: Sync Labels

on:
  push:
    branches: [master]
    paths:
      - '.github/labels.yml'
      - '.github/scripts/sync-labels.sh'
      - '.github/workflows/sync-labels.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "sync-labels-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  sync-labels:
    name: Sync repository labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write  # Required to create or update repository labels.

    steps:
      - name: Check out label taxonomy
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          sparse-checkout: |
            .github/labels.yml
            .github/scripts/sync-labels.sh
          persist-credentials: false

      - name: Synchronize labels
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          .github/scripts/sync-labels.sh
