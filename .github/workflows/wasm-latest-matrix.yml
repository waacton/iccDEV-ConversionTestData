# Intent: iccDEV wasm-latest-matrix
#
# Last Updated: 2026-03-28 by David Hoyt
#               Removed stale wasm branch checkout (consolidated)
#               Build from repo checkout instead of separate clone
#               Use CMake for libxml2 (replaces fragile autogen.sh)
#               Added retry logic for GitLab clones
#               Added WASM validation step
#               Added concurrency group and timeout
#               Governance hardening: Hoyt shell prologue on every
#               step, sanitize-sed.sh for GITHUB_STEP_SUMMARY,
#               matrix values via env: block (never ${{ }} in run:),
#               credential isolation per-step
#
###############################################################

name: "wasm-latest-matrix"

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: wasm-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-build:
    name: "WASM Matrix - ${{ matrix.build_type }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      EMSDK_VERSION: latest
      WASM_DEPS_CACHE_VERSION: v1
    strategy:
      matrix:
        build_type: [Release, Debug, Asan]
      fail-fast: false
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Harden Bash Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Restore Emscripten SDK cache
        id: emsdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            emsdk
            ~/.emscripten
            ~/.emscripten_cache
          key: iccdev-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ matrix.build_type }}-${{ hashFiles('.github/workflows/ci-latest-release.yml', '.github/workflows/ci-pr-wasm.yml', '.github/workflows/wasm-latest-matrix.yml') }}
          restore-keys: |
            iccdev-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ matrix.build_type }}-
            iccdev-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-
            ci-latest-release-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-

      - name: Install Emscripten SDK
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if [[ -d emsdk/.git ]]; then
            git -C emsdk remote set-url origin https://github.com/emscripten-core/emsdk.git
            git -C emsdk fetch --depth 1 origin main
            git -C emsdk checkout --force FETCH_HEAD
          else
            rm -rf emsdk
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          fi
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"

      - name: Restore WASM third-party dependency cache
        id: wasm-deps-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: third_party
          key: iccdev-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-${{ matrix.build_type }}-${{ hashFiles('.github/workflows/ci-latest-release.yml', '.github/workflows/ci-pr-wasm.yml', '.github/workflows/wasm-latest-matrix.yml') }}
          restore-keys: |
            iccdev-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-${{ matrix.build_type }}-
            iccdev-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-
            ci-latest-release-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-

      - name: Build third-party dependencies
        env:
          BASH_ENV: /dev/null
          WASM_DEPS_CACHE_HIT: ${{ steps.wasm-deps-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"
          CACHE_ACTION="rebuilt"
          deps_ready() {
            [[ -f "$THIRD_PARTY/zlib/out/lib/libz.a" ]] &&
            [[ -f "$THIRD_PARTY/libpng/out/lib/libpng16.a" ]] &&
            [[ -f "$THIRD_PARTY/libjpeg/out/lib/libjpeg.a" ]] &&
            [[ -f "$THIRD_PARTY/libtiff/out/lib/libtiff.a" ]] &&
            [[ -f "$THIRD_PARTY/libxml2/out/lib/libxml2.a" ]] &&
            [[ -d "$THIRD_PARTY/nlohmann-json/out/share/cmake/nlohmann_json" ]]
          }

          if deps_ready; then
            echo "Using cached WASM third-party dependencies from $THIRD_PARTY"
            CACHE_ACTION="reused"
          else
          echo "WASM third-party cache is missing or incomplete; rebuilding dependencies."
          rm -rf "$THIRD_PARTY"
          mkdir -p "$THIRD_PARTY" && cd "$THIRD_PARTY"

          # zlib
          git clone --depth 1 https://github.com/madler/zlib.git && cd zlib
          emconfigure ./configure --static --prefix="$THIRD_PARTY/zlib/out"
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          # libpng (checksum verified)
          curl -sLO https://download.sourceforge.net/libpng/libpng-1.6.57.tar.gz
          echo "01fdab044cdc575c74a9ef62a4042fbe24fea8bedfe8aa5c89f4467b781bbb60  libpng-1.6.57.tar.gz" | sha256sum -c -
          tar -xzf libpng-1.6.57.tar.gz && mv libpng-1.6.57 libpng && cd libpng
          CPPFLAGS="-I$THIRD_PARTY/zlib" LDFLAGS="-L$THIRD_PARTY/zlib/out/lib" \
            emconfigure ./configure --disable-shared --enable-static --prefix="$THIRD_PARTY/libpng/out"
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          # libjpeg (checksum verified)
          curl -sLO https://ijg.org/files/jpegsrc.v9e.tar.gz
          echo "4077d6a6a75aeb01884f708919d25934c93305e49f7e3f36db9129320e6f4f3d  jpegsrc.v9e.tar.gz" | sha256sum -c -
          tar -xzf jpegsrc.v9e.tar.gz && mv jpeg-9e libjpeg && cd libjpeg
          emconfigure ./configure --prefix="$THIRD_PARTY/libjpeg/out" --disable-shared --enable-static
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          # libtiff (with retry for GitLab)
          for attempt in 1 2 3; do
            if git clone --depth 1 https://gitlab.com/libtiff/libtiff.git; then
              break
            fi
            echo "::warning::libtiff clone attempt $attempt failed, retrying in 10s..."
            rm -rf libtiff
            sleep 10
          done
          if [[ ! -d libtiff ]]; then
            echo "::error::Failed to clone libtiff after 3 attempts"
            exit 1
          fi
          cd libtiff
          mkdir wasm && cd wasm
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libtiff/out" \
            -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
            -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
            -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
            -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a"
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          # libxml2 (CMake build with retry for GitLab)
          for attempt in 1 2 3; do
            if git clone --depth 1 https://gitlab.gnome.org/GNOME/libxml2.git; then
              break
            fi
            echo "::warning::libxml2 clone attempt $attempt failed, retrying in 10s..."
            rm -rf libxml2
            sleep 10
          done
          if [[ ! -d libxml2 ]]; then
            echo "::error::Failed to clone libxml2 after 3 attempts"
            exit 1
          fi
          cd libxml2
          mkdir wasm-build && cd wasm-build
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libxml2/out" \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBXML2_WITH_PYTHON=OFF \
            -DLIBXML2_WITH_TESTS=OFF \
            -DLIBXML2_WITH_PROGRAMS=OFF \
            -DLIBXML2_WITH_LZMA=OFF \
            -DLIBXML2_WITH_ZLIB=OFF \
            -DLIBXML2_WITH_ICONV=OFF
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          # nlohmann-json (build with CMake for find_package support)
          git clone --depth 1 https://github.com/nlohmann/json.git nlohmann-json && cd nlohmann-json
          mkdir wasm && cd wasm
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/nlohmann-json/out" \
            -DJSON_BuildTests=OFF \
            -DJSON_Install=ON
          emmake make -j"$(nproc)"
          emmake make install
          cd "$THIRD_PARTY"

          find "$THIRD_PARTY" -type d -name .git -prune -print0 | xargs -0r rm -rf
          touch "$THIRD_PARTY/.wasm-latest-matrix-deps-complete"
          fi

          # --- Sanitized step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "### Third-party dependencies"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| cache hit | $(sanitize_line "${WASM_DEPS_CACHE_HIT:-false}") |"
            echo "| action | $(sanitize_line "$CACHE_ACTION") |"
            echo ""
            echo '```'
            find "$THIRD_PARTY" -mindepth 2 -maxdepth 2 -type d -name out \
              | sort \
              | while IFS= read -r dep; do
                sanitize_line "$dep"
                echo ""
              done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure and Build iccDEV-WASM
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"

          # --- Load sanitizer for step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          # Determine build type and extra flags
          BUILD_FLAGS=""
          BUILD_TYPE="${MATRIX_BUILD_TYPE}"
          if [[ "$BUILD_TYPE" == "Asan" ]]; then
            BUILD_FLAGS="-fsanitize=address"
            BUILD_TYPE="Debug"
          fi

          mkdir -p build-wasm && cd build-wasm
          emcmake cmake ../Build/Cmake \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DENABLE_TOOLS=ON \
            -DENABLE_STATIC_LIBS=ON \
            -DENABLE_SHARED_LIBS=OFF \
            -DENABLE_TESTS=OFF \
            -DLIBXML2_INCLUDE_DIR="$THIRD_PARTY/libxml2/out/include/libxml2" \
            -DLIBXML2_LIBRARY="$THIRD_PARTY/libxml2/out/lib/libxml2.a" \
            -DTIFF_INCLUDE_DIR="$THIRD_PARTY/libtiff/out/include" \
            -DTIFF_LIBRARY="$THIRD_PARTY/libtiff/out/lib/libtiff.a" \
            -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
            -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a" \
            -DPNG_PNG_INCLUDE_DIR="$THIRD_PARTY/libpng/out/include" \
            -DPNG_LIBRARY="$THIRD_PARTY/libpng/out/lib/libpng16.a" \
            -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
            -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
            -Dnlohmann_json_DIR="$THIRD_PARTY/nlohmann-json/out/share/cmake/nlohmann_json" \
            -DCMAKE_CXX_FLAGS=" \
              $BUILD_FLAGS \
              -I$THIRD_PARTY/libtiff/out/include \
              -I$THIRD_PARTY/libjpeg/out/include \
              -I$THIRD_PARTY/libpng/out/include \
              -I$THIRD_PARTY/zlib \
              -I$THIRD_PARTY/nlohmann-json/out/include" \
            -DCMAKE_EXE_LINKER_FLAGS=" \
              $THIRD_PARTY/libjpeg/out/lib/libjpeg.a \
              $THIRD_PARTY/libpng/out/lib/libpng16.a \
              $THIRD_PARTY/zlib/out/lib/libz.a \
              -s INITIAL_MEMORY=128MB \
              -s ALLOW_MEMORY_GROWTH=1 \
              -s FORCE_FILESYSTEM=1 \
              -s MODULARIZE=1 \
              -s EXPORT_NAME=createModule \
              -s EXPORTED_RUNTIME_METHODS=['FS','callMain'] -s EXIT_RUNTIME=0" \
            -Wno-dev

          emmake make -j"$(nproc)"

          # Report results (sanitized, 1 file per line)
          JS_COUNT=$(find . -name '*.js' -not -path '*/CMakeFiles/*' | wc -l)
          WASM_COUNT=$(find . -name '*.wasm' | wc -l)
          LIB_COUNT=$(find . -name '*.a' | wc -l)

          {
            echo "### WASM Build: $(sanitize_line "${MATRIX_BUILD_TYPE}")"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| JS modules | $(sanitize_line "$JS_COUNT") |"
            echo "| WASM binaries | $(sanitize_line "$WASM_COUNT") |"
            echo "| Static libraries | $(sanitize_line "$LIB_COUNT") |"
            echo ""
            echo "#### JS Modules"
            echo '```'
            find . -name '*.js' -not -path '*/CMakeFiles/*' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
            echo "#### WASM Binaries"
            echo '```'
            find . -name '*.wasm' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate WASM output
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          # --- Load sanitizer ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          cd build-wasm

          # Verify .wasm files exist and are valid
          WASM_FILES=$(find . -name '*.wasm' -type f)
          if [ -z "$WASM_FILES" ]; then
            echo "::error::No WASM files produced"
            exit 1
          fi

          # Validate each .wasm file header (magic number: \0asm)
          VALID=0
          INVALID=0
          for wf in $WASM_FILES; do
            MAGIC=$(xxd -l 4 -p "$wf" 2>/dev/null)
            if [ "$MAGIC" = "0061736d" ]; then
              SIZE=$(stat -c%s "$wf")
              echo "VALID: $(basename "$wf") ($SIZE bytes)"
              VALID=$((VALID + 1))
            else
              echo "INVALID: $(basename "$wf") (magic: $MAGIC)"
              INVALID=$((INVALID + 1))
            fi
          done

          { sanitize_line "### Validation: $VALID valid, $INVALID invalid"; echo ""; } >> "$GITHUB_STEP_SUMMARY"

          if [ $INVALID -gt 0 ]; then
            echo "::error::$INVALID invalid WASM files found"
            exit 1
          fi

          # Run a quick smoke test with node if iccDumpProfile exists
          DUMP_JS=$(find . -name "iccDumpProfile.js" -not -path '*/CMakeFiles/*' | head -1)
          if [ -n "$DUMP_JS" ] && [ -f "$DUMP_JS" ]; then
            echo "Smoke test: iccDumpProfile --help"
            set +e
            node "$DUMP_JS" 2>&1 | head -5
            echo "iccDumpProfile WASM smoke test complete"
            set -e
          fi

          # ------------------------------------------------------------------
          # Regression test: re-invoke callMain() AFTER main() has exited.
          #
          # Without -s EXIT_RUNTIME=0 (or Module.noExitRuntime=true), the
          # second callMain() aborts with:
          #   Aborted(Assertion failed: native function `strerror` called
          #   after runtime exit (use NO_EXIT_RUNTIME ...))
          #
          # This pattern broke the npm iccdev package after the Asan matrix
          # variant landed; this test guards against any future regression
          # of the EXIT_RUNTIME flag in the link line above.
          # ------------------------------------------------------------------
          if [ -n "$DUMP_JS" ] && [ -f "$DUMP_JS" ] && command -v node >/dev/null 2>&1; then
            echo "Regression test: re-invoke callMain() after main() exits"
            REG_JS="$GITHUB_WORKSPACE/.github/scripts/wasm-reinvoke-test.cjs"
            REG_OUT=$(mktemp)
            if [ -f "$REG_JS" ]; then
              # Emscripten's runtime can swallow process.exit() after abort,
              # so the script writes its verdict to a sentinel file. Trust
              # the sentinel rather than node's exit code.
              node "$REG_JS" "$DUMP_JS" "$REG_OUT" || true
              VERDICT=$(head -1 "$REG_OUT" 2>/dev/null || echo "FAIL: no sentinel")
              echo "regression verdict: $VERDICT"
              if [ "$VERDICT" = "PASS" ]; then
                { echo "### WASM Regression: PASS (re-invoke after main exit)"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::error::WASM regression test failed - EXIT_RUNTIME flag may have been removed from the link line"
                { echo "### WASM Regression: FAIL"; echo ""; echo '```'; printf '%s\n' "$VERDICT" | while IFS= read -r line; do sanitize_line "$line"; echo ""; done; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
                rm -f "$REG_OUT"
                exit 1
              fi
              rm -f "$REG_OUT"
            else
              echo "::warning::regression script $REG_JS not found, skipping"
            fi
          fi


      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wasm-matrix-${{ matrix.build_type }}
          path: |
            build-wasm/Tools/**/*.js
            build-wasm/Tools/**/*.wasm
            build-wasm/IccProfLib/*.a
            build-wasm/IccXML/*.a
            build-wasm/IccJSON/*.a
          retention-days: 7
          if-no-files-found: warn
