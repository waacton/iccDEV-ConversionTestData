# Intent: iccDEV wasm-latest-matrix
#
# Last Updated: 2026-03-28 by David Hoyt
#               Removed stale wasm branch checkout (consolidated)
#               Build from repo checkout instead of separate clone
#               Use CMake for libxml2 (replaces fragile autogen.sh)
#               Added retry logic for GitLab clones
#               Added WASM validation step
#               Added concurrency group and timeout
#               Governance hardening: Hoyt shell prologue on every
#               step, sanitize-sed.sh for GITHUB_STEP_SUMMARY,
#               matrix values via env: block (never ${{ }} in run:),
#               credential isolation per-step
#
###############################################################

name: "wasm-latest-matrix"

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: wasm-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-build:
    name: "WASM Matrix • ${{ matrix.build_type }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        build_type: [Release, Debug, Asan]
      fail-fast: false
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Harden Bash Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Emscripten SDK
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Build third-party dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"
          mkdir -p "$THIRD_PARTY" && cd "$THIRD_PARTY"

          # zlib
          git clone --depth 1 https://github.com/madler/zlib.git && cd zlib
          emconfigure ./configure --static --prefix="$THIRD_PARTY/zlib/out"
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # libpng (checksum verified)
          curl -sLO https://download.sourceforge.net/libpng/libpng-1.6.51.tar.gz
          echo "ac25cafc2054cda3f6f0fe22ee9fc587024b99e01d03bd72b765824e48f39021  libpng-1.6.51.tar.gz" | sha256sum -c -
          tar -xzf libpng-1.6.51.tar.gz && mv libpng-1.6.51 libpng && cd libpng
          CPPFLAGS="-I$THIRD_PARTY/zlib" LDFLAGS="-L$THIRD_PARTY/zlib/out/lib" \
            emconfigure ./configure --disable-shared --enable-static --prefix="$THIRD_PARTY/libpng/out"
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # libjpeg (checksum verified)
          curl -sLO https://ijg.org/files/jpegsrc.v9e.tar.gz
          echo "4077d6a6a75aeb01884f708919d25934c93305e49f7e3f36db9129320e6f4f3d  jpegsrc.v9e.tar.gz" | sha256sum -c -
          tar -xzf jpegsrc.v9e.tar.gz && mv jpeg-9e libjpeg && cd libjpeg
          emconfigure ./configure --prefix="$THIRD_PARTY/libjpeg/out" --disable-shared --enable-static
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # libtiff (with retry for GitLab)
          for attempt in 1 2 3; do
            if git clone --depth 1 https://gitlab.com/libtiff/libtiff.git; then
              break
            fi
            echo "::warning::libtiff clone attempt $attempt failed, retrying in 10s..."
            rm -rf libtiff
            sleep 10
          done
          if [[ ! -d libtiff ]]; then
            echo "::error::Failed to clone libtiff after 3 attempts"
            exit 1
          fi
          cd libtiff
          mkdir wasm && cd wasm
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libtiff/out" \
            -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
            -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
            -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
            -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a"
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # libxml2 (CMake build with retry for GitLab)
          for attempt in 1 2 3; do
            if git clone --depth 1 https://gitlab.gnome.org/GNOME/libxml2.git; then
              break
            fi
            echo "::warning::libxml2 clone attempt $attempt failed, retrying in 10s..."
            rm -rf libxml2
            sleep 10
          done
          if [[ ! -d libxml2 ]]; then
            echo "::error::Failed to clone libxml2 after 3 attempts"
            exit 1
          fi
          cd libxml2
          mkdir wasm-build && cd wasm-build
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libxml2/out" \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBXML2_WITH_PYTHON=OFF \
            -DLIBXML2_WITH_TESTS=OFF \
            -DLIBXML2_WITH_PROGRAMS=OFF \
            -DLIBXML2_WITH_LZMA=OFF \
            -DLIBXML2_WITH_ZLIB=OFF \
            -DLIBXML2_WITH_ICONV=OFF
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # nlohmann-json (build with CMake for find_package support)
          git clone --depth 1 https://github.com/nlohmann/json.git nlohmann-json && cd nlohmann-json
          mkdir wasm && cd wasm
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/nlohmann-json/out" \
            -DJSON_BuildTests=OFF \
            -DJSON_Install=ON
          emmake make -j$(nproc)
          emmake make install
          cd "$THIRD_PARTY"

          # --- Sanitized step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "### Third-party dependencies built"
            echo '```'
            ls -d "$THIRD_PARTY"/*/out 2>/dev/null | while IFS= read -r dep; do
              sanitize_line "$dep"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure and Build iccDEV-WASM
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"

          # --- Load sanitizer for step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          # Determine build type and extra flags
          BUILD_FLAGS=""
          BUILD_TYPE="${MATRIX_BUILD_TYPE}"
          if [[ "$BUILD_TYPE" == "Asan" ]]; then
            BUILD_FLAGS="-fsanitize=address"
            BUILD_TYPE="Debug"
          fi

          mkdir -p build-wasm && cd build-wasm
          emcmake cmake ../Build/Cmake \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DENABLE_TOOLS=ON \
            -DENABLE_STATIC_LIBS=ON \
            -DENABLE_SHARED_LIBS=OFF \
            -DENABLE_TESTS=OFF \
            -DLIBXML2_INCLUDE_DIR="$THIRD_PARTY/libxml2/out/include/libxml2" \
            -DLIBXML2_LIBRARY="$THIRD_PARTY/libxml2/out/lib/libxml2.a" \
            -DTIFF_INCLUDE_DIR="$THIRD_PARTY/libtiff/out/include" \
            -DTIFF_LIBRARY="$THIRD_PARTY/libtiff/out/lib/libtiff.a" \
            -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
            -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a" \
            -DPNG_PNG_INCLUDE_DIR="$THIRD_PARTY/libpng/out/include" \
            -DPNG_LIBRARY="$THIRD_PARTY/libpng/out/lib/libpng16.a" \
            -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
            -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
            -Dnlohmann_json_DIR="$THIRD_PARTY/nlohmann-json/out/share/cmake/nlohmann_json" \
            -DCMAKE_CXX_FLAGS=" \
              $BUILD_FLAGS \
              -I$THIRD_PARTY/libtiff/out/include \
              -I$THIRD_PARTY/libjpeg/out/include \
              -I$THIRD_PARTY/libpng/out/include \
              -I$THIRD_PARTY/zlib \
              -I$THIRD_PARTY/nlohmann-json/out/include" \
            -DCMAKE_EXE_LINKER_FLAGS=" \
              $THIRD_PARTY/libjpeg/out/lib/libjpeg.a \
              $THIRD_PARTY/libpng/out/lib/libpng16.a \
              $THIRD_PARTY/zlib/out/lib/libz.a \
              -s INITIAL_MEMORY=128MB \
              -s ALLOW_MEMORY_GROWTH=1 \
              -s FORCE_FILESYSTEM=1 \
              -s MODULARIZE=1 \
              -s EXPORT_NAME=createModule \
              -s EXPORTED_RUNTIME_METHODS=['FS','callMain']" \
            -Wno-dev

          emmake make -j$(nproc)

          # Report results (sanitized, 1 file per line)
          JS_COUNT=$(find . -name '*.js' -not -path '*/CMakeFiles/*' | wc -l)
          WASM_COUNT=$(find . -name '*.wasm' | wc -l)
          LIB_COUNT=$(find . -name '*.a' | wc -l)

          {
            echo "### WASM Build: $(sanitize_line "${MATRIX_BUILD_TYPE}")"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| JS modules | $(sanitize_line "$JS_COUNT") |"
            echo "| WASM binaries | $(sanitize_line "$WASM_COUNT") |"
            echo "| Static libraries | $(sanitize_line "$LIB_COUNT") |"
            echo ""
            echo "#### JS Modules"
            echo '```'
            find . -name '*.js' -not -path '*/CMakeFiles/*' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
            echo "#### WASM Binaries"
            echo '```'
            find . -name '*.wasm' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate WASM output
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          # --- Load sanitizer ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          cd build-wasm

          # Verify .wasm files exist and are valid
          WASM_FILES=$(find . -name '*.wasm' -type f)
          if [ -z "$WASM_FILES" ]; then
            echo "::error::No WASM files produced"
            exit 1
          fi

          # Validate each .wasm file header (magic number: \0asm)
          VALID=0
          INVALID=0
          for wf in $WASM_FILES; do
            MAGIC=$(xxd -l 4 -p "$wf" 2>/dev/null)
            if [ "$MAGIC" = "0061736d" ]; then
              SIZE=$(stat -c%s "$wf")
              echo "VALID: $(basename "$wf") ($SIZE bytes)"
              VALID=$((VALID + 1))
            else
              echo "INVALID: $(basename "$wf") (magic: $MAGIC)"
              INVALID=$((INVALID + 1))
            fi
          done

          { sanitize_line "### Validation: $VALID valid, $INVALID invalid"; echo ""; } >> "$GITHUB_STEP_SUMMARY"

          if [ $INVALID -gt 0 ]; then
            echo "::error::$INVALID invalid WASM files found"
            exit 1
          fi

          # Run a quick smoke test with node if iccDumpProfile exists
          DUMP_JS=$(find . -name "iccDumpProfile.js" -not -path '*/CMakeFiles/*' | head -1)
          if [ -n "$DUMP_JS" ] && [ -f "$DUMP_JS" ]; then
            echo "Smoke test: iccDumpProfile --help"
            set +e
            node "$DUMP_JS" 2>&1 | head -5
            echo "iccDumpProfile WASM smoke test complete"
            set -e
          fi

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: wasm-matrix-${{ matrix.build_type }}
          path: |
            build-wasm/Tools/**/*.js
            build-wasm/Tools/**/*.wasm
            build-wasm/IccProfLib/*.a
            build-wasm/IccXML/*.a
            build-wasm/IccJSON/*.a
          retention-days: 7
          if-no-files-found: warn
