#
# Intent: Static code analysis and linting
# Last Updated: 2026-04-05 23:37:53 UTC by David Hoyt
#
#               Matrix: cppcheck and clang-tidy run as parallel
#               jobs, each with -j$(nproc). Build is shared via
#               artifact upload.
#
###############################################################

name: "ci-pr-lint"

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:

  workflow_call:
    inputs:
      ubuntu-version:
        description: "Ubuntu version for runner"
        required: false
        default: "ubuntu-latest"
        type: string

jobs:
  #############################################################################
  # Job 1: Build + determine files
  #############################################################################
  build:
    name: "Build"
    runs-on: ${{ inputs.ubuntu-version || 'ubuntu-latest' }}
    timeout-minutes: 20
    outputs:
      no_src_changes: ${{ steps.diffcheck.outputs.no_src_changes }}
      scope: ${{ steps.diffcheck.outputs.scope }}
    steps:

      - name: Validate ubuntu-version input
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          INPUT_UBUNTU_VERSION: ${{ inputs.ubuntu-version }}
        run: |
          set -euo pipefail
          case "${INPUT_UBUNTU_VERSION}" in
            ubuntu-latest|ubuntu-22.04|ubuntu-24.04|"")
              ;;
            *)
              echo "ERROR: Invalid runner: '${INPUT_UBUNTU_VERSION}' - blocked." >&2
              exit 1
              ;;
          esac
      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout base commit (trusted sanitizers)
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          path: base
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Git anonymous identity
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Install Linux dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake gcc g++ clang clang-tools clang-tidy \
            cppcheck clang-format pkg-config jq \
            libpng-dev libxml2-dev libtiff-dev libjpeg-dev \
            nlohmann-json3-dev libwxgtk3.2-dev wx-common \
            python3 curl git llvm
          {
            echo "### Environment"
            echo "| Tool | Version |"
            echo "|------|---------|"
            echo "| cppcheck | $(cppcheck --version 2>&1) |"
            echo "| clang-tidy | $(clang-tidy --version 2>&1 | head -1) |"
            echo "| cmake | $(cmake --version | head -1) |"
            echo "| nproc | $(nproc) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
      - id: diffcheck
        name: Determine files to analyze
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          PR_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          git show --stat --pretty=format:"Commit: %H%nAuthor: %an%nDate: %ad%n" HEAD
          if [ "${PR_EVENT_NAME}" = "pull_request" ]; then
            base_ref="${PR_BASE_REF}"
            case "$base_ref" in master) ;; *)
              echo "Ref blocked or unsupported: $base_ref" >&2
              echo "no_src_changes=true" >> "$GITHUB_OUTPUT"
              echo "scope=none" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            esac
            # Use fully-qualified refspec (defense-in-depth: prevents ambiguous ref resolution)
            git -c protocol.version=2 fetch --no-tags origin \
              "refs/heads/${base_ref}:refs/remotes/origin/${base_ref}" \
              --depth=50
            git diff --name-only "origin/${base_ref}...HEAD" \
              | tr -cd '[:alnum:]./\-_\n' > changed_paths.txt
            grep -E '\.(cpp|cxx|cc|h|hpp)$' changed_paths.txt \
              | tr '\n' '\0' > changed_files.txt || true
            changed_file_count="$(xargs -0 -n1 < changed_files.txt | wc -l)"
            if [ "$changed_file_count" -eq 0 ]; then
              echo "no_src_changes=true" >> "$GITHUB_OUTPUT"
              echo "scope=none" >> "$GITHUB_OUTPUT"
            else
              echo "no_src_changes=false" >> "$GITHUB_OUTPUT"
              echo "scope=pr" >> "$GITHUB_OUTPUT"
              echo "Analyzing $changed_file_count changed files"
            fi
          else
            echo "no_src_changes=false" >> "$GITHUB_OUTPUT"
            echo "scope=full" >> "$GITHUB_OUTPUT"
            find IccProfLib IccXML IccJSON Tools -type f \
              \( -name '*.cpp' -o -name '*.h' -o -name '*.cxx' \
              -o -name '*.cc' -o -name '*.hpp' \) \
              -print0 > changed_files.txt
            file_count="$(xargs -0 -n1 < changed_files.txt | wc -l)"
            echo "Full-tree analysis: $file_count source files"
          fi
      - name: Configure and build
        if: steps.diffcheck.outputs.no_src_changes == 'false'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build
          cd Build
          cmake Cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -Wno-dev
          make -j"$(nproc)"
      - name: Upload build context
        if: steps.diffcheck.outputs.no_src_changes == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lint-build-context
          retention-days: 1
          path: |
            Build/compile_commands.json
            changed_files.txt
  #############################################################################
  # Job 2: Parallel lint matrix
  #   - cppcheck split by component (IccProfLib, IccXML, Tools)
  #   - clang-tidy runs full tree
  #############################################################################
  lint:
    name: "${{ matrix.name }}"
    runs-on: ${{ inputs.ubuntu-version || 'ubuntu-latest' }}
    needs: build
    if: needs.build.outputs.no_src_changes == 'false'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "cppcheck - IccProfLib"
            tool: cppcheck
            component: IccProfLib
          - name: "cppcheck - IccXML"
            tool: cppcheck
            component: IccXML
          - name: "cppcheck - Tools"
            tool: cppcheck
            component: Tools
          - name: "cppcheck - IccJSON"
            tool: cppcheck
            component: IccJSON
          - name: "clang-tidy"
            tool: clang-tidy
            component: all
    steps:

      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake gcc g++ clang clang-tools clang-tidy \
            cppcheck pkg-config \
            libpng-dev libxml2-dev libtiff-dev libjpeg-dev \
            nlohmann-json3-dev libwxgtk3.2-dev wx-common \
            llvm
      - name: Download build context
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-build-context

      - name: Recreate build directory for static analyzers
        if: matrix.tool == 'clang-tidy' || matrix.tool == 'cppcheck'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # clang-tidy and cppcheck need the Build subdirectories to exist because
          # compile_commands.json entries have "directory" fields pointing
          # to Build/IccProfLib, Build/IccXML, etc.  The build job only
          # uploads compile_commands.json, so those directories are missing
          # and generated headers like IccProfLibVer.h are unavailable.
          # Running cmake configure (without make) recreates the directory
          # structure and generates version headers.
          # See: https://github.com/InternationalColorConsortium/iccDEV/issues/799
          mkdir -p Build
          cd Build
          cmake Cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -Wno-dev 2>&1 | tail -3
          dir_count=$(find . -type d | wc -l)
          echo "Build directory structure recreated: $dir_count directories"

      - name: Filter files for component
        if: matrix.tool == 'cppcheck'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          # Filter changed_files.txt to only this component's files
          xargs -0 -n1 < changed_files.txt \
            | { grep "^${MATRIX_COMPONENT}/" || true; } \
            | tr '\n' '\0' > component_files.txt
          FILE_COUNT=$(xargs -0 -n1 < component_files.txt 2>/dev/null | wc -l)
          echo "Component ${MATRIX_COMPONENT}: $FILE_COUNT files to analyze"
          echo "file_count=$FILE_COUNT" >> "$GITHUB_ENV"
      - name: Run ${{ matrix.name }}
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_TOOL: ${{ matrix.tool }}
          MATRIX_COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          NPROC=$(nproc)
          mkdir -p lint_reports
          if [ "${MATRIX_TOOL}" = "cppcheck" ]; then
            if [ "${file_count:-0}" -eq 0 ]; then
              echo "No ${MATRIX_COMPONENT} files to check -- skipping"
              : > "lint_reports/cppcheck_${MATRIX_COMPONENT}.txt"
            else
              echo "Running cppcheck on ${MATRIX_COMPONENT} with $NPROC parallel jobs"
              cppcheck_args=(
                --language=c++
                --std=c++17
                "--enable=warning,performance,portability,style"
                --suppress=missingIncludeSystem
                --suppress=unusedStructMember
                --suppress=unknownMacro:Tools/wxWidget/wxProfileDump/wxProfileDump.cpp
                -DICCPROFLIBVER='"cppcheck"'
                -DICFLOATSFX='"f"'
              )
              cppcheck \
                -j "$NPROC" \
                --project=Build/compile_commands.json \
                --file-filter="${MATRIX_COMPONENT}/*" \
                "${cppcheck_args[@]}" \
                2> "lint_reports/cppcheck_${MATRIX_COMPONENT}.txt" || true
              echo "cppcheck ${MATRIX_COMPONENT}: $(wc -l < "lint_reports/cppcheck_${MATRIX_COMPONENT}.txt") lines"
            fi
          else
            echo "Running clang-tidy with $NPROC parallel jobs"
            tidy_checks='modernize-*,readability-*,cppcoreguidelines-*'
            tidy_checks+=',clang-analyzer-core.*,clang-analyzer-security.*'
            tidy_checks+=',clang-analyzer-alpha.core.*,clang-analyzer-alpha.security.*'
            xargs -0 run-clang-tidy \
              -j "$NPROC" \
              -p Build \
              -checks="$tidy_checks" \
              < changed_files.txt \
              > lint_reports/clang_tidy.txt 2>&1 || true
            echo "clang-tidy: $(wc -l < lint_reports/clang_tidy.txt) lines"
          fi
      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lint-${{ matrix.tool }}-${{ matrix.component }}
          retention-days: 3
          path: lint_reports/

  #############################################################################
  # Job 3: Combined report
  #############################################################################
  report:
    name: "Report"
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()
    timeout-minutes: 5
    steps:

      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Download cppcheck IccProfLib results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-cppcheck-IccProfLib
          path: lint_reports/parts/
        continue-on-error: true

      - name: Download cppcheck IccXML results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-cppcheck-IccXML
          path: lint_reports/parts/
        continue-on-error: true

      - name: Download cppcheck Tools results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-cppcheck-Tools
          path: lint_reports/parts/
        continue-on-error: true

      - name: Download cppcheck IccJSON results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-cppcheck-IccJSON
          path: lint_reports/parts/
        continue-on-error: true

      - name: Download clang-tidy results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lint-clang-tidy-all
          path: lint_reports/
        continue-on-error: true

      - name: Merge cppcheck results
        if: needs.lint.result == 'success' || needs.lint.result == 'failure'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          mkdir -p lint_reports
          : > lint_reports/cppcheck.txt
          for f in lint_reports/parts/cppcheck_*.txt; do
            [ -f "$f" ] && cat "$f" >> lint_reports/cppcheck.txt
          done
          echo "Merged cppcheck: $(wc -l < lint_reports/cppcheck.txt) lines"
      - name: Generate GitHub summary
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          LINT_SCOPE: ${{ needs.build.outputs.scope || 'unknown' }}
          NO_SRC_CHANGES: ${{ needs.build.outputs.no_src_changes }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          SANITIZER=".github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi
          summary_line() { printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"; }

          summary_line "## Lint Report Summary"
          summary_line ""
          summary_line "**Scope:** ${LINT_SCOPE}"
          summary_line ""
          if [ "${NO_SRC_CHANGES}" = "true" ]; then
            summary_line "[SKIP] No modified source files detected."
            exit 0
          fi
          mkdir -p lint_reports
          # --- cppcheck summary ---
          summary_line "### cppcheck Results"
          summary_line ""
          if [ -s lint_reports/cppcheck.txt ]; then
            cpp_warns=$({ grep -c 'warning:' lint_reports/cppcheck.txt 2>/dev/null || true; })
            cpp_errs=$({ grep -c 'error:' lint_reports/cppcheck.txt 2>/dev/null || true; })
            cpp_perf=$({ grep -c 'performance:' lint_reports/cppcheck.txt 2>/dev/null || true; })
            cpp_port=$({ grep -c 'portability:' lint_reports/cppcheck.txt 2>/dev/null || true; })
            cpp_style=$({ grep -c 'style:' lint_reports/cppcheck.txt 2>/dev/null || true; })
            summary_line "| Severity | Count |"
            summary_line "|----------|-------|"
            summary_line "| error | $cpp_errs |"
            summary_line "| warning | $cpp_warns |"
            summary_line "| performance | $cpp_perf |"
            summary_line "| portability | $cpp_port |"
            summary_line "| style | $cpp_style |"
            summary_line ""
            summary_line "#### Findings by Component"
            summary_line ""
            summary_line "| Component | Findings |"
            summary_line "|-----------|----------|"
            for comp in IccProfLib IccXML IccJSON Tools; do
              f="lint_reports/parts/cppcheck_${comp}.txt"
              if [ -f "$f" ] && [ -s "$f" ]; then
                cnt=$(wc -l < "$f" | tr -d ' ')
              else
                cnt=0
              fi
              summary_line "| $comp | $cnt |"
            done
            summary_line ""
            summary_line "#### Top cppcheck Files"
            summary_line ""
            { grep -oP '^[^:]+\.(cpp|h)' lint_reports/cppcheck.txt 2>/dev/null || true; } \
              | sort | uniq -c | sort -rn | sed -n '1,10p' \
              | while read -r cnt fname; do
                  summary_line "- **$cnt** - $fname"
                done
            summary_line ""
            summary_line "<details><summary>cppcheck output (last 50 lines)</summary>"
            summary_line ""
            summary_line '```'
            while IFS= read -r line; do
              safe_line=$(sanitize_line "$line")
              echo "$safe_line"
            done < <(tail -n 50 lint_reports/cppcheck.txt) >> "$GITHUB_STEP_SUMMARY"
            summary_line '```'
            summary_line "</details>"
            summary_line ""
          else
            summary_line "[OK] No cppcheck findings."
            summary_line ""
          fi
          # --- clang-tidy summary ---
          summary_line "### clang-tidy Results"
          summary_line ""
          if [ -s lint_reports/clang_tidy.txt ]; then
            ct_warns=$({ grep -c 'warning:' lint_reports/clang_tidy.txt 2>/dev/null || true; })
            ct_errs=$({ grep -c 'error:' lint_reports/clang_tidy.txt 2>/dev/null || true; })
            summary_line "| Severity | Count |"
            summary_line "|----------|-------|"
            summary_line "| warning | $ct_warns |"
            summary_line "| error | $ct_errs |"
            summary_line ""
            # Per-category breakdown
            summary_line "#### Findings by Check Category"
            summary_line ""
            summary_line "| Category | Count |"
            summary_line "|----------|-------|"
            for cat in cppcoreguidelines modernize readability \
              clang-analyzer-core clang-analyzer-security clang-analyzer-alpha; do
              cnt=$({ grep -c "\[$cat" lint_reports/clang_tidy.txt 2>/dev/null || true; })
              summary_line "| $cat | $cnt |"
            done
            summary_line ""
            # Per-component breakdown
            summary_line "#### Findings by Source Component"
            summary_line ""
            summary_line "| Component | Warnings |"
            summary_line "|-----------|----------|"
            for component in IccProfLib IccXML IccJSON Tools; do
              cnt=$(
                { grep "warning:.*\[" lint_reports/clang_tidy.txt 2>/dev/null || true; } \
                  | { grep "/${component}/" || true; } \
                  | wc -l | tr -d ' '
              )
              summary_line "| $component | $cnt |"
            done
            summary_line ""
            # Top 15 specific checks
            summary_line "#### Top 15 Triggered Checks"
            summary_line ""
            summary_line "| Count | Check |"
            summary_line "|-------|-------|"
            { grep -oh '\[[-a-zA-Z.]*\]' lint_reports/clang_tidy.txt 2>/dev/null || true; } \
              | sort | uniq -c | sort -rn | sed -n '1,15p' \
              | while read -r cnt chk; do
                  summary_line "| $cnt | $chk |"
                done
            summary_line ""
            # Security findings highlight
            sec_pattern='clang-analyzer-security\|clang-analyzer-alpha.security'
            sec_count=$({ grep -c "$sec_pattern" lint_reports/clang_tidy.txt 2>/dev/null || true; })
            if [ "$sec_count" -gt 0 ]; then
              summary_line "#### [WARN] Security Findings ($sec_count)"
              summary_line ""
              summary_line '```'
              { grep "$sec_pattern" lint_reports/clang_tidy.txt || true; } \
                | sed -n '1,20p' >> "$GITHUB_STEP_SUMMARY"
              summary_line '```'
              summary_line ""
            fi
            # Top 10 files
            summary_line "#### Top 10 Files by Warning Count"
            summary_line ""
            { grep 'warning:' lint_reports/clang_tidy.txt 2>/dev/null || true; } \
              | { grep -oP '[^ ]+\.(cpp|h)' || true; } \
              | sort | uniq -c | sort -rn | sed -n '1,10p' \
              | while read -r cnt fname; do
                  summary_line "- **$cnt** - $fname"
                done
            summary_line ""
          else
            summary_line "[OK] No clang-tidy findings."
            summary_line ""
          fi
          summary_line "[OK] Report generated."
      - name: Upload combined reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lint-reports
          path: lint_reports/
          if-no-files-found: warn
