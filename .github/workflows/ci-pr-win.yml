name: ci-pr-win

permissions:
  contents: read
  pull-requests: read  # Required by reusable PR build callers.

on:
  workflow_call:

concurrency:
  group: pr-win-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1
  RUN_URL: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
  PR: ${{ github.event.number }}

jobs:
  build:
    name: Windows MSVC build
    runs-on: windows-2022
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout PR source
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Harden Environment and Validate Inputs
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
         Set-StrictMode -Version Latest
         $ErrorActionPreference = 'Stop'
         $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
         $ProgressPreference = 'SilentlyContinue'
         $env:POWERSHELL_TELEMETRY_OPTOUT = "1"
         $env:DOTNET_CLI_TELEMETRY_OPTOUT = "1"
         $env:GH_NO_UPDATE_NOTIFIER = "1"
         $env:GH_PROMPT_DISABLED = "1"
         $env:NUGET_XMLDOC_MODE = "skip"
         # --- Validate workspace path (defense-in-depth) ---
         if (-not (Test-Path $env:GITHUB_WORKSPACE)) {
             throw "Invalid GITHUB_WORKSPACE path: $env:GITHUB_WORKSPACE"
         }
         # --- Remove tokens or UCI that should not exist in PR CI ---
         foreach ($v in @(
             'GITHUB_TOKEN',
             'ACTIONS_RUNTIME_TOKEN',
             'ACTIONS_ID_TOKEN_REQUEST_URL',
             'ACTIONS_ID_TOKEN_REQUEST_TOKEN'
         )) {
             if (Test-Path "Env:$v") {
                 Remove-Item "Env:$v" -ErrorAction SilentlyContinue
             }
         }
         # --- Canonicalization then sanitize user controllable input ---
         function Canonicalize([string]$s) {
             if (-not $s) { return "" }
             $s = $s.Trim()
             $s = $s.Replace("`r","").Replace("`n","")
             # Strip C0 controls, DEL, and Unicode bidi/zero-width/formatting chars
             $s = -join ($s.ToCharArray() | Where-Object {
                 $c = [int]$_
                 $c -ge 32 -and $c -ne 127 -and
                 -not ($c -ge 0x200B -and $c -le 0x200F) -and
                 -not ($c -ge 0x2028 -and $c -le 0x202F) -and
                 -not ($c -ge 0x2060 -and $c -le 0x2069) -and
                 $c -ne 0xFEFF -and
                 -not ($c -ge 0xFFF9 -and $c -le 0xFFFB)
             })
             return $s
         }
         # --- Canonicalize PR-controlled environment values ---
         $env:GITHUB_REF      = Canonicalize $env:GITHUB_REF
         $env:GITHUB_HEAD_REF = Canonicalize $env:GITHUB_HEAD_REF
         $env:GITHUB_BASE_REF = Canonicalize $env:GITHUB_BASE_REF
         # --- Harden Git configuration ---
         git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
         git config --global credential.helper ""
         # --- PATH hardening: limit to trusted tool locations ---
         $trustedPath = @(
             "$env:SystemRoot\system32",
             "$env:SystemRoot",
             "$env:ProgramFiles\Git\bin",
             "$env:ProgramFiles\PowerShell\7"
         ) -join ';'
         $env:PATH = $trustedPath
         Write-Host "Finished Harden Environment and Validate Inputs" -ForegroundColor Green

      - name: Test Sanitization Functions
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Testing Sanitization Functions" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host ""
          # Source the sanitization functions
          . .github/scripts/sanitize.ps1
          # Quick validation tests
          $unicodeInput = "Hello " + [char]0x4E16 + [char]0x754C
          $tests = @(
              @{Name="XSS prevention"; Input="<script>alert(1)</script>"; Expected="&lt;script&gt;alert(1)&lt;/script&gt;"},
              @{Name="HTML entities"; Input="A&B"; Expected="A&amp;B"},
              @{Name="Quotes"; Input="'test'"; Expected="&#39;test&#39;"},
              @{Name="Unicode"; Input=$unicodeInput; Expected=$unicodeInput},
              @{Name="Null bytes"; Input="test$([char]0x00)null"; Expected="testnull"},
              @{Name="CR/LF"; Input="line1`r`nline2"; Expected="line1 line2"}
          )
          $pass = 0
          $fail = 0
          foreach ($test in $tests) {
              $result = Sanitize-Line -InputString $test.Input
              if ($result -eq $test.Expected) {
                  Write-Host "  [OK] PASS: $($test.Name)" -ForegroundColor Green
                  $pass++
              } else {
                  Write-Host "  [FAIL] FAIL: $($test.Name)" -ForegroundColor Red
                  Write-Host "     Expected: [$($test.Expected)]"
                  Write-Host "     Got:      [$result]"
                  $fail++
              }
          }
          Write-Host ""
          Write-Host "Results: $pass passed, $fail failed"
          if ($fail -gt 0) {
              throw "Sanitization tests failed"
          }
          Write-Host ""
          Write-Host "[OK] All sanitization functions validated" -ForegroundColor Green
          Write-Host ""

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: Print PR Information
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          Write-Host "Triggered by:  $env:GITHUB_EVENT_NAME"
          Write-Host "Base branch:   $env:GITHUB_BASE_REF"
          Write-Host "Head branch:   $env:GITHUB_HEAD_REF"
          Write-Host "Commit SHA:    $env:PR_HEAD_SHA"
          Write-Host "OS:            $env:RUNNER_OS"

      - name: Install dependencies
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
            if (Test-Path Env:GITHUB_TOKEN) {
              Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue
            }
          pwd
          git branch
          git status
          Write-Host "========= Fetching Deps from Releases... ================`n"
          Start-BitsTransfer -Source "https://github.com/InternationalColorConsortium/iccDEV/releases/download/v2.3.1/vcpkg-exported-deps.zip" -Destination "deps.zip"
          Write-Host "========= Extracting Dependencies ...    ================`n"
          tar -xf deps.zip
      - name: CMake Configure
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
            if (Test-Path Env:GITHUB_TOKEN) {
              Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue
            }
          pwd
          cd Build/Cmake
          Write-Host "========= Configuring iccDEV ... ================`n"
          cmake  -B build -S . -DCMAKE_TOOLCHAIN_FILE="..\..\scripts\buildsystems\vcpkg.cmake" -DVCPKG_MANIFEST_MODE=OFF -DCMAKE_BUILD_TYPE=Debug  -Wno-dev

      - name: Build iccDEV
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
            if (Test-Path Env:GITHUB_TOKEN) {
              Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue
            }
          pwd
          cd Build/Cmake
          Write-Host "========= Building iccDEV ... ================`n"
          cmake --build build -- /m /maxcpucount
          cmake --build build -- /m /maxcpucount

      - name: Run Windows CTest check
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
            if (Test-Path Env:GITHUB_TOKEN) {
              Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue
            }
          pwd
          cd Build/Cmake
          Write-Host "========= Running CTest check ... ================`n"
          cmake --build build --config Debug --target check -- /m /maxcpucount
      - name: GitHub Summary
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          POWERSHELL_UPDATECHECK: Off
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_URL: ${{ env.RUN_URL }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_BUILD_TYPE: Debug
          GH_RUNNER_OS: ${{ runner.os }}
          GH_JOB_STATUS: ${{ job.status }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          # Use canonical sanitization from .github/scripts/sanitize.ps1
          # PowerShell dot-sourcing: loads the script into the current scope
          . .github/scripts/sanitize.ps1
          "## CMake Windows Build Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Repository: $(Sanitize-Line $env:GH_REPOSITORY)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Run URL: $(Sanitize-Line $env:GH_RUN_URL)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Triggered by: $(Sanitize-Line $env:GH_EVENT_NAME)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Commit SHA: $(Sanitize-Line $env:GH_COMMIT_SHA)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Build Type: $(Sanitize-Line $env:GH_BUILD_TYPE)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Runner OS: $(Sanitize-Line $env:GH_RUNNER_OS)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Status: $(Sanitize-Line $env:GH_JOB_STATUS)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  mingw-smoke:
    name: MinGW UCRT64 smoke
    runs-on: windows-2022
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}

    steps:
      - name: Checkout PR source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup MSYS2 UCRT64 MinGW
        id: setup-msys2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Run MinGW build and CTest check
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
          MSYS2_LOCATION: ${{ steps.setup-msys2.outputs.msys2-location }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $env:GH_NO_UPDATE_NOTIFIER = '1'
          $env:GH_PROMPT_DISABLED = '1'

          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_URL) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_URL
          }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_TOKEN) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_TOKEN
          }
          . .github/scripts/sanitize.ps1

          $msysRoot = [System.IO.Path]::GetFullPath($env:MSYS2_LOCATION)
          $ucrtRoot = Join-Path $msysRoot 'ucrt64'
          $ucrtBin = Join-Path $msysRoot 'ucrt64\bin'
          $usrBin = Join-Path $msysRoot 'usr\bin'
          $env:PATH = "$ucrtBin;$usrBin;$env:PATH"
          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          git config --global --add safe.directory $workspace

          $sourceDir = Join-Path $workspace 'Build\Cmake'
          $buildDir = Join-Path $sourceDir 'build-mingw-pr-smoke'
          $cmake = Join-Path $ucrtBin 'cmake.exe'
          $ctest = Join-Path $ucrtBin 'ctest.exe'
          $gcc = Join-Path $ucrtBin 'x86_64-w64-mingw32-gcc.exe'
          $gxx = Join-Path $ucrtBin 'x86_64-w64-mingw32-g++.exe'
          $ninja = Join-Path $ucrtBin 'ninja.exe'

          foreach ($tool in @($cmake, $ctest, $gcc, $gxx, $ninja)) {
            if (-not (Test-Path -LiteralPath $tool)) {
              throw "Required MinGW tool missing: $(Sanitize-Line $tool)"
            }
          }

          function Invoke-Native {
            param(
              [Parameter(Mandatory = $true)][string] $FilePath,
              [Parameter(Mandatory = $true)][string[]] $Arguments
            )
            & $FilePath @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "$(Sanitize-Line $FilePath) failed with exit code $LASTEXITCODE"
            }
          }

          if (Test-Path -LiteralPath $buildDir) {
            Remove-Item -Recurse -Force -LiteralPath $buildDir
          }

          Invoke-Native $cmake @(
            '-S', $sourceDir,
            '-B', $buildDir,
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=Release',
            "-DCMAKE_C_COMPILER=$gcc",
            "-DCMAKE_CXX_COMPILER=$gxx",
            "-DCMAKE_PREFIX_PATH=$ucrtRoot",
            '-DENABLE_TOOLS=ON',
            '-DENABLE_ICCXML=ON',
            '-DENABLE_ICCJSON=ON',
            '-DENABLE_IMAGE_TOOLS=ON',
            '-DENABLE_WXWIDGETS=OFF',
            '-DENABLE_CMM_TOOLS=OFF',
            '-DENABLE_IIS_TOOLS=OFF',
            '-DENABLE_TESTS=ON',
            '-DENABLE_SHARED_LIBS=OFF',
            '-DENABLE_STATIC_LIBS=ON'
          )
          Invoke-Native $cmake @(
            '--build', $buildDir,
            '--parallel'
          )
          Invoke-Native $ctest @(
            '--test-dir', $buildDir,
            '-N',
            '--no-tests=error'
          )
          Invoke-Native $cmake @(
            '--build', $buildDir,
            '--target', 'check',
            '--parallel'
          )

          $compilerLine = (& $gxx --version)[0]
          $summaryLines = @(
            '### Windows MinGW UCRT64 smoke',
            '',
            "- Compiler: ``$(Sanitize-Line $compilerLine)``",
            "- Build scope: ``full configured command-line project``",
            "- Build type: ``Release``",
            "- Linkage: ``static``",
            "- CTest: ``all registered MinGW suites``",
            "- Result: ``passed``"
          )
          $summaryLines | ForEach-Object {
            Sanitize-Print $_
          } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload MinGW smoke results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ci-pr-win-mingw-smoke-results
          path: Build/Cmake/build-mingw-pr-smoke/Testing
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
