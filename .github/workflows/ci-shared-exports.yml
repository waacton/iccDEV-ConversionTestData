###############################################################
# ci-shared-exports.yml
#
#         Tests all build configurations, sanitizers, and options
#         This workflow will replace ci-pr-actions in time
#
# Last Updated: 2026-04-05 23:35:58 UTC by David Hoyt
#               - Support Shared Libs
#
# All PR _must_ PASS this workflow
# Jobs:
#   1. validate-inputs     - guard workflow_dispatch inputs before clone
#   2. standard-builds     - os x compiler x build_type + profile creation
#   4. sanitizer-builds    - asan / ubsan / asan+ubsan x build_type
#   5. option-matrix       - individual cmake option toggles
#   6. windows-build       - MSVC + vcpkg + RefIccMAX smoke on windows-latest
#   7. version-header-test - verify cmake-generated version headers
#   8. clean-rebuild-test  - build / clean / rebuild cycle
#   9. final-summary       - aggregate results
###############################################################

name: ci-shared-exports

permissions:
  contents: read

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      iccdev_repo:
        description: 'Repository to checkout (owner/name)'
        required: false
        default: 'InternationalColorConsortium/iccDEV'
        type: string
      iccdev_ref:
        description: 'Branch, tag, or SHA to checkout'
        required: false
        default: 'master'
        type: string

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1

jobs:
  #############################################################################
  # Job 1: Validate User-Controllable Inputs
  #############################################################################
  validate-inputs:
    name: "Validate Workflow Inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    outputs:
      iccdev_repo: ${{ steps.validate.outputs.iccdev_repo }}
      iccdev_ref: ${{ steps.validate.outputs.iccdev_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate workflow_dispatch inputs
        id: validate
        env:
          BASH_ENV: /dev/null
          RAW_ICCDEV_REPO: ${{ github.event.inputs.iccdev_repo || github.repository }}
          RAW_ICCDEV_REF: ${{ github.event.inputs.iccdev_ref || github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          repo="${RAW_ICCDEV_REPO}"
          ref="${RAW_ICCDEV_REF}"
          workspace_root="$(realpath -m "$GITHUB_WORKSPACE")"

          if [[ ! "$repo" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*/[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "::error title=Invalid iccDEV repository::Expected owner/name, got $(sanitize_line "$repo")"
            exit 1
          fi

          if [[ "$ref" =~ ^[0-9A-Fa-f]{7,40}$ ]]; then
            :
          elif [[ ! "$ref" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,127}$ ]]; then
            echo "::error title=Invalid iccDEV ref::Rejected ref $(sanitize_line "$ref")"
            exit 1
          fi

          case "$ref" in
            -*|*..*|*//*|*@\{*|*.lock|*/|*/.|*/..)
              echo "::error title=Invalid iccDEV ref::Rejected ref $(sanitize_line "$ref")"
              exit 1
              ;;
          esac

          {
            printf 'iccdev_repo=%s\n' "$repo"
            printf 'iccdev_ref=%s\n' "$ref"
          } >> "$GITHUB_OUTPUT"

  #############################################################################
  # Job 2: Standard Project Builds (Tools Only - No Fuzzing)
  #############################################################################
  standard-builds:
    name: "Standard - ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}"
    needs: validate-inputs
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        build_type: [Release, Debug, RelWithDebInfo]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Dependencies (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.0 (node24)
        with:
          path: |
            ~/.cache/ccache
          key: ${{ runner.os }}-deps-${{ matrix.compiler }}-${{ hashFiles('.github/workflows/ci-shared-exports.yml') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ matrix.compiler }}-
            ${{ runner.os }}-deps-

      - name: Cache Dependencies (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.0 (node24)
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/.cache/ccache
          key: ${{ runner.os }}-deps-${{ matrix.compiler }}-${{ hashFiles('.github/workflows/ci-shared-exports.yml') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ matrix.compiler }}-
            ${{ runner.os }}-deps-

      - name: Configure Git Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake gcc g++ clang ccache \
            libpng-dev libxml2-dev libtiff-dev \
            nlohmann-json3-dev
          ccache --zero-stats || true

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          brew_install_missing() {
            local formula
            for formula in "$@"; do
              if brew list --formula "$formula" >/dev/null 2>&1; then
                brew list --versions "$formula"
              else
                brew install "$formula"
              fi
            done
          }
          brew_install_missing \
            cmake llvm libpng libtiff libxml2 nlohmann-json ccache jpeg-turbo
          ccache --zero-stats || true

      - name: Strip Emoji Selectors
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          # Strip U+FE0F (emoji variation selector) from upstream source
          find . -name '*.h' -o -name '*.cpp' | \
            xargs sed -i.bak "s/$(printf '\xef\xb8\x8f')//g" 2>/dev/null || true
          find . -name '*.bak' -delete 2>/dev/null || true
      - name: Set Compiler
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          if [ "$MATRIX_COMPILER" = "gcc" ]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Configure CMake
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build/build && cd Build/build
          cmake ../Cmake \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE" \
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
                -DENABLE_SHARED_LIBS=ON \
                -DENABLE_STATIC_LIBS=ON \
                -DENABLE_TOOLS=ON

      - name: Build
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          # Enable ccache if available
          if command -v ccache >/dev/null 2>&1; then
            export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
            if [ "$MATRIX_COMPILER" = "gcc" ]; then
              export CC="ccache gcc"
              export CXX="ccache g++"
            else
              export CC="ccache clang"
              export CXX="ccache clang++"
            fi
          fi

          cd Build/build
          echo "::group::Build Output"
          BUILD_START=$(date +%s)
          make -j"$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)" 2>&1 | tee build.log
          BUILD_END=$(date +%s)
          echo "::endgroup::"

          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo "::notice title=Build Time::Build completed in ${BUILD_TIME}s"

          if grep -iE '(error|failed|undefined reference|cannot find)' build.log; then
            echo "::error title=Build Failed::Build errors detected in log"
            exit 1
          fi

          # Show ccache stats if available
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache Statistics"
            ccache --show-stats || true
            echo "::endgroup::"
          fi

      - name: Verify Shared Library Consumer and Export Visibility
        if: matrix.build_type == 'Release'
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake -S examples/hello-iccdev \
                -B examples/hello-iccdev/build-ci \
                -DICCDEV_BUILD_DIR="$PWD/Build/build" \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE"
          cmake --build examples/hello-iccdev/build-ci -j"$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)"

          report_dir="$PWD/Build/build/abi-reports"
          mkdir -p "$report_dir"
          hello_bin="$PWD/examples/hello-iccdev/build-ci/hello-iccdev"
          hello_log="$report_dir/hello-iccdev-${RUNNER_OS}-${MATRIX_COMPILER}-${MATRIX_BUILD_TYPE}.log"
          report="$report_dir/shared-lib-visibility-${RUNNER_OS}-${MATRIX_COMPILER}-${MATRIX_BUILD_TYPE}.txt"
          proflib="$(find "$PWD/Build/build/IccProfLib" -maxdepth 1 -type f \( -name 'libIccProfLib2*.so*' -o -name 'libIccProfLib2*.dylib' \) | sort | sed -n '1p')"
          xmllib="$(find "$PWD/Build/build/IccXML" -maxdepth 1 -type f \( -name 'libIccXML2*.so*' -o -name 'libIccXML2*.dylib' \) | sort | sed -n '1p')"

          if [[ -z "$proflib" || -z "$xmllib" ]]; then
            echo "ERROR: Expected shared libraries were not built"
            exit 1
          fi

          if [[ "$RUNNER_OS" = "Linux" ]]; then
            export LD_LIBRARY_PATH="$PWD/Build/build/IccProfLib:$PWD/Build/build/IccXML:$PWD/Build/build/IccJSON:${LD_LIBRARY_PATH:-}"
          else
            export DYLD_LIBRARY_PATH="$PWD/Build/build/IccProfLib:$PWD/Build/build/IccXML:$PWD/Build/build/IccJSON:${DYLD_LIBRARY_PATH:-}"
          fi

          demangle() {
            if command -v c++filt >/dev/null 2>&1; then
              c++filt
            else
              cat
            fi
          }

          "$hello_bin" | tee "$hello_log"
          grep -q 'IccProfLib version:' "$hello_log"
          grep -q 'IccLibXML  version:' "$hello_log"
          grep -q 'Hello, iccDEV!' "$hello_log"

          {
            echo "Shared library visibility report"
            echo "OS: $RUNNER_OS"
            echo "Compiler: $MATRIX_COMPILER"
            echo "Build type: $MATRIX_BUILD_TYPE"
            echo "IccProfLib2: $proflib"
            echo "IccXML2: $xmllib"
            echo "hello-iccdev: $hello_bin"
            echo
            echo '$ file'
            file "$proflib" "$xmllib" "$hello_bin"
            echo
            if [[ "$RUNNER_OS" = "Linux" ]]; then
              echo '$ readelf -d'
              readelf -d "$proflib" | head -n 40
              echo
              echo '$ nm -D --defined-only | demangle'
              nm -D --defined-only "$proflib" | demangle | grep -E 'CIccProfile::InitHeader|CIccInfo::GetVersionName|CIccProfile::Attach' | sed -n '1,20p' || true
              echo
              echo '$ nm -D --defined-only | demangle (IccXML2)'
              nm -D --defined-only "$xmllib" | demangle | grep -E 'CIccProfileXml::ToXml|CIccProfileXml::InitHeader' | sed -n '1,20p' || true
              echo
              echo '$ ldd'
              ldd "$hello_bin"
            else
              echo '$ otool -L'
              otool -L "$proflib"
              echo
              echo '$ nm -gU | demangle'
              nm -gU "$proflib" | demangle | grep -E 'CIccProfile::InitHeader|CIccInfo::GetVersionName|CIccProfile::Attach' | sed -n '1,20p' || true
              echo
              echo '$ nm -gU | demangle (IccXML2)'
              nm -gU "$xmllib" | demangle | grep -E 'CIccProfileXml::ToXml|CIccProfileXml::InitHeader' | sed -n '1,20p' || true
              echo
              echo '$ otool -L (hello-iccdev)'
              otool -L "$hello_bin"
            fi
          } > "$report"

          # ── Symbol count assertions ──
          echo "::group::Symbol count assertions"
          if [[ "$RUNNER_OS" = "Linux" ]]; then
            proflib_syms="$(nm -D --defined-only "$proflib" | wc -l)"
            xmllib_syms="$(nm -D --defined-only "$xmllib" | wc -l)"
          else
            proflib_syms="$(nm -gU "$proflib" | wc -l)"
            xmllib_syms="$(nm -gU "$xmllib" | wc -l)"
          fi
          echo "IccProfLib2 exported symbols: $proflib_syms"
          echo "IccXML2     exported symbols: $xmllib_syms"
          if [[ "$proflib_syms" -lt 2000 ]]; then
            echo "::error::IccProfLib2 symbol count too low: $(sanitize_line "$proflib_syms") (expected >= 2000)"
            exit 1
          fi
          if [[ "$xmllib_syms" -lt 500 ]]; then
            echo "::error::IccXML2 symbol count too low: $(sanitize_line "$xmllib_syms") (expected >= 500)"
            exit 1
          fi
          echo "[OK] Symbol counts within expected range"
          echo "::endgroup::"

          # ── SONAME validation (Linux only) ──
          if [[ "$RUNNER_OS" = "Linux" ]]; then
            echo "::group::SONAME validation"
            proflib_soname="$(readelf -d "$proflib" | grep SONAME | sed 's/.*\[//' | sed 's/\]//')"
            xmllib_soname="$(readelf -d "$xmllib" | grep SONAME | sed 's/.*\[//' | sed 's/\]//')"
            echo "IccProfLib2 SONAME: $proflib_soname"
            echo "IccXML2     SONAME: $xmllib_soname"
            if ! grep -qE '^libIccProfLib2d?\.so\.[0-9]+$' <<< "$proflib_soname"; then
              echo "::error::IccProfLib2 SONAME does not match expected pattern: $(sanitize_line "$proflib_soname")"
              exit 1
            fi
            if ! grep -qE '^libIccXML2d?\.so\.[0-9]+$' <<< "$xmllib_soname"; then
              echo "::error::IccXML2 SONAME does not match expected pattern: $(sanitize_line "$xmllib_soname")"
              exit 1
            fi
            echo "[OK] SONAME values match expected pattern"
            echo "::endgroup::"
          fi

          echo "::notice title=Shared Library Consumer Smoke::hello-iccdev linked and ran against build-tree shared libraries"

      - name: Upload Build Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-logs-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            Build/build/build.log
            Build/build/CMakeCache.txt
            Build/build/CMakeFiles/CMakeError.log
            Build/build/CMakeFiles/CMakeOutput.log
          retention-days: 7

      - name: Upload Build Artifacts (on success)
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            Build/build/Tools/IccApplyNamedCmm/**/IccApplyNamedCmm
            Build/build/Tools/IccDumpProfile/**/IccDumpProfile
            Build/build/Tools/IccFromXml/**/IccFromXml
            Build/build/Tools/IccToXml/**/IccToXml
            Build/build/IccProfLib/libIccProfLib2*
            Build/build/IccXML/libIccXML2*
            Build/build/abi-reports/*
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9

      - name: Test Profiles
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Testing
          for d in ../Build/build/Tools/*; do
            [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
          done
          sh CreateAllProfiles.sh
          PROFILE_COUNT=$(find . -name "*.icc" | wc -l)
          echo "Created $PROFILE_COUNT profiles"
          if [ "$PROFILE_COUNT" -eq 0 ]; then
            echo "ERROR: No profiles created"
            exit 1
          fi

  #############################################################################
  # Job 4: Sanitizer Builds (Individual Sanitizers)
  #############################################################################
  sanitizer-builds:
    name: "Sanitizer - ${{ matrix.sanitizer }} - ${{ matrix.build_type }}"
    needs: validate-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, RelWithDebInfo]
        sanitizer:
          - asan
          - ubsan
          - asan-ubsan
        exclude:
          - sanitizer: asan-ubsan
            build_type: RelWithDebInfo

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.0 (node24)
        with:
          path: |
            ~/.cache/ccache
          key: sanitizer-deps-${{ matrix.sanitizer }}-${{ hashFiles('.github/workflows/ci-shared-exports.yml') }}
          restore-keys: |
            sanitizer-deps-${{ matrix.sanitizer }}-
            sanitizer-deps-

      - name: Configure Git Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake clang llvm \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Strip Emoji Selectors
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          find . -name '*.h' -o -name '*.cpp' | \
            xargs sed -i "s/$(printf '\xef\xb8\x8f')//g" 2>/dev/null || true
      - name: Configure with Sanitizer
        env:
          BASH_ENV: /dev/null
          MATRIX_SANITIZER: ${{ matrix.sanitizer }}
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build/build && cd Build/build

          case "$MATRIX_SANITIZER" in
            asan)
              OPTS="-DENABLE_ASAN=ON"
              ;;
            ubsan)
              OPTS="-DENABLE_UBSAN=ON"
              ;;
            asan-ubsan)
              OPTS="-DENABLE_ASAN=ON -DENABLE_UBSAN=ON"
              ;;
          esac

          CC=clang CXX=clang++ cmake ../Cmake \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE" \
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
                $OPTS

      - name: Build with Sanitizer
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build/build
          make -j"$(nproc)" 2>&1 | tee build.log
          if grep -iE 'error:' build.log; then
            echo "ERROR: Build failed"
            exit 1
          fi

      - name: Test with Sanitizer
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Testing
          for d in ../Build/build/Tools/*; do
            [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
          done
          timeout 300 sh CreateAllProfiles.sh || echo "Profile creation timed out (acceptable for sanitizer builds)"

      - name: Upload Sanitizer Build Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sanitizer-${{ matrix.sanitizer }}-${{ matrix.build_type }}
          path: |
            Build/build/Tools/IccApplyNamedCmm/**/IccApplyNamedCmm
            Build/build/Tools/IccDumpProfile/**/IccDumpProfile
            Build/build/IccProfLib/libIccProfLib2*
            Build/build/build.log
          if-no-files-found: warn
          retention-days: 7
          compression-level: 9

  #############################################################################
  # Job 5: Build Option Matrix (Test Each Option Independently)
  #############################################################################
  option-matrix:
    name: "Option - ${{ matrix.option_name }}"
    needs: validate-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - option_name: "ENABLE_COVERAGE"
            cmake_opts: "-DENABLE_COVERAGE=ON"
          - option_name: "ICC_ENABLE_ASSERTS"
            cmake_opts: "-DICC_ENABLE_ASSERTS=ON"
          - option_name: "ICC_TRACE_NAN_ENABLED"
            cmake_opts: "-DICC_TRACE_NAN_ENABLED=ON"
          - option_name: "SHARED_ONLY"
            cmake_opts: "-DENABLE_SHARED_LIBS=ON -DENABLE_STATIC_LIBS=OFF"
          # STATIC_ONLY excluded - upstream iccDEV IccXML/CMakeLists.txt:141
          # references IccXML2 shared target unconditionally (bug)

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake clang \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Strip Emoji Selectors
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          find . -name '*.h' -o -name '*.cpp' | \
            xargs sed -i "s/$(printf '\xef\xb8\x8f')//g" 2>/dev/null || true
      - name: Configure with Option
        env:
          BASH_ENV: /dev/null
          MATRIX_CMAKE_OPTS: ${{ matrix.cmake_opts }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build/build && cd Build/build
          cmake ../Cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
                $MATRIX_CMAKE_OPTS

      - name: Build
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build/build
          make -j"$(nproc)" 2>&1 | tee build.log
          if grep -iE 'error:' build.log; then
            echo "ERROR: Build failed"
            exit 1
          fi

  #############################################################################
  # Job 6: Windows Build (MSVC + SDK + RefIccMAX smoke)
  #############################################################################
  windows-build:
    name: "Windows - MSVC - ${{ matrix.build_type }} - RefIccMAX"
    needs: validate-inputs
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      POWERSHELL_TELEMETRY_OPTOUT: "1"
      POWERSHELL_UPDATECHECK: "Off"
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: Install Dependencies
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Write-Host "[INFO] Fetching vcpkg deps from iccDEV releases..."
          Start-BitsTransfer -Source "https://github.com/InternationalColorConsortium/iccDEV/releases/download/v2.3.1/vcpkg-exported-deps.zip" -Destination "deps.zip"
          Write-Host "[INFO] Extracting..."
          tar -xf deps.zip -C .
          $vcpkgBin = Join-Path (Resolve-Path '.').Path 'installed/x64-windows/bin'
          if (-not (Test-Path $vcpkgBin)) {
            throw "vcpkg bin directory not found after extracting deps.zip: $vcpkgBin"
          }
          Write-Host "[OK] vcpkg deps ready"

      - name: Configure
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          cd Build/Cmake
          cmake -B build -S . `
                -G "Visual Studio 17 2022" `
                -A x64 `
                -DCMAKE_TOOLCHAIN_FILE="..\..\scripts\buildsystems\vcpkg.cmake" `
                -DVCPKG_MANIFEST_MODE=OFF `
                -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
                -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF `
                -DENABLE_TOOLS=ON `
                -DENABLE_SHARED_LIBS=ON `
                -DENABLE_STATIC_LIBS=ON `
                -Wno-dev

      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          cd Build/Cmake
          cmake --build build --config $env:BUILD_TYPE -- /m /maxcpucount
          cmake --build build --config $env:BUILD_TYPE -- /m /maxcpucount

      - name: Verify RefIccMAX exports and import library
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          . .github/scripts/sanitize.ps1

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }

          $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          if (-not $vsPath) {
            throw 'Unable to locate a Visual Studio installation with C++ tools'
          }

          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          if (-not (Test-Path $vcvars)) {
            throw "vcvars64.bat not found at $vcvars"
          }

          $buildRoot = (Resolve-Path 'Build/Cmake/build').Path
          $configSuffix = if ($env:BUILD_TYPE -eq 'Debug') { 'd' } else { '' }

          $cmmDir = Join-Path $buildRoot "Tools\IccDEVCmm\x64\$($env:BUILD_TYPE)"
          $dllPath = Join-Path $cmmDir 'IccDEVCmm.dll'
          $libPath = Join-Path $cmmDir 'IccDEVCmm.lib'
          if (-not (Test-Path $dllPath)) {
            throw "RefIccMAX DLL not found for build type $env:BUILD_TYPE: $dllPath"
          }
          if (-not (Test-Path $libPath)) {
            throw "RefIccMAX import library not found for build type $env:BUILD_TYPE: $libPath"
          }
          $dll = Get-Item -LiteralPath $dllPath
          $lib = Get-Item -LiteralPath $libPath

          $profDir = Join-Path $buildRoot "IccProfLib\$($env:BUILD_TYPE)"
          $profDllPath = Join-Path $profDir ("IccProfLib2" + $configSuffix + ".dll")
          $profImportPath = Join-Path $profDir ("IccProfLib2" + $configSuffix + ".lib")
          $profStaticPath = Join-Path $profDir ("IccProfLib2-static" + $configSuffix + ".lib")
          foreach ($artifact in @($profDllPath, $profImportPath, $profStaticPath)) {
            if (-not (Test-Path $artifact)) {
              throw "IccProfLib artifact not found for build type $env:BUILD_TYPE: $artifact"
            }
          }
          $profDll = Get-Item -LiteralPath $profDllPath
          $profImport = Get-Item -LiteralPath $profImportPath
          $profStatic = Get-Item -LiteralPath $profStaticPath

          $xmlDir = Join-Path $buildRoot "IccXML\$($env:BUILD_TYPE)"
          $xmlDllPath = Join-Path $xmlDir ("IccXML2" + $configSuffix + ".dll")
          $xmlImportPath = Join-Path $xmlDir ("IccXML2" + $configSuffix + ".lib")
          $xmlStaticPath = Join-Path $xmlDir ("IccXML2-static" + $configSuffix + ".lib")
          foreach ($artifact in @($xmlDllPath, $xmlImportPath, $xmlStaticPath)) {
            if (-not (Test-Path $artifact)) {
              throw "IccXML artifact not found for build type $env:BUILD_TYPE: $artifact"
            }
          }
          $xmlDll = Get-Item -LiteralPath $xmlDllPath
          $xmlImport = Get-Item -LiteralPath $xmlImportPath
          $xmlStatic = Get-Item -LiteralPath $xmlStaticPath

          $reportDir = Join-Path $buildRoot 'abi-reports'
          New-Item -ItemType Directory -Path $reportDir -Force | Out-Null
          $exportsLog = Join-Path $env:RUNNER_TEMP "reficcmax_exports_$($env:BUILD_TYPE).txt"
          $dependentsLog = Join-Path $env:RUNNER_TEMP "reficcmax_dependents_$($env:BUILD_TYPE).txt"
          $importLibLog = Join-Path $env:RUNNER_TEMP "reficcmax_importlib_$($env:BUILD_TYPE).txt"
          $abiReport = Join-Path $reportDir "reficcmax-abi-$($env:BUILD_TYPE).txt"
          $profExportsLog = Join-Path $reportDir "iccproflib-exports-$($env:BUILD_TYPE).txt"
          $profDependentsLog = Join-Path $reportDir "iccproflib-dependents-$($env:BUILD_TYPE).txt"
          $profAbiReport = Join-Path $reportDir "iccproflib-abi-$($env:BUILD_TYPE).txt"
          $xmlExportsLog = Join-Path $reportDir "iccxml-exports-$($env:BUILD_TYPE).txt"
          $xmlDependentsLog = Join-Path $reportDir "iccxml-dependents-$($env:BUILD_TYPE).txt"
          $xmlAbiReport = Join-Path $reportDir "iccxml-abi-$($env:BUILD_TYPE).txt"

          $verifyCmd = @(
            "call `"$vcvars`" >nul",
            "dumpbin /exports `"$($dll.FullName)`" > `"$exportsLog`"",
            "dumpbin /dependents `"$($dll.FullName)`" > `"$dependentsLog`"",
            "dumpbin /all `"$($lib.FullName)`" > `"$importLibLog`"",
            "dumpbin /exports `"$($profDll.FullName)`" > `"$profExportsLog`"",
            "dumpbin /dependents `"$($profDll.FullName)`" > `"$profDependentsLog`"",
            "dumpbin /exports `"$($xmlDll.FullName)`" > `"$xmlExportsLog`"",
            "dumpbin /dependents `"$($xmlDll.FullName)`" > `"$xmlDependentsLog`""
          ) -join ' && '

          cmd.exe /d /s /c $verifyCmd
          if ($LASTEXITCODE -ne 0) {
            throw "RefIccMAX export/import verification command failed with exit code $LASTEXITCODE"
          }

          foreach ($symbol in @(
            'CMCheckColors',
            'CMCheckColorsInGamut',
            'CMCheckRGBs',
            'CMCreateMultiProfileTransform',
            'CMCreateTransform',
            'CMCreateTransformExt',
            'CMCreateTransformExtW',
            'CMCreateTransformW',
            'CMDeleteTransform',
            'CMGetInfo',
            'CMGetNamedProfileInfo',
            'CMIsProfileValid',
            'CMTranslateColors',
            'CMTranslateRGB',
            'CMTranslateRGBs',
            'CMTranslateRGBsExt',
            'CMConvertColorNameToIndex',
            'CMConvertIndexToColorName'
          )) {
            if (-not (Select-String -Path $exportsLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "Missing RefIccMAX export: $symbol"
            }
            if (-not (Select-String -Path $importLibLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "Missing RefIccMAX import-library symbol: $symbol"
            }
          }

          if (-not (Select-String -Path $importLibLog -Pattern 'DLL name     : IccDEVCmm.dll' -SimpleMatch -Quiet)) {
            throw 'RefIccMAX import library does not reference IccDEVCmm.dll'
          }

          foreach ($symbol in @(
            'icConvertUTF16toUTF32',
            'icConvertUTF16toUTF8',
            'isLegalUTF8String'
          )) {
            if (-not (Select-String -Path $profExportsLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "Missing IccProfLib export: $symbol"
            }
          }

          foreach ($symbol in @(
            'icXmlDumpHexData',
            'icXmlFindNode',
            'icXmlNodeCount'
          )) {
            if (-not (Select-String -Path $xmlExportsLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "Missing IccXML export: $symbol"
            }
          }

          if (-not (Select-String -Path $xmlDependentsLog -Pattern $profDll.Name -SimpleMatch -Quiet)) {
            throw "Missing IccXML dependent DLL: $($profDll.Name)"
          }
          if (-not (Select-String -Path $xmlDependentsLog -Pattern 'libxml2.dll' -SimpleMatch -Quiet)) {
            throw 'Missing IccXML dependent DLL: libxml2.dll'
          }

          function Get-PreviewLines {
            param(
              [Parameter(Mandatory=$true)][string]$Path,
              [Parameter(Mandatory=$false)][int]$Count = 25
            )

            if (-not (Test-Path -LiteralPath $Path)) {
              return @("MISSING: $Path")
            }

            return @(Get-Content -LiteralPath $Path | Select-Object -First $Count)
          }

          @(
            "RefIccMAX ABI verification report ($($env:BUILD_TYPE))",
            "",
            "DLL: $($dll.FullName)",
            "Import library: $($lib.FullName)",
            "",
            "=== dumpbin /exports ===",
            (Get-Content -LiteralPath $exportsLog),
            "",
            "=== dumpbin /all (import library) ===",
            (Get-Content -LiteralPath $importLibLog),
            "",
            "=== dumpbin /dependents ===",
            (Get-Content -LiteralPath $dependentsLog)
          ) | Set-Content -LiteralPath $abiReport -Encoding ascii

          Write-Host "[OK] ABI report written to $abiReport"
          Write-Host "::group::RefIccMAX ABI report ($($env:BUILD_TYPE))"
          Get-Content -LiteralPath $abiReport
          Write-Host "::endgroup::"

          @(
            "IccProfLib ABI verification report ($($env:BUILD_TYPE))",
            "",
            "DLL: $($profDll.FullName)",
            "Import library: $($profImport.FullName)",
            "Static library: $($profStatic.FullName)",
            "",
            "=== dumpbin /exports (overview) ===",
            (Get-PreviewLines -Path $profExportsLog -Count 25),
            "",
            "=== dumpbin /dependents ===",
            (Get-PreviewLines -Path $profDependentsLog -Count 20)
          ) | Set-Content -LiteralPath $profAbiReport -Encoding ascii

          Write-Host "[OK] IccProfLib ABI report written to $profAbiReport"
          Write-Host "::group::IccProfLib ABI report ($($env:BUILD_TYPE))"
          Get-Content -LiteralPath $profAbiReport
          Write-Host "::endgroup::"

          @(
            "IccXML ABI verification report ($($env:BUILD_TYPE))",
            "",
            "DLL: $($xmlDll.FullName)",
            "Import library: $($xmlImport.FullName)",
            "Static library: $($xmlStatic.FullName)",
            "",
            "=== dumpbin /exports (overview) ===",
            (Get-PreviewLines -Path $xmlExportsLog -Count 25),
            "",
            "=== dumpbin /dependents ===",
            (Get-PreviewLines -Path $xmlDependentsLog -Count 20)
          ) | Set-Content -LiteralPath $xmlAbiReport -Encoding ascii

          Write-Host "[OK] IccXML ABI report written to $xmlAbiReport"
          Write-Host "::group::IccXML ABI report ($($env:BUILD_TYPE))"
          Get-Content -LiteralPath $xmlAbiReport
          Write-Host "::endgroup::"

      - name: Audit Windows library artifacts and target resolution
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          $buildRoot = (Resolve-Path 'Build/Cmake/build').Path
          $reportDir = Join-Path $buildRoot 'abi-reports'
          New-Item -ItemType Directory -Path $reportDir -Force | Out-Null
          $auditReport = Join-Path $reportDir "windows-library-audit-$($env:BUILD_TYPE).txt"
          $profDir = Join-Path $buildRoot "IccProfLib\$($env:BUILD_TYPE)"
          $xmlDir = Join-Path $buildRoot "IccXML\$($env:BUILD_TYPE)"

          function Get-ArtifactRecord {
            param(
              [Parameter(Mandatory=$true)][string]$Label,
              [Parameter(Mandatory=$false)]$Item
            )

            if (-not $Item) {
              return "$Label`tMISSING"
            }

            $hash = (Get-FileHash -LiteralPath $Item.FullName -Algorithm SHA256).Hash
            return "$Label`t$($Item.Name)`t$($Item.Length)`t$hash"
          }

          $profLibs = @()
          if (Test-Path -LiteralPath $profDir) {
            $profLibs = @(Get-ChildItem -LiteralPath $profDir -File -Filter 'IccProfLib2*.lib')
          }
          $profStatic = $profLibs | Where-Object { $_.Name -like '*-static*.lib' } | Select-Object -First 1
          $profImport = $profLibs | Where-Object { $_.Name -notlike '*-static*.lib' } | Select-Object -First 1
          $profDll = $null
          if (Test-Path -LiteralPath $profDir) {
            $profDll = Get-ChildItem -LiteralPath $profDir -File -Filter 'IccProfLib2*.dll' | Select-Object -First 1
          }

          $xmlLibs = @()
          if (Test-Path -LiteralPath $xmlDir) {
            $xmlLibs = @(Get-ChildItem -LiteralPath $xmlDir -File -Filter 'IccXML2*.lib')
          }
          $xmlStatic = $xmlLibs | Where-Object { $_.Name -like '*-static*.lib' } | Select-Object -First 1
          $xmlImport = $xmlLibs | Where-Object { $_.Name -notlike '*-static*.lib' } | Select-Object -First 1
          $xmlDll = $null
          if (Test-Path -LiteralPath $xmlDir) {
            $xmlDll = Get-ChildItem -LiteralPath $xmlDir -File -Filter 'IccXML2*.dll' | Select-Object -First 1
          }

          if ($profImport -and $profStatic) {
            $profImportHash = (Get-FileHash -LiteralPath $profImport.FullName -Algorithm SHA256).Hash
            $profStaticHash = (Get-FileHash -LiteralPath $profStatic.FullName -Algorithm SHA256).Hash
            if ($profImportHash -eq $profStaticHash) {
              throw "IccProfLib import library hash matches static library hash: possible overwrite of $($profImport.Name)"
            }
          }

          if ($xmlImport -and $xmlStatic) {
            $xmlImportHash = (Get-FileHash -LiteralPath $xmlImport.FullName -Algorithm SHA256).Hash
            $xmlStaticHash = (Get-FileHash -LiteralPath $xmlStatic.FullName -Algorithm SHA256).Hash
            if ($xmlImportHash -eq $xmlStaticHash) {
              throw "IccXML import library hash matches static library hash: possible overwrite of $($xmlImport.Name)"
            }
          }

          if (-not $profDll) {
            throw "IccProfLib runtime DLL missing for build type $env:BUILD_TYPE in $profDir"
          }
          if (-not $profImport) {
            throw "IccProfLib import library missing for build type $env:BUILD_TYPE in $profDir"
          }
          if (-not $profStatic) {
            throw "IccProfLib static library missing for build type $env:BUILD_TYPE in $profDir"
          }
          if (-not $xmlDll) {
            throw "IccXML runtime DLL missing for build type $env:BUILD_TYPE in $xmlDir"
          }
          if (-not $xmlImport) {
            throw "IccXML import library missing for build type $env:BUILD_TYPE in $xmlDir"
          }
          if (-not $xmlStatic) {
            throw "IccXML static library missing for build type $env:BUILD_TYPE in $xmlDir"
          }

          $projectReports = @()
          foreach ($relativeProject in @(
            'Tools\IccApplyNamedCmm\iccApplyNamedCmm.vcxproj',
            'Tools\IccFromXml\iccFromXml.vcxproj',
            'Tools\IccToXml\iccToXml.vcxproj'
          )) {
            $projectPath = Join-Path $buildRoot $relativeProject
            $projectReports += "Project: $relativeProject"
            if (-not (Test-Path -LiteralPath $projectPath)) {
              $projectReports += '  MISSING'
              $projectReports += ''
              continue
            }

            $matches = Select-String -Path $projectPath -Pattern 'AdditionalDependencies|ProjectReference Include=.*IccXML|<Name>IccXML'
            if (-not $matches) {
              $projectReports += '  No IccXML references found'
              $projectReports += ''
              continue
            }

            foreach ($match in $matches) {
              $projectReports += "  $($match.Line.Trim())"
            }
            $projectReports += ''
          }

          @(
            "Windows library artifact audit ($($env:BUILD_TYPE))",
            "",
            "Label`tFile`tSize`tSHA256",
            (Get-ArtifactRecord -Label 'IccProfLib DLL' -Item $profDll),
            (Get-ArtifactRecord -Label 'IccProfLib import lib' -Item $profImport),
            (Get-ArtifactRecord -Label 'IccProfLib static lib' -Item $profStatic),
            (Get-ArtifactRecord -Label 'IccXML DLL' -Item $xmlDll),
            (Get-ArtifactRecord -Label 'IccXML import/bare lib' -Item $xmlImport),
            (Get-ArtifactRecord -Label 'IccXML static lib' -Item $xmlStatic),
            "",
            "Resolved project references",
            ""
          ) + $projectReports | Set-Content -LiteralPath $auditReport -Encoding ascii

          Write-Host "[OK] Windows library audit written to $auditReport"
          Write-Host "::group::Windows library audit ($($env:BUILD_TYPE))"
          Get-Content -LiteralPath $auditReport
          Write-Host "::endgroup::"

      - name: Test
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          cd Build/Cmake
          $exeDirs = Get-ChildItem -Recurse -File -Include *.exe -Path .\build\ |
              Where-Object {
                $_.FullName -match 'icc' -and
                $_.FullName -like "*\$($env:BUILD_TYPE)\*" -and
                $_.FullName -notmatch '\\CMakeFiles\\' -and
                $_.Name -notmatch '^CMake(C|CXX)CompilerId\.exe$'
              } |
              ForEach-Object { Split-Path $_.FullName -Parent } |
              Sort-Object -Unique
          $dllDirs = Get-ChildItem -Recurse -File -Include *.dll -Path .\build\ |
              Where-Object {
                $_.FullName -like "*\$($env:BUILD_TYPE)\*" -and
                $_.FullName -notmatch '\\CMakeFiles\\'
              } |
              ForEach-Object { Split-Path $_.FullName -Parent } |
              Sort-Object -Unique
          $iccdevRoot = (Resolve-Path '..\..').Path
          $vcpkgReleaseBin = Join-Path $iccdevRoot 'installed/x64-windows/bin'
          if (-not (Test-Path $vcpkgReleaseBin)) {
            throw "vcpkg bin directory not found: $vcpkgReleaseBin"
          }
          $vcpkgBins = @()
          $vcpkgDebugBin = Join-Path $iccdevRoot 'installed/x64-windows/debug/bin'
          if ($env:BUILD_TYPE -eq 'Debug' -and (Test-Path $vcpkgDebugBin)) {
            $vcpkgBins += $vcpkgDebugBin
          }
          $vcpkgBins += $vcpkgReleaseBin
          $env:PATH = ((@($exeDirs + $dllDirs + $vcpkgBins) | Select-Object -Unique) -join ';') + ';' + $env:PATH
          cd ..\..\Testing
          if (Test-Path .\CreateAllProfiles.bat) {
            Write-Host "[INFO] Running CreateAllProfiles.bat..."
            cmd.exe /d /c CreateAllProfiles.bat
            Write-Host "[OK] Profile creation complete"
          } else {
            Write-Host "[WARN] CreateAllProfiles.bat not found, skipping"
          }

      - name: Upload ABI Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: abi-windows-${{ matrix.build_type }}
          path: Build/Cmake/build/abi-reports/*
          if-no-files-found: warn
          retention-days: 14

  #############################################################################
  # Job 7: Version Header Generation Test
  #############################################################################
  version-header-test:
    name: "Version Headers - Build Directory Generation"
    needs: validate-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Strip Emoji Selectors
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          find . -name '*.h' -o -name '*.cpp' | \
            xargs sed -i "s/$(printf '\xef\xb8\x8f')//g" 2>/dev/null || true
      - name: Build
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build/build && cd Build/build
          cmake ../Cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          make -j"$(nproc)"

      - name: Verify Version Headers in Build Directory
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          if [ ! -f "Build/build/IccProfLib/IccProfLibVer.h" ] && [ ! -f "IccProfLib/IccProfLibVer.h" ]; then
            echo "WARNING: IccProfLibVer.h not found (may not be generated yet)"
          fi

          if [ ! -f "Build/build/IccXML/IccLibXMLVer.h" ] && [ ! -f "IccXML/IccLibXML/IccLibXMLVer.h" ]; then
            echo "WARNING: IccLibXMLVer.h not found (may not be generated yet)"
          fi

          echo "[OK] Version headers correctly generated in build directory"

  #############################################################################
  # Job 8: Clean/Rebuild Cycle Test
  #############################################################################
  clean-rebuild-test:
    name: "Clean/Rebuild Cycle Test"
    needs: validate-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.validate-inputs.outputs.iccdev_ref }}
          repository: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Strip Emoji Selectors
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          find . -name '*.h' -o -name '*.cpp' | \
            xargs sed -i "s/$(printf '\xef\xb8\x8f')//g" 2>/dev/null || true
      - name: Initial Build
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build/build && cd Build/build
          cmake ../Cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          make -j"$(nproc)"
          count_built_tools() {
            find Tools -maxdepth 2 -type f \
              \( -name 'icc*' -o -name 'RefIccMAX*' \) \
              -executable | sort
          }
          TOOL_COUNT_1=$(count_built_tools | wc -l)
          echo "Initial build: $TOOL_COUNT_1 tools"
          echo "TOOL_COUNT_1=$TOOL_COUNT_1" >> "$GITHUB_ENV"

      - name: Clean
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build/build
          count_built_tools() {
            find Tools -maxdepth 2 -type f \
              \( -name 'icc*' -o -name 'RefIccMAX*' \) \
              -executable | sort
          }
          make clean
          REMAINING=$(count_built_tools 2>/dev/null | wc -l || echo 0)
          echo "After clean: $REMAINING built tools"
          if [ "$REMAINING" -ne 0 ]; then
            echo "ERROR: make clean did not remove all built tools"
            exit 1
          fi

      - name: Rebuild
        env:
          BASH_ENV: /dev/null
          TOOL_COUNT_1: ${{ env.TOOL_COUNT_1 }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build/build
          count_built_tools() {
            find Tools -maxdepth 2 -type f \
              \( -name 'icc*' -o -name 'RefIccMAX*' \) \
              -executable | sort
          }
          make -j"$(nproc)"
          TOOL_COUNT_2=$(count_built_tools | wc -l)
          echo "After rebuild: $TOOL_COUNT_2 tools"

          if [ "$TOOL_COUNT_2" -ne "${TOOL_COUNT_1:-0}" ]; then
            echo "ERROR: Rebuild produced different number of tools ($TOOL_COUNT_2 vs ${TOOL_COUNT_1:-?})"
            exit 1
          fi

          echo "[OK] Clean/rebuild cycle successful"

  #############################################################################
  # Job 9: Final Summary
  #############################################################################
  source-install-consumer:
    name: "Source Install - ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
        build_type: [Release, Debug, RelWithDebInfo, MinSizeRel]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Configure git environment
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake ninja-build gcc g++ clang pkg-config \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          brew_install_missing() {
            local formula
            for formula in "$@"; do
              if brew list --formula "$formula" >/dev/null 2>&1; then
                brew list --versions "$formula"
              else
                brew install "$formula"
              fi
            done
          }
          brew_install_missing cmake ninja libpng libtiff libxml2 nlohmann-json
          LIBXML2_PREFIX="$(brew --prefix libxml2)"
          LIBPNG_PREFIX="$(brew --prefix libpng)"
          LIBTIFF_PREFIX="$(brew --prefix libtiff)"
          JSON_PREFIX="$(brew --prefix nlohmann-json)"
          printf 'EXTRA_CMAKE_PREFIX_PATH=%s\n' \
            "${LIBXML2_PREFIX};${LIBPNG_PREFIX};${LIBTIFF_PREFIX};${JSON_PREFIX}" >> "$GITHUB_ENV"
          printf 'PKG_CONFIG_PATH=%s\n' "${LIBXML2_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Configure, build, and install
        env:
          BASH_ENV: /dev/null
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          BUILD_TYPE: ${{ matrix.build_type }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          JOBS="$(sysctl -n hw.logicalcpu 2>/dev/null || nproc 2>/dev/null || echo 3)"
          BUILD_DIR="$RUNNER_TEMP/source-${MATRIX_OS}-${MATRIX_COMPILER}-${BUILD_TYPE}"
          PREFIX="$RUNNER_TEMP/prefix-${MATRIX_OS}-${MATRIX_COMPILER}-${BUILD_TYPE}"
          cmake_args=(
            -S "Build/Cmake"
            -B "$BUILD_DIR"
            -G Ninja
            "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}"
            "-DCMAKE_C_COMPILER=${CC}"
            "-DCMAKE_CXX_COMPILER=${CXX}"
            "-DCMAKE_INSTALL_PREFIX=${PREFIX}"
            -DENABLE_TESTS=OFF
            -DENABLE_TOOLS=ON
            -DENABLE_WXWIDGETS=OFF
            -DENABLE_SHARED_LIBS=ON
            -DENABLE_STATIC_LIBS=ON
          )
          if [ -n "${EXTRA_CMAKE_PREFIX_PATH:-}" ]; then
            cmake_args+=("-DCMAKE_PREFIX_PATH=${EXTRA_CMAKE_PREFIX_PATH}")
          fi
          cmake "${cmake_args[@]}"
          cmake --build "$BUILD_DIR" --parallel "$JOBS"
          cmake --install "$BUILD_DIR"
          test -f "$BUILD_DIR/install_manifest.txt"
          duplicate_manifest_entries="$(
            sort "$BUILD_DIR/install_manifest.txt" | uniq -d || true
          )"
          if [ -n "$duplicate_manifest_entries" ]; then
            echo "::error title=Duplicate manifest::duplicate install paths"
            printf '%s\n' "$duplicate_manifest_entries"
            exit 1
          fi
          test -f "$PREFIX/lib/cmake/reficcmax/RefIccMAXConfig.cmake"
          test -f "$PREFIX/bin/iccApplySearch"
          {
            printf 'BUILD_DIR=%s\n' "$BUILD_DIR"
            printf 'PREFIX=%s\n' "$PREFIX"
          } >> "$GITHUB_ENV"

      - name: Build and run installed hello-iccdev
        env:
          BASH_ENV: /dev/null
          BUILD_TYPE: ${{ matrix.build_type }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          JOBS="$(sysctl -n hw.logicalcpu 2>/dev/null || nproc 2>/dev/null || echo 3)"
          EXAMPLE_BUILD="$RUNNER_TEMP/hello-${MATRIX_OS}-${MATRIX_COMPILER}-${BUILD_TYPE}"
          cmake_args=(
            -S "examples/hello-iccdev"
            -B "$EXAMPLE_BUILD"
            -G Ninja
            "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}"
            "-DCMAKE_PREFIX_PATH=${PREFIX}"
          )
          if [ -n "${EXTRA_CMAKE_PREFIX_PATH:-}" ]; then
            cmake_args+=("-DCMAKE_PREFIX_PATH=${PREFIX};${EXTRA_CMAKE_PREFIX_PATH}")
          fi
          cmake "${cmake_args[@]}"
          cmake --build "$EXAMPLE_BUILD" --parallel "$JOBS"
          case "$RUNNER_OS" in
            Linux)
              export LD_LIBRARY_PATH="$PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
              ;;
            macOS)
              export DYLD_LIBRARY_PATH="$PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
              ;;
          esac
          OUTPUT="$("$EXAMPLE_BUILD/hello-iccdev" 2>&1)"
          printf '%s\n' "$OUTPUT"
          grep -q "IccProfLib version:" <<< "$OUTPUT"
          grep -q "IccLibXML  version:" <<< "$OUTPUT"
          grep -q "Hello, iccDEV!" <<< "$OUTPUT"

      - name: Inspect installed shared library artifacts
        if: matrix.build_type == 'Release'
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi
          TOOL="$PREFIX/bin/iccApplySearch"
          case "$RUNNER_OS" in
            Linux)
              CORE_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccProfLib2.so*' | sort | head -n 1)"
              XML_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccXML2.so*' | sort | head -n 1)"
              JSON_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccJSON2.so*' | sort | head -n 1)"
              ;;
            macOS)
              CORE_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccProfLib2*.dylib' | sort | head -n 1)"
              XML_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccXML2*.dylib' | sort | head -n 1)"
              JSON_LIB="$(find -L "$PREFIX/lib" -maxdepth 1 -name 'libIccJSON2*.dylib' | sort | head -n 1)"
              ;;
            *)
              echo "Unsupported runner OS: $RUNNER_OS"
              exit 1
              ;;
          esac
          test -n "$CORE_LIB"
          test -n "$XML_LIB"
          if [ -n "$JSON_LIB" ]; then
            echo "IccJSON library found: $JSON_LIB"
          else
            echo "::warning::IccJSON library not found (ENABLE_ICCJSON may be OFF)"
          fi
          test -f "$TOOL"
          echo "::group::Installed prefix inventory"
          find -L "$PREFIX" -maxdepth 2 \( -name 'iccApplySearch' -o -name 'libIccProfLib2*' -o -name 'libIccXML2*' -o -name 'libIccJSON2*' -o -name 'RefIccMAXConfig.cmake' \) | sort
          echo "::endgroup::"
          echo "::group::Artifact metadata"
          ARTIFACTS=("$CORE_LIB" "$XML_LIB" "$TOOL" "$PREFIX/lib/cmake/reficcmax/RefIccMAXConfig.cmake")
          if [ -n "$JSON_LIB" ]; then ARTIFACTS+=("$JSON_LIB"); fi
          for artifact in "${ARTIFACTS[@]}"; do
            ls -l "$artifact"
            file "$artifact"
          done
          echo "::endgroup::"
          case "$RUNNER_OS" in
            Linux)
              echo "::group::readelf"
              readelf -d "$CORE_LIB" | grep -E 'SONAME|NEEDED'
              readelf -d "$XML_LIB" | grep -E 'SONAME|NEEDED'
              if [ -n "$JSON_LIB" ]; then readelf -d "$JSON_LIB" | grep -E 'SONAME|NEEDED'; fi
              echo "::endgroup::"
              echo "::group::nm"
              core_nm_log="$RUNNER_TEMP/$(basename "$CORE_LIB").nm.txt"
              xml_nm_log="$RUNNER_TEMP/$(basename "$XML_LIB").nm.txt"
              nm -D --defined-only "$CORE_LIB" > "$core_nm_log"
              nm -D --defined-only "$XML_LIB" > "$xml_nm_log"
              sed -n '1,25p' "$core_nm_log"
              sed -n '1,25p' "$xml_nm_log"
              if [ -n "$JSON_LIB" ]; then
                json_nm_log="$RUNNER_TEMP/$(basename "$JSON_LIB").nm.txt"
                nm -D --defined-only "$JSON_LIB" > "$json_nm_log"
                sed -n '1,25p' "$json_nm_log"
              fi
              echo "::endgroup::"
              echo "::group::ldd"
              ldd "$TOOL"
              echo "::endgroup::"
              ;;
            macOS)
              echo "::group::otool"
              otool -L "$CORE_LIB"
              otool -L "$XML_LIB"
              if [ -n "$JSON_LIB" ]; then otool -L "$JSON_LIB"; fi
              otool -L "$TOOL"
              echo "::endgroup::"
              echo "::group::nm"
              core_nm_log="$RUNNER_TEMP/$(basename "$CORE_LIB").nm.txt"
              xml_nm_log="$RUNNER_TEMP/$(basename "$XML_LIB").nm.txt"
              nm -gU "$CORE_LIB" > "$core_nm_log"
              nm -gU "$XML_LIB" > "$xml_nm_log"
              sed -n '1,25p' "$core_nm_log"
              sed -n '1,25p' "$xml_nm_log"
              if [ -n "$JSON_LIB" ]; then
                json_nm_log="$RUNNER_TEMP/$(basename "$JSON_LIB").nm.txt"
                nm -gU "$JSON_LIB" > "$json_nm_log"
                sed -n '1,25p' "$json_nm_log"
              fi
              echo "::endgroup::"
              ;;
          esac

          # ── Symlink chain verification (Linux only) ──
          if [[ "$RUNNER_OS" = "Linux" ]]; then
            echo "::group::Symlink chain verification"
            FAIL=0
            for base_name in IccProfLib2 IccXML2 IccJSON2; do
              so_link="$PREFIX/lib/lib${base_name}.so"
              if [[ ! -L "$so_link" ]]; then
                echo "::error::Missing .so symlink: $(sanitize_line "$so_link")"
                FAIL=1
                continue
              fi
              so_target="$(readlink "$so_link")"
              if ! grep -qE "^lib${base_name}\.so\.[0-9]+$" <<< "$so_target"; then
                echo "::error::.so symlink target unexpected: $(sanitize_line "$so_link") -> $(sanitize_line "$so_target")"
                FAIL=1
              fi
              soversion_link="$PREFIX/lib/$so_target"
              if [[ ! -L "$soversion_link" ]]; then
                echo "::error::Missing SOVERSION symlink: $(sanitize_line "$soversion_link")"
                FAIL=1
                continue
              fi
              full_target="$(readlink "$soversion_link")"
              if ! grep -qE "^lib${base_name}\.so\.[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" <<< "$full_target"; then
                echo "::error::SOVERSION symlink target unexpected: $(sanitize_line "$soversion_link") -> $(sanitize_line "$full_target")"
                FAIL=1
              fi
              real_lib="$PREFIX/lib/$full_target"
              if [[ ! -f "$real_lib" ]]; then
                echo "::error::Real library file missing: $(sanitize_line "$real_lib")"
                FAIL=1
              fi
              echo "[OK] $base_name: .so -> $(sanitize_line "$so_target") -> $(sanitize_line "$full_target")"
            done
            if [[ "$FAIL" -ne 0 ]]; then
              exit 1
            fi
            echo "::endgroup::"
          fi

          # ── RPATH absence in installed binaries (Linux only) ──
          if [[ "$RUNNER_OS" = "Linux" ]]; then
            echo "::group::RPATH absence check"
            FAIL=0
            for bin in "$PREFIX"/bin/icc*; do
              if [[ ! -f "$bin" ]]; then continue; fi
              rpath_line="$(readelf -d "$bin" 2>/dev/null | grep -E 'RPATH|RUNPATH' || true)"
              if [[ -n "$rpath_line" ]]; then
                echo "::warning::Installed binary has RPATH/RUNPATH: $(sanitize_line "$(basename "$bin")"): $(sanitize_line "$rpath_line")"
                FAIL=1
              fi
            done
            if [[ "$FAIL" -ne 0 ]]; then
              echo "::error::Installed binaries should not have hardcoded RPATH"
              exit 1
            fi
            echo "[OK] No installed binaries have hardcoded RPATH/RUNPATH"
            echo "::endgroup::"
          fi

          # ── SONAME validation (Linux only) ──
          if [[ "$RUNNER_OS" = "Linux" ]]; then
            echo "::group::SONAME validation"
            proflib_soname="$(readelf -d "$CORE_LIB" | grep SONAME | sed 's/.*\[//' | sed 's/\]//')"
            xmllib_soname="$(readelf -d "$XML_LIB" | grep SONAME | sed 's/.*\[//' | sed 's/\]//')"
            echo "IccProfLib2 SONAME: $(sanitize_line "$proflib_soname")"
            echo "IccXML2     SONAME: $(sanitize_line "$xmllib_soname")"
            if ! grep -qE '^libIccProfLib2d?\.so\.[0-9]+$' <<< "$proflib_soname"; then
              echo "::error::IccProfLib2 SONAME pattern mismatch: $(sanitize_line "$proflib_soname")"
              exit 1
            fi
            if ! grep -qE '^libIccXML2d?\.so\.[0-9]+$' <<< "$xmllib_soname"; then
              echo "::error::IccXML2 SONAME pattern mismatch: $(sanitize_line "$xmllib_soname")"
              exit 1
            fi
            if [ -n "$JSON_LIB" ]; then
              jsonlib_soname="$(readelf -d "$JSON_LIB" | grep SONAME | sed 's/.*\[//' | sed 's/\]//')"
              echo "IccJSON2    SONAME: $(sanitize_line "$jsonlib_soname")"
              if ! grep -qE '^libIccJSON2d?\.so\.[0-9]+$' <<< "$jsonlib_soname"; then
                echo "::error::IccJSON2 SONAME pattern mismatch: $(sanitize_line "$jsonlib_soname")"
                exit 1
              fi
            fi
            echo "[OK] SONAME values match expected pattern"
            echo "::endgroup::"
          fi

  linux-housekeeping:
    name: "Housekeeping - Linux - ${{ matrix.build_type }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug, RelWithDebInfo, MinSizeRel]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Install dependencies
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Configure, build, install, clean, and uninstall
        env:
          BASH_ENV: /dev/null
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh 2>/dev/null || true
          BUILD_DIR="$RUNNER_TEMP/housekeeping-${BUILD_TYPE}"
          PREFIX="$RUNNER_TEMP/housekeeping-prefix-${BUILD_TYPE}"
          CONFIG_PATH="$PREFIX/lib/cmake/reficcmax/RefIccMAXConfig.cmake"
          cmake -S "Build/Cmake" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DENABLE_TESTS=OFF \
            -DENABLE_TOOLS=ON \
            -DENABLE_WXWIDGETS=OFF \
            -DENABLE_SHARED_LIBS=ON \
            -DENABLE_STATIC_LIBS=ON
          cmake --build "$BUILD_DIR" --parallel "$(nproc)"
          cmake --install "$BUILD_DIR" 2>&1 | tee "$BUILD_DIR/install.log"
          test -f "$BUILD_DIR/install_manifest.txt"
          test -f "$CONFIG_PATH"
          test -f "$PREFIX/bin/iccApplySearch"
          test "$(wc -l < "$BUILD_DIR/install_manifest.txt")" -gt 0
          duplicate_manifest_entries="$(
            sort "$BUILD_DIR/install_manifest.txt" | uniq -d || true
          )"
          if [ -n "$duplicate_manifest_entries" ]; then
            echo "::error title=Duplicate manifest::duplicate install paths"
            printf '%s\n' "$duplicate_manifest_entries"
            exit 1
          fi
          cmake --build "$BUILD_DIR" --target clean
          test -f "$CONFIG_PATH"
          cmake --build "$BUILD_DIR" --target uninstall 2>&1 \
            | tee "$BUILD_DIR/uninstall.log"
          if grep -E 'File ".+" does not exist\.' \
              "$BUILD_DIR/install.log" "$BUILD_DIR/uninstall.log"; then
            echo "::error title=Missing file diagnostic::install log"
            exit 1
          fi
          test ! -e "$CONFIG_PATH"
          test ! -e "$PREFIX/bin/iccApplySearch"

  windows-shared-smoke:
    name: "Windows Shared Smoke - ${{ matrix.build_type }}"
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      POWERSHELL_TELEMETRY_OPTOUT: "1"
      POWERSHELL_UPDATECHECK: "Off"
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug, RelWithDebInfo, MinSizeRel]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Configure git environment
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: Install exported dependencies
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $archive = Join-Path $env:RUNNER_TEMP 'vcpkg-exported-deps.zip'
          Start-BitsTransfer -Source "https://github.com/InternationalColorConsortium/iccDEV/releases/download/v2.3.1/vcpkg-exported-deps.zip" -Destination $archive
          tar -xf $archive -C .
          $vcpkgPrefix = Join-Path (Resolve-Path .).Path 'installed/x64-windows'
          $vcpkgBin = Join-Path $vcpkgPrefix 'bin'
          if (-not (Test-Path $vcpkgBin)) {
            throw "vcpkg bin directory not found after extracting deps.zip: $vcpkgBin"
          }
          "VCPKG_PREFIX=$vcpkgPrefix" >> $env:GITHUB_ENV
          "VCPKG_BIN=$vcpkgBin" >> $env:GITHUB_ENV

      - name: Configure
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $prefix = Join-Path $env:RUNNER_TEMP ("prefix-" + $env:BUILD_TYPE)
          cd "Build\Cmake"
          # Upstream re-enables Release-family IPO for multi-config generators
          # unless the global toggle is forced off at configure time.
          cmake -B build -S . `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="..\..\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            "-DCMAKE_INSTALL_PREFIX=$prefix" `
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF `
            -DENABLE_TESTS=OFF `
            -DENABLE_TOOLS=ON `
            -DENABLE_WXWIDGETS=OFF `
            -DENABLE_SHARED_LIBS=ON `
            -DENABLE_STATIC_LIBS=ON `
            -Wno-dev
          $cachePrefix = (Select-String -Path '.\build\CMakeCache.txt' -Pattern '^CMAKE_INSTALL_PREFIX:PATH=' | Select-Object -First 1).Line
          if (-not $cachePrefix) {
            throw 'CMAKE_INSTALL_PREFIX was not recorded in CMakeCache.txt'
          }
          if ($cachePrefix -match '\$prefix') {
            throw "CMAKE_INSTALL_PREFIX still contains a literal `$prefix: $cachePrefix"
          }
          Write-Host "::group::CMake install prefix proof"
          Write-Host $cachePrefix
          Write-Host "::endgroup::"
          "INSTALL_PREFIX=$prefix" >> $env:GITHUB_ENV

      - name: Build and install
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          cd "Build\Cmake"
          $cmakeDir = (Get-Location).Path
          $configSuffix = if ($env:BUILD_TYPE -eq 'Debug') { 'd' } else { '' }
          $configuredTools = New-Object System.Collections.Generic.List[string]
          $expectedLibArtifacts = @(
            ('IccProfLib2' + $configSuffix + '.lib'),
            ('IccProfLib2-static' + $configSuffix + '.lib'),
            ('IccXML2' + $configSuffix + '.lib'),
            ('IccXML2-static' + $configSuffix + '.lib'),
            'cmake\reficcmax\RefIccMAXConfig.cmake'
          )
          cmake --build build --config $env:BUILD_TYPE -- /m /maxcpucount
          cmake --install build --config $env:BUILD_TYPE --prefix "$env:INSTALL_PREFIX"
          foreach ($script in Get-ChildItem -Path '.\build\Tools' -Recurse -Filter 'cmake_install.cmake') {
            $content = Get-Content $script.FullName -Raw
            foreach ($match in [regex]::Matches($content, ('TYPE EXECUTABLE FILES "[^"]+/' + [regex]::Escape($env:BUILD_TYPE) + '/([^"/]+\.exe)"'))) {
              $configuredTools.Add($match.Groups[1].Value)
            }
          }
          $expectedTools = $configuredTools | Sort-Object -Unique
          if ($expectedTools.Count -eq 0) {
            throw "No installed tool executables discovered from generated cmake_install.cmake files for $env:BUILD_TYPE"
          }
          $expectedBinArtifacts = @(
            $expectedTools
            ('IccProfLib2' + $configSuffix + '.dll')
            ('IccXML2' + $configSuffix + '.dll')
            'iccIisIsapi.dll'
            'index.html'
            'endpoints.html'
            'integration.html'
            'site.css'
            'site.js'
            'web.config'
            '_tool-work\index.html'
            'assets\ICC_logo_text.gif'
          )
          $expectedShareArtifacts = @(
            'iccdev\Install-IccIisIsapiSite.ps1'
          )
          foreach ($artifact in $expectedBinArtifacts) {
            $artifactPath = Join-Path $env:INSTALL_PREFIX ("bin\" + $artifact)
            if (-not (Test-Path $artifactPath)) {
              throw "Expected installed bin artifact missing: $artifactPath"
            }
          }
          foreach ($artifact in $expectedShareArtifacts) {
            $artifactPath = Join-Path $env:INSTALL_PREFIX ("share\" + $artifact)
            if (-not (Test-Path $artifactPath)) {
              throw "Expected installed share artifact missing: $artifactPath"
            }
          }
          foreach ($artifact in $expectedLibArtifacts) {
            $artifactPath = Join-Path $env:INSTALL_PREFIX ("lib\" + $artifact)
            if (-not (Test-Path $artifactPath)) {
              throw "Expected installed lib artifact missing: $artifactPath"
            }
          }
          $literalPrefixTree = Join-Path $cmakeDir '$prefix'
          if (Test-Path $literalPrefixTree) {
            throw "Literal `$prefix install tree still exists: $literalPrefixTree"
          }
          Write-Host "::group::Installed prefix proof"
          Write-Host "Install prefix: $env:INSTALL_PREFIX"
          Write-Host "Configured tool installers:"
          $expectedTools | ForEach-Object { Write-Host $_ }
          Get-ChildItem -Path "$env:INSTALL_PREFIX\bin" -File | Sort-Object Name | Format-Table Name,Length
          Get-ChildItem -Path "$env:INSTALL_PREFIX\lib" -File | Sort-Object Name | Format-Table Name,Length
          Write-Host "::endgroup::"

      - name: Inspect installed shared library artifacts
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          if (-not $vsPath) {
            throw 'Unable to locate a Visual Studio installation with C++ tools'
          }
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          $tool = Join-Path $env:INSTALL_PREFIX 'bin\iccApplySearch.exe'
          $configSuffix = if ($env:BUILD_TYPE -eq 'Debug') { 'd' } else { '' }
          $coreDll = Join-Path $env:INSTALL_PREFIX ("bin\IccProfLib2" + $configSuffix + ".dll")
          $xmlDll = Join-Path $env:INSTALL_PREFIX ("bin\IccXML2" + $configSuffix + ".dll")
          $coreImportLib = Join-Path $env:INSTALL_PREFIX ("lib\IccProfLib2" + $configSuffix + ".lib")
          $xmlImportLib = Join-Path $env:INSTALL_PREFIX ("lib\IccXML2" + $configSuffix + ".lib")
          $coreStaticLib = Join-Path $env:INSTALL_PREFIX ("lib\IccProfLib2-static" + $configSuffix + ".lib")
          $xmlStaticLib = Join-Path $env:INSTALL_PREFIX ("lib\IccXML2-static" + $configSuffix + ".lib")
          $cmmDef = Join-Path . 'Tools\Winnt\IccDEVCmm\IccDEVCmm.def'
          $cmmBuildDir = Join-Path "Build\Cmake\build\Tools\IccDEVCmm\x64" $env:BUILD_TYPE
          $cmmDll = Join-Path $cmmBuildDir 'IccDEVCmm.dll'
          $cmmImportLib = Join-Path $cmmBuildDir 'IccDEVCmm.lib'
          $cmmExp = Join-Path $cmmBuildDir 'IccDEVCmm.exp'
          foreach ($artifact in @($tool, $coreDll, $xmlDll, $coreImportLib, $xmlImportLib, $coreStaticLib, $xmlStaticLib, (Join-Path $env:INSTALL_PREFIX 'lib\cmake\reficcmax\RefIccMAXConfig.cmake'))) {
            if (-not $artifact -or -not (Test-Path $artifact)) {
              throw "Expected installed artifact missing: $artifact"
            }
          }
          foreach ($artifact in @($cmmDef, $cmmDll, $cmmImportLib, $cmmExp)) {
            if (-not (Test-Path $artifact)) {
              throw "Expected IccDEVCmm artifact missing: $artifact"
            }
          }
          $cmmExports = New-Object System.Collections.Generic.List[string]
          $inExportBlock = $false
          foreach ($line in Get-Content $cmmDef) {
            $trimmed = $line.Trim()
            if ($trimmed -eq 'EXPORTS') {
              $inExportBlock = $true
              continue
            }
            if (-not $inExportBlock -or -not $trimmed -or $trimmed.StartsWith(';')) {
              continue
            }
            $cmmExports.Add(($trimmed -split '\s+')[0])
          }
          if ($cmmExports.Count -eq 0) {
            throw "No exports parsed from $cmmDef"
          }
          $coreImportHash = (Get-FileHash $coreImportLib -Algorithm SHA256).Hash
          $coreStaticHash = (Get-FileHash $coreStaticLib -Algorithm SHA256).Hash
          $xmlImportHash = (Get-FileHash $xmlImportLib -Algorithm SHA256).Hash
          $xmlStaticHash = (Get-FileHash $xmlStaticLib -Algorithm SHA256).Hash
          if ($coreImportHash -eq $coreStaticHash) {
            throw "IccProfLib import lib matches static archive hash for $env:BUILD_TYPE"
          }
          if ($xmlImportHash -eq $xmlStaticHash) {
            throw "IccXML import lib matches static archive hash for $env:BUILD_TYPE"
          }
          Write-Host "::group::Installed prefix inventory"
          Get-ChildItem -Path "$env:INSTALL_PREFIX\bin" -File | Sort-Object Name | Format-Table Name,Length
          Get-ChildItem -Path "$env:INSTALL_PREFIX\lib" -File | Sort-Object Name | Format-Table Name,Length
          Write-Host "::endgroup::"
          Write-Host "::group::IccDEVCmm build-tree inventory"
          Get-ChildItem -Path $cmmBuildDir -File | Sort-Object Name | Format-Table Name,Length
          Write-Host "Source DEF: $cmmDef"
          Write-Host "::endgroup::"
          Write-Host "::group::Import-vs-static hashes"
          [PSCustomObject]@{ Artifact = (Split-Path $coreImportLib -Leaf); SHA256 = $coreImportHash } | Format-Table -AutoSize
          [PSCustomObject]@{ Artifact = (Split-Path $coreStaticLib -Leaf); SHA256 = $coreStaticHash } | Format-Table -AutoSize
          [PSCustomObject]@{ Artifact = (Split-Path $xmlImportLib -Leaf); SHA256 = $xmlImportHash } | Format-Table -AutoSize
          [PSCustomObject]@{ Artifact = (Split-Path $xmlStaticLib -Leaf); SHA256 = $xmlStaticHash } | Format-Table -AutoSize
          Write-Host "::endgroup::"
          $dependentsLog = Join-Path $env:RUNNER_TEMP ("iccApplySearch_dependents_" + $env:BUILD_TYPE + ".txt")
          $coreExportsLog = Join-Path $env:RUNNER_TEMP ("IccProfLib2_exports_" + $env:BUILD_TYPE + ".txt")
          $coreLibLog = Join-Path $env:RUNNER_TEMP ("IccProfLib2_importlib_" + $env:BUILD_TYPE + ".txt")
          $xmlExportsLog = Join-Path $env:RUNNER_TEMP ("IccXML2_exports_" + $env:BUILD_TYPE + ".txt")
          $xmlLibLog = Join-Path $env:RUNNER_TEMP ("IccXML2_importlib_" + $env:BUILD_TYPE + ".txt")
          $cmmExportsLog = Join-Path $env:RUNNER_TEMP ("IccDEVCmm_exports_" + $env:BUILD_TYPE + ".txt")
          $cmmLibLog = Join-Path $env:RUNNER_TEMP ("IccDEVCmm_importlib_" + $env:BUILD_TYPE + ".txt")
          $inspectCmd = @(
            "call `"$vcvars`" >nul",
            "dumpbin /dependents `"$tool`" > `"$dependentsLog`"",
            "dumpbin /exports `"$coreDll`" > `"$coreExportsLog`"",
            "dumpbin /linkermember:1 `"$coreImportLib`" > `"$coreLibLog`"",
            "dumpbin /exports `"$xmlDll`" > `"$xmlExportsLog`"",
            "dumpbin /linkermember:1 `"$xmlImportLib`" > `"$xmlLibLog`"",
            "dumpbin /exports `"$cmmDll`" > `"$cmmExportsLog`"",
            "dumpbin /all `"$cmmImportLib`" > `"$cmmLibLog`""
          ) -join ' && '
          cmd.exe /d /s /c $inspectCmd
          if ($LASTEXITCODE -ne 0) {
            throw "Shared-library inspection command failed with exit code $LASTEXITCODE"
          }
          foreach ($symbol in $cmmExports) {
            if (-not (Select-String -Path $cmmExportsLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "IccDEVCmm DLL missing DEF export: $symbol"
            }
            if (-not (Select-String -Path $cmmLibLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "IccDEVCmm import lib missing DEF export: $symbol"
            }
          }
          if (-not (Select-String -Path $cmmLibLog -Pattern 'DLL name     : IccDEVCmm.dll' -SimpleMatch -Quiet)) {
            throw 'IccDEVCmm import lib does not reference IccDEVCmm.dll'
          }
          Write-Host "::group::dumpbin /dependents iccApplySearch.exe"
          Get-Content $dependentsLog
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /exports IccProfLib2"
          Get-Content $coreExportsLog | Select-Object -First 40
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /linkermember:1 IccProfLib2 import lib"
          Get-Content $coreLibLog | Select-Object -First 40
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /exports IccXML2"
          Get-Content $xmlExportsLog | Select-Object -First 40
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /linkermember:1 IccXML2 import lib"
          Get-Content $xmlLibLog | Select-Object -First 40
          Write-Host "::endgroup::"
          Write-Host "::group::IccDEVCmm.def"
          Get-Content $cmmDef
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /exports IccDEVCmm"
          Get-Content $cmmExportsLog | Select-Object -First 80
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /all IccDEVCmm import lib"
          Get-Content $cmmLibLog | Select-Object -First 140
          Write-Host "::endgroup::"

      - name: Verify installed IIS sample artifacts and smoke
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          if (-not $vsPath) {
            throw 'Unable to locate a Visual Studio installation with C++ tools'
          }
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          $configSuffix = if ($env:BUILD_TYPE -eq 'Debug') { 'd' } else { '' }
          $iisDll = Join-Path $env:INSTALL_PREFIX 'bin\iccIisIsapi.dll'
          $iisSmoke = Join-Path $env:INSTALL_PREFIX 'bin\iccIisIsapiSmoke.exe'
          $siteArtifacts = @(
            $iisDll
            $iisSmoke
            (Join-Path $env:INSTALL_PREFIX 'bin\index.html')
            (Join-Path $env:INSTALL_PREFIX 'bin\endpoints.html')
            (Join-Path $env:INSTALL_PREFIX 'bin\integration.html')
            (Join-Path $env:INSTALL_PREFIX 'bin\site.css')
            (Join-Path $env:INSTALL_PREFIX 'bin\site.js')
            (Join-Path $env:INSTALL_PREFIX 'bin\web.config')
            (Join-Path $env:INSTALL_PREFIX 'bin\_tool-work\index.html')
            (Join-Path $env:INSTALL_PREFIX 'bin\assets\ICC_logo_text.gif')
          )
          foreach ($artifact in $siteArtifacts) {
            if (-not (Test-Path $artifact)) {
              throw "Expected IIS sample artifact missing: $artifact"
            }
          }
          $iisExportsLog = Join-Path $env:RUNNER_TEMP ("iccIisIsapi_exports_" + $env:BUILD_TYPE + ".txt")
          $iisDepsLog = Join-Path $env:RUNNER_TEMP ("iccIisIsapi_dependents_" + $env:BUILD_TYPE + ".txt")
          $inspectCmd = @(
            "call `"$vcvars`" >nul",
            "dumpbin /exports `"$iisDll`" > `"$iisExportsLog`"",
            "dumpbin /dependents `"$iisDll`" > `"$iisDepsLog`""
          ) -join ' && '
          # issue #823: harden against the windows-latest AV/parallel-build
          # race that can produce a transiently truncated PE import table
          # (Windows Defender real-time scan holds an open handle on the
          # freshly-installed DLL while dumpbin reads it). Add Defender
          # exclusion + retry the dumpbin read up to 5 times so a single
          # transient miss does not fail the smoke check. The /INCLUDE:
          # linker anchor in Tools/IccIisIsapi/CMakeLists.txt prevents the
          # underlying import elision; this loop mitigates I/O-layer flake.
          try {
            Add-MpPreference -ExclusionPath $env:INSTALL_PREFIX -ErrorAction SilentlyContinue
            Add-MpPreference -ExclusionPath $env:RUNNER_TEMP -ErrorAction SilentlyContinue
          } catch {
            Write-Host "[INFO] Defender exclusion add skipped: $($_.Exception.Message)"
          }
          $expectedDeps = @(
            ('IccProfLib2' + $configSuffix + '.dll'),
            ('IccXML2'     + $configSuffix + '.dll'),
            ('IccJSON2'    + $configSuffix + '.dll')
          )
          $depAttempts = 5
          $depLastMissing = @()
          for ($depTry = 1; $depTry -le $depAttempts; $depTry++) {
            cmd.exe /d /s /c $inspectCmd
            if ($LASTEXITCODE -ne 0) {
              throw "iccIisIsapi dumpbin verification failed with exit code $LASTEXITCODE"
            }
            $depLastMissing = @($expectedDeps | Where-Object {
              -not (Select-String -Path $iisDepsLog -Pattern $_ -SimpleMatch -Quiet)
            })
            if ($depLastMissing.Count -eq 0) { break }
            Write-Host "[WARN] dumpbin attempt $depTry/$depAttempts missing: $($depLastMissing -join ', ')"
            Start-Sleep -Seconds 2
          }
          foreach ($symbol in @('GetExtensionVersion', 'HttpExtensionProc', 'TerminateExtension')) {
            if (-not (Select-String -Path $iisExportsLog -Pattern $symbol -SimpleMatch -Quiet)) {
              throw "iccIisIsapi.dll missing export: $symbol"
            }
          }
          if ($depLastMissing.Count -gt 0) {
            $depDump = (Get-Content -Path $iisDepsLog -Raw -ErrorAction SilentlyContinue)
            Write-Host "----- dumpbin /dependents output (last attempt) -----"
            Write-Host $depDump
            throw "iccIisIsapi.dll is missing dependency: $($depLastMissing -join ', ')"
          }
          $originalPath = $env:PATH
          try {
            $env:PATH = "$env:INSTALL_PREFIX\bin;$env:PATH"
            $smokeOutput = & $iisSmoke $iisDll 2>&1
          }
          finally {
            $env:PATH = $originalPath
          }
          $smokeText = ($smokeOutput | Out-String)
          $smokeOutput | ForEach-Object { Write-Host $_ }
          if ($smokeText -notmatch 'Description:\s+iccDEV IIS ISAPI shared-library sample') {
            throw 'IIS smoke test did not print the extension description'
          }
          if ($smokeText -notmatch 'HTTP status:\s+200 OK') {
            throw 'IIS smoke test did not return HTTP 200 OK'
          }
          if ($smokeText -notmatch 'Body:\s+ok') {
            throw 'IIS smoke test did not return body ok'
          }
          Write-Host "::group::dumpbin /exports iccIisIsapi"
          Get-Content $iisExportsLog | Select-Object -First 80
          Write-Host "::endgroup::"
          Write-Host "::group::dumpbin /dependents iccIisIsapi"
          Get-Content $iisDepsLog
          Write-Host "::endgroup::"

      - name: Build and run installed hello-iccdev
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $exampleBuild = Join-Path $env:RUNNER_TEMP ("hello-" + $env:BUILD_TYPE)
          $exampleSource = (Resolve-Path "examples\hello-iccdev").Path
          $toolchainFile = (Resolve-Path "scripts\buildsystems\vcpkg.cmake").Path
          $installPrefix = (Resolve-Path $env:INSTALL_PREFIX).Path
          $vcpkgPrefix = (Resolve-Path $env:VCPKG_PREFIX).Path
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          if (-not $vsPath) {
            throw 'Unable to locate a Visual Studio installation with C++ tools'
          }
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          cmake -S $exampleSource -B $exampleBuild `
            -G "Visual Studio 17 2022" `
            -A x64 `
            "-DCMAKE_PREFIX_PATH=$installPrefix;$vcpkgPrefix" `
            "-DCMAKE_BUILD_TYPE=$env:BUILD_TYPE" `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchainFile" `
            -DVCPKG_MANIFEST_MODE=OFF
          cmake --build $exampleBuild --config $env:BUILD_TYPE -- /m /maxcpucount
          $env:PATH = "$env:INSTALL_PREFIX\bin;$env:VCPKG_BIN;$env:PATH"
          $helloExe = Join-Path $exampleBuild ($env:BUILD_TYPE + '\hello-iccdev.exe')
          $output = & $helloExe 2>&1
          $output | ForEach-Object { Write-Host $_ }
          if (-not ($output -match 'IccProfLib version:')) { throw 'Missing IccProfLib version output' }
          if (-not ($output -match 'IccLibXML  version:')) { throw 'Missing IccLibXML version output' }
          if (-not ($output -match 'Hello, iccDEV!')) { throw 'Missing hello-iccdev marker' }
          $helloDepsLog = Join-Path $env:RUNNER_TEMP ("hello_dependents_" + $env:BUILD_TYPE + ".txt")
          $verifyCmd = @(
            "call `"$vcvars`" >nul",
            "dumpbin /dependents `"$helloExe`" > `"$helloDepsLog`""
          ) -join ' && '
          # issue #823: retry to absorb windows-latest AV/parallel-build
          # race that can transiently truncate dumpbin output.
          $dllSuffix = if ($env:BUILD_TYPE -eq 'Debug') { 'd' } else { '' }
          $helloExpected = @(
            "IccProfLib2$dllSuffix.dll",
            "IccXML2$dllSuffix.dll",
            "IccJSON2$dllSuffix.dll"
          )
          $helloAttempts = 5
          $helloMissing = @()
          for ($helloTry = 1; $helloTry -le $helloAttempts; $helloTry++) {
            cmd.exe /d /s /c $verifyCmd
            if ($LASTEXITCODE -ne 0) {
              throw "hello-iccdev dependents check failed with exit code $LASTEXITCODE"
            }
            $helloMissing = @($helloExpected | Where-Object {
              -not (Select-String -Path $helloDepsLog -Pattern $_ -SimpleMatch -Quiet)
            })
            if ($helloMissing.Count -eq 0) { break }
            Write-Host "[WARN] hello dumpbin attempt $helloTry/$helloAttempts missing: $($helloMissing -join ', ')"
            Start-Sleep -Seconds 2
          }
          if ($helloMissing.Count -gt 0) {
            $helloDump = (Get-Content -Path $helloDepsLog -Raw -ErrorAction SilentlyContinue)
            Write-Host "----- dumpbin /dependents output (last attempt) -----"
            Write-Host $helloDump
            throw "hello-iccdev is missing dependency: $($helloMissing -join ', ')"
          }
          Write-Host "::group::dumpbin /dependents hello-iccdev.exe"
          Get-Content $helloDepsLog
          Write-Host "::endgroup::"

      - name: Stage Windows shared smoke bundle
        if: always()
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $bundleDir = Join-Path $env:RUNNER_TEMP ("windows-shared-smoke-" + $env:BUILD_TYPE)
          $missingLog = Join-Path $bundleDir 'missing.txt'
          if (Test-Path $bundleDir) {
            Remove-Item -LiteralPath $bundleDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          foreach ($entry in @('bin', 'lib')) {
            $source = Join-Path $env:INSTALL_PREFIX $entry
            if (Test-Path $source) {
              Copy-Item -LiteralPath $source -Destination (Join-Path $bundleDir $entry) -Recurse
            }
            else {
              Add-Content -Path $missingLog -Value ("Missing install artifact directory: " + $source)
            }
          }
          $reportDir = Join-Path $bundleDir 'reports'
          New-Item -ItemType Directory -Path $reportDir | Out-Null
          Get-ChildItem -Path $env:RUNNER_TEMP -File -Filter ('*_' + $env:BUILD_TYPE + '.txt') | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $reportDir $_.Name)
          }
          Set-Content -Path (Join-Path $bundleDir 'README.txt') -Value @(
            "Windows shared smoke bundle for $env:BUILD_TYPE"
            "bin\\ contains the installed IIS sample site, tools, and runtime DLLs."
            "lib\\ contains import/static libraries plus generated CMake package files."
            "reports\\ contains dumpbin inspection logs captured during workflow validation."
          )

      - name: Upload Windows shared smoke bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-shared-smoke-${{ matrix.build_type }}
          path: ${{ runner.temp }}/windows-shared-smoke-${{ matrix.build_type }}
          if-no-files-found: error
          retention-days: 14

  vcpkg-consumer-unix:
    name: "vcpkg Consumer - ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          brew_install_missing() {
            local formula
            for formula in "$@"; do
              if brew list --formula "$formula" >/dev/null 2>&1; then
                brew list --versions "$formula"
              else
                brew install "$formula"
              fi
            done
          }
          brew_install_missing cmake ninja curl zip unzip

      - name: Bootstrap vcpkg and install iccdev
        env:
          BASH_ENV: /dev/null
          VCPKG_DISABLE_METRICS: 1
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          VCPKG_ROOT="$RUNNER_TEMP/vcpkg"
          VCPKG_ICCDEV_SOURCE="$GITHUB_WORKSPACE"
          export VCPKG_ROOT
          # Pin vcpkg to builtin-baseline from vcpkg.json for reproducibility
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout 1940ee77e81573713c0d364c42f5990172198be1
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          if [ ! -f "$VCPKG_ICCDEV_SOURCE/Build/Cmake/CMakeLists.txt" ]; then
            echo "vcpkg local source is missing Build/Cmake/CMakeLists.txt: $VCPKG_ICCDEV_SOURCE"
            exit 1
          fi
          export VCPKG_ICCDEV_SOURCE
          export VCPKG_KEEP_ENV_VARS=VCPKG_ICCDEV_SOURCE
          export VCPKG_BINARY_SOURCES=clear
          case "$RUNNER_OS" in
            Linux)
              VCPKG_TRIPLET="x64-linux"
              ;;
            macOS)
              if [ "$(uname -m)" = "arm64" ]; then
                VCPKG_TRIPLET="arm64-osx"
              else
                VCPKG_TRIPLET="x64-osx"
              fi
              ;;
          esac
          # Run from temp dir to avoid vcpkg manifest mode (vcpkg.json at repo root)
          pushd "$RUNNER_TEMP" >/dev/null
          "$VCPKG_ROOT/vcpkg" install "iccdev[xml,json]:${VCPKG_TRIPLET}" --overlay-ports="$VCPKG_ICCDEV_SOURCE/ports"
          popd >/dev/null
          {
            printf 'VCPKG_ROOT=%s\n' "$VCPKG_ROOT"
            printf 'VCPKG_TRIPLET=%s\n' "$VCPKG_TRIPLET"
            printf 'VCPKG_ICCDEV_SOURCE=%s\n' "$VCPKG_ICCDEV_SOURCE"
            printf 'VCPKG_KEEP_ENV_VARS=%s\n' "$VCPKG_KEEP_ENV_VARS"
            printf 'VCPKG_BINARY_SOURCES=%s\n' "$VCPKG_BINARY_SOURCES"
          } >> "$GITHUB_ENV"

      - name: Validate packaged consumer and archive format
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          JOBS="$(sysctl -n hw.logicalcpu 2>/dev/null || nproc 2>/dev/null || echo 3)"
          EXAMPLE_BUILD="$RUNNER_TEMP/vcpkg-example-$RUNNER_OS"
          export VCPKG_ICCDEV_SOURCE
          export VCPKG_KEEP_ENV_VARS
          export VCPKG_BINARY_SOURCES
          cmake -S "examples/hello-iccdev" -B "$EXAMPLE_BUILD" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET"
          cmake --build "$EXAMPLE_BUILD" --parallel "$JOBS"
          for lib_base in IccProfLib2 IccXML2 IccJSON2; do
            STATIC_LIB="$VCPKG_ROOT/installed/$VCPKG_TRIPLET/lib/lib${lib_base}-static.a"
            if [ ! -f "$STATIC_LIB" ]; then
              STATIC_LIB="$VCPKG_ROOT/installed/$VCPKG_TRIPLET/lib/lib${lib_base}.a"
            fi
            if [ ! -f "$STATIC_LIB" ]; then
              echo "Expected packaged static archive missing: $lib_base"
              exit 1
            fi
            echo "=== file $STATIC_LIB ==="
            file "$STATIC_LIB"
            TMP_AR_DIR="$RUNNER_TEMP/archive-check-$lib_base"
            rm -rf "$TMP_AR_DIR"
            mkdir -p "$TMP_AR_DIR"
            (cd "$TMP_AR_DIR" && ar x "$STATIC_LIB")
            BITCODE_HIT=0
            for obj in "$TMP_AR_DIR"/*.o; do
              [ -f "$obj" ] || continue
              FILE_OUT="$(file "$obj")"
              if grep -qi 'LLVM IR bitcode\|LLVM bitcode' <<< "$FILE_OUT"; then
                printf '[FAIL] LLVM bitcode: %s\n' "$(basename "$obj")"
                BITCODE_HIT=1
              fi
            done
            OBJ_COUNT="$(find "$TMP_AR_DIR" -name '*.o' | wc -l | tr -d ' ')"
            if [ "$BITCODE_HIT" -ne 0 ]; then
              echo "Unexpected LLVM bitcode in packaged archive: $STATIC_LIB"
              exit 1
            fi
            printf '[OK] %s: %s native objects\n' "$lib_base" "$OBJ_COUNT"
            rm -rf "$TMP_AR_DIR"
          done
          case "$RUNNER_OS" in
            Linux)
              export LD_LIBRARY_PATH="$VCPKG_ROOT/installed/$VCPKG_TRIPLET/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
              ;;
            macOS)
              export DYLD_LIBRARY_PATH="$VCPKG_ROOT/installed/$VCPKG_TRIPLET/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
              ;;
          esac
          OUTPUT="$("$EXAMPLE_BUILD/hello-iccdev" 2>&1)"
          printf '%s\n' "$OUTPUT"
          grep -q "IccProfLib version:" <<< "$OUTPUT"
          grep -q "IccLibXML  version:" <<< "$OUTPUT"
          grep -q "Hello, iccDEV!" <<< "$OUTPUT"

  vcpkg-consumer-windows:
    name: "vcpkg Consumer - windows-latest"
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      POWERSHELL_TELEMETRY_OPTOUT: "1"
      POWERSHELL_UPDATECHECK: "Off"
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Configure git environment
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: Bootstrap vcpkg and install iccdev
        env:
          VCPKG_DISABLE_METRICS: 1
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $vcpkgIccdevSource = (Resolve-Path .).Path
          $env:VCPKG_ROOT = $vcpkgRoot
          # Pin vcpkg to builtin-baseline from vcpkg.json for reproducibility
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          git -C $vcpkgRoot checkout 1940ee77e81573713c0d364c42f5990172198be1
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          if (-not (Test-Path (Join-Path $vcpkgIccdevSource 'Build\Cmake\CMakeLists.txt'))) {
            throw "vcpkg local source is missing Build\\Cmake\\CMakeLists.txt: $vcpkgIccdevSource"
          }
          $env:VCPKG_ICCDEV_SOURCE = $vcpkgIccdevSource
          $env:VCPKG_KEEP_ENV_VARS = 'VCPKG_ICCDEV_SOURCE'
          $env:VCPKG_BINARY_SOURCES = 'clear'
          # Run from temp dir to avoid vcpkg manifest mode (vcpkg.json at repo root)
          Push-Location $env:RUNNER_TEMP
          & "$vcpkgRoot\vcpkg.exe" install 'iccdev[xml,json]:x64-windows-static' "--overlay-ports=$vcpkgIccdevSource\ports"
          Pop-Location
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg install failed with exit code $LASTEXITCODE"
          }
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "VCPKG_ICCDEV_SOURCE=$vcpkgIccdevSource" >> $env:GITHUB_ENV
          "VCPKG_KEEP_ENV_VARS=$env:VCPKG_KEEP_ENV_VARS" >> $env:GITHUB_ENV
          "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES" >> $env:GITHUB_ENV

      - name: Build and run packaged hello-iccdev
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $exampleBuild = Join-Path $env:RUNNER_TEMP 'hello-vcpkg-windows'
          $env:VCPKG_ICCDEV_SOURCE = (Resolve-Path $env:VCPKG_ICCDEV_SOURCE).Path
          $env:VCPKG_KEEP_ENV_VARS = 'VCPKG_ICCDEV_SOURCE'
          $env:VCPKG_BINARY_SOURCES = 'clear'
          cmake -S "examples\hello-iccdev" -B $exampleBuild `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build $exampleBuild --config Release -- /m /maxcpucount
          $helloExe = Join-Path $exampleBuild 'Release\hello-iccdev.exe'
          $output = & $helloExe 2>&1
          $output | ForEach-Object { Write-Host $_ }
          if (-not ($output -match 'IccProfLib version:')) { throw 'Missing IccProfLib version output' }
          if (-not ($output -match 'IccLibXML  version:')) { throw 'Missing IccLibXML version output' }
          if (-not ($output -match 'Hello, iccDEV!')) { throw 'Missing hello-iccdev marker' }


  final-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [validate-inputs, standard-builds, sanitizer-builds, option-matrix, windows-build, version-header-test, clean-rebuild-test, source-install-consumer, linux-housekeeping, windows-shared-smoke, vcpkg-consumer-unix, vcpkg-consumer-windows]
    if: always()

    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Download Windows ABI Reports
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v7.0.0 (node24)
        with:
          pattern: abi-windows-*
          path: windows-abi-reports
          merge-multiple: true

      - name: Generate Summary
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          INPUT_VALIDATION_RESULT: ${{ needs.validate-inputs.result }}
          STANDARD_RESULT: ${{ needs.standard-builds.result }}
          SANITIZER_RESULT: ${{ needs.sanitizer-builds.result }}
          OPTION_RESULT: ${{ needs.option-matrix.result }}
          WINDOWS_RESULT: ${{ needs.windows-build.result }}
          VERSION_RESULT: ${{ needs.version-header-test.result }}
          CLEAN_RESULT: ${{ needs.clean-rebuild-test.result }}
          SOURCE_INSTALL_RESULT: ${{ needs.source-install-consumer.result }}
          HOUSEKEEPING_RESULT: ${{ needs.linux-housekeeping.result }}
          WINDOWS_SMOKE_RESULT: ${{ needs.windows-shared-smoke.result }}
          VCPKG_UNIX_RESULT: ${{ needs.vcpkg-consumer-unix.result }}
          VCPKG_WINDOWS_RESULT: ${{ needs.vcpkg-consumer-windows.result }}
          SUMMARY_ICCDEV_REPO: ${{ needs.validate-inputs.outputs.iccdev_repo }}
          SUMMARY_ICCDEV_REF: ${{ needs.validate-inputs.outputs.iccdev_ref }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() {
              escape_html "$1"
            }
            sanitize_print() {
              sanitize_line "$1"
              printf '\n'
            }
          fi

          summary_print() {
            if declare -F sanitize_line >/dev/null 2>&1; then
              sanitize_line "$1"
            else
              printf '%s' "$1"
            fi
            printf '\n'
          }

          append_summary_file() {
            local title="$1"
            local path="$2"
            summary_print "### $title"
            summary_print ""
            if [[ -f "$path" ]]; then
              summary_print '```text'
              while IFS= read -r line || [[ -n "$line" ]]; do
                summary_print "$line"
              done < "$path"
              summary_print '```'
            else
              summary_print "_Missing report: $path_"
            fi
            summary_print ""
          }

          {
            summary_print "# Comprehensive Cross-Platform Build and Test Results"
            summary_print ""
            summary_print "## iccDEV Source"
            summary_print ""
            summary_print "- Repository: ${SUMMARY_ICCDEV_REPO}"
            summary_print "- Ref: ${SUMMARY_ICCDEV_REF}"
            summary_print ""
            summary_print "## Test Coverage"
            summary_print ""
            summary_print "### Platforms"
            summary_print "- Ubuntu (latest)"
            summary_print "- macOS (latest)"
            summary_print "- Windows (latest)"
            summary_print ""
            summary_print "### Compilers"
            summary_print "- GCC (Ubuntu)"
            summary_print "- Clang (Ubuntu, macOS)"
            summary_print "- MSVC (Windows)"
            summary_print ""
            summary_print "### Build Types"
            summary_print "- Release"
            summary_print "- Debug"
            summary_print "- RelWithDebInfo"
            summary_print ""
            summary_print "### Sanitizers"
            summary_print "- AddressSanitizer (ASAN)"
            summary_print "- UndefinedBehaviorSanitizer (UBSAN)"
            summary_print "- Combined ASAN+UBSAN"
            summary_print ""
            summary_print "### Build Options"
            summary_print "- ENABLE_COVERAGE"
            summary_print "- ICC_ENABLE_ASSERTS"
            summary_print "- ICC_TRACE_NAN_ENABLED"
            summary_print "- Shared libs only"
            summary_print ""
            summary_print "### Special Tests"
              summary_print "- Windows RefIccMAX export/import verification"
            summary_print "- Linux/macOS hello-iccdev build-tree consumer smoke"
            summary_print "- Linux/macOS shared-library export and dependency reports"
            summary_print "- Windows dumpbin export and dependent-DLL reports"
            summary_print "- Windows library artifact hash and project-reference audit"
            summary_print "- Version header generation (build directory)"
            summary_print "- Clean/rebuild cycle"
            summary_print ""
            summary_print "## Job Results"
            summary_print ""
            summary_print "| Job | Status |"
            summary_print "|-----|--------|"
            summary_print "| Input Validation | ${INPUT_VALIDATION_RESULT} |"
            summary_print "| Standard Builds | ${STANDARD_RESULT} |"

            summary_print "| Sanitizer Builds | ${SANITIZER_RESULT} |"
            summary_print "| Option Matrix | ${OPTION_RESULT} |"
            summary_print "| Windows Build | ${WINDOWS_RESULT} |"
            summary_print "| Version Header Test | ${VERSION_RESULT} |"
            summary_print "| Clean/Rebuild Test | ${CLEAN_RESULT} |"
            summary_print "| Source Install Consumer | ${SOURCE_INSTALL_RESULT} |"
            summary_print "| Linux Housekeeping | ${HOUSEKEEPING_RESULT} |"
            summary_print "| Windows Shared Smoke | ${WINDOWS_SMOKE_RESULT} |"
            summary_print "| vcpkg Consumer Unix | ${VCPKG_UNIX_RESULT} |"
            summary_print "| vcpkg Consumer Windows | ${VCPKG_WINDOWS_RESULT} |"
            summary_print ""
            summary_print "## Windows ABI Reports"
            summary_print ""
            if [[ -d windows-abi-reports ]]; then
              summary_print "Available downloaded report files:"
              while IFS= read -r report_file; do
                summary_print "- ${report_file#./}"
              done < <(cd windows-abi-reports && find . -maxdepth 1 -type f | LC_ALL=C sort)
              summary_print ""
            else
              summary_print "_Windows ABI artifact directory was not downloaded._"
              summary_print ""
            fi
            append_summary_file "RefIccMAX ABI Report (Release)" "windows-abi-reports/reficcmax-abi-Release.txt"
            append_summary_file "IccProfLib ABI Report (Release)" "windows-abi-reports/iccproflib-abi-Release.txt"
            append_summary_file "IccXML ABI Report (Release)" "windows-abi-reports/iccxml-abi-Release.txt"
            append_summary_file "Windows Library Audit (Release)" "windows-abi-reports/windows-library-audit-Release.txt"
            summary_print "---"
            summary_print ""
            summary_print "**Reference:** ci-comprehensive-cross-platform.yml"
          } >> "$GITHUB_STEP_SUMMARY"
