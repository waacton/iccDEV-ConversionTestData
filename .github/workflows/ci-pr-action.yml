name: "ci-pr-action"

# Existing contributor guidance and summary strings intentionally exceed the
# default yamllint line length. Keep the disable local to this workflow.
# yamllint disable rule:line-length

permissions:
  contents: read
  packages: read
  pull-requests: read  # Required to classify PR scope and summarize metadata.
  # Avoid unnecessary permissions; do not add write permissions.

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      ci_scope:
        description: 'CI scope to run'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - full
          - source
          - governance
          - docs

concurrency:
  group: "ci-pr-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

jobs:
  detect-src:
    name: Welcome to iccDEV
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Required to inspect changed files and PR metadata.

    outputs:
      src_changed: ${{ steps.diffcheck.outputs.src_changed }}
      ci_scope: ${{ steps.diffcheck.outputs.ci_scope }}
      source_changed: ${{ steps.diffcheck.outputs.source_changed }}
      build_config_changed: ${{ steps.diffcheck.outputs.build_config_changed }}
      testing_changed: ${{ steps.diffcheck.outputs.testing_changed }}
      ci_changed: ${{ steps.diffcheck.outputs.ci_changed }}
      docs_only: ${{ steps.diffcheck.outputs.docs_only }}

    steps:
      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 50  # Increased from 2 to allow merge-base detection
          # Disable unsafe fetch options
          persist-credentials: false

      # Checkout the trusted base commit into a separate path so we do not
      # source code from the PR workspace (untrusted).
      - name: Checkout base commit (trusted sanitizers)
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          # Use the base commit SHA to ensure we fetch the exact trusted version.
          ref: ${{ github.event.pull_request.base.sha || 'master' }}
          path: base
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""

      - name: Check for source changes
        id: diffcheck
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          CI_SCOPE: ${{ inputs.ci_scope || 'auto' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_BASE_REF: ${{ github.base_ref || 'master' }}
        run: |
          set -euo pipefail

          git config --add safe.directory "$PWD"
          unset GITHUB_TOKEN || true

          ci_scope="${CI_SCOPE:-auto}"
          head_sha="${PR_HEAD_SHA}"

          case "$ci_scope" in
            auto|full|source|governance|docs)
              ;;
            *)
              echo "Invalid CI scope: $ci_scope" >&2
              exit 1
              ;;
          esac

          write_scope_outputs() {
            local run_full="$1"
            local source_changed="$2"
            local build_config_changed="$3"
            local testing_changed="$4"
            local ci_changed="$5"
            local docs_only="$6"

            {
              printf 'src_changed=%s\n' "$run_full"
              printf 'ci_scope=%s\n' "$ci_scope"
              printf 'source_changed=%s\n' "$source_changed"
              printf 'build_config_changed=%s\n' "$build_config_changed"
              printf 'testing_changed=%s\n' "$testing_changed"
              printf 'ci_changed=%s\n' "$ci_changed"
              printf 'docs_only=%s\n' "$docs_only"
          } >> "$GITHUB_OUTPUT"  # elements-sanitized
          }

          case "$ci_scope" in
            full|source)
              write_scope_outputs true true true true false false
              exit 0
              ;;
            governance)
              write_scope_outputs false false false false true false
              exit 0
              ;;
            docs)
              write_scope_outputs false false false false false true
              exit 0
              ;;
          esac

          # Validate that both SHAs look like exact Git commit OIDs (40 hex chars).
          validate_sha() {
            local sha="$1"
            if [[ -z "$sha" ]]; then
              return 1
            fi
            # require exactly 40 hexadecimal characters
            if [[ ! "$sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
              return 1
            fi
            return 0
          }

          if ! validate_sha "$head_sha"; then
            echo "Warning: invalid or missing head commit sha; assuming source changed for safety" >&2
            write_scope_outputs true true true true false false
            exit 0
          fi

          base_ref="${PR_BASE_REF}"

          # Avoid fetching refs from user-controllable inputs like ($base_ref)
          case "$base_ref" in master)
              ;;
            *)
              echo "Ref blocked or unsupported: $base_ref" >&2
              write_scope_outputs false false false false false false
              exit 0
              ;;
          esac

          # Fetch with increased depth to find merge base
          # Use fully-qualified refspec (defense-in-depth: prevents ambiguous ref resolution)
          git -c protocol.version=2 fetch --no-tags origin \
            "refs/heads/${base_ref}:refs/remotes/origin/${base_ref}" \
            --depth=50

          # Check if merge base exists before running diff
          if ! git merge-base "origin/${base_ref}" HEAD >/dev/null 2>&1; then
            echo "Warning: no merge base found; assuming source changed for safety" >&2
            write_scope_outputs true true true true false false
            exit 0
          fi

          changed_files="$(git diff --name-only "origin/${base_ref}"...HEAD)"

          has_changed_file() {
            local pattern="$1"
            grep -Eiq "$pattern" <<< "$changed_files"
          }

          source_changed=false
          build_config_changed=false
          testing_changed=false
          ci_changed=false
          docs_only=false

          if has_changed_file '\.(cpp|cxx|cc|c|h|hpp|hh)$'; then
            source_changed=true
          fi

          if has_changed_file '(^|/)(CMakeLists\.txt|[^/]+\.cmake)$|^Build/Cmake/|^cmake/'; then
            build_config_changed=true
          fi

          if has_changed_file '^(Testing/|\.github/ci/regression/)'; then
            testing_changed=true
          fi

          if has_changed_file '^\.github/(workflows|scripts|actions|codeql-queries)/'; then
            ci_changed=true
          fi

          docs_pattern='(^docs/|^README(\..*)?$|^CONTRIBUTING(\..*)?$'
          docs_pattern+='|^CHANGELOG(\..*)?$|^LICENSE(\..*)?$|\.(md|rst|txt)$)'
          if [[ -n "$changed_files" ]] &&
             ! grep -Eiv "$docs_pattern" <<< "$changed_files" >/dev/null; then
            docs_only=true
          fi

          run_full=false
          if [[ "$source_changed" == "true" || "$build_config_changed" == "true" || "$testing_changed" == "true" || "$ci_changed" == "true" ]]; then
            run_full=true
          fi

          write_scope_outputs "$run_full" "$source_changed" "$build_config_changed" "$testing_changed" "$ci_changed" "$docs_only"

      - name: Generate Summary
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_RUN_ID: ${{ github.run_id }}
          RUN_FULL_BUILD: ${{ steps.diffcheck.outputs.src_changed }}
          CI_SCOPE: ${{ steps.diffcheck.outputs.ci_scope }}
          SOURCE_CHANGED: ${{ steps.diffcheck.outputs.source_changed }}
          BUILD_CONFIG_CHANGED: ${{ steps.diffcheck.outputs.build_config_changed }}
          TESTING_CHANGED: ${{ steps.diffcheck.outputs.testing_changed }}
          CI_CHANGED: ${{ steps.diffcheck.outputs.ci_changed }}
          DOCS_ONLY: ${{ steps.diffcheck.outputs.docs_only }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          # --- load trusted canonical sanitizers from the checked-out base ---
          TRUSTED_SANITIZER="$GITHUB_WORKSPACE/base/.github/scripts/sanitize-sed.sh"
          if [[ -f "$TRUSTED_SANITIZER" ]]; then
            # source the trusted sanitizer (from the base commit)
            # shellcheck disable=SC1090
            source "$TRUSTED_SANITIZER"
          else
            # Fallback: provide a minimal, safe sanitizer to ensure step summaries
            # are escaped. This is intentionally conservative.
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_print() { escape_html "$1"; }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "<div align=\"center\">"
            echo "  <h3>Welcome to the ICC Development Workflow</h3>"
            echo "  <em>Date:</em> $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "</div>"
            echo ""
            echo "## PR Checklist"
            echo ""
            echo "- [x] You followed CONTRIBUTING.md"
            echo "- [x] Commits follow GitHub's acceptable use policy"
            echo "- [x] You checked for duplicate pull requests"
            echo "- [x] You built locally using docs/build.md"
            echo "- [x] You included Unit Tests and/or Issue reproduction steps + fix"
            echo ""
            echo "## CI Scope"
            echo ""
            echo "- **Requested scope:** \`$(sanitize_line "${CI_SCOPE:-auto}")\`"
            echo "- **Run full build matrix:** \`$(sanitize_line "${RUN_FULL_BUILD:-false}")\`"
            echo "- **Source changed:** \`$(sanitize_line "${SOURCE_CHANGED:-false}")\`"
            echo "- **Build config changed:** \`$(sanitize_line "${BUILD_CONFIG_CHANGED:-false}")\`"
            echo "- **Testing/regression changed:** \`$(sanitize_line "${TESTING_CHANGED:-false}")\`"
            echo "- **CI/governance changed:** \`$(sanitize_line "${CI_CHANGED:-false}")\`"
            echo "- **Docs only:** \`$(sanitize_line "${DOCS_ONLY:-false}")\`"
            echo ""
            echo "If you have questions, contact a listed [Maintainer](https://github.com/InternationalColorConsortium/iccDEV/blob/master/.github/CODEOWNERS)."
            echo ""
            echo "## Legal Requirements"
            echo ""
            echo "All contributions to ICC open-source projects follow:"
            echo "- The [International Color Consortium IP Policy](https://www.color.org/iccip.xalter)"
            echo "- Open-source software best practices"
            echo "- Contributor License Agreement (CLA) requirements"
            echo ""
            echo "### Contributor License Agreements"
            echo "Before contributing code, you must complete a **Contributor License Agreement (CLA)**."
            echo ""
            echo "- [Personal CLA](https://github.com/InternationalColorConsortium/.github/blob/main/docs/CLA.md)"
            echo "- Corporate CLA: InternationalColorConsortium/.github docs"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

  setup:
    name: Thank You for the PR
    runs-on: ubuntu-latest
    needs: [detect-src, risk-gate]
    permissions:
      contents: read
      pull-requests: read  # Required to render trusted PR summary details.
    steps:
      - name: Checkout repository (for shared sanitize helpers)
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout base commit (trusted sanitizers)
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || 'master' }}
          path: base
          fetch-depth: 1
          persist-credentials: false

      - name: Print PR Details
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_RUN_ID: ${{ github.run_id }}
          SRC_CHANGED: ${{ needs.detect-src.outputs.src_changed }}
          CI_SCOPE: ${{ needs.detect-src.outputs.ci_scope }}
          SOURCE_CHANGED: ${{ needs.detect-src.outputs.source_changed }}
          BUILD_CONFIG_CHANGED: ${{ needs.detect-src.outputs.build_config_changed }}
          TESTING_CHANGED: ${{ needs.detect-src.outputs.testing_changed }}
          CI_CHANGED: ${{ needs.detect-src.outputs.ci_changed }}
          DOCS_ONLY: ${{ needs.detect-src.outputs.docs_only }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          # Load canonical sanitizers from trusted checkout
          TRUSTED_SANITIZER="$GITHUB_WORKSPACE/base/.github/scripts/sanitize-sed.sh"
          if [[ -f "$TRUSTED_SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$TRUSTED_SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_print() { escape_html "$1"; }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "============================"
          echo "   iccDEV PR Build Runner   "
          echo "============================"
          echo ""
          echo "International Color Consortium"
          echo "Thank you for the PR"
          echo ""
          echo "Trigger: $(sanitize_print "$GH_EVENT_NAME")"
          echo "Repository: $(sanitize_print "$GH_REPOSITORY")"
          echo "Branch: $(sanitize_print "$GH_REF_NAME")"
          echo "Commit: $(sanitize_print "$GH_SHA")"
          echo "Actor: $(sanitize_print "$GH_ACTOR")"
          echo "Run ID: $(sanitize_print "$GH_RUN_ID")"
          echo "Start time: $(date)"
          echo "Source changed: $(sanitize_print "$SRC_CHANGED")"
          echo "CI scope: $(sanitize_print "$CI_SCOPE")"
          echo "Source files changed: $(sanitize_print "$SOURCE_CHANGED")"
          echo "Build config changed: $(sanitize_print "$BUILD_CONFIG_CHANGED")"
          echo "Testing/regression changed: $(sanitize_print "$TESTING_CHANGED")"
          echo "CI/governance changed: $(sanitize_print "$CI_CHANGED")"
          echo "Docs only: $(sanitize_print "$DOCS_ONLY")"

      - name: Generate Summary
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          # ensure these are available in the step; if not, the defaults below will be used
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SRC_CHANGED: ${{ needs.detect-src.outputs.src_changed || 'false' }}
          CI_SCOPE: ${{ needs.detect-src.outputs.ci_scope || 'auto' }}
          SOURCE_CHANGED: ${{ needs.detect-src.outputs.source_changed || 'false' }}
          BUILD_CONFIG_CHANGED: ${{ needs.detect-src.outputs.build_config_changed || 'false' }}
          TESTING_CHANGED: ${{ needs.detect-src.outputs.testing_changed || 'false' }}
          CI_CHANGED: ${{ needs.detect-src.outputs.ci_changed || 'false' }}
          DOCS_ONLY: ${{ needs.detect-src.outputs.docs_only || 'false' }}
        run: |
          set -euo pipefail

          git config --add safe.directory "$PWD"
          git config --global credential.helper ""

          # load trusted canonical sanitizers
          TRUSTED_SANITIZER="$GITHUB_WORKSPACE/base/.github/scripts/sanitize-sed.sh"
          if [[ -f "$TRUSTED_SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$TRUSTED_SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
            sanitize_print() { escape_html "$1"; }
          fi

          # Safe defaults.
          : "${GITHUB_EVENT_NAME:=<none>}"
          : "${GITHUB_REPOSITORY:=<none>}"
          : "${GITHUB_REF_NAME:=<none>}"
          : "${GITHUB_SHA:=<none>}"
          : "${GITHUB_RUN_ID:=<none>}"
          : "${SRC_CHANGED:=false}"
          : "${CI_SCOPE:=auto}"
          : "${SOURCE_CHANGED:=false}"
          : "${BUILD_CONFIG_CHANGED:=false}"
          : "${TESTING_CHANGED:=false}"
          : "${CI_CHANGED:=false}"
          : "${DOCS_ONLY:=false}"

          # write step summary (all dynamic values passed through sanitize_line)
          {
            echo "## PR Init Complete"
            echo ""
            echo "**Workflow:** ci-pr-action"
            echo "- **GITHUB_Repository:** \`$(sanitize_line "${GITHUB_REPOSITORY}")\`"
            echo "- **Event type:** \`$(sanitize_line "${GITHUB_EVENT_NAME}")\`"
            echo "- **Branch:** \`$(sanitize_line "${GITHUB_REF_NAME}")\`"
            echo "- **Commit:** \`$(sanitize_line "${GITHUB_SHA}")\`"
            echo "- **Run ID:** \`$(sanitize_line "${GITHUB_RUN_ID}")\`"
            echo "- **Session start:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- **CI scope:** \`$(sanitize_line "${CI_SCOPE}")\`"
            echo "- **Run full build matrix:** \`$(sanitize_line "${SRC_CHANGED}")\`"
            echo "- **Source files changed:** \`$(sanitize_line "${SOURCE_CHANGED}")\`"
            echo "- **Build config changed:** \`$(sanitize_line "${BUILD_CONFIG_CHANGED}")\`"
            echo "- **Testing/regression changed:** \`$(sanitize_line "${TESTING_CHANGED}")\`"
            echo "- **CI/governance changed:** \`$(sanitize_line "${CI_CHANGED}")\`"
            echo "- **Docs only:** \`$(sanitize_line "${DOCS_ONLY}")\`"
            echo ""
            echo "[OK] CI environment successfully initialized and ready for subsequent jobs."
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

  validate-inputs:
    name: Init PR Build Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Required to derive the PR build matrix.
    needs: [setup, detect-src]

    outputs:
      os-list: ${{ steps.v.outputs.os }}
      compilers: ${{ steps.v.outputs.comp }}
      build-types: ${{ steps.v.outputs.bt }}

    steps:
      - name: Set up Matrix Runners
        id: v
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          # --- Define for child workflows ---
          # Windows is Hardcoded - TODO
          allowed_os=( "ubuntu-latest" "macos-latest" )
          allowed_comp=( "gcc" "clang" )
          allowed_bt=( "Release" "Debug" )
          # --- Define for child workflows ---
          # Windows is Hardcoded - TODO
          os_raw='["ubuntu-latest","macos-latest"]'
          comp_raw='["gcc","clang"]'
          bt_raw='["Release","Debug"]'

          validate() {
            local json="$1"; shift
            local allowed=("$@")

            # ensure jq is present
            if ! command -v jq >/dev/null 2>&1; then
              echo "Error: jq is required for input validation" >&2
              exit 1
            fi

            readarray -t vals < <(jq -r '.[]' <<<"$json")

            for v in "${vals[@]}"; do
              local ok=0
              for a in "${allowed[@]}"; do
                [[ "$v" == "$a" ]] && ok=1
              done
              if [[ $ok -eq 0 ]]; then
                echo "Invalid matrix value: $v" >&2
                exit 1
              fi
            done
          }

          write_github_output() {
            local key="$1"
            local value="$2"

            case "$key" in
              os|comp|bt) ;;
              *)
                echo "Invalid output key: $key" >&2
                exit 1
                ;;
            esac

            if [[ "$value" == *$'\r'* || "$value" == *$'\n'* ]]; then
              echo "Invalid multiline value for output: $key" >&2
              exit 1
            fi

            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_OUTPUT"  # elements-sanitized
          }

          validate "$os_raw"   "${allowed_os[@]}"
          validate "$comp_raw" "${allowed_comp[@]}"
          validate "$bt_raw"   "${allowed_bt[@]}"

          write_github_output os "$os_raw"
          write_github_output comp "$comp_raw"
          write_github_output bt "$bt_raw"

  risk-gate:
    name: Risk Analysis Gate
    needs: [detect-src]
    uses: ./.github/workflows/ci-pr-risk-security-analysis.yml
    with:
      analysis_target: 'Specific git ref'
      git_ref: ${{ github.event.pull_request.head.sha || github.sha }}
      severity_threshold: 'HIGH'
      fail_on_findings: true

  unix-ci:
    if: ${{ needs.detect-src.outputs.src_changed == 'true' }}
    name: Unix Build & Test Profiles
    needs: [setup, detect-src, validate-inputs]
    uses: ./.github/workflows/ci-pr-unix.yml
    # pass minimized inputs
    with:
      # only these, bail if not defined
      os-list: ${{ needs.validate-inputs.outputs.os-list }}
      build-types: ${{ needs.validate-inputs.outputs.build-types }}
      compilers: ${{ needs.validate-inputs.outputs.compilers }}

  tool-tests:
    if: ${{ needs.detect-src.outputs.src_changed == 'true' }}
    name: Tool Smoke Tests (ASAN+UBSAN)
    needs: [setup, detect-src, validate-inputs]
    uses: ./.github/workflows/ci-iccdev-tool-tests.yml

  win-ci:
    if: ${{ needs.detect-src.outputs.src_changed == 'true' }}
    name: Windows Build & Test Profiles
    needs: [setup, detect-src, validate-inputs]
    uses: ./.github/workflows/ci-pr-win.yml

  wasm-ci:
    if: ${{ needs.detect-src.outputs.src_changed == 'true' }}
    name: WASM Build & Parity (npm-shaped)
    needs: [setup, detect-src, validate-inputs]
    # PR source is untrusted; the reusable WASM workflow must validate in-place
    # and must not upload npm-shaped bundles as artifacts.
    uses: ./.github/workflows/ci-pr-wasm.yml
    with:
      expected-icc-count: '208'

  #############################################################################
  # Example Consumer Project -- verifies build-tree export works
  #############################################################################
  example-project:
    if: ${{ needs.detect-src.outputs.src_changed == 'true' }}
    name: Example Project
    needs: [detect-src, risk-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Build iccDEV
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build/Cmake
          cmake -B build -S . \
                -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_TOOLS=ON \
                -Wno-dev
          cmake --build build --parallel "$(nproc)"

      - name: Build Example Project
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd examples/hello-iccdev
          cmake -B build \
                -DICCDEV_BUILD_DIR="$GITHUB_WORKSPACE/Build/Cmake/build" \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"

      - name: Run Example Project
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          ICCDEV_BUILD_DIR: ${{ github.workspace }}/Build/Cmake/build
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          export LD_LIBRARY_PATH="${ICCDEV_BUILD_DIR}/IccProfLib"
          LD_LIBRARY_PATH+=":${ICCDEV_BUILD_DIR}/IccXML"
          LD_LIBRARY_PATH+=":${ICCDEV_BUILD_DIR}/IccJSON"
          OUTPUT=$(./examples/hello-iccdev/build/hello-iccdev 2>&1)
          echo "$OUTPUT"
          if grep -qE 'IccProfLib|Successfully opened' <<< "$OUTPUT"; then
            echo "[OK] Example project works correctly"
          else
            echo "[FAIL] Example project output unexpected"
            exit 1
          fi

  finalize:
    name: PR Summary
    runs-on: ubuntu-latest
    needs:
      - detect-src
      - risk-gate
      - unix-ci
      # clang-tidy lint and scan-build are temporarily disabled above.
      # - lint
      # - scan-build
      - tool-tests
      - win-ci
      - wasm-ci
      - example-project
    if: always()
    steps:
      - uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Checkout base commit (trusted sanitizers)
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || 'master' }}
          path: base
          fetch-depth: 1
          persist-credentials: false

      - name: PR Details
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SRC_CHANGED: ${{ needs.detect-src.outputs.src_changed }}
          RISK_RESULT: ${{ needs.risk-gate.result }}
          UNIX_RESULT: ${{ needs.unix-ci.result }}
          # clang-tidy lint and scan-build are temporarily disabled above.
          # LINT_RESULT: ${{ needs.lint.result }}
          # SCAN_RESULT: ${{ needs['scan-build'].result }}
          LINT_RESULT: skipped
          SCAN_RESULT: skipped
          TOOL_RESULT: ${{ needs['tool-tests'].result }}
          WIN_RESULT: ${{ needs['win-ci'].result }}
          WASM_RESULT: ${{ needs['wasm-ci'].result }}
          EXAMPLE_RESULT: ${{ needs['example-project'].result }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""

          # load canonical sanitizers from trusted checkout
          TRUSTED_SANITIZER="$GITHUB_WORKSPACE/base/.github/scripts/sanitize-sed.sh"
          if [[ -f "$TRUSTED_SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$TRUSTED_SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}"
              s="${s//</&lt;}"
              s="${s//>/&gt;}"
              s="${s//\"/&quot;}"
              s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
            sanitize_print() { escape_html "$1"; }
          fi

          # --- normalize upstream job results (default to success if missing) ---
          UNIX_RESULT="${UNIX_RESULT:-success}"
          LINT_RESULT="${LINT_RESULT:-success}"
          SCAN_RESULT="${SCAN_RESULT:-success}"
          TOOL_RESULT="${TOOL_RESULT:-success}"
          WIN_RESULT="${WIN_RESULT:-success}"
          WASM_RESULT="${WASM_RESULT:-success}"
          EXAMPLE_RESULT="${EXAMPLE_RESULT:-success}"
          RISK_RESULT="${RISK_RESULT:-success}"

          # remove CRs, trim whitespace and lowercase each value
          trim_and_norm() {
            local v="$1"
            # remove CRs
            v="${v//$'\r'/}"
            # trim leading/trailing whitespace (awk used for portability)
            v="$(printf '%s' "$v" | awk '{$1=$1;print}')"
            # lowercase (use tr for portability)
            v="$(echo "$v" | tr '[:upper:]' '[:lower:]')"
            printf '%s' "$v"
          }

          UNIX_RESULT="$(trim_and_norm "$UNIX_RESULT")"
          LINT_RESULT="$(trim_and_norm "$LINT_RESULT")"
          SCAN_RESULT="$(trim_and_norm "$SCAN_RESULT")"
          TOOL_RESULT="$(trim_and_norm "$TOOL_RESULT")"
          WIN_RESULT="$(trim_and_norm "$WIN_RESULT")"
          WASM_RESULT="$(trim_and_norm "$WASM_RESULT")"
          EXAMPLE_RESULT="$(trim_and_norm "$EXAMPLE_RESULT")"
          RISK_RESULT="$(trim_and_norm "$RISK_RESULT")"

          # --- compute overall result from upstream jobs ----------------------
          job_res=success
          for s in "$RISK_RESULT" "$UNIX_RESULT" "$LINT_RESULT" "$SCAN_RESULT" "$TOOL_RESULT" "$WIN_RESULT" "$WASM_RESULT" "$EXAMPLE_RESULT"; do
            # 'skipped' is acceptable (jobs are skipped when src_changed is false)
            # only 'failure' or 'cancelled' should cause overall failure
            if [[ "$s" != "success" && "$s" != "skipped" ]]; then
              job_res=failure
              break
            fi
          done

          # --- write header ----------------------------------------------------
          {
            echo "<div align=\"center\">"
            echo "  <h3>Completed the ICC Development Workflow</h3>"
            echo "  <em>Date:</em> $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "</div>"
            echo ""
            echo "## PR Summary"
            echo "  <strong>PRs Are Typically Reviewed Within 14 Days</strong><br>"
            echo ""
            echo "## PR / Branch Context"
            echo '```text'
            printf "HEAD_REF:   %s\n" "$(sanitize_line "${GITHUB_HEAD_REF:-<none>}")"
            printf "BASE_REF:   %s\n" "$(sanitize_line "${GITHUB_BASE_REF:-<none>}")"
            printf "GITHUB_REF: %s\n" "$(sanitize_line "${GITHUB_REF:-<none>}")"
            echo '```'
            echo ""

            # --- Ref Name Security Validation ---
            echo "### Ref Name Security Check"
            _ref_findings=0
            if [ -n "${GITHUB_HEAD_REF:-}" ]; then
              if detect_hidden_chars "${GITHUB_HEAD_REF}" "github.head_ref" 2>/dev/null; then
                _ref_findings=$((_ref_findings + 1))
                _clean_ref="$(validate_ref "${GITHUB_HEAD_REF}" "HEAD_REF" 2>/dev/null)"
                echo "[CRITICAL] Hidden Unicode characters detected in HEAD ref"
                echo "  Sanitized: ${_clean_ref}"
                echo ""
              fi
            fi
            if [ -n "${GITHUB_BASE_REF:-}" ]; then
              if detect_hidden_chars "${GITHUB_BASE_REF}" "github.base_ref" 2>/dev/null; then
                _ref_findings=$((_ref_findings + 1))
                _clean_ref="$(validate_ref "${GITHUB_BASE_REF}" "BASE_REF" 2>/dev/null)"
                echo "[CRITICAL] Hidden Unicode characters detected in BASE ref"
                echo "  Sanitized: ${_clean_ref}"
                echo ""
              fi
            fi
            if [ "${_ref_findings}" -eq 0 ]; then
              echo "[OK] All ref names are clean ASCII"
            else
              echo "[CRITICAL] ${_ref_findings} ref name(s) contain hidden Unicode characters"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

          # --- write job status summary ---------------------------------------
          {
            echo "## Job Status"
            echo ""
            echo "| Job                | Status   |"
            echo "|--------------------|----------|"
            printf "| risk-gate          | %s |\n" "$(sanitize_line "$RISK_RESULT")"
            printf "| unix-ci            | %s |\n" "$(sanitize_line "$UNIX_RESULT")"
            printf "| lint               | %s |\n" "$(sanitize_line "$LINT_RESULT")"
            printf "| scan-build         | %s |\n" "$(sanitize_line "$SCAN_RESULT")"
            printf "| tool-tests         | %s |\n" "$(sanitize_line "$TOOL_RESULT")"
            printf "| win-ci             | %s |\n" "$(sanitize_line "$WIN_RESULT")"
            printf "| wasm-ci            | %s |\n" "$(sanitize_line "$WASM_RESULT")"
            printf "| example-project    | %s |\n" "$(sanitize_line "$EXAMPLE_RESULT")"
            echo ""
            echo "**Overall Result:** \`$(sanitize_line "$job_res")\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized
