###############################################################
# Intent: Build and publish iccDEV Docker containers
###############################################################

name: ci-docker

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: "docker-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  cache-policy:
    name: "Validate workflow cache policy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Assert no GitHub Actions cache primitives
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          .github/scripts/check-workflow-cache-policy.sh .github/workflows/ci-docker.yml

  build:
    name: "Docker (${{ matrix.variant }})"
    needs: cache-policy
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fix-nixos-image-runtime'
    runs-on: ubuntu-latest
    environment: ghcr-publish
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write  # Required to publish GHCR images.
      id-token: write  # Required for artifact attestation identity.
      attestations: write  # Required to publish build provenance.
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ubuntu
            dockerfile: Dockerfile
            suffix: ""
            workdir: /opt/iccdev
            run_shell: bash
          - variant: nixos
            dockerfile: Dockerfile.nixos
            suffix: "-nixos"
            workdir: /workspace/iccDEV
            run_shell: sh

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          persist-credentials: false

      - name: Lowercase image name
        id: image
        env:
          BASH_ENV: /dev/null
          MATRIX_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ ! "$owner" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid repository owner for image name" >&2
            exit 1
          fi
          if [[ ! "$MATRIX_SUFFIX" =~ ^(-nixos)?$ ]]; then
            echo "Invalid Docker image suffix" >&2
            exit 1
          fi

          printf 'name=ghcr.io/%s/iccdev%s\n' "$owner" "$MATRIX_SUFFIX" >> "$GITHUB_OUTPUT"  # elements-sanitized

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ matrix.suffix == '-nixos' }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Generate SBOM
        uses: anchore/sbom-action@31d97aec0c0753790e49391033639e05f3006a16  # v0.22.2
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275  # v3.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v3.0.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: iccdev${{ matrix.suffix }}-sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Load test image
        env:
          BASH_ENV: /dev/null
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build-push.outputs.digest }}
          MATRIX_VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          docker pull "${IMAGE_REF}"
          docker tag  "${IMAGE_REF}" "iccdev-${MATRIX_VARIANT}-test:latest"

      - name: Scan test image
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
          TRIVY_IMAGE: aquasec/trivy@sha256:5c59e08f980b5d4d503329773480fcea2c9bdad7e381d846fbf9f2ecb8050f6b
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TEST_IMAGE="iccdev-${MATRIX_VARIANT}-test:latest"
          TRIVY_CACHE="${RUNNER_TEMP:-/tmp}/trivy-image-cache-${MATRIX_VARIANT}"
          rm -rf "$TRIVY_CACHE"
          mkdir -p "$TRIVY_CACHE"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$TRIVY_CACHE":/root/.cache/ \
            "$TRIVY_IMAGE" \
            image --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 "$TEST_IMAGE"

      - name: Verify NixOS image hygiene
        if: matrix.variant == 'nixos'
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TEST_IMAGE="iccdev-${MATRIX_VARIANT}-test:latest"

          SOURCE_HITS=$(docker run --rm "$TEST_IMAGE" sh -c \
            "find /nix/store -maxdepth 1 -name '*-source' -type d | wc -l")
          if [ "$SOURCE_HITS" -ne 0 ]; then
            echo "::error::NixOS image contains /nix/store/*-source paths"
            exit 1
          fi

          KEY_HITS=$(docker run --rm "$TEST_IMAGE" sh -c "
            grep -RIlE 'BEGIN .*PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY' \
              /nix/store /workspace/iccDEV 2>/dev/null | wc -l
          ")
          if [ "$KEY_HITS" -ne 0 ]; then
            echo "::error::NixOS image contains private-key material"
            exit 1
          fi

          CHANNEL_HITS=$(docker run --rm "$TEST_IMAGE" sh -c "
            find /nix/store -maxdepth 1 \
              \( -name '*-channel-*' -o -name '*manifest.nix' \) \
              -print 2>/dev/null | wc -l
          ")
          if [ "$CHANNEL_HITS" -ne 0 ]; then
            echo "::error::NixOS image contains channel/profile source artifacts"
            exit 1
          fi

      - name: Verify tools
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
          MATRIX_WORKDIR: ${{ matrix.workdir }}
          MATRIX_SHELL: ${{ matrix.run_shell }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TEST_IMAGE="iccdev-${MATRIX_VARIANT}-test:latest"
          SAFE_VARIANT="$(sanitize_line "$MATRIX_VARIANT")"
          TOOL_COUNT=$(docker run --rm "$TEST_IMAGE" "${MATRIX_SHELL}" -c \
            "find ${MATRIX_WORKDIR}/Build/Tools -type f -executable | wc -l")
          echo "Tools built: $TOOL_COUNT"
          if [ "$TOOL_COUNT" -lt 12 ]; then
            echo "::error::Expected at least 12 tools, found $TOOL_COUNT"
            exit 1
          fi
          TOOL_SMOKE=$(docker run --rm "$TEST_IMAGE" "${MATRIX_SHELL}" -c \
            "${MATRIX_WORKDIR}/Build/Tools/IccDumpProfile/iccDumpProfile 2>&1 || true")
          if ! grep -qiE 'Usage:|IccProfLib' <<< "$TOOL_SMOKE"; then
            echo "::error::Tool smoke test failed -- runtime library issue"
            echo "$TOOL_SMOKE"
            exit 1
          fi
          {
            echo "### Build Results (${SAFE_VARIANT})"
            echo "- Tools: $(sanitize_line "$TOOL_COUNT")"
            echo "- Runtime deps: All resolved"
            echo '```'
            TOOL_LIST=$(docker run --rm "$TEST_IMAGE" "${MATRIX_SHELL}" -c \
              "find ${MATRIX_WORKDIR}/Build/Tools -type f -executable -exec basename {} \; | sort")
            sanitize_print "$TOOL_LIST"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"  # sanitize_print

      - name: Test tool execution
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TEST_IMAGE="iccdev-${MATRIX_VARIANT}-test:latest"
          SAFE_VARIANT="$(sanitize_line "$MATRIX_VARIANT")"
          FAILURES=0
          echo "### Tool Tests (${SAFE_VARIANT})" >> "$GITHUB_STEP_SUMMARY"  # sanitize_line
          for tool in iccToXml iccFromXml iccToJson iccFromJson iccDumpProfile iccPawgReport iccRoundTrip; do
            SAFE_TOOL="$(sanitize_line "$tool")"
            OUT=$(docker run --rm "$TEST_IMAGE" "$tool" 2>&1 || true)
            if grep -qiE "Usage:|IccProfLib" <<< "$OUT"; then
              echo "[OK] $SAFE_TOOL" >> "$GITHUB_STEP_SUMMARY"  # sanitize_line
            else
              echo "::error::Tool test failed: $tool"
              echo "[FAIL] $SAFE_TOOL" >> "$GITHUB_STEP_SUMMARY"  # sanitize_line
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES tool test(s) failed"
            exit 1
          fi

      - name: Test iccToXml profile conversion
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
          MATRIX_WORKDIR: ${{ matrix.workdir }}
          MATRIX_SHELL: ${{ matrix.run_shell }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          TEST_IMAGE="iccdev-${MATRIX_VARIANT}-test:latest"
          SAFE_VARIANT="$(sanitize_line "$MATRIX_VARIANT")"
          echo "### iccToXml Conversion (${SAFE_VARIANT})" >> "$GITHUB_STEP_SUMMARY"  # sanitize_line
          docker run --rm "$TEST_IMAGE" "${MATRIX_SHELL}" -c "
            cd ${MATRIX_WORKDIR}
            iccToXml Testing/sRGB_v4_ICC_preference.icc /tmp/sRGB_v4.xml
            test -s /tmp/sRGB_v4.xml || { echo 'ERROR: output XML is empty'; exit 1; }
            ls -lh /tmp/sRGB_v4.xml
            echo '=== First 20 lines of XML output ==='
            sed -n '1,20p' /tmp/sRGB_v4.xml
          " 2>&1 | tee /tmp/iccToXml-output.txt
          {
            echo '```'
            sanitize_print "$(cat /tmp/iccToXml-output.txt)"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"  # sanitize_print

      - name: Cleanup
        if: always()
        env:
          BASH_ENV: /dev/null
          MATRIX_VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          docker rmi "iccdev-${MATRIX_VARIANT}-test:latest" || true

  prune:
    name: "Prune old container versions"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment: ghcr-publish
    permissions:
      packages: write  # Required to delete old GHCR package versions.
    strategy:
      matrix:
        package: [iccdev, iccdev-nixos]
    steps:
      # preflight: allow-token-exposure reason=ghcr-package-prune
      - name: Delete old package versions
        env:
          BASH_ENV: /dev/null
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX_PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""

          ORG="InternationalColorConsortium"
          CUTOFF=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)

          echo "Pruning ${MATRIX_PACKAGE} versions older than ${CUTOFF}"

          gh api --paginate \
            "/orgs/${ORG}/packages/container/${MATRIX_PACKAGE}/versions" |
          jq -r --arg cutoff "${CUTOFF}" '
            .[] | select(
              (.created_at < $cutoff) and
              ((.metadata.container.tags | index("latest")) == null)
            ) | .id
          ' > /tmp/prune-ids.txt

          TOTAL=$(wc -l < /tmp/prune-ids.txt | tr -d ' ')
          if [ "${TOTAL}" -eq 0 ]; then
            echo "No versions to prune"
            exit 0
          fi

          echo "Found ${TOTAL} versions to prune"
          DELETED=0
          FAILED=0
          while IFS= read -r vid; do
            if gh api --method DELETE \
              "/orgs/${ORG}/packages/container/${MATRIX_PACKAGE}/versions/${vid}" \
              2>/dev/null; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done < /tmp/prune-ids.txt

          echo "Pruned ${DELETED}/${TOTAL} old versions (${FAILED} failed)"
          rm -f /tmp/prune-ids.txt
