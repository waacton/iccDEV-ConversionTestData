###############################################################################
# ci-doxygen.yml -- iccDEV API documentation generation
#
# Generates Doxygen HTML docs for IccJSON (focused) and the full iccDEV
# project (IccProfLib + IccXML + IccJSON + Tools). Both sets are uploaded
# as separate workflow artifacts. Documentation is NEVER committed.
#
# Copyright (c) 2024-2026 The International Color Consortium.
###############################################################################

name: iccDEV Doxygen Docs

on:
  push:
    branches: [master]
    paths:
      - 'IccProfLib/**'
      - 'IccXML/**'
      - 'IccJSON/**'
      - 'Tools/**'
      - 'examples/**'
      - 'Doxyfile'
      - 'Doxyfile.full'
  workflow_dispatch:
    inputs:
      target_type:
        description: 'Documentation source target'
        required: true
        default: current-ref
        type: choice
        options:
          - current-ref
          - pr
          - git-ref
      pr_number:
        description: 'PR number when target_type is pr'
        required: false
        type: string
        default: ''
      git_ref:
        description: 'Branch, tag, or SHA when target_type is git-ref'
        required: false
        type: string
        default: ''
      docs_scope:
        description: 'Documentation set to generate'
        required: true
        default: both
        type: choice
        options:
          - iccjson
          - full
          - both

concurrency:
  group: "doxygen-${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resolve-target:
    name: Resolve Documentation Target
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      docs_scope: ${{ steps.resolve.outputs.docs_scope }}
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    steps:
      - name: Resolve checkout ref
        id: resolve
        env:
          BASH_ENV: /dev/null
          EVENT_NAME: ${{ github.event_name }}
          TARGET_TYPE: ${{ inputs.target_type || 'current-ref' }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
          GIT_REF: ${{ inputs.git_ref || '' }}
          DOCS_SCOPE: ${{ inputs.docs_scope || 'both' }}
          DEFAULT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          checkout_ref="$DEFAULT_REF"
          docs_scope="$DOCS_SCOPE"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "$TARGET_TYPE" in
              current-ref)
                checkout_ref="$DEFAULT_REF"
                ;;
              pr)
                if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
                  echo "Invalid PR number for Doxygen dispatch" >&2
                  exit 1
                fi
                checkout_ref="refs/pull/${PR_NUMBER}/head"
                ;;
              git-ref)
                if [[ ! "$GIT_REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
                  echo "Invalid git ref for Doxygen dispatch" >&2
                  exit 1
                fi
                checkout_ref="$GIT_REF"
                ;;
              *)
                echo "Invalid target_type: $TARGET_TYPE" >&2
                exit 1
                ;;
            esac
          fi

          case "$docs_scope" in
            iccjson|full|both)
              ;;
            *)
              echo "Invalid docs_scope: $docs_scope" >&2
              exit 1
              ;;
          esac

          {
            printf 'checkout_ref=%s\n' "$checkout_ref"
            printf 'docs_scope=%s\n' "$docs_scope"
          } >> "$GITHUB_OUTPUT"

  doxygen-iccjson:
    if: >-
      needs.resolve-target.outputs.docs_scope == 'iccjson' ||
      needs.resolve-target.outputs.docs_scope == 'both'
    name: IccJSON Docs
    needs: [resolve-target]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.resolve-target.outputs.checkout_ref }}
          persist-credentials: false

      - name: Install Doxygen and Graphviz
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz

      - name: Generate IccJSON Documentation
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          doxygen Doxyfile
          echo "IccJSON Doxygen generation complete"
          find docs/generated/html -maxdepth 1 -printf '%M %u %g %s %TY-%Tm-%Td %TH:%TM %p\n' |
            sort |
            sed -n '1,5p'

      - name: Report IccJSON Summary
        if: success()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          html_dir="docs/generated/html"
          total_files=$(find "$html_dir" -type f | wc -l)
          svg_files=$(find "$html_dir" -name '*.svg' | wc -l)
          html_files=$(find "$html_dir" -name '*.html' | wc -l)
          total_size=$(du -sh "$html_dir" | cut -f1)

          {
            echo "### IccLibJSON Doxygen Documentation"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total files | ${total_files} |"
            echo "| HTML pages | ${html_files} |"
            echo "| SVG graphs | ${svg_files} |"
            echo "| Total size | ${total_size} |"
            echo ""
            echo "**Visual aids**: Interactive SVG (pan/zoom), class hierarchy browser,"
            echo "call/caller graphs, collaboration diagrams, UML class diagrams,"
            echo "include dependency graphs, treeview navigation, client-side search."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IccJSON Documentation
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: iccjson-doxygen-html
          path: docs/generated/html/
          retention-days: 30

  doxygen-full:
    if: >-
      needs.resolve-target.outputs.docs_scope == 'full' ||
      needs.resolve-target.outputs.docs_scope == 'both'
    name: Full Project Docs
    needs: [resolve-target]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ needs.resolve-target.outputs.checkout_ref }}
          persist-credentials: false

      - name: Install Doxygen and Graphviz
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz

      - name: Generate Full Project Documentation
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          doxygen Doxyfile.full
          echo "Full iccDEV Doxygen generation complete"
          find docs/generated-full/html -maxdepth 1 -printf '%M %u %g %s %TY-%Tm-%Td %TH:%TM %p\n' |
            sort |
            sed -n '1,5p'

      - name: Report Full Project Summary
        if: success()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [ -f "$SANITIZER" ]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          html_dir="docs/generated-full/html"
          total_files=$(find "$html_dir" -type f | wc -l)
          svg_files=$(find "$html_dir" -name '*.svg' | wc -l)
          html_files=$(find "$html_dir" -name '*.html' | wc -l)
          class_count=$(find "$html_dir" -name 'class*.html' | wc -l)
          total_size=$(du -sh "$html_dir" | cut -f1)

          {
            echo "### Full iccDEV Doxygen Documentation"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total files | $(sanitize_line "${total_files}") |"
            echo "| HTML pages | $(sanitize_line "${html_files}") |"
            echo "| Class pages | $(sanitize_line "${class_count}") |"
            echo "| SVG graphs | $(sanitize_line "${svg_files}") |"
            echo "| Total size | $(sanitize_line "${total_size}") |"
            echo ""
            echo "**Coverage**: IccProfLib, IccLibXML, IccLibJSON, 17 CLI Tools"
            echo ""
            echo "**Visual aids**: Interactive SVG (pan/zoom), class hierarchy browser,"
            echo "call/caller graphs, collaboration diagrams, UML class diagrams,"
            echo "include dependency graphs, directory graphs, treeview navigation,"
            echo "client-side search, cross-referenced source browser."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Full Project Documentation
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: iccdev-full-doxygen-html
          path: docs/generated-full/html/
          retention-days: 30
