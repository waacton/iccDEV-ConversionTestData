---
###############################################################################
# ci-doxygen.yml -- iccDEV API documentation generation
#
# Generates HTML-only Doxygen documentation for the full iccDEV project:
# IccProfLib, IccXML, IccJSON/IccLibJSON, IccConnect/IccLibConnect, command-line
# tools including IccPawgReport and IccProfileVisualize, Winnt tools including
# IccIisIsapi, wxWidget tools, examples, docs, and Testing notes.
# Documentation is uploaded as a workflow artifact and is NEVER committed.
# This workflow intentionally does not use dependency caches and does not run
# on pull_request or pull_request_target. Generated HTML can include source
# comments and should only be uploaded through the protected doxygen-publish
# environment from the canonical repository on trusted master pushes or
# explicit maintainer-dispatched branch test runs.
#
# Copyright (c) 2024-2026 The International Color Consortium.
###############################################################################

name: iccDEV Doxygen Docs

'on':
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'README.md'
      - 'IccProfLib/**'
      - 'IccXML/**'
      - 'IccJSON/**'
      - 'IccConnect/**'
      - 'Tools/**'
      - 'examples/**'
      - 'docs/**'
      - 'Testing/**'
      - '.github/ci/doxygen/**'
      - '.github/scripts/check-workflow-cache-policy.sh'
      - '.github/scripts/sanitize-sed.sh'
      - '.github/workflows/ci-doxygen.yml'

concurrency:
  group: "doxygen-${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cache-policy:
    name: Validate workflow cache policy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Assert no GitHub Actions cache primitives
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          .github/scripts/check-workflow-cache-policy.sh \
            .github/workflows/ci-doxygen.yml

  doxygen:
    name: Full Project HTML Docs
    needs: cache-policy
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        github.event_name != 'pull_request_target'
      }}
    runs-on: ubuntu-24.04
    environment: doxygen-publish
    timeout-minutes: 60
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Install Doxygen and Graphviz
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz

      - name: Generate HTML Documentation
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          doxygen .github/ci/doxygen/Doxyfile
          echo "Full iccDEV Doxygen HTML generation complete"
          find docs/generated/html -maxdepth 1 -printf '%p\n' |
            sort |
            sed -n '1,5p'

      - name: Report Documentation Summary
        if: success()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [ -f "$SANITIZER" ]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          html_dir="docs/generated/html"
          warnings_file="docs/generated/doxygen-warnings.log"
          total_files=$(find "$html_dir" -type f | wc -l)
          svg_files=$(find "$html_dir" -name '*.svg' | wc -l)
          html_files=$(find "$html_dir" -name '*.html' | wc -l)
          class_count=$(find "$html_dir" -name 'class*.html' | wc -l)
          total_size=$(du -sh "$html_dir" | cut -f1)
          warning_count=0
          if [ -s "$warnings_file" ]; then
            warning_count=$(grep -c 'warning:' "$warnings_file" || true)
          fi

          {
            echo "### Full iccDEV Doxygen HTML Documentation"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total files | $(sanitize_line "${total_files}") |"
            echo "| HTML pages | $(sanitize_line "${html_files}") |"
            echo "| Class pages | $(sanitize_line "${class_count}") |"
            echo "| SVG graphs | $(sanitize_line "${svg_files}") |"
            echo "| Doxygen warnings | $(sanitize_line "${warning_count}") |"
            echo "| Total size | $(sanitize_line "${total_size}") |"
            echo ""
            echo "**Coverage**: IccProfLib, IccXML,"
            echo "IccJSON/IccLibJSON, IccConnect/IccLibConnect,"
            echo "CLI tools including IccPawgReport and"
            echo "IccProfileVisualize, Winnt tools including"
            echo "IccIisIsapi, wxWidget tools, hello-iccdev,"
            echo "docs, and Testing notes."
            echo ""
            echo "**Visual aids**: Interactive SVG (pan/zoom),"
            echo "class hierarchy browser, call/caller graphs,"
            echo "collaboration diagrams, UML class diagrams,"
            echo "include dependency graphs, directory graphs,"
            echo "treeview navigation, client-side search,"
            echo "and cross-referenced inline source browser."
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

      - name: Upload HTML Documentation
        if: >-
          ${{
            success() &&
            github.repository == 'InternationalColorConsortium/iccDEV' &&
            (
              github.event_name == 'workflow_dispatch' ||
              (
                github.event_name == 'push' &&
                github.ref == 'refs/heads/master'
              )
            )
          }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: iccdev-doxygen-html
          path: docs/generated/html/
          if-no-files-found: error
          retention-days: 30
