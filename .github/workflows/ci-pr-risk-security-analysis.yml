name: ci-risk-analysis

# This scanner contains long literal detection patterns and report strings.
# Keep line-length disabled here instead of weakening repository-wide yamllint.
# yamllint disable rule:line-length

permissions:
  contents: read
  pull-requests: read  # Required to analyze PR workflow changes.

on:
  workflow_call:
    inputs:
      analysis_target:
        description: 'What to analyze'
        required: false
        type: string
        default: 'Current branch workflows'
      pr_number:
        description: 'PR number (only when target = Specific PR number)'
        required: false
        type: string
        default: ''
      git_ref:
        description: 'Git ref / branch / SHA (only when target = Specific git ref)'
        required: false
        type: string
        default: 'master'
      severity_threshold:
        description: 'Minimum severity to report (display-only; filtering planned)'
        required: false
        type: string
        default: 'INFO'
      fail_on_findings:
        description: 'Fail on blocking governance findings'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      analysis_target:
        description: 'What to analyze'
        required: true
        type: choice
        options:
          - 'Current branch workflows'
          - 'Specific PR number'
          - 'Specific git ref'
      pr_number:
        description: 'PR number (only when target = Specific PR number)'
        required: false
        type: string
        default: ''
      git_ref:
        description: 'Git ref / branch / SHA (only when target = Specific git ref)'
        required: false
        type: string
        default: 'master'
      severity_threshold:
        description: 'Minimum severity to report (display-only; filtering planned)'
        required: false
        type: choice
        options:
          - 'INFO'
          - 'LOW'
          - 'MEDIUM'
          - 'HIGH'
          - 'CRITICAL'
        default: 'INFO'
      fail_on_findings:
        description: 'Fail on blocking governance findings'
        required: false
        type: boolean
        default: false

concurrency:
  group: >-
    pr-risk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{
    inputs.analysis_target || 'Current branch workflows' }}-${{
    inputs.pr_number || 'none' }}-${{ inputs.git_ref || 'none' }}-${{
    inputs.severity_threshold || 'INFO' }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

jobs:
  ###########################################################################
  # Job 1: Workflow Security Audit
  ###########################################################################
  workflow-security-audit:
    name: "Workflow Security Audit"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      ANALYSIS_TARGET: ${{ github.event.pull_request.number && 'Pull request' || inputs.analysis_target || 'Current branch workflows' }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number || '' }}
      GIT_REF: ${{ github.event.pull_request.head.sha || inputs.git_ref || github.ref }}
      SEVERITY_THRESHOLD: ${{ inputs.severity_threshold || 'HIGH' }}
      FAIL_ON_FINDINGS: ${{ github.event_name == 'pull_request' && 'true' || inputs.fail_on_findings && 'true' || 'false' }}
      SCAN_ROOT: ${{ github.workspace }}/target
      TRUSTED_SCRIPTS: ${{ github.workspace }}/trusted/.github/scripts
      RISK_REPORT_PATH: ${{ github.workspace }}/risk-analysis-report-linux.md

    steps:
      - name: "Checkout trusted scanner helpers"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          # PR scans use trusted base-branch helpers, not PR-modified scanner code.
          ref: ${{ github.event.pull_request.base.sha || github.workflow_sha }}
          path: trusted
          sparse-checkout: .github/scripts
          fetch-depth: 1
          persist-credentials: false

      - name: "Checkout target repository"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ github.event.pull_request.head.sha || inputs.analysis_target == 'Specific git ref' && inputs.git_ref || github.ref }}
          path: target
          fetch-depth: 0
          persist-credentials: false

      - name: "Checkout PR head (if PR mode)"
        if: inputs.analysis_target == 'Specific PR number' && inputs.pr_number != ''
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          path: target
          fetch-depth: 0
          persist-credentials: false

      - name: "Fork PR Maintainer Automation Gate"
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        env:
          BASH_ENV: /dev/null
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            sanitize_line() { printf '%s' "$1"; }
          fi

          cd "$SCAN_ROOT"
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA"...HEAD -- \
            .github .githooks 'Dockerfile*' 'Dockerfile.*' Build/Cmake 2>/dev/null || true)

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "[OK] Fork PR does not change maintainer-owned automation"
            exit 0
          fi

          {
            echo "## Fork PR Maintainer Automation Gate"
            echo ""
            echo "[FAIL] Fork PRs cannot modify maintainer-owned automation in the untrusted PR path."
            echo ""
            echo "Open this change from a maintainer branch or split automation changes into a maintainer-owned PR."
            echo ""
            echo "Changed maintainer-owned files:"
            for file in "${changed_files[@]}"; do
              echo "- \`$(sanitize_line "$file")\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized
          exit 1

      - name: "Load sanitizer"
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            echo "Sanitizer found at $SANITIZER"
            echo "SANITIZER_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "SANITIZER_PATH=$SANITIZER" >> "$GITHUB_ENV"
          else
            echo "WARNING: sanitize-sed.sh not found, using inline fallback"
            echo "SANITIZER_AVAILABLE=false" >> "$GITHUB_ENV"
          fi
          cat > "${RUNNER_TEMP}/workflow-trigger-names.py" <<'PY'
          import re
          import sys

          KEY_RE = re.compile(
              r"^(?P<indent>\s*)(?P<key>'[^']+'|\"[^\"]+\"|[A-Za-z_][A-Za-z0-9_-]*)\s*:\s*(?P<value>[^#]*)"
          )
          LIST_RE = re.compile(
              r"^\s*-\s*(?P<key>'[^']+'|\"[^\"]+\"|[A-Za-z_][A-Za-z0-9_-]*)\s*(?:#.*)?$"
          )


          def clean(value):
              return value.strip().strip("\"'")


          def inline_triggers(value):
              value = value.split("#", 1)[0].strip()
              if not value:
                  return []
              if value.startswith("[") and "]" in value:
                  return [clean(part) for part in value[1:value.index("]")].split(",") if clean(part)]
              if value.startswith("{") and "}" in value:
                  items = value[1:value.index("}")].split(",")
                  return [clean(item.split(":", 1)[0]) for item in items if clean(item.split(":", 1)[0])]
              return [clean(value)]

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              lines = handle.readlines()

          triggers = []
          in_on = False
          trigger_indent = None
          for line in lines:
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  continue

              match = KEY_RE.match(line)
              if not in_on:
                  if match and not match.group("indent") and clean(match.group("key")) == "on":
                      triggers.extend(inline_triggers(match.group("value")))
                      in_on = True
                  continue

              if match and not match.group("indent"):
                  break

              indent_len = len(line) - len(line.lstrip(" "))
              if trigger_indent is None and stripped:
                  trigger_indent = indent_len

              if trigger_indent is not None and indent_len != trigger_indent:
                  continue

              list_match = LIST_RE.match(line)
              if list_match:
                  triggers.append(clean(list_match.group("key")))
              elif match:
                  triggers.append(clean(match.group("key")))

          seen = set()
          for trigger in triggers:
              if trigger and trigger not in seen:
                  print(trigger)
                  seen.add(trigger)
          PY
          echo "WORKFLOW_TRIGGER_HELPER=${RUNNER_TEMP}/workflow-trigger-names.py" >> "$GITHUB_ENV"

      - name: "1. Action SHA Pinning Audit"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 1. Action SHA Pinning Audit" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          TOTAL_ACTIONS=0
          PINNED_ACTIONS=0
          UNPINNED_ACTIONS=0
          TAG_ONLY_ACTIONS=0

          declare -a UNPINNED_LIST=()
          declare -a TAG_ONLY_LIST=()

          # Extract only YAML-level uses: directives (skip script content in run: blocks)
          while IFS= read -r wf; do
            # Use awk to skip lines inside run: blocks -- only match top-level uses:
            while IFS= read -r action_ref; do
              TOTAL_ACTIONS=$((TOTAL_ACTIONS + 1))
              wf_base=$(basename "$wf")

              if grep -qE '@[0-9a-f]{40}' <<< "$action_ref"; then
                PINNED_ACTIONS=$((PINNED_ACTIONS + 1))
              elif grep -qE '@v[0-9]' <<< "$action_ref"; then
                TAG_ONLY_ACTIONS=$((TAG_ONLY_ACTIONS + 1))
                TAG_ONLY_LIST+=("$wf_base: $action_ref")
              else
                UNPINNED_ACTIONS=$((UNPINNED_ACTIONS + 1))
                UNPINNED_LIST+=("$wf_base: $action_ref")
              fi
            done < <(awk '
              /^[[:space:]]*run:[[:space:]]*\|/ {
                in_run=1
                match($0, /^[[:space:]]*/)
                run_indent=RLENGTH
                next
              }
              in_run {
                match($0, /^[[:space:]]*/)
                if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= run_indent) {
                  in_run=0
                } else {
                  next
                }
              }
              /^[[:space:]]*-?[[:space:]]*uses:[[:space:]]/ {
                sub(/.*uses:[[:space:]]*/, "")
                gsub(/["'\'']/, "")
                if ($0 !~ /^#/ && $0 !~ /docker:\/\// && $0 !~ /^\.\/\.github\/workflows\//) print
              }
            ' "$wf")
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          if [[ $TOTAL_ACTIONS -eq 0 ]]; then
            echo "No workflow actions found." >> "$RISK_REPORT_PATH"
          else
            PIN_PCT=$((PINNED_ACTIONS * 100 / TOTAL_ACTIONS))
            if [[ $UNPINNED_ACTIONS -eq 0 && $TAG_ONLY_ACTIONS -eq 0 ]]; then
              echo "[OK] All $(sanitize_line "$TOTAL_ACTIONS") actions are SHA-pinned ($(sanitize_line "$PIN_PCT")%)" >> "$RISK_REPORT_PATH"
            else
              echo "| Metric | Count |" >> "$RISK_REPORT_PATH"
              echo "|--------|-------|" >> "$RISK_REPORT_PATH"
              echo "| Total actions | $(sanitize_line "$TOTAL_ACTIONS") |" >> "$RISK_REPORT_PATH"
              echo "| SHA-pinned | $(sanitize_line "$PINNED_ACTIONS") ($(sanitize_line "$PIN_PCT")%) |" >> "$RISK_REPORT_PATH"
              echo "| Tag-only (MEDIUM risk) | $(sanitize_line "$TAG_ONLY_ACTIONS") |" >> "$RISK_REPORT_PATH"
              echo "| Unpinned (CRITICAL risk) | $(sanitize_line "$UNPINNED_ACTIONS") |" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi

            if [[ ${#TAG_ONLY_LIST[@]} -gt 0 ]]; then
              echo "" >> "$RISK_REPORT_PATH"
              echo "<details><summary>[WARN] Tag-only actions ($(sanitize_line "${#TAG_ONLY_LIST[@]}"))</summary>" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
              for item in "${TAG_ONLY_LIST[@]}"; do
                echo "- \`$(sanitize_line "$item")\`" >> "$RISK_REPORT_PATH"
              done
              echo "</details>" >> "$RISK_REPORT_PATH"
            fi

            if [[ ${#UNPINNED_LIST[@]} -gt 0 ]]; then
              echo "" >> "$RISK_REPORT_PATH"
              echo "<details><summary>[CRITICAL] Unpinned actions ($(sanitize_line "${#UNPINNED_LIST[@]}"))</summary>" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
              for item in "${UNPINNED_LIST[@]}"; do
                echo "- \`$(sanitize_line "$item")\`" >> "$RISK_REPORT_PATH"
              done
              echo "</details>" >> "$RISK_REPORT_PATH"
            fi
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "2. Dangerous Trigger Detection"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 2. Dangerous Trigger Detection" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"
          echo "Checks trigger patterns that can grant write access to untrusted code." >> "$RISK_REPORT_PATH"
          echo "\`pull_request_target\` is advisory unless it checks out PR head code." >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          DANGEROUS_COUNT=0

          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$wf")"

            if grep -qx 'pull_request_target' <<< "$trigger_names"; then
              if grep -q 'ref.*pull_request.*head' "$wf" 2>/dev/null; then
                DANGEROUS_COUNT=$((DANGEROUS_COUNT + 1))
                echo "[CRITICAL] \`$(sanitize_line "$wf_base")\` uses \`pull_request_target\` with PR head checkout" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
                echo "> Trivy-style supply chain attack vector: privileged workflow" >> "$RISK_REPORT_PATH"
                echo "> checks out untrusted PR code." >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              else
                echo "[INFO] \`$(sanitize_line "$wf_base")\` uses \`pull_request_target\` without PR head checkout" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              fi
            fi

            if grep -qx 'issue_comment' <<< "$trigger_names"; then
              DANGEROUS_COUNT=$((DANGEROUS_COUNT + 1))
              echo "[HIGH] \`$(sanitize_line "$wf_base")\` uses \`issue_comment\` trigger" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi

            if grep -qx 'workflow_run' <<< "$trigger_names"; then
              DANGEROUS_COUNT=$((DANGEROUS_COUNT + 1))
              echo "[MEDIUM] \`$(sanitize_line "$wf_base")\` uses \`workflow_run\` trigger" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi

            # C-2: Additional dangerous triggers
            if grep -qx 'repository_dispatch' <<< "$trigger_names"; then
              DANGEROUS_COUNT=$((DANGEROUS_COUNT + 1))
              echo "[HIGH] \`$(sanitize_line "$wf_base")\` uses \`repository_dispatch\` trigger" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
              echo "> External event source that can execute arbitrary workflow code." >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi

            for evt in create delete; do
              if grep -qx "$evt" <<< "$trigger_names"; then
                DANGEROUS_COUNT=$((DANGEROUS_COUNT + 1))
                echo "[MEDIUM] \`$(sanitize_line "$wf_base")\` uses \`$evt\` trigger" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              fi
            done

            if grep -qx 'workflow_call' <<< "$trigger_names"; then
              echo "[INFO] \`$(sanitize_line "$wf_base")\` accepts \`workflow_call\` (reusable workflow -- safe)" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          if [[ $DANGEROUS_COUNT -eq 0 ]]; then
            echo "[OK] No dangerous triggers detected" >> "$RISK_REPORT_PATH"
          else
            echo "" >> "$RISK_REPORT_PATH"
            echo "**Total dangerous triggers: $(sanitize_line "$DANGEROUS_COUNT")**" >> "$RISK_REPORT_PATH"
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "3. Credential Hygiene Audit"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 3. Credential Hygiene Audit" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          TOTAL_WF=0
          WF_WITH_BASH_ENV=0
          WF_WITH_CRED_CLEANUP=0
          WF_WITH_PERSIST_FALSE=0
          WF_MISSING_BASH_ENV=0
          WF_MISSING_CRED=0

          declare -a MISSING_ENV=()
          declare -a MISSING_CRED=()
          declare -a MISSING_PERSIST=()

          while IFS= read -r wf; do
            TOTAL_WF=$((TOTAL_WF + 1))
            wf_base=$(basename "$wf")

            # Determine if workflow uses bash without treating PowerShell-only
            # workflows with defaults.run.shell as missing BASH_ENV.
            HAS_BASH_STEPS="false"
            if grep -qE '^\s+shell:\s*bash\b' "$wf" 2>/dev/null; then
              HAS_BASH_STEPS="true"
            elif grep -qE '^\s+run:' "$wf" 2>/dev/null; then
              run_count=$(grep -cE '^\s+run:' "$wf" 2>/dev/null) || run_count=0
              pwsh_count=$(grep -cE '^\s+shell:\s*pwsh\b' "$wf" 2>/dev/null) || pwsh_count=0
              HAS_PWSH_DEFAULT="false"
              if awk '
                /^[[:space:]]*defaults:[[:space:]]*$/ { in_defaults=1; next }
                in_defaults && /^[[:space:]]*run:[[:space:]]*$/ { in_run=1; next }
                in_defaults && in_run && /^[[:space:]]*shell:[[:space:]]*pwsh([[:space:]]|$)/ { found=1 }
                END { exit(found ? 0 : 1) }
              ' "$wf"; then
                HAS_PWSH_DEFAULT="true"
              fi

              if [[ "$pwsh_count" -ge "$run_count" ]] && [[ "$pwsh_count" -gt 0 ]]; then
                HAS_BASH_STEPS="false"
              elif [[ "$HAS_PWSH_DEFAULT" == "true" ]]; then
                HAS_BASH_STEPS="false"
              else
                HAS_BASH_STEPS="true"
              fi
            fi

            if [[ "$HAS_BASH_STEPS" == "true" ]]; then
              if grep -q 'BASH_ENV.*dev.null\|BASH_ENV:.*dev.null' "$wf"; then
                WF_WITH_BASH_ENV=$((WF_WITH_BASH_ENV + 1))
              else
                WF_MISSING_BASH_ENV=$((WF_MISSING_BASH_ENV + 1))
                MISSING_ENV+=("$wf_base")
              fi
            else
              # PowerShell-only workflow -- BASH_ENV not applicable
              WF_WITH_BASH_ENV=$((WF_WITH_BASH_ENV + 1))
            fi

            if [[ "$HAS_BASH_STEPS" == "true" ]]; then
              if grep -q 'credential.helper' "$wf"; then
                WF_WITH_CRED_CLEANUP=$((WF_WITH_CRED_CLEANUP + 1))
              else
                WF_MISSING_CRED=$((WF_MISSING_CRED + 1))
                MISSING_CRED+=("$wf_base")
              fi
            else
              # PowerShell-only -- credential.helper is bash-specific
              WF_WITH_CRED_CLEANUP=$((WF_WITH_CRED_CLEANUP + 1))
            fi

            if grep -q 'persist-credentials.*false' "$wf"; then
              WF_WITH_PERSIST_FALSE=$((WF_WITH_PERSIST_FALSE + 1))
            elif grep -qE 'uses:.*actions/checkout' "$wf"; then
              # Only flag if the workflow actually has a checkout step
              MISSING_PERSIST+=("$wf_base")
            else
              # No checkout step -- persist-credentials is not applicable
              WF_WITH_PERSIST_FALSE=$((WF_WITH_PERSIST_FALSE + 1))
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          echo "| Check | Compliant | Non-compliant |" >> "$RISK_REPORT_PATH"
          echo "|-------|-----------|---------------|" >> "$RISK_REPORT_PATH"
          echo "| BASH_ENV=/dev/null | $(sanitize_line "$WF_WITH_BASH_ENV") | $(sanitize_line "$WF_MISSING_BASH_ENV") |" >> "$RISK_REPORT_PATH"
          echo "| credential.helper cleanup | $(sanitize_line "$WF_WITH_CRED_CLEANUP") | $(sanitize_line "$WF_MISSING_CRED") |" >> "$RISK_REPORT_PATH"
          echo "| persist-credentials: false | $(sanitize_line "$WF_WITH_PERSIST_FALSE") | $(sanitize_line "$((TOTAL_WF - WF_WITH_PERSIST_FALSE))") |" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          if [[ ${#MISSING_ENV[@]} -gt 0 ]]; then
            echo "<details><summary>[HIGH] Missing BASH_ENV=/dev/null ($(sanitize_line "${#MISSING_ENV[@]}"))</summary>" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            for item in "${MISSING_ENV[@]}"; do
              echo "- \`$(sanitize_line "$item")\`" >> "$RISK_REPORT_PATH"
            done
            echo "</details>" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          if [[ ${#MISSING_PERSIST[@]} -gt 0 ]]; then
            echo "<details><summary>[MEDIUM] Missing persist-credentials: false ($(sanitize_line "${#MISSING_PERSIST[@]}"))</summary>" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            for item in "${MISSING_PERSIST[@]}"; do
              echo "- \`$(sanitize_line "$item")\`" >> "$RISK_REPORT_PATH"
            done
            echo "</details>" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

      - name: "4. Shell Hardening Audit"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 4. Shell Hardening Audit" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          TOTAL_STEPS=0
          HARDENED_STEPS=0
          PWSH_HARDENED=0
          UNHARDENED=0

          declare -a UNHARDENED_LIST=()

          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            in_run_block=false
            has_pipefail=false
            has_erroraction=false
            run_indent_len=0
            block_start_line=0
            line_num=0

            while IFS= read -r line; do
              line_num=$((line_num + 1))

              if grep -qE '^\s+run:\s*\|' <<< "$line"; then
                # Finalize previous block if still open
                if $in_run_block; then
                  if $has_pipefail; then
                    HARDENED_STEPS=$((HARDENED_STEPS + 1))
                  elif $has_erroraction; then
                    PWSH_HARDENED=$((PWSH_HARDENED + 1))
                  else
                    UNHARDENED=$((UNHARDENED + 1))
                    UNHARDENED_LIST+=("$wf_base:$block_start_line")
                  fi
                fi
                in_run_block=true
                has_pipefail=false
                has_erroraction=false
                TOTAL_STEPS=$((TOTAL_STEPS + 1))
                block_start_line=$line_num
                run_indent="${line%%[![:space:]]*}"
                run_indent_len=${#run_indent}
                continue
              fi

              if $in_run_block; then
                # Non-blank line with indent <= run: level ends the block
                if [[ "$line" =~ [^[:space:]] ]]; then
                  cur_indent="${line%%[![:space:]]*}"
                  cur_indent_len=${#cur_indent}
                  if [[ $cur_indent_len -le $run_indent_len ]]; then
                    if $has_pipefail; then
                      HARDENED_STEPS=$((HARDENED_STEPS + 1))
                    elif $has_erroraction; then
                      PWSH_HARDENED=$((PWSH_HARDENED + 1))
                    else
                      UNHARDENED=$((UNHARDENED + 1))
                      UNHARDENED_LIST+=("$wf_base:$block_start_line")
                    fi
                    in_run_block=false
                  fi
                fi
                if $in_run_block && grep -q 'set -euo pipefail\|set -euxo pipefail' <<< "$line"; then
                  has_pipefail=true
                fi
                if $in_run_block && grep -q 'ErrorActionPreference' <<< "$line"; then
                  has_erroraction=true
                fi
              fi
            done < "$wf"

            if $in_run_block; then
              if $has_pipefail; then
                HARDENED_STEPS=$((HARDENED_STEPS + 1))
              elif $has_erroraction; then
                PWSH_HARDENED=$((PWSH_HARDENED + 1))
              else
                UNHARDENED=$((UNHARDENED + 1))
              fi
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          COMBINED_HARDENED=$((HARDENED_STEPS + PWSH_HARDENED))

          # H-2: Detect shell: sh usage (should use bash for proper hardening)
          SH_COUNT=$({ grep -rn -E '^\s+shell:\s+sh\s*$' .github/workflows/ 2>/dev/null || true; } | wc -l)

          # H-7: Detect defaults.run.shell at job level
          DEFAULTS_SHELL=0
          while IFS= read -r wf; do
            cnt=$(awk '
              /^\s+defaults:/ { in_def=1; next }
              in_def && /^\s+run:/ { in_run=1; next }
              in_def && in_run && /shell:/ { c++; in_def=0; in_run=0 }
              /^[^ ]/ { in_def=0; in_run=0 }
              END { print c+0 }
            ' "$wf")
            DEFAULTS_SHELL=$((DEFAULTS_SHELL + cnt))
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          if [[ $TOTAL_STEPS -gt 0 ]]; then
            COMBINED_PCT=$((COMBINED_HARDENED * 100 / TOTAL_STEPS))
            echo "| Metric | Count |" >> "$RISK_REPORT_PATH"
            echo "|--------|-------|" >> "$RISK_REPORT_PATH"
            echo "| Total run: blocks | $(sanitize_line "$TOTAL_STEPS") |" >> "$RISK_REPORT_PATH"
            echo "| Bash: set -euo pipefail | $(sanitize_line "$HARDENED_STEPS") |" >> "$RISK_REPORT_PATH"
            echo "| PowerShell: ErrorActionPreference | $(sanitize_line "$PWSH_HARDENED") |" >> "$RISK_REPORT_PATH"
            echo "| Combined hardened | $(sanitize_line "$COMBINED_HARDENED") ($(sanitize_line "$COMBINED_PCT")%) |" >> "$RISK_REPORT_PATH"
            echo "| Missing hardening | $(sanitize_line "$UNHARDENED") |" >> "$RISK_REPORT_PATH"
            if [[ $DEFAULTS_SHELL -gt 0 ]]; then
              echo "| Job-level defaults.run.shell | $(sanitize_line "$DEFAULTS_SHELL") |" >> "$RISK_REPORT_PATH"
            fi
          else
            echo "No run: blocks found" >> "$RISK_REPORT_PATH"
          fi

          if [[ $SH_COUNT -gt 0 ]]; then
            echo "" >> "$RISK_REPORT_PATH"
            echo "[WARN] $(sanitize_line "$SH_COUNT") step(s) use \`shell: sh\` -- prefer \`bash --noprofile --norc {0}\` for proper hardening" >> "$RISK_REPORT_PATH"
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "5. Matrix Expression Injection Scan"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2001,SC2016,SC2034,SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 5. Matrix Expression Injection Scan" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"
          echo "Detects unsafe matrix/github/inputs expressions in \`run:\` blocks." >> "$RISK_REPORT_PATH"
          echo "These are injectable via PR titles, branch names, or workflow inputs." >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          INJECTION_COUNT=0
          declare -a INJECTION_LIST=()

          while IFS= read -r wf; do
            wf_base=$(basename "$wf")

            # Use awk to find expressions only inside run: blocks (indentation-aware)
            while IFS= read -r match; do
              INJECTION_COUNT=$((INJECTION_COUNT + 1))
              INJECTION_LIST+=("$wf_base: $match")
            done < <(awk '
              /^[[:space:]]*run:[[:space:]]*\|/ {
                in_run = 1
                match($0, /^[[:space:]]*/); run_indent = RLENGTH
                next
              }
              in_run {
                match($0, /^[[:space:]]*/); cur = RLENGTH
                if ($0 !~ /^[[:space:]]*$/ && cur <= run_indent) { in_run = 0 }
              }
              in_run && /\$\{\{/ {
                if (/\$\{\{[^}]* matrix\./ || /\$\{\{ *matrix\./ || /github\.event\.(issue|pull_request|discussion)\.(title|body)/ || /github\.event\.(comment|review|review_comment)\.body/ || /github\.event\.pages/ || /github\.event\.commits/ || /github\.head_ref/ || /inputs\./) {
                  # Exclude safe contexts: needs.*.result contains "matrix." as substring
                  if (/needs\.[a-zA-Z0-9_-]*\.result/) next
                  gsub(/^[[:space:]]+/, "")
                  print
                }
              }
            ' "$wf")
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          if [[ $INJECTION_COUNT -eq 0 ]]; then
            echo "[OK] No injectable expressions detected in run: blocks" >> "$RISK_REPORT_PATH"
          else
            echo "[CRITICAL] Found $(sanitize_line "$INJECTION_COUNT") injectable expression(s):" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            echo '```' >> "$RISK_REPORT_PATH"
            for item in "${INJECTION_LIST[@]}"; do
              sanitize_line "$item" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            done
            echo '```' >> "$RISK_REPORT_PATH"
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "6. Output Sanitization Audit"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 6. Output Sanitization Audit" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          SUMMARY_WRITES=0
          SANITIZED_WRITES=0
          UNSANITIZED_WRITES=0

          declare -a UNSANITIZED_LIST=()
          declare -a UNSANITIZED_CONTENT=()

          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            line_num=0

            while IFS= read -r line; do
              line_num=$((line_num + 1))

              # Strip single-quoted content first (regex patterns, not actual writes)
              write_check=$(sed "s/'[^']*'//g" <<< "$line")
              # Only match actual writes to summary/output env files.
              if ! grep -qE '>>.*GITHUB_(STEP_SUMMARY|OUTPUT)|Out-File.*GITHUB_(STEP_SUMMARY|OUTPUT)' <<< "$write_check"; then
                continue
              fi

              # Extract the content before the redirect/pipe target
              content_part=$(sed -E 's/>>.*GITHUB_(STEP_SUMMARY|OUTPUT).*//' <<< "$line")
              content_part=$(sed -E 's/\|[[:space:]]*Out-File.*GITHUB_(STEP_SUMMARY|OUTPUT).*//' <<< "$content_part")

              # Strip single-quoted content (no interpolation in bash single quotes)
              content_stripped=$(sed "s/'[^']*'//g" <<< "$content_part")

              # Strip the redirect variable reference itself
              content_stripped="${content_stripped//\$GITHUB_STEP_SUMMARY/}"
              content_stripped="${content_stripped//\$env:GITHUB_STEP_SUMMARY/}"
              content_stripped="${content_stripped//\$GITHUB_OUTPUT/}"
              content_stripped="${content_stripped//\$env:GITHUB_OUTPUT/}"

              # Skip static-only writes (no variables or command substitution)
              if ! grep -qE '\$[a-zA-Z_{(]|\$\(' <<< "$content_stripped"; then
                continue
              fi

              SUMMARY_WRITES=$((SUMMARY_WRITES + 1))

              # Classify the write
              classification=""

              # Check if any sanitizer function is used on this line
              if grep -qE 'sanitize_line|sanitize_print|sanitize_codeblock|sanitize_ref|sanitize_filename|escape_html|Sanitize-Line|Sanitize-Print|Safe-EchoForSummary|Escape-Html|elements-sanitized' <<< "$line"; then
                SANITIZED_WRITES=$((SANITIZED_WRITES + 1))
                classification="sanitizer-function"
              # Recognize pre-sanitized variable naming conventions
              elif grep -qiE '\$SANITIZED_|\$safe_|\$_SAFE|\$SAFE_' <<< "$content_stripped"; then
                SANITIZED_WRITES=$((SANITIZED_WRITES + 1))
                classification="safe-variable-name"
              # Tool version/sysinfo output (workflow-controlled, not user input)
              elif grep -qE '\$\([a-z_-]+\s+--|\$\((nproc|arch|uname|hostname|date|whoami|id)\)' <<< "$content_stripped"; then
                SANITIZED_WRITES=$((SANITIZED_WRITES + 1))
                classification="sysinfo-command"
              # Env-block variables from matrix/context expressions (already intermediary'd)
              elif grep -qE '\$\{?(MATRIX_|CC|CXX|LINT_|GH_|BUILD_)' <<< "$content_stripped"; then
                SANITIZED_WRITES=$((SANITIZED_WRITES + 1))
                classification="env-intermediary"
              # Workflow-controlled counters and loop variables (from awk/grep/find, not user input)
              elif grep -qE '\$\{?(cnt|count|warns|errs|files|category|component|chk|fname|cpp_|ct_|sec_|tool|comp|pr|status|GRAND_)' <<< "$content_stripped"; then
                SANITIZED_WRITES=$((SANITIZED_WRITES + 1))
                classification="workflow-counter"
              else
                UNSANITIZED_WRITES=$((UNSANITIZED_WRITES + 1))
                UNSANITIZED_LIST+=("${wf_base}:${line_num}")
                # Capture trimmed content (first 120 chars) for precise reporting
                trimmed=""
                trimmed=$(echo "$line" | sed 's/^[[:space:]]*//' | cut -c1-120)
                UNSANITIZED_CONTENT+=("$trimmed")
              fi
            done < "$wf"
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)

          echo "| Metric | Count |" >> "$RISK_REPORT_PATH"
          echo "|--------|-------|" >> "$RISK_REPORT_PATH"
          echo "| Total GITHUB_STEP_SUMMARY/GITHUB_OUTPUT writes | $(sanitize_line "$SUMMARY_WRITES") |" >> "$RISK_REPORT_PATH"
          echo "| Via sanitizer function | $(sanitize_line "$SANITIZED_WRITES") |" >> "$RISK_REPORT_PATH"
          echo "| Direct/unsanitized | $(sanitize_line "$UNSANITIZED_WRITES") |" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          if [[ ${#UNSANITIZED_LIST[@]} -gt 0 && ${#UNSANITIZED_LIST[@]} -le 30 ]]; then
            echo "**Unsanitized writes ($(sanitize_line "${#UNSANITIZED_LIST[@]}")):**" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            echo "| File | Line | Content |" >> "$RISK_REPORT_PATH"
            echo "|------|------|---------|" >> "$RISK_REPORT_PATH"
            for idx in "${!UNSANITIZED_LIST[@]}"; do
              loc="${UNSANITIZED_LIST[$idx]}"
              content="${UNSANITIZED_CONTENT[$idx]:-}"
              file_part="${loc%%:*}"
              line_part="${loc##*:}"
              echo "| \`$(sanitize_line "$file_part")\` | $(sanitize_line "$line_part") | \`$(sanitize_line "$content")\` |" >> "$RISK_REPORT_PATH"
            done
            echo "" >> "$RISK_REPORT_PATH"
          elif [[ ${#UNSANITIZED_LIST[@]} -gt 30 ]]; then
            echo "**$(sanitize_line "${#UNSANITIZED_LIST[@]}") unsanitized writes found (too many to list)**" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

      - name: "7. Permissions Minimization Audit"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          # shellcheck shell=bash
          # shellcheck disable=SC2129
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          python3 "$TRUSTED_SCRIPTS/audit-workflow-permissions.py" \
            --workflows-dir .github/workflows \
            --format markdown >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          # H-4: id-token: write audit (cross-reference with dangerous triggers)
          ID_TOKEN_WRITE=0
          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            if grep -qE '^\s+id-token:\s*write' "$wf"; then
              ID_TOKEN_WRITE=$((ID_TOKEN_WRITE + 1))
              trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$wf")"
              if grep -qE '^(pull_request_target|workflow_run|repository_dispatch)$' <<< "$trigger_names"; then
                echo "[CRITICAL] \`$(sanitize_line "$wf_base")\` has \`id-token: write\` with dangerous trigger" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              fi
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $ID_TOKEN_WRITE -gt 0 ]]; then
            echo "**id-token: write found in $(sanitize_line "$ID_TOKEN_WRITE") workflow(s)**" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # H-5: privileged workflow_dispatch publish jobs must be master/environment gated.
          PUBLISH_GATE_GAPS=0
          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$wf")"
            if ! grep -qx 'workflow_dispatch' <<< "$trigger_names"; then
              continue
            fi
            if ! grep -qE '^\s+(contents|packages|attestations|artifact-metadata|id-token):\s*write' "$wf"; then
              continue
            fi
            has_master_gate=false
            has_environment=false
            if grep -q "github.ref == 'refs/heads/master'" "$wf"; then
              has_master_gate=true
            fi
            if grep -qE '^\s+environment:' "$wf"; then
              has_environment=true
            fi
            if [[ "$has_master_gate" != "true" || "$has_environment" != "true" ]]; then
              PUBLISH_GATE_GAPS=$((PUBLISH_GATE_GAPS + 1))
              echo "[HIGH] \`$(sanitize_line "$wf_base")\` has privileged workflow_dispatch publish permissions without both master ref and environment gates" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $PUBLISH_GATE_GAPS -eq 0 ]]; then
            echo "[OK] Privileged workflow_dispatch publish jobs are master/environment gated" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # H-6: privileged cache boundaries must not mix PR/release cache namespaces.
          CACHE_BOUNDARY_GAPS=0
          while IFS= read -r wf; do
            wf_base=$(basename "$wf")
            has_write=false
            if grep -qE '^\s+(contents|packages|attestations|artifact-metadata|id-token):\s*write' "$wf"; then
              has_write=true
            fi
            if [[ "$has_write" == "true" ]] && grep -qE 'cache-to:\s*type=gha|restore-keys:' "$wf"; then
              if ! grep -q "github.ref == 'refs/heads/master'" "$wf"; then
                CACHE_BOUNDARY_GAPS=$((CACHE_BOUNDARY_GAPS + 1))
                echo "[HIGH] \`$(sanitize_line "$wf_base")\` combines write credentials with GHA cache usage without a master-only gate" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              fi
            fi
            if [[ "$wf_base" == "ci-latest-release.yml" ]] && grep -q 'restore-keys:' "$wf"; then
              CACHE_BOUNDARY_GAPS=$((CACHE_BOUNDARY_GAPS + 1))
              echo "[HIGH] \`$(sanitize_line "$wf_base")\` release workflow uses broad cache restore keys" >> "$RISK_REPORT_PATH"
              echo "" >> "$RISK_REPORT_PATH"
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $CACHE_BOUNDARY_GAPS -eq 0 ]]; then
            echo "[OK] Privileged cache boundaries are isolated from PR/release namespace mixing" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # H-6: CODEOWNERS coverage check for workflow directory
          if [[ -f .github/CODEOWNERS ]]; then
            if grep -qE '\.github/(workflows|actions|\*\*)' .github/CODEOWNERS; then
              echo "[OK] CODEOWNERS covers .github/workflows/ directory" >> "$RISK_REPORT_PATH"
            else
              echo "[WARN] CODEOWNERS exists but does not cover .github/workflows/" >> "$RISK_REPORT_PATH"
            fi
          else
            echo "[WARN] No .github/CODEOWNERS file -- workflow changes are unprotected" >> "$RISK_REPORT_PATH"
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "8. Supply-Chain Risk Score"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 8. Supply-Chain Risk Score" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"
          echo "Composite risk assessment based on TanStack, Trivy, cache-isolation, and OIDC compromise indicators." >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          RISK_SCORE=0
          RISK_ITEMS=()
          ADVISORY_ITEMS=()

          # Check 1: pull_request_target (on: section only)
          PRT_COUNT=0
          while IFS= read -r f; do
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$f")"
            if grep -qx 'pull_request_target' <<< "$trigger_names"; then
              PRT_COUNT=$((PRT_COUNT + 1))
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $PRT_COUNT -gt 0 ]]; then
            ADVISORY_ITEMS+=("$PRT_COUNT workflow(s) use pull_request_target for privileged automation")
          fi

          # Check 2: Unpinned actions (skip run: block content)
          UNPIN_COUNT=0
          while IFS= read -r f; do
            cnt=$(awk '
              /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; match($0,/^[[:space:]]*/); ri=RLENGTH; next }
              in_run { match($0,/^[[:space:]]*/); if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= ri) in_run=0 }
              !in_run && /[[:space:]]uses:[[:space:]]/ && !/^[[:space:]]*#/ && !/@[0-9a-f]{40}/ && !/docker:\/\// && !/\.\/\.github\/workflows\// { c++ }
              END { print c+0 }
            ' "$f")
            UNPIN_COUNT=$((UNPIN_COUNT + cnt))
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $UNPIN_COUNT -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + UNPIN_COUNT * 5))
            RISK_ITEMS+=("$UNPIN_COUNT unpinned action reference(s) (+$((UNPIN_COUNT * 5)))")
          fi

          # Check 3: Missing permissions and explicit write permissions.
          # This accounts for workflow-level and job-level permissions blocks.
          NOPERM_COUNT=0
          WRITE_WF_COUNT=0
          WRITE_BLOCK_COUNT=0
          while IFS='=' read -r key value; do
            case "$key" in
              WF_NO_PERMS) NOPERM_COUNT="$value" ;;
              WF_WITH_WRITE) WRITE_WF_COUNT="$value" ;;
              WF_WRITE_BLOCKS) WRITE_BLOCK_COUNT="$value" ;;
            esac
          done < <(python3 "$TRUSTED_SCRIPTS/audit-workflow-permissions.py" \
            --workflows-dir .github/workflows \
            --format shell)

          if [[ $NOPERM_COUNT -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + NOPERM_COUNT * 3))
            RISK_ITEMS+=("$NOPERM_COUNT workflow(s) without permissions block (+$((NOPERM_COUNT * 3)))")
          fi
          if [[ $WRITE_WF_COUNT -gt 0 ]]; then
            ADVISORY_ITEMS+=("$WRITE_WF_COUNT workflow(s) grant write permissions across $WRITE_BLOCK_COUNT permissions block(s)")
          fi

          # Check 4: shell=true or shell: bash (without noprofile)
          # Exclude comments and the scanner file itself
          # Match only YAML shell: key (not matrix vars like run_shell:)
          NOPROFILE_MISSING=$({ grep -rn -E '^\s+shell:\s+bash\s*$' .github/workflows/ 2>/dev/null \
            | grep -v '#.*shell: bash' \
            | grep -v 'ci-pr-risk-security-analysis' \
            || true; } | cut -d: -f1 | sort -u | wc -l)
          if [[ $NOPROFILE_MISSING -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + NOPROFILE_MISSING * 2))
            RISK_ITEMS+=("$NOPROFILE_MISSING workflow(s) use \`shell: bash\` without --noprofile (+$((NOPROFILE_MISSING * 2)))")
          fi

          # Check 5: GITHUB_TOKEN in run blocks (exclude credential cleanup and env blocks)
          # Uses indent-based block detection: run: | starts at indent N,
          # block ends when a non-blank line has indent <= N
          TOKEN_IN_RUN=0
          while IFS= read -r f; do
            # Skip the scanner itself
            if grep -qF 'ci-pr-risk-security-analysis' <<< "$(basename "$f")"; then continue; fi
            cnt=$(awk '
              /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; match($0,/^[[:space:]]*/); ri=RLENGTH; next }
              in_run { match($0,/^[[:space:]]*/); if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= ri) in_run=0 }
              in_run && /GITHUB_TOKEN/ && !/unset GITHUB_TOKEN/ && !/credential.helper/ && !/Remove-Item/ && !/Test-Path/ && !/'GITHUB_TOKEN'/ { c++ }
              END { print c+0 }
            ' "$f")
            TOKEN_IN_RUN=$((TOKEN_IN_RUN + cnt))
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $TOKEN_IN_RUN -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + TOKEN_IN_RUN * 5))
            RISK_ITEMS+=("$TOKEN_IN_RUN GITHUB_TOKEN reference(s) in run: blocks (+$((TOKEN_IN_RUN * 5)))")
          fi

          # Check 6: secrets in env blocks
          SECRETS_COUNT=$({ grep -rn 'secrets\.' .github/workflows/ 2>/dev/null || true; } | { grep -vE ':[0-9]+:\s*#' || true; } | wc -l)
          if [[ $SECRETS_COUNT -gt 0 ]]; then
            ADVISORY_ITEMS+=("$SECRETS_COUNT secret reference(s) found")
          fi

          # Check 7: Expression injection in run: blocks (H-1, +10 each)
          EXPR_INJECT=0
          while IFS= read -r f; do
            f_base=$(basename "$f")
            [[ "$f_base" == *"ci-pr-risk-security-analysis"* ]] && continue
            cnt=$(awk '
              /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; match($0,/^[[:space:]]*/); ri=RLENGTH; next }
              in_run { match($0,/^[[:space:]]*/); if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= ri) in_run=0 }
              in_run && /\$\{\{/ {
                if (/matrix\./ || /github\.event\.(issue|pull_request|discussion)\.(title|body)/ || /github\.event\.(comment|review|review_comment)\.body/ || /github\.event\.pages/ || /github\.event\.commits/ || /github\.head_ref/ || /inputs\./) {
                  c++
                }
              }
              END { print c+0 }
            ' "$f")
            EXPR_INJECT=$((EXPR_INJECT + cnt))
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $EXPR_INJECT -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + EXPR_INJECT * 10))
            RISK_ITEMS+=("$EXPR_INJECT expression injection(s) in run: blocks (+$((EXPR_INJECT * 10)))")
          fi

          # Check 8: Artifact poisoning -- workflow_run + download-artifact (M-5, +15)
          ARTIFACT_POISON=0
          while IFS= read -r f; do
            f_base=$(basename "$f")
            [[ "$f_base" == *"ci-pr-risk-security-analysis"* ]] && continue
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$f")"
            if grep -qx 'workflow_run' <<< "$trigger_names"; then
              if grep -q 'download-artifact' "$f" 2>/dev/null; then
                ARTIFACT_POISON=$((ARTIFACT_POISON + 1))
              fi
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $ARTIFACT_POISON -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + ARTIFACT_POISON * 15))
            RISK_ITEMS+=("$ARTIFACT_POISON workflow_run + download-artifact pattern(s) (+$((ARTIFACT_POISON * 15)))")
          fi

          # Check 9: Cache key injection -- only flag attacker-controllable github.head_ref (+10)
          CACHE_INJECT=0
          while IFS= read -r f; do
            f_base=$(basename "$f")
            [[ "$f_base" == *"ci-pr-risk-security-analysis"* ]] && continue
            if grep -qE 'key:.*\$\{\{.*github\.head_ref' "$f" 2>/dev/null; then
              CACHE_INJECT=$((CACHE_INJECT + 1))
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $CACHE_INJECT -gt 0 ]]; then
            RISK_SCORE=$((RISK_SCORE + CACHE_INJECT * 10))
            RISK_ITEMS+=("$CACHE_INJECT cache key injection pattern(s) (+$((CACHE_INJECT * 10)))")
          fi

          # Check 10: Dependabot configuration (C-5, +5 if missing)
          if [[ ! -f .github/dependabot.yml && ! -f .github/dependabot.yaml ]]; then
            RISK_SCORE=$((RISK_SCORE + 5))
            RISK_ITEMS+=("No .github/dependabot.yml found (+5)")
          else
            if ! grep -q 'github-actions' .github/dependabot.yml 2>/dev/null && \
               ! grep -q 'github-actions' .github/dependabot.yaml 2>/dev/null; then
              RISK_SCORE=$((RISK_SCORE + 3))
              RISK_ITEMS+=("Dependabot does not cover github-actions ecosystem (+3)")
            fi
          fi

          # Risk level classification
          if [[ $RISK_SCORE -eq 0 ]]; then
            RISK_LEVEL="None Identified"
            RISK_EMOJI="[OK]"
          elif [[ $RISK_SCORE -le 10 ]]; then
            RISK_LEVEL="LOW"
            RISK_EMOJI="[OK]"
          elif [[ $RISK_SCORE -le 30 ]]; then
            RISK_LEVEL="MEDIUM"
            RISK_EMOJI="[WARN]"
          elif [[ $RISK_SCORE -le 60 ]]; then
            RISK_LEVEL="HIGH"
            RISK_EMOJI="[WARN]"
          else
            RISK_LEVEL="CRITICAL"
            RISK_EMOJI="[CRITICAL]"
          fi

          echo "### $(sanitize_line "$RISK_EMOJI") Supply-Chain Risk: $(sanitize_line "$RISK_LEVEL") (Score: $(sanitize_line "$RISK_SCORE"))" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"
          echo "Composite score excludes approved privileged automation. The enforcement gate fails only objective blocking findings." >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          if [[ ${#RISK_ITEMS[@]} -gt 0 ]]; then
            echo "| Finding | Impact |" >> "$RISK_REPORT_PATH"
            echo "|---------|--------|" >> "$RISK_REPORT_PATH"
            for item in "${RISK_ITEMS[@]}"; do
              echo "| $(sanitize_line "$item") |  |" >> "$RISK_REPORT_PATH"
            done
          else
            echo "No risk indicators detected." >> "$RISK_REPORT_PATH"
          fi
          if [[ ${#ADVISORY_ITEMS[@]} -gt 0 ]]; then
            echo "" >> "$RISK_REPORT_PATH"
            echo "### Privileged Automation Inventory (Advisory)" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            echo "| Advisory | Detail |" >> "$RISK_REPORT_PATH"
            echo "|----------|--------|" >> "$RISK_REPORT_PATH"
            for item in "${ADVISORY_ITEMS[@]}"; do
              echo "| $(sanitize_line "$item") | Review trust boundary and least privilege |" >> "$RISK_REPORT_PATH"
            done
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "9. Trivy-Specific Indicator Check"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          echo "## 9. Trivy-Specific Indicator Check" >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"
          echo "Checks for patterns matching the Trivy supply-chain attack (March 2026):" >> "$RISK_REPORT_PATH"
          echo "credential exfiltration, tag rewriting, pull_request_target abuse." >> "$RISK_REPORT_PATH"
          echo "" >> "$RISK_REPORT_PATH"

          TRIVY_INDICATORS=0
          # In workflow_call runs, GITHUB_WORKFLOW_REF can identify the caller.
          # Always exclude this scanner workflow, not the calling workflow.
          SELF_WF="ci-pr-risk-security-analysis.yml"
          SELF_WF_RE='(^|/)ci-pr-risk-security-analysis\.ya?ml:'

          # Pattern 1: curl/wget piped to shell in workflows (exclude self)
          EXT_CALLS=$({ grep -rnE 'curl.*\|[[:space:]]*(ba)?sh|wget.*\|[[:space:]]*(ba)?sh' .github/workflows/ 2>/dev/null || true; } | { grep -vE "$SELF_WF_RE" || true; } | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $EXT_CALLS -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[CRITICAL] $(sanitize_line "$EXT_CALLS") curl/wget|bash pipe(s) in workflows (remote code execution vector)" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # Pattern 2: Base64 encoding (common obfuscation, exclude self)
          B64_CALLS=$({ grep -rnE 'base64|b64encode|btoa' .github/workflows/ 2>/dev/null || true; } | { grep -vE "$SELF_WF_RE" || true; } | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $B64_CALLS -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[WARN] $(sanitize_line "$B64_CALLS") base64 encoding reference(s) detected (check for credential obfuscation)" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # Pattern 3: Environment variable dumping (exclude self)
          ENV_DUMP=$({ grep -rnE 'printenv|echo.*SECRET|echo.*TOKEN' .github/workflows/ 2>/dev/null || true; } | { grep -vE "$SELF_WF_RE" || true; } | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | { grep -v 'BASH_ENV' || true; } | { grep -v 'GITHUB_ENV' || true; } | wc -l)
          if [[ $ENV_DUMP -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[WARN] $(sanitize_line "$ENV_DUMP") environment dump pattern(s) detected" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # Pattern 4a: git force-push / tag rewriting (actual Trivy attack vector)
          GIT_FORCE=$({ grep -rnE 'git[[:space:]]+(push[[:space:]]+--force|push[[:space:]]+-f|tag[[:space:]]+-f|tag[[:space:]]+-d)' .github/workflows/ 2>/dev/null || true; } | { grep -vE "$SELF_WF_RE" || true; } | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $GIT_FORCE -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[HIGH] $(sanitize_line "$GIT_FORCE") git force-push/tag-rewrite pattern(s) detected" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # Pattern 4b: Regular git push (auto-commit pattern, informational)
          GIT_PUSH=$({ grep -rnE 'git[[:space:]]+push' .github/workflows/ 2>/dev/null || true; } | { grep -vE "$SELF_WF_RE" || true; } | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | { grep -vE '\-\-force|[[:space:]]-f([[:space:]]|$)' || true; } | wc -l)
          if [[ $GIT_PUSH -gt 0 ]]; then
            echo "[INFO] $(sanitize_line "$GIT_PUSH") git push pattern(s) detected (auto-commit, verify workflow_dispatch-only triggers)" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # Pattern 5: pull_request_target trigger + PR head checkout (on: section only, exclude self)
          PR_CHECKOUT=0
          while IFS= read -r f; do
            f_base=$(basename "$f")
            [[ "$f_base" == "$SELF_WF" ]] && continue
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$f")"
            if grep -qx 'pull_request_target' <<< "$trigger_names"; then
              if grep -q 'ref.*pull_request.*head' "$f" 2>/dev/null; then
                PR_CHECKOUT=$((PR_CHECKOUT + 1))
              fi
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $PR_CHECKOUT -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[CRITICAL] $(sanitize_line "$PR_CHECKOUT") workflow(s) checkout PR head code with elevated permissions" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # C-3: Artifact poisoning -- workflow_run + download-artifact (Nx attack pattern)
          ART_POISON=0
          while IFS= read -r f; do
            f_base=$(basename "$f")
            [[ "$f_base" == "$SELF_WF" ]] && continue
            trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$f")"
            if grep -qx 'workflow_run' <<< "$trigger_names"; then
              if grep -q 'download-artifact' "$f" 2>/dev/null; then
                ART_POISON=$((ART_POISON + 1))
                echo "[HIGH] \`$(sanitize_line "$f_base")\` uses workflow_run + download-artifact (artifact poisoning vector)" >> "$RISK_REPORT_PATH"
                echo "" >> "$RISK_REPORT_PATH"
              fi
            fi
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [[ $ART_POISON -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + ART_POISON))
          fi

          # C-3b: Artifact name injection (attacker-controllable artifact names)
          # Only flag github.head_ref and PR/issue title/body (attacker-controlled)
          # Exclude inputs.* (reusable workflow / workflow_dispatch -- collaborator-controlled)
          ART_NAME_INJECT=$({ grep -rnE 'name:.*\$\{\{.*(github\.head_ref|github\.event\.(issue|pull_request)\.(title|body))' .github/workflows/ 2>/dev/null || true; } \
            | { grep -vE "$SELF_WF_RE" || true; } \
            | { grep -i 'artifact' || true; } | wc -l)
          if [[ $ART_NAME_INJECT -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[MEDIUM] $(sanitize_line "$ART_NAME_INJECT") artifact name(s) use attacker-controllable expressions" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # C-4: Cache key injection (attacker-controllable cache keys)
          # github.head_ref is PR-author-controlled (real injection risk)
          CACHE_KEY_HIGH=$({ grep -rnE 'key:.*\$\{\{.*github\.head_ref' .github/workflows/ 2>/dev/null || true; } \
            | { grep -vE "$SELF_WF_RE" || true; } \
            | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $CACHE_KEY_HIGH -gt 0 ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[MEDIUM] $(sanitize_line "$CACHE_KEY_HIGH") cache key(s) use attacker-controllable github.head_ref" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # github.event.inputs.* and inputs.* require repo write access (informational)
          CACHE_KEY_INFO=$({ grep -rnE 'key:.*\$\{\{.*(github\.event\.inputs|inputs\.)' .github/workflows/ 2>/dev/null || true; } \
            | { grep -vE "$SELF_WF_RE" || true; } \
            | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $CACHE_KEY_INFO -gt 0 ]]; then
            echo "[INFO] $(sanitize_line "$CACHE_KEY_INFO") cache key(s) use workflow input expressions (collaborator-controlled)" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # C-5: Dependabot configuration audit
          if [[ ! -f .github/dependabot.yml && ! -f .github/dependabot.yaml ]]; then
            TRIVY_INDICATORS=$((TRIVY_INDICATORS + 1))
            echo "[MEDIUM] No .github/dependabot.yml -- automated dependency updates not configured" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          # C-6: Package install lifecycle audit. Advisory only: publish and OIDC gates are enforced elsewhere.
          PACKAGE_INSTALLS=$({ grep -rnE '(^|[[:space:]])(pip|python3 -m pip|npm|pnpm|yarn|npx|twine|cibuildwheel)[[:space:]].*(install|publish|build)' .github/workflows/ 2>/dev/null || true; } \
            | { grep -vE "$SELF_WF_RE" || true; } \
            | { grep -vE ':[0-9]+:[[:space:]]*#' || true; } | wc -l)
          if [[ $PACKAGE_INSTALLS -gt 0 ]]; then
            echo "[INFO] $(sanitize_line "$PACKAGE_INSTALLS") package install/build/publish command(s) found; verify high-trust jobs use pinned constraints or isolated publish credentials" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
          fi

          if [[ $TRIVY_INDICATORS -eq 0 ]]; then
            echo "[OK] No TanStack/Trivy-pattern indicators detected" >> "$RISK_REPORT_PATH"
          else
            echo "" >> "$RISK_REPORT_PATH"
            echo "**Total TanStack/Trivy-pattern indicators: $(sanitize_line "$TRIVY_INDICATORS")**" >> "$RISK_REPORT_PATH"
          fi
          echo "" >> "$RISK_REPORT_PATH"

      - name: "10. Ref Name Security Validation"
        if: always()
        env:
          BASH_ENV: /dev/null
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            echo "[FAIL] Sanitizer not found" >> "$RISK_REPORT_PATH"
            exit 1
          fi

          {
            echo "## 10. Ref Name Security Validation"
            echo ""
            echo "Validates branch/ref names for hidden Unicode characters"
            echo "(BOM, bidi overrides, zero-width chars) that enable Trojan Source"
            echo "and ref confusion attacks. Achieves parity with GitHub UI warning:"
            echo "_The head ref may contain hidden characters._"
            echo ""
          } >> "$RISK_REPORT_PATH"

          REF_FINDINGS=0

          # --- Canary check: verify detection engine works ---
          # Injects the exact PR #786 pattern (BOM U+FEFF in branch name)
          # to confirm detect_hidden_chars is functional before trusting
          # results on real refs. If the canary fails, Section 10 is unreliable.
          CANARY_REF=$(printf 'fix-bisect-\xef\xbb\xbf95ebc2f7')
          CANARY_PASS=false
          if detect_hidden_chars "$CANARY_REF" "canary-PR786" 2>/dev/null; then
            CANARY_PASS=true
          fi
          if [[ "$CANARY_PASS" == "true" ]]; then
            echo "- Canary: [OK] BOM detection engine verified (PR #786 pattern)" >> "$RISK_REPORT_PATH"
          else
            {
              echo ""
              echo "### [CRITICAL] Canary check FAILED"
              echo ""
              echo "The detection engine did not identify the known-bad PR #786"
              echo "pattern (\`fix-bisect-<BOM>95ebc2f7\`). All ref validation"
              echo "results below are **unreliable**. Investigate whether"
              echo "\`detect_hidden_chars()\` is functional (grep -P support,"
              echo "sanitize-sed.sh version, locale settings)."
              echo ""
            } >> "$RISK_REPORT_PATH"
          fi

          # emit_ref_finding REF_VALUE LABEL
          # Captures detect_hidden_chars stderr, emits detailed table
          emit_ref_finding() {
            local ref_val="$1"
            local ref_label="$2"
            local diag
            diag=$(detect_hidden_chars "$ref_val" "$ref_label" 2>&1 >/dev/null || true)
            local hex_dump
            hex_dump=$(printf '%s' "$ref_val" | xxd -p | head -c 80)
            {
              echo "### [CRITICAL] Hidden characters in ${ref_label}"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Visible ref | \`$(sanitize_line "$ref_val")\` |"
              echo "| Sanitized | \`$(sanitize_ref "$ref_val")\` |"
              echo "| Raw hex | \`$(sanitize_line "$hex_dump")\` |"  # elements-sanitized
              echo "| Severity | CRITICAL |"
              echo ""
              # Extract character category lines from diagnostic output
              if [[ -n "$diag" ]]; then
                echo "**Detected hidden character categories:**"
                echo ""
                echo '```'
                printf '%s\n' "$diag" | while IFS= read -r dline; do
                  sanitize_line "$dline"
                  echo ""
                done
                echo '```'
                echo ""
              fi
              echo "> This ref name contains invisible Unicode characters that"
              echo "> could enable ref confusion, Trojan Source, or supply-chain"
              echo "> attacks. The branch should be renamed to remove hidden chars."
              echo ""
            } >> "$RISK_REPORT_PATH"
          }

          # Check HEAD_REF (PR source branch)
          if [[ -n "${PR_HEAD_REF:-}" ]]; then
            if detect_hidden_chars "$PR_HEAD_REF" "github.head_ref" 2>/dev/null; then
              REF_FINDINGS=$((REF_FINDINGS + 1))
              emit_ref_finding "$PR_HEAD_REF" "HEAD ref"
            else
              echo "- HEAD ref \`$(sanitize_line "$PR_HEAD_REF")\`: [OK] clean" >> "$RISK_REPORT_PATH"
            fi
          fi

          # Check BASE_REF (PR target branch)
          if [[ -n "${PR_BASE_REF:-}" ]]; then
            if detect_hidden_chars "$PR_BASE_REF" "github.base_ref" 2>/dev/null; then
              REF_FINDINGS=$((REF_FINDINGS + 1))
              emit_ref_finding "$PR_BASE_REF" "BASE ref"
            else
              echo "- BASE ref \`$(sanitize_line "$PR_BASE_REF")\`: [OK] clean" >> "$RISK_REPORT_PATH"
            fi
          fi

          # Check GITHUB_REF_NAME (current ref)
          if [[ -n "${GITHUB_REF_NAME:-}" ]]; then
            if detect_hidden_chars "$GITHUB_REF_NAME" "GITHUB_REF_NAME" 2>/dev/null; then
              REF_FINDINGS=$((REF_FINDINGS + 1))
              emit_ref_finding "$GITHUB_REF_NAME" "GITHUB_REF_NAME"
            fi
          fi

          {
            echo ""
            if [[ $REF_FINDINGS -gt 0 ]]; then
              echo "**[CRITICAL] $REF_FINDINGS ref name(s) contain hidden Unicode characters**"
            else
              echo "[OK] All ref names are clean ASCII"
            fi
            echo ""
          } >> "$RISK_REPORT_PATH"

      - name: "11. Workflow Inventory & Final Report"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cd "$SCAN_ROOT"
          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
            sanitizer_version() { printf 'unknown\n'; }
          fi
          SAFE_SANITIZER_VERSION=$(sanitize_line "$(sanitizer_version)")

          {
            echo "---"
            echo ""
            echo "## 11. Workflow Inventory"
            echo ""
            echo "| Workflow | Triggers | Explicit Permissions | SHA-Pinned |"
            echo "|----------|----------|-------------|------------|"

            while IFS= read -r wf; do
              wf_base=$(basename "$wf")

              trigger_names="$(python3 "$WORKFLOW_TRIGGER_HELPER" "$wf")"
              triggers="$(paste -sd ',' <<< "$trigger_names" | sed 's/,/, /g')"
              triggers="${triggers:-none detected}"

              # Check permissions
              if grep -qE '^[[:space:]]*permissions:' "$wf" 2>/dev/null; then
                perms="Yes"
              else
                perms="No"
              fi

              # Check actions pinned (skip run: block content)
              total_acts=$(awk '
                /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; match($0,/^[[:space:]]*/); ri=RLENGTH; next }
                in_run { match($0,/^[[:space:]]*/); if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= ri) in_run=0 }
                !in_run && /^[[:space:]]*-?[[:space:]]*uses:/ && $0 !~ /^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*\.\// { c++ }
                END { print c+0 }
              ' "$wf")
              pinned_acts=$(awk '
                /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; match($0,/^[[:space:]]*/); ri=RLENGTH; next }
                in_run { match($0,/^[[:space:]]*/); if ($0 !~ /^[[:space:]]*$/ && RLENGTH <= ri) in_run=0 }
                !in_run && /^[[:space:]]*-?[[:space:]]*uses:.*@[0-9a-f]{40}/ && $0 !~ /^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*\.\// { c++ }
                END { print c+0 }
              ' "$wf")
              if [[ $total_acts -eq 0 ]]; then
                pin_status="N/A"
              else
                pin_status="$pinned_acts/$total_acts"
              fi

              echo "| \`$(sanitize_line "$wf_base")\` | $(sanitize_line "$triggers") | $perms | $pin_status |"
            done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null | sort)

            echo ""
            echo "---"
            echo ""
            echo "## Analysis Metadata"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Analysis target | $(sanitize_line "$ANALYSIS_TARGET") |"
            if [[ "$ANALYSIS_TARGET" == "Specific PR number" && -n "$PR_NUMBER" ]]; then
              echo "| PR number | #$(sanitize_line "$PR_NUMBER") |"
            fi
            if [[ "$ANALYSIS_TARGET" == "Specific git ref" && -n "$GIT_REF" ]]; then
              echo "| Git ref | $(sanitize_line "$GIT_REF") |"
            fi
            echo "| Severity threshold | $(sanitize_line "$SEVERITY_THRESHOLD") |"
            echo "| Repository | $(sanitize_line "$GITHUB_REPOSITORY") |"
            echo "| Run ID | $GITHUB_RUN_ID |"
            echo "| Commit | $(git rev-parse --short HEAD 2>/dev/null || echo unknown) |"
            echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo ""
            echo "---"
            echo ""
            echo "### Governance References"
            echo ""
            echo "- [iccDEV CI TanStack audit issue #1016](https://github.com/InternationalColorConsortium/iccDEV/issues/1016)"
            echo "- [TanStack npm supply-chain compromise postmortem](https://tanstack.com/blog/npm-supply-chain-compromise-postmortem)"
            echo "- [GitHub Actions cache isolation discussion](https://github.com/orgs/community/discussions/194493)"
            echo "- [Trivy Supply-Chain Compromise (March 2026)](https://snyk.io/articles/trivy-github-actions-supply-chain-compromise/)"
            echo "- [tj-actions/changed-files Compromise (March 2025)](https://github.com/advisories/GHSA-mrrh-fwg8-r2c3)"
            echo "- [Nx Supply-Chain Attack (Feb 2025)](https://nx.dev/blog/security-incident-feb-2025)"
            echo "- [OpenSSF Scorecard](https://securityscorecards.dev/)"
            echo "- [GitHub Actions Security Hardening](https://docs.github.com/en/actions/reference/security/secure-use)"
            echo "- [xsscx/governance/actions](https://github.com/xsscx/governance/tree/main/actions)"
            echo "- \`.github/instructions/workflow-governance\`"
            echo "- \`.github/scripts/sanitize-sed.sh\` (${SAFE_SANITIZER_VERSION})"
            echo ""
          } >> "$RISK_REPORT_PATH"

          echo "[OK] PR Risk & Security Analysis complete (Linux)"

      - name: "12. Enforce Blocking Findings"
        if: always() && (github.event_name == 'pull_request' || inputs.fail_on_findings == true)
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          summary="${RISK_REPORT_PATH:-}"
          if [[ -z "$summary" || ! -f "$summary" ]]; then
            echo "[FAIL] Missing risk-analysis report for enforcement" >&2
            exit 1
          fi

          blocking_patterns=(
            '^\[CRITICAL\] Found .*injectable expression'
            '^\[CRITICAL\].*Unpinned actions'
            '^\[CRITICAL\].*curl/wget\|bash'
            '^\[CRITICAL\].*checkout PR head code with elevated permissions'
            '^\[CRITICAL\].*id-token: write'
            '^\[CRITICAL\].*hidden Unicode'
            '^\*\*\[CRITICAL\].*hidden Unicode'
            '^\[HIGH\] Missing BASH_ENV'
            '^\[HIGH\].*git force-push/tag-rewrite'
            '^\[HIGH\].*workflow_run \+ download-artifact'
            '^\[HIGH\].*privileged workflow_dispatch publish permissions'
            '^\[HIGH\].*write credentials with GHA cache'
            '^\[HIGH\].*release workflow uses broad cache restore keys'
          )

          rca_for_finding() {
            local finding="$1"
            local cause remediation
            case "$finding" in
              *"injectable expression"*)
                cause="Untrusted GitHub context or matrix data is interpolated directly inside a run block."
                remediation="Move the expression to an env value and consume the quoted environment variable from shell."
                ;;
              *"Unpinned actions"*)
                cause="A workflow action can be replaced upstream because it is not pinned to an immutable commit SHA."
                remediation="Pin every third-party action to a reviewed 40-character commit SHA."
                ;;
              *"curl/wget|bash"*)
                cause="Remote script execution bypasses review, pinning, and provenance controls."
                remediation="Fetch pinned artifacts, verify checksums/signatures, and execute reviewed local scripts only."
                ;;
              *"checkout PR head code with elevated permissions"*)
                cause="Untrusted pull-request code can run with privileged tokens or write-capable workflow context."
                remediation="Run PR head code only with read-only permissions, no secrets, and trusted scanner code checked out separately."
                ;;
              *"id-token: write"*)
                cause="OIDC federation is available in a context that can be influenced by untrusted workflow triggers."
                remediation="Restrict id-token: write to master-only release/publish jobs protected by a GitHub environment."
                ;;
              *"hidden Unicode"*)
                cause="A ref or workflow value contains invisible Unicode that can hide intent or confuse review."
                remediation="Reject hidden Unicode and require normalized ASCII ref names for automation entry points."
                ;;
              *"Missing BASH_ENV"*)
                cause="A shell step does not explicitly block startup-file injection."
                remediation="Set BASH_ENV: /dev/null on bash steps and use bash --noprofile --norc."
                ;;
              *"git force-push/tag-rewrite"*)
                cause="A workflow contains commands capable of rewriting shared refs or tags."
                remediation="Remove rewrite commands from CI or gate them behind protected manual maintainer release flows."
                ;;
              *"workflow_run + download-artifact"*)
                cause="A privileged workflow can consume artifacts from a less-trusted workflow boundary."
                remediation="Verify artifact provenance and never execute or trust artifacts from untrusted workflows."
                ;;
              *"privileged workflow_dispatch publish permissions"*)
                cause="Manual dispatch can reach write-capable publish permissions without both branch and environment controls."
                remediation="Require github.ref == refs/heads/master and a protected GitHub environment for publish jobs."
                ;;
              *"write credentials with GHA cache"*)
                cause="A write-capable job shares mutable GitHub Actions cache state without a master-only trust boundary."
                remediation="Namespace caches by workflow role and restrict write-capable cache producers to master-only jobs."
                ;;
              *"release workflow uses broad cache restore keys"*)
                cause="Release builds can restore cache entries from broader or lower-trust cache namespaces."
                remediation="Use exact release-specific cache keys with pinned dependency versions and no broad restore prefixes."
                ;;
              *)
                cause="A blocking governance rule matched this workflow state."
                remediation="Review the finding, remove unsafe trust expansion, and rerun risk analysis."
                ;;
            esac
            printf '| `%s` | %s | %s |\n' \
              "$(sanitize_line "$finding")" \
              "$(sanitize_line "$cause")" \
              "$(sanitize_line "$remediation")"
          }

          blockers=0
          rca_file="$(mktemp)"
          {
            echo ""
            echo "## 12. Enforcement Gate"
            echo ""
            echo "Composite supply-chain score and privileged automation inventory are advisory."
            echo ""
          } >> "$RISK_REPORT_PATH"

          for pattern in "${blocking_patterns[@]}"; do
            while IFS= read -r finding; do
              [[ -z "$finding" ]] && continue
              blockers=$((blockers + 1))
              echo "- \`$(sanitize_line "$finding")\`" >> "$RISK_REPORT_PATH"
              rca_for_finding "$finding" >> "$rca_file"
            done < <(grep -E "$pattern" "$summary" || true)
          done

          if [[ "$blockers" -gt 0 ]]; then
            echo "" >> "$RISK_REPORT_PATH"
            echo "### Root Cause Analysis" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            echo "| Finding | Root cause | Required remediation |" >> "$RISK_REPORT_PATH"
            echo "|---------|------------|----------------------|" >> "$RISK_REPORT_PATH"
            cat "$rca_file" >> "$RISK_REPORT_PATH"
            echo "" >> "$RISK_REPORT_PATH"
            echo "[FAIL] Blocking governance findings: $(sanitize_line "$blockers")" >> "$RISK_REPORT_PATH"
            exit 1
          fi

          if [[ -f "${RUNNER_TEMP}/risk-analysis-linux-failed" ]]; then
            {
              echo ""
              echo "### Root Cause Analysis"
              echo ""
              echo "| Finding | Root cause | Required remediation |"
              echo "|---------|------------|----------------------|"
              echo "| \`prior risk-analysis step failed\` | One or more scanner steps failed before enforcement completed. | Inspect the uploaded report and job log, then fix the scanner/runtime failure so the gate cannot fail open. |"
              echo ""
              echo "[FAIL] Risk-analysis step failure detected before enforcement"
            } >> "$RISK_REPORT_PATH"
            exit 1
          fi

          echo "[OK] No blocking governance findings" >> "$RISK_REPORT_PATH"

      - name: "Mark Prior Linux Risk Failure"
        if: failure()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          touch "${RUNNER_TEMP}/risk-analysis-linux-failed"

      - name: "13. Executive Risk Summary"
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$TRUSTED_SCRIPTS/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          report="${RISK_REPORT_PATH:-${RUNNER_TEMP}/risk-analysis-report-linux.md}"
          mkdir -p "$(dirname "$report")"

          missing_report=false
          if [[ ! -s "$report" ]]; then
            missing_report=true
            {
              echo "## Risk Gate Analysis Report"
              echo ""
              echo "[FAIL] Detailed risk report was not generated."
            } >> "$report"
          fi

          blocking_patterns=(
            '^\[CRITICAL\] Found .*injectable expression'
            '^\[CRITICAL\].*Unpinned actions'
            '^\[CRITICAL\].*curl/wget\|bash'
            '^\[CRITICAL\].*checkout PR head code with elevated permissions'
            '^\[CRITICAL\].*id-token: write'
            '^\[CRITICAL\].*hidden Unicode'
            '^\*\*\[CRITICAL\].*hidden Unicode'
            '^\[HIGH\] Missing BASH_ENV'
            '^\[HIGH\].*git force-push/tag-rewrite'
            '^\[HIGH\].*workflow_run \+ download-artifact'
            '^\[HIGH\].*privileged workflow_dispatch publish permissions'
            '^\[HIGH\].*write credentials with GHA cache'
            '^\[HIGH\].*release workflow uses broad cache restore keys'
          )

          audit_failed=false
          if [[ -f "${RUNNER_TEMP}/risk-analysis-linux-failed" ]]; then
            audit_failed=true
          fi

          findings_file="$(mktemp)"
          for pattern in "${blocking_patterns[@]}"; do
            grep -E "$pattern" "$report" >> "$findings_file" || true
          done

          finding_count="$(wc -l < "$findings_file" | tr -d ' ')"
          result="[PASS]"
          if [[ "$audit_failed" == "true" || "$missing_report" == "true" || "$finding_count" -gt 0 ]]; then
            result="[FAIL]"
          fi

          {
            echo "## Risk Gate Analysis - Executive Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Result | $(sanitize_line "$result") |"
            echo "| Platform | Linux (Bash) |"
            echo "| Enforcement enabled | $(sanitize_line "$FAIL_ON_FINDINGS") |"
            echo "| Blocking findings | $(sanitize_line "$finding_count") |"
            echo "| Full report artifact | \`risk-analysis-report-linux\` |"
            echo ""

            if [[ "$result" == "[FAIL]" ]]; then
              echo "### Failure Evidence"
              echo ""
              if [[ "$finding_count" -gt 0 ]]; then
                while IFS= read -r finding; do
                  [[ -z "$finding" ]] && continue
                  echo "- \`$(sanitize_line "$finding")\`"
                done < <(sed -n '1,20p' "$findings_file")
                if [[ "$finding_count" -gt 20 ]]; then
                  echo "- Additional findings are included in the uploaded full report."
                fi
              elif [[ "$missing_report" == "true" ]]; then
                echo "- Detailed risk report was not generated."
              else
                echo "- One or more risk-analysis steps failed before producing blocking-finding evidence."
              fi
              echo ""
              echo "### Root Cause Analysis"
              echo ""
              echo "Root cause analysis is included in the uploaded full report artifact."
              echo ""
            fi

            echo "Full detailed evidence is uploaded as the \`risk-analysis-report-linux\` artifact."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"  # elements-sanitized

      - name: "Upload Linux Risk Report"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: risk-analysis-report-linux
          path: ${{ env.RISK_REPORT_PATH }}
          if-no-files-found: error
          retention-days: 14

  ###########################################################################
  # Job 2: Windows PowerShell Workflow Security Audit
  ###########################################################################
  windows-security-audit:
    name: "Windows Security Audit (PowerShell)"
    runs-on: windows-2025-vs2026
    timeout-minutes: 15
    env:
      ANALYSIS_TARGET: ${{ github.event.pull_request.number && 'Pull request' || inputs.analysis_target || 'Current branch workflows' }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number || '' }}
      GIT_REF: ${{ github.event.pull_request.head.sha || inputs.git_ref || github.ref }}
      SEVERITY_THRESHOLD: ${{ inputs.severity_threshold || 'HIGH' }}
      FAIL_ON_FINDINGS: ${{ github.event_name == 'pull_request' && 'true' || inputs.fail_on_findings && 'true' || 'false' }}
      SCAN_ROOT: ${{ github.workspace }}/target
      TRUSTED_SCRIPTS: ${{ github.workspace }}/trusted/.github/scripts
      RISK_REPORT_PATH: ${{ github.workspace }}/risk-analysis-report-windows.md
      POWERSHELL_TELEMETRY_OPTOUT: 1
      POWERSHELL_UPDATECHECK: Off

    steps:
      - name: "Checkout trusted scanner helpers"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          # PR scans use trusted base-branch helpers, not PR-modified scanner code.
          ref: ${{ github.event.pull_request.base.sha || github.workflow_sha }}
          path: trusted
          sparse-checkout: .github/scripts
          fetch-depth: 1
          persist-credentials: false

      - name: "Checkout target repository"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: ${{ github.event.pull_request.head.sha || inputs.analysis_target == 'Specific git ref' && inputs.git_ref || github.ref }}
          path: target
          fetch-depth: 0
          persist-credentials: false

      - name: "Checkout PR head (if PR mode)"
        if: inputs.analysis_target == 'Specific PR number' && inputs.pr_number != ''
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          path: target
          fetch-depth: 0
          persist-credentials: false

      - name: "Load sanitizer & validate"
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) {
            Write-Host "[OK] PowerShell sanitizer found at $sanitizerPath"
            . $sanitizerPath
            Write-Host "[OK] Sanitizer version: $(Sanitizer-Version)"
          } else {
            Write-Host "[WARN] sanitize.ps1 not found, will use inline fallback"
          }
          $helperPath = Join-Path $env:RUNNER_TEMP "workflow-trigger-names.py"
          @'
          import re
          import sys

          KEY_RE = re.compile(
              r"^(?P<indent>\s*)(?P<key>'[^']+'|\"[^\"]+\"|[A-Za-z_][A-Za-z0-9_-]*)\s*:\s*(?P<value>[^#]*)"
          )
          LIST_RE = re.compile(
              r"^\s*-\s*(?P<key>'[^']+'|\"[^\"]+\"|[A-Za-z_][A-Za-z0-9_-]*)\s*(?:#.*)?$"
          )


          def clean(value):
              return value.strip().strip("\"'")


          def inline_triggers(value):
              value = value.split("#", 1)[0].strip()
              if not value:
                  return []
              if value.startswith("[") and "]" in value:
                  return [clean(part) for part in value[1:value.index("]")].split(",") if clean(part)]
              if value.startswith("{") and "}" in value:
                  items = value[1:value.index("}")].split(",")
                  return [clean(item.split(":", 1)[0]) for item in items if clean(item.split(":", 1)[0])]
              return [clean(value)]

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              lines = handle.readlines()

          triggers = []
          in_on = False
          trigger_indent = None
          for line in lines:
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  continue

              match = KEY_RE.match(line)
              if not in_on:
                  if match and not match.group("indent") and clean(match.group("key")) == "on":
                      triggers.extend(inline_triggers(match.group("value")))
                      in_on = True
                  continue

              if match and not match.group("indent"):
                  break

              indent_len = len(line) - len(line.lstrip(" "))
              if trigger_indent is None and stripped:
                  trigger_indent = indent_len

              if trigger_indent is not None and indent_len != trigger_indent:
                  continue

              list_match = LIST_RE.match(line)
              if list_match:
                  triggers.append(clean(list_match.group("key")))
              elif match:
                  triggers.append(clean(match.group("key")))

          seen = set()
          for trigger in triggers:
              if trigger and trigger not in seen:
                  print(trigger)
                  seen.add(trigger)
          '@ | Set-Content -Path $helperPath -Encoding utf8
          "WORKFLOW_TRIGGER_HELPER=$helperPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: "1. Action SHA Pinning Audit (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $totalActions = 0
          $pinnedActions = 0
          $tagOnlyActions = 0
          $unpinnedActions = 0
          $tagOnlyList = @()
          $unpinnedList = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $inRunBlock = $false
            $runIndent = 0
            foreach ($ln in $lines) {
              # Track run: | blocks to skip script content
              if ($ln -match '^(\s*)run:\s*\|') {
                $inRunBlock = $true
                $runIndent = $matches[1].Length
                continue
              }
              if ($inRunBlock) {
                if ($ln -match '^\S' -or ($ln -match '^(\s*)\S' -and $matches[1].Length -le $runIndent)) {
                  $inRunBlock = $false
                } else {
                  continue
                }
              }
              if ($ln -match '^\s*#') { continue }
              if ($ln -notmatch '^\s*-?\s*uses:\s') { continue }
              if ($ln -match 'docker://') { continue }
              # Skip local reusable workflow refs (no SHA needed)
              if ($ln -match '\./\.github/workflows/') { continue }
              $totalActions++
              $actionRef = ($ln -replace '.*uses:\s*', '').Trim().Trim('"').Trim("'")
              if ($actionRef -match '@[0-9a-f]{40}') {
                $pinnedActions++
              } elseif ($actionRef -match '@v\d') {
                $tagOnlyActions++
                $tagOnlyList += "$($wf.Name): $actionRef"
              } else {
                $unpinnedActions++
                $unpinnedList += "$($wf.Name): $actionRef"
              }
            }
          }

          $report = @()
          $report += "## 1. Action SHA Pinning Audit (Windows Validation)"
          $report += ""
          if ($totalActions -eq 0) {
            $report += "[SKIP] No actions found"
          } else {
            $pct = [math]::Round(($pinnedActions / $totalActions) * 100, 1)
            $report += "| Metric | Count |"
            $report += "|--------|-------|"
            $report += "| Total actions | $(Sanitize-Line "$totalActions") |"
            $report += "| SHA-pinned | $(Sanitize-Line "$pinnedActions") ($(Sanitize-Line "$pct")%) |"
            $report += "| Tag-only | $(Sanitize-Line "$tagOnlyActions") |"
            $report += "| Unpinned | $(Sanitize-Line "$unpinnedActions") |"
            $report += ""
            if ($tagOnlyList.Count -gt 0) {
              $report += "**Tag-only actions:**"
              foreach ($t in $tagOnlyList) { $report += "- ``$(Sanitize-Line $t)``" }
              $report += ""
            }
            if ($unpinnedList.Count -gt 0) {
              $report += "**Unpinned actions (CRITICAL):**"
              foreach ($u in $unpinnedList) { $report += "- ``$(Sanitize-Line $u)``" }
              $report += ""
            }
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] SHA pinning audit complete (Windows): $pinnedActions/$totalActions pinned"

      - name: "2. Dangerous Trigger Detection (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $dangerousTriggers = @('issue_comment', 'workflow_run', 'repository_dispatch')
          $mediumTriggers = @('create', 'delete')
          $infoTriggers = @('workflow_call')
          $findings = @()
          $infoFindings = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            if ($triggerNames -contains 'pull_request_target') {
              if ($content -match 'ref.*pull_request.*head') {
                $findings += "$($wf.Name): pull_request_target with PR head checkout (CRITICAL)"
              } else {
                $infoFindings += "$($wf.Name): pull_request_target (INFO -- no PR head checkout)"
              }
            }
            foreach ($trigger in $dangerousTriggers) {
              if ($triggerNames -contains $trigger) {
                $findings += "$($wf.Name): $trigger"
              }
            }
            # C-2: Medium-severity triggers
            foreach ($evt in $mediumTriggers) {
              if ($triggerNames -contains $evt) {
                $findings += "$($wf.Name): $evt (MEDIUM)"
              }
            }
            # workflow_call is safe (reusable workflow) -- INFO only
            foreach ($evt in $infoTriggers) {
              if ($triggerNames -contains $evt) {
                $infoFindings += "$($wf.Name): $evt (INFO -- reusable workflow, safe)"
              }
            }
          }

          $report = @()
          $report += "## 2. Dangerous Trigger Detection (Windows Validation)"
          $report += ""
          if ($findings.Count -eq 0) {
            $report += "[OK] No dangerous triggers found"
          } else {
            $report += "| Workflow | Trigger |"
            $report += "|----------|---------|"
            foreach ($f in $findings) {
              $parts = $f -split ": ", 2
              $report += "| ``$(Sanitize-Line $parts[0])`` | ``$(Sanitize-Line $parts[1])`` |"
            }
          }
          if ($infoFindings.Count -gt 0) {
            $report += ""
            $report += "**Informational** (not counted as dangerous):"
            $report += ""
            foreach ($f in $infoFindings) {
              $parts = $f -split ": ", 2
              $report += "- ``$(Sanitize-Line $parts[0])``: $(Sanitize-Line $parts[1])"
            }
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Dangerous trigger detection complete (Windows): $($findings.Count) findings"

      - name: "3. Credential Hygiene Audit (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $totalWf = 0
          $bashEnvCount = 0
          $credCleanupCount = 0
          $tokenUnsetCount = 0
          $issues = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $totalWf++
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue

            # Determine if workflow has bash run: blocks, without treating
            # PowerShell-only jobs as bash because of unrelated shell text.
            $runCount = ([regex]::Matches($content, '(?m)^\s+run:\s*\|')).Count
            $pwshCount = ([regex]::Matches($content, '(?m)^\s+shell:\s*pwsh\b')).Count
            $explicitBashCount = ([regex]::Matches($content, '(?m)^\s+shell:\s*bash\b')).Count
            $hasBashDefault = $content -match '(?ms)^\s*defaults:\s*.*?^\s*run:\s*.*?^\s*shell:\s*bash\b'
            $hasPwshDefault = $content -match '(?ms)^\s*defaults:\s*.*?^\s*run:\s*.*?^\s*shell:\s*pwsh\b'
            $hasBashSteps = $explicitBashCount -gt 0 -or (
              $runCount -gt $pwshCount -and -not $hasPwshDefault
            ) -or (
              $hasBashDefault -and $runCount -gt $pwshCount
            )

            if ($hasBashSteps) {
              if ($content -match 'BASH_ENV') { $bashEnvCount++ }
              else { $issues += "$($wf.Name): missing BASH_ENV=/dev/null" }
            } else {
              # PowerShell-only -- BASH_ENV not applicable
              $bashEnvCount++
            }

            if ($hasBashSteps) {
              if ($content -match 'credential\.helper') { $credCleanupCount++ }
              else { $issues += "$($wf.Name): missing credential.helper cleanup" }
            } else {
              # PowerShell-only -- credential.helper is bash-specific
              $credCleanupCount++
            }

            if ($content -match 'unset GITHUB_TOKEN\b|Remove-Item env:GITHUB_TOKEN') { $tokenUnsetCount++ }
          }

          $report = @()
          $report += "## 3. Credential Hygiene Audit (Windows Validation)"
          $report += ""
          $report += "| Check | Workflows |"
          $report += "|-------|-----------|"
          $report += "| Total workflows scanned | $(Sanitize-Line "$totalWf") |"
          $report += "| BASH_ENV=/dev/null present | $(Sanitize-Line "$bashEnvCount") |"
          $report += "| credential.helper cleanup | $(Sanitize-Line "$credCleanupCount") |"
          $report += "| Token unset/removal | $(Sanitize-Line "$tokenUnsetCount") |"
          $report += ""
          if ($issues.Count -gt 0) {
            $report += "**Issues found:**"
            foreach ($i in $issues) { $report += "- ``$(Sanitize-Line $i)``" }
          } else {
            $report += "[OK] All workflows have proper credential hygiene"
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Credential hygiene audit complete (Windows)"

      - name: "4. Shell Hardening Audit (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $totalBlocks = 0
          $hardenedBlocks = 0
          $pwshHardenedBlocks = 0
          $issues = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $inRunBlock = $false
            $currentBlock = @()
            $runIndentLen = 0
            foreach ($ln in $lines) {
              if ($ln -match '^\s+run:\s*\|') {
                # Finalize previous block if still open
                if ($inRunBlock -and $currentBlock.Count -gt 0) {
                  $blockText = $currentBlock -join "`n"
                  if ($blockText -match 'set -euo pipefail|set -euxo pipefail') {
                    $hardenedBlocks++
                  }
                  elseif ($blockText -match 'ErrorActionPreference') {
                    $pwshHardenedBlocks++
                  }
                }
                $inRunBlock = $true
                $currentBlock = @()
                $totalBlocks++
                $runIndentLen = ($ln -replace '\S.*', '').Length
                continue
              }
              if ($inRunBlock) {
                # Non-blank line with indent <= run: level ends the block
                if ($ln -match '\S') {
                  $curIndentLen = ($ln -replace '\S.*', '').Length
                  if ($curIndentLen -le $runIndentLen) {
                    $blockText = $currentBlock -join "`n"
                    if ($blockText -match 'set -euo pipefail|set -euxo pipefail') {
                      $hardenedBlocks++
                    }
                    elseif ($blockText -match 'ErrorActionPreference') {
                      $pwshHardenedBlocks++
                    }
                    $inRunBlock = $false
                    $currentBlock = @()
                  } else {
                    $currentBlock += $ln
                  }
                } else {
                  $currentBlock += $ln
                }
              }
            }
            # Handle last block in file
            if ($inRunBlock -and $currentBlock.Count -gt 0) {
              $blockText = $currentBlock -join "`n"
              if ($blockText -match 'set -euo pipefail|set -euxo pipefail') {
                $hardenedBlocks++
              }
              elseif ($blockText -match 'ErrorActionPreference') {
                $pwshHardenedBlocks++
              }
            }
          }

          $combinedHardened = $hardenedBlocks + $pwshHardenedBlocks

          # H-2: shell: sh detection
          $shellShCount = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -match '(?m)^\s+shell:\s+sh\s*$') {
              $shellShCount++
            }
          }

          # H-7: defaults.run.shell detection
          $defaultsShellCount = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -match '(?m)^\s+defaults:.*?shell:') {
              $defaultsShellCount++
            }
          }

          $report = @()
          $report += "## 4. Shell Hardening Audit (Windows Validation)"
          $report += ""
          $report += "| Metric | Count |"
          $report += "|--------|-------|"
          $report += "| Total run: blocks | $(Sanitize-Line "$totalBlocks") |"
          $report += "| Bash: set -euo pipefail | $(Sanitize-Line "$hardenedBlocks") |"
          $report += "| PowerShell: ErrorActionPreference | $(Sanitize-Line "$pwshHardenedBlocks") |"
          $report += "| Combined hardened | $(Sanitize-Line "$combinedHardened") |"
          if ($totalBlocks -gt 0) {
            $combinedPct = [math]::Round(($combinedHardened / $totalBlocks) * 100, 1)
            $report += "| Combined hardening rate | $(Sanitize-Line "$combinedPct")% |"
          }
          if ($shellShCount -gt 0) {
            $report += "| shell: sh usage | $(Sanitize-Line "$shellShCount") |"
            $report += ""
            $report += "[WARN] $shellShCount workflow(s) use ``shell: sh`` -- upgrade to ``bash --noprofile --norc``"
          }
          if ($defaultsShellCount -gt 0) {
            $report += "| defaults.run.shell | $(Sanitize-Line "$defaultsShellCount") |"
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Shell hardening audit complete (Windows): $combinedHardened/$totalBlocks hardened (bash=$hardenedBlocks, pwsh=$pwshHardenedBlocks)"

      - name: "5. Expression Injection Scan (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $unsafePatterns = @(
            'matrix\.',
            'github\.event\.(issue|pull_request|discussion)\.(title|body)',
            'github\.event\.(comment|review|review_comment)\.body',
            'github\.event\.pages',
            'github\.event\.commits',
            'github\.head_ref',
            'inputs\.'
          )
          $findings = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $inRunBlock = $false
            $runIndent = 0
            $lineNum = 0
            foreach ($ln in $lines) {
              $lineNum++
              # Detect run: | line and record its indentation
              if ($ln -match '^(\s*)run:\s*\|') {
                $inRunBlock = $true
                $runIndent = $matches[1].Length
                continue
              }
              if ($inRunBlock) {
                # Non-blank line with indentation <= run: line exits the block
                if ($ln -match '^\S' -or ($ln -match '^(\s*)\S' -and $matches[1].Length -le $runIndent)) {
                  $inRunBlock = $false
                }
              }
              if ($inRunBlock) {
                foreach ($pat in $unsafePatterns) {
                  $exprPattern = '\$\{\{[^}]*' + $pat
                  if ($ln -match $exprPattern) {
                    # Exclude safe contexts: needs.*.result contains "matrix." as substring
                    if ($ln -match 'needs\.[a-zA-Z0-9_-]+\.result') { continue }
                    $findings += "$($wf.Name):$lineNum -- $(Sanitize-Line $ln.Trim())"
                  }
                }
              }
            }
          }

          $report = @()
          $report += "## 5. Expression Injection Scan (Windows Validation)"
          $report += ""
          if ($findings.Count -eq 0) {
            $report += "[OK] No expression injection patterns found in run: blocks"
          } else {
            $report += "**Findings ($(Sanitize-Line "$($findings.Count)")):**"
            $report += ""
            foreach ($f in $findings) { $report += "- ``$(Sanitize-Line $f)``" }
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Expression injection scan complete (Windows): $($findings.Count) findings"

      - name: "6. Output Sanitization Audit (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $totalSummaryWrites = 0
          $sanitizedWrites = 0
          $unsanitizedList = @()
          $allSanitizers = @('sanitize_line', 'sanitize_print', 'sanitize_codeblock',
            'sanitize_ref', 'sanitize_filename', 'escape_html',
            'Sanitize-Line', 'Sanitize-Print', 'Safe-EchoForSummary', 'Escape-Html',
            'elements-sanitized')

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $lineNum = 0
            foreach ($ln in $lines) {
              $lineNum++

              # Strip single-quoted content first (regex patterns are not actual writes)
              $writeCheck = $ln -replace "'[^']*'", ''
              # Only match actual writes to summary/output env files.
              if ($writeCheck -notmatch '>>.*GITHUB_(STEP_SUMMARY|OUTPUT)' -and $writeCheck -notmatch 'Out-File.*GITHUB_(STEP_SUMMARY|OUTPUT)') {
                continue
              }

              # Extract content before redirect target
              $contentPart = $ln -replace '>>.*GITHUB_(STEP_SUMMARY|OUTPUT).*', '' -replace '\|?\s*Out-File.*GITHUB_(STEP_SUMMARY|OUTPUT).*', ''

              # Strip single-quoted content (no interpolation in bash single quotes)
              $contentStripped = $contentPart -replace "'[^']*'", ''

              # Strip the redirect variable reference itself
              $contentStripped = $contentStripped -replace '\$GITHUB_STEP_SUMMARY', '' -replace '\$env:GITHUB_STEP_SUMMARY', ''
              $contentStripped = $contentStripped -replace '\$GITHUB_OUTPUT', '' -replace '\$env:GITHUB_OUTPUT', ''

              # Skip static-only writes (no variables or command substitution)
              if ($contentStripped -notmatch '\$[a-zA-Z_{(]' -and $contentStripped -notmatch '\$\(') {
                continue
              }

              $totalSummaryWrites++
              $isSanitized = $false
              foreach ($s in $allSanitizers) {
                if ($ln -match [regex]::Escape($s)) {
                  $isSanitized = $true
                  break
                }
              }
              # Recognize pre-sanitized variable naming conventions
              if (-not $isSanitized -and ($contentStripped -match '\$SANITIZED_' -or $contentStripped -match '\$safe_' -or $contentStripped -match '\$SAFE_')) {
                $isSanitized = $true
              }
              # Tool version/sysinfo output (workflow-controlled, not user input)
              if (-not $isSanitized -and ($contentStripped -match '\$\([a-z_-]+\s+--' -or $contentStripped -match '\$\((nproc|arch|uname|hostname|date)\)')) {
                $isSanitized = $true
              }
              # Env-block variables from matrix/context expressions (already intermediary'd)
              if (-not $isSanitized -and ($contentStripped -match '\$\{?(MATRIX_|CC|CXX|LINT_|GH_|BUILD_)')) {
                $isSanitized = $true
              }
              # Workflow-controlled counters and loop variables (not user input)
              if (-not $isSanitized -and ($contentStripped -match '\$\{?(cnt|count|warns|errs|files|category|component|chk|fname|cpp_|ct_|sec_|tool|comp|pr|status|GRAND_)')) {
                $isSanitized = $true
              }
              if ($isSanitized) {
                $sanitizedWrites++
              } else {
                $unsanitizedList += "$($wf.Name):$lineNum"
              }
            }
          }

          $report = @()
          $report += "## 6. Output Sanitization Audit (Windows Validation)"
          $report += ""
          $report += "| Metric | Count |"
          $report += "|--------|-------|"
          $report += "| GITHUB_STEP_SUMMARY/GITHUB_OUTPUT writes | $(Sanitize-Line "$totalSummaryWrites") |"
          $report += "| Sanitized writes | $(Sanitize-Line "$sanitizedWrites") |"
          $report += "| Potentially unsanitized | $(Sanitize-Line "$($unsanitizedList.Count)") |"
          $report += ""
          if ($unsanitizedList.Count -gt 0 -and $unsanitizedList.Count -le 30) {
            $report += "**Unsanitized writes ($(Sanitize-Line "$($unsanitizedList.Count)")):**"
            $report += ""
            foreach ($u in $unsanitizedList) { $report += "- ``$(Sanitize-Line $u)``" }
          } elseif ($unsanitizedList.Count -gt 30) {
            $report += "**$(Sanitize-Line "$($unsanitizedList.Count)") unsanitized writes (too many to list)**"
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Output sanitization audit complete (Windows): $sanitizedWrites/$totalSummaryWrites sanitized"

      - name: "7. Permissions Audit (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          $permJson = python "$env:TRUSTED_SCRIPTS/audit-workflow-permissions.py" --workflows-dir .github/workflows --format json | ConvertFrom-Json
          python "$env:TRUSTED_SCRIPTS/audit-workflow-permissions.py" --workflows-dir .github/workflows --format markdown |
            Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8
          "" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8

          # H-4: id-token: write audit
          $report = @()
          $idTokenWrite = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -match '(?m)^\s+id-token:\s*write') {
              $idTokenWrite++
              $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
              if (($triggerNames -contains 'pull_request_target') -or
                  ($triggerNames -contains 'workflow_run') -or
                  ($triggerNames -contains 'repository_dispatch')) {
                $report += "[CRITICAL] ``$(Sanitize-Line $wf.Name)`` has ``id-token: write`` with dangerous trigger"
              }
            }
          }
          if ($idTokenWrite -gt 0) {
            $report += "**id-token: write found in $(Sanitize-Line "$idTokenWrite") workflow(s)**"
          }

          # H-5: privileged workflow_dispatch publish jobs must be master/environment gated.
          $publishGateGaps = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            if ($triggerNames -notcontains 'workflow_dispatch') { continue }
            if ($content -notmatch '(?m)^\s+(contents|packages|attestations|artifact-metadata|id-token):\s*write') { continue }
            $hasMasterGate = $content -match "github\.ref == 'refs/heads/master'"
            $hasEnvironment = $content -match '(?m)^\s+environment:'
            if (-not $hasMasterGate -or -not $hasEnvironment) {
              $publishGateGaps++
              $report += "[HIGH] ``$(Sanitize-Line $wf.Name)`` has privileged workflow_dispatch publish permissions without both master ref and environment gates"
            }
          }
          if ($publishGateGaps -eq 0) {
            $report += "[OK] Privileged workflow_dispatch publish jobs are master/environment gated"
          }

          # H-6: privileged cache boundaries must not mix PR/release cache namespaces.
          $cacheBoundaryGaps = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            $hasWrite = $content -match '(?m)^\s+(contents|packages|attestations|artifact-metadata|id-token):\s*write'
            if ($hasWrite -and $content -match 'cache-to:\s*type=gha|restore-keys:') {
              if ($content -notmatch "github\.ref == 'refs/heads/master'") {
                $cacheBoundaryGaps++
                $report += "[HIGH] ``$(Sanitize-Line $wf.Name)`` combines write credentials with GHA cache usage without a master-only gate"
              }
            }
            if ($wf.Name -eq "ci-latest-release.yml" -and $content -match 'restore-keys:') {
              $cacheBoundaryGaps++
              $report += "[HIGH] ``$(Sanitize-Line $wf.Name)`` release workflow uses broad cache restore keys"
            }
          }
          if ($cacheBoundaryGaps -eq 0) {
            $report += "[OK] Privileged cache boundaries are isolated from PR/release namespace mixing"
          }

          # H-6: CODEOWNERS coverage
          if (Test-Path ".github/CODEOWNERS") {
            $coContent = Get-Content ".github/CODEOWNERS" -Raw -ErrorAction SilentlyContinue
            if ($coContent -match '\.github/(workflows|actions|\*\*)') {
              $report += "[OK] CODEOWNERS covers .github/workflows/ directory"
            } else {
              $report += "[WARN] CODEOWNERS exists but does not cover .github/workflows/"
            }
          } else {
            $report += "[WARN] No .github/CODEOWNERS file -- workflow changes are unprotected"
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Permissions audit complete (Windows): $($permJson.with_permissions) with perms, $($permJson.without_permissions) without, $($permJson.with_write) with write"

      - name: "8. Supply-Chain Risk Score (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $score = 100
          $deductions = @()
          $advisories = @()

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          $allContent = ""
          foreach ($wf in $workflows) {
            $allContent += Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
          }

          # Check SHA pinning (skip run: block content)
          $totalUses = 0
          $pinnedUses = 0
          foreach ($wf in $workflows) {
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $inRunBlock = $false
            $runIndent = 0
            foreach ($ln in $lines) {
              if ($ln -match '^(\s*)run:\s*\|') {
                $inRunBlock = $true
                $runIndent = $matches[1].Length
                continue
              }
              if ($inRunBlock) {
                if ($ln -match '^\S' -or ($ln -match '^(\s*)\S' -and $matches[1].Length -le $runIndent)) {
                  $inRunBlock = $false
                }
              }
              if (-not $inRunBlock -and $ln -match '^\s*-?\s*uses:\s' -and $ln -notmatch '^\s*#' -and $ln -notmatch 'docker://' -and $ln -notmatch '\./\.github/workflows/') {
                $totalUses++
                if ($ln -match '@[0-9a-f]{40}') { $pinnedUses++ }
              }
            }
          }
          if ($totalUses -gt 0) {
            $pinRate = [math]::Round(($pinnedUses / $totalUses) * 100, 1)
            if ($pinRate -lt 100) {
              $deduct = [math]::Min(30, [math]::Round((100 - $pinRate) * 0.3))
              $score -= $deduct
              $deductions += "SHA pinning: $pinRate% (-$deduct)"
            }
          }

          # Check pull_request_target (on: section only)
          $hasPRT = $false
          foreach ($wf in $workflows) {
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            if ($triggerNames -contains 'pull_request_target') { $hasPRT = $true }
            if ($hasPRT) { break }
          }
          if ($hasPRT) {
            $advisories += "pull_request_target trigger present for privileged automation"
          }

          # Check persist-credentials
          $checkouts = ([regex]::Matches($allContent, 'actions/checkout')).Count
          $persistFalse = ([regex]::Matches($allContent, 'persist-credentials:\s*false')).Count
          if ($checkouts -gt 0 -and $persistFalse -lt $checkouts) {
            $deduct = [math]::Min(15, ($checkouts - $persistFalse) * 5)
            $score -= $deduct
            $deductions += "persist-credentials not false: $($checkouts - $persistFalse) checkouts (-$deduct)"
          }

          # Check permissions blocks and explicit write grants. The helper
          # accounts for workflow-level and job-level permissions blocks.
          $permAudit = python "$env:TRUSTED_SCRIPTS/audit-workflow-permissions.py" --workflows-dir .github/workflows --format json | ConvertFrom-Json
          if ($permAudit.without_permissions -gt 0) {
            $deduct = [math]::Min(10, $permAudit.without_permissions * 2)
            $score -= $deduct
            $deductions += "Missing permissions blocks: $($permAudit.without_permissions) workflows (-$deduct)"
          }
          if ($permAudit.with_write -gt 0) {
            $advisories += "Write permissions granted: $($permAudit.with_write) workflows / $($permAudit.write_blocks) block(s)"
          }

          # H-2: shell: bash without --noprofile
          $bareBashCount = 0
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            $matches2 = [regex]::Matches($content, '(?m)^\s+shell:\s+bash\s*$')
            $bareBashCount += $matches2.Count
          }
          if ($bareBashCount -gt 0) {
            $deduct = [math]::Min(10, $bareBashCount * 2)
            $score -= $deduct
            $deductions += "$bareBashCount workflow(s) use shell: bash without --noprofile (-$deduct)"
          }

          # Check GITHUB_TOKEN in env blocks
          $envTokenCount = ([regex]::Matches($allContent, '(?m)GITHUB_TOKEN:\s*\$')).Count
          if ($envTokenCount -gt 0) {
            $advisories += "$envTokenCount GITHUB_TOKEN env reference(s)"
          }

          # H-1: Expression injection in run: blocks
          $exprInject = 0
          foreach ($wf in $workflows) {
            if ($wf.Name -eq "ci-pr-risk-security-analysis.yml") { continue }
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            $inRun = $false
            $runInd = 0
            foreach ($ln in $lines) {
              if ($ln -match '^(\s*)run:\s*\|') { $inRun = $true; $runInd = $matches[1].Length; continue }
              if ($inRun -and $ln -match '^\S') { $inRun = $false }
              if ($inRun -and $ln -match '\S') {
                $ci = ($ln -replace '\S.*','').Length
                if ($ci -le $runInd) { $inRun = $false; continue }
              }
              if ($inRun -and $ln -match '\$\{\{') {
                if ($ln -match 'matrix\.|github\.event\.(issue|pull_request|discussion)\.(title|body)|github\.event\.(comment|review|review_comment)\.body|github\.head_ref|inputs\.') {
                  $exprInject++
                }
              }
            }
          }
          if ($exprInject -gt 0) {
            $deduct = [math]::Min(30, $exprInject * 10)
            $score -= $deduct
            $deductions += "$exprInject expression injection(s) in run: blocks (-$deduct)"
          }

          # C-3/M-5: Artifact poisoning
          $artPoison = 0
          foreach ($wf in $workflows) {
            if ($wf.Name -eq "ci-pr-risk-security-analysis.yml") { continue }
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            if ($triggerNames -contains 'workflow_run' -and $content -match 'download-artifact') {
              $artPoison++
            }
          }
          if ($artPoison -gt 0) {
            $deduct = $artPoison * 15
            $score -= $deduct
            $deductions += "$artPoison workflow_run + download-artifact pattern(s) (-$deduct)"
          }

          # C-4: Cache key injection -- only flag attacker-controllable github.head_ref
          $cacheInject = 0
          foreach ($wf in $workflows) {
            if ($wf.Name -eq "ci-pr-risk-security-analysis.yml") { continue }
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -match 'key:.*\$\{\{.*github\.head_ref') {
              $cacheInject++
            }
          }
          if ($cacheInject -gt 0) {
            $deduct = $cacheInject * 10
            $score -= $deduct
            $deductions += "$cacheInject cache key injection pattern(s) (-$deduct)"
          }

          # C-5: Dependabot
          if (-not (Test-Path ".github/dependabot.yml") -and -not (Test-Path ".github/dependabot.yaml")) {
            $score -= 5
            $deductions += "No .github/dependabot.yml (-5)"
          } else {
            $depContent = ""
            if (Test-Path ".github/dependabot.yml") { $depContent = Get-Content ".github/dependabot.yml" -Raw -ErrorAction SilentlyContinue }
            elseif (Test-Path ".github/dependabot.yaml") { $depContent = Get-Content ".github/dependabot.yaml" -Raw -ErrorAction SilentlyContinue }
            if ($depContent -notmatch 'github-actions') {
              $score -= 3
              $deductions += "Dependabot does not cover github-actions (-3)"
            }
          }

          $score = [math]::Max(0, $score)
          if ($score -ge 90) { $grade = "A" }
          elseif ($score -ge 80) { $grade = "B" }
          elseif ($score -ge 70) { $grade = "C" }
          elseif ($score -ge 60) { $grade = "D" }
          else { $grade = "F" }

          $report = @()
          $report += "## 8. Supply-Chain Risk Score (Windows Validation)"
          $report += ""
          $report += "**Score: $(Sanitize-Line "$score")/100 (Grade: $(Sanitize-Line "$grade"))**"
          $report += ""
          $report += "Composite score excludes approved privileged automation. The enforcement gate fails only objective blocking findings."
          $report += ""
          if ($deductions.Count -gt 0) {
            $report += "| Deduction | Detail |"
            $report += "|-----------|--------|"
            foreach ($d in $deductions) {
              $report += "| $(Sanitize-Line $d) |  |"
            }
          } else {
            $report += "[OK] Perfect supply-chain security score"
          }
          if ($advisories.Count -gt 0) {
            $report += ""
            $report += "### Privileged Automation Inventory (Advisory)"
            $report += ""
            $report += "| Advisory | Detail |"
            $report += "|----------|--------|"
            foreach ($a in $advisories) {
              $report += "| $(Sanitize-Line $a) | Review trust boundary and least privilege |"
            }
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Supply-chain risk score (Windows): $score/100 ($grade)"

      - name: "9. Trivy-Specific Indicator Check (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $selfWf = "ci-pr-risk-security-analysis.yml"
          $indicators = @(
            @{Name='aquasecurity/trivy-action'; Pattern='uses:\s*aquasecurity/trivy'; Severity='CRITICAL'},
            @{Name='Tag-only action refs (not SHA-pinned)'; Pattern='uses:.*@v\d'; Severity='HIGH'},
            @{Name='curl|bash pipe (remote script exec)'; Pattern='curl.*\|\s*(ba)?sh'; Severity='CRITICAL'},
            @{Name='wget|bash pipe (remote script exec)'; Pattern='wget.*\|\s*(ba)?sh'; Severity='CRITICAL'},
            @{Name='Invoke-WebRequest|IEX (remote exec)'; Pattern='Invoke-WebRequest.*Invoke-Expression|iwr.*iex'; Severity='CRITICAL'},
            @{Name='Artifact name injection'; Pattern='name:.*\$\{\{.*(github\.head_ref|github\.event\.(issue|pull_request)\.(title|body))'; Severity='MEDIUM'},
            @{Name='Cache key injection (github.head_ref)'; Pattern='key:.*\$\{\{.*github\.head_ref'; Severity='MEDIUM'}
          )

          $findings = @()
          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue
          foreach ($wf in $workflows) {
            # Skip self-workflow to avoid self-scan false positives
            if ($wf.Name -eq $selfWf) { continue }
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            foreach ($ind in $indicators) {
              if ($content -match $ind.Pattern) {
                $findings += @{Workflow=$wf.Name; Indicator=$ind.Name; Severity=$ind.Severity}
              }
            }
            # Check pull_request_target only in on: section
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            if ($triggerNames -contains 'pull_request_target') {
              $findings += @{Workflow=$wf.Name; Indicator='pull_request_target trigger'; Severity='INFO'}
              # Check if it also checks out PR head
              if ($content -match 'ref.*pull_request.*head') {
                $findings += @{Workflow=$wf.Name; Indicator='pull_request_target with PR head checkout'; Severity='CRITICAL'}
              }
            }
            if ($triggerNames -contains 'issue_comment') {
              $findings += @{Workflow=$wf.Name; Indicator='issue_comment trigger'; Severity='MEDIUM'}
            }
          }

          # C-3: Artifact poisoning (workflow_run + download-artifact)
          foreach ($wf in $workflows) {
            if ($wf.Name -eq $selfWf) { continue }
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue
            $triggerNames = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            if ($triggerNames -contains 'workflow_run' -and $content -match 'download-artifact') {
              $findings += @{Workflow=$wf.Name; Indicator='workflow_run + download-artifact (artifact poisoning)'; Severity='HIGH'}
            }
          }

          # C-5: Dependabot configuration audit
          if (-not (Test-Path ".github/dependabot.yml") -and -not (Test-Path ".github/dependabot.yaml")) {
            $findings += @{Workflow='(repo)'; Indicator='No .github/dependabot.yml found'; Severity='MEDIUM'}
          }

          # C-6: Package install lifecycle audit. Advisory only: publish and OIDC gates are enforced elsewhere.
          $packageInstalls = 0
          foreach ($wf in $workflows) {
            if ($wf.Name -eq $selfWf) { continue }
            $lines = Get-Content $wf.FullName -ErrorAction SilentlyContinue
            foreach ($ln in $lines) {
              if ($ln -match '(^|\s)(pip|python3 -m pip|npm|pnpm|yarn|npx|twine|cibuildwheel)\s.*(install|publish|build)' -and
                  $ln -notmatch '^\s*#') {
                $packageInstalls++
              }
            }
          }
          if ($packageInstalls -gt 0) {
            $findings += @{Workflow='(repo)'; Indicator="$packageInstalls package install/build/publish command(s); verify pinned constraints or isolated publish credentials"; Severity='INFO'}
          }

          $report = @()
          $report += "## 9. TanStack/Trivy Indicator Check (Windows Validation)"
          $report += ""
          if ($findings.Count -eq 0) {
            $report += "[OK] No TanStack/Trivy-style supply-chain indicators detected"
          } else {
            $report += "| Workflow | Indicator | Severity |"
            $report += "|----------|-----------|----------|"
            foreach ($f in $findings) {
              $report += "| ``$(Sanitize-Line $f.Workflow)`` | $(Sanitize-Line $f.Indicator) | $($f.Severity) |"
            }
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] TanStack/Trivy indicator check complete (Windows): $($findings.Count) indicators"

      - name: "10. Ref Name Security Validation (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
            function Sanitize-Ref { param([string]$InputString = "") return ($InputString -replace '[^\x20-\x7E]','-' -replace '-+','-' -replace '^-|-$','') }
            function Detect-HiddenChars { param([string]$InputString, [string]$Label="input")
              foreach ($c in $InputString.ToCharArray()) { if ([int]$c -gt 127) { Write-Host "[CRITICAL] Non-ASCII in $Label"; return $true } }
              return $false
            }
          }

          $report = @()
          $report += "## 10. Ref Name Security Validation (Windows Validation)"
          $report += ""
          $report += "Validates branch/ref names for hidden Unicode characters."
          $report += ""

          $refFindings = 0

          # Check HEAD ref
          $headRef = $env:PR_HEAD_REF
          if (-not [string]::IsNullOrEmpty($headRef)) {
            if (Detect-HiddenChars -InputString $headRef -Label "github.head_ref") {
              $refFindings++
              $sanitized = Sanitize-Ref -InputString $headRef
              $report += "### [CRITICAL] Hidden characters in HEAD ref"
              $report += ""
              $report += "| Field | Value |"
              $report += "|-------|-------|"
              $report += "| Raw ref | ``$(Sanitize-Line $headRef)`` |"
              $report += "| Sanitized | ``$(Sanitize-Line $sanitized)`` |"
              $report += "| Severity | CRITICAL |"
              $report += ""
            } else {
              $report += "- HEAD ref ``$(Sanitize-Line $headRef)``: [OK] clean"
            }
          }

          # Check BASE ref
          $baseRef = $env:PR_BASE_REF
          if (-not [string]::IsNullOrEmpty($baseRef)) {
            if (Detect-HiddenChars -InputString $baseRef -Label "github.base_ref") {
              $refFindings++
              $sanitized = Sanitize-Ref -InputString $baseRef
              $report += "### [CRITICAL] Hidden characters in BASE ref"
              $report += ""
              $report += "| Field | Value |"
              $report += "|-------|-------|"
              $report += "| Raw ref | ``$(Sanitize-Line $baseRef)`` |"
              $report += "| Sanitized | ``$(Sanitize-Line $sanitized)`` |"
              $report += ""
            } else {
              $report += "- BASE ref ``$(Sanitize-Line $baseRef)``: [OK] clean"
            }
          }

          # Check GITHUB_REF_NAME
          $refName = $env:GITHUB_REF_NAME
          if (-not [string]::IsNullOrEmpty($refName)) {
            if (Detect-HiddenChars -InputString $refName -Label "GITHUB_REF_NAME") {
              $refFindings++
              $sanitized = Sanitize-Ref -InputString $refName
              $report += "### [CRITICAL] Hidden characters in GITHUB_REF_NAME"
              $report += ""
              $report += "| Field | Value |"
              $report += "|-------|-------|"
              $report += "| Raw ref | ``$(Sanitize-Line $refName)`` |"
              $report += "| Sanitized | ``$(Sanitize-Line $sanitized)`` |"
              $report += ""
            }
          }

          $report += ""
          if ($refFindings -gt 0) {
            $report += "**[CRITICAL] $refFindings ref name(s) contain hidden Unicode characters**"
          } else {
            $report += "[OK] All ref names are clean ASCII"
          }
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] Ref name security validation complete (Windows): $refFindings findings"

      - name: "11. Inventory & Cross-Platform Summary"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          Set-Location $env:SCAN_ROOT
          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $report = @()
          $report += "## 11. Workflow Inventory (Windows Validation)"
          $report += ""
          $report += "| Workflow | Triggers | Explicit Permissions | Pinning |"
          $report += "|----------|----------|-------------|---------|"

          $workflows = Get-ChildItem -Path ".github/workflows" -Filter "*.yml" -ErrorAction SilentlyContinue | Sort-Object Name
          foreach ($wf in $workflows) {
            $content = Get-Content $wf.FullName -Raw -ErrorAction SilentlyContinue

            $triggerList = @(python $env:WORKFLOW_TRIGGER_HELPER $wf.FullName)
            $triggers = if ($triggerList.Count -gt 0) { $triggerList -join ", " } else { "unknown" }

            # Check permissions
            $hasPerms = if ($content -match '(?m)^\s*permissions:') { "Yes" } else { "No" }

            # Check pinning (skip run: block content)
            $totalActs = 0
            $pinnedActs = 0
            $inRunBlock = $false
            $runIndent = 0
            foreach ($ln in $lines) {
              if ($ln -match '^(\s*)run:\s*\|') {
                $inRunBlock = $true
                $runIndent = $matches[1].Length
                continue
              }
              if ($inRunBlock) {
                if ($ln -match '^\S' -or ($ln -match '^(\s*)\S' -and $matches[1].Length -le $runIndent)) {
                  $inRunBlock = $false
                }
              }
              if (-not $inRunBlock -and $ln -match '^\s*-?\s*uses:\s+(.+)$') {
                $usesTarget = $matches[1].Trim()
                if (-not $usesTarget.StartsWith('./')) {
                  $totalActs++
                  if ($usesTarget -match '@[0-9a-f]{40}') { $pinnedActs++ }
                }
              }
            }
            $pinStatus = if ($totalActs -eq 0) { "N/A" } else { "$pinnedActs/$totalActs" }

            $report += "| ``$(Sanitize-Line $wf.Name)`` | $(Sanitize-Line $triggers) | $hasPerms | $pinStatus |"
          }

          $report += ""
          $report += "---"
          $report += ""
          $report += "## Cross-Platform Analysis Metadata"
          $report += ""
          $report += "| Field | Value |"
          $report += "|-------|-------|"
          $report += "| Platform | Windows (PowerShell) |"
          $report += "| Sanitizer | sanitize.ps1 ($(Sanitizer-Version 2>$null)) |"
          $report += "| Analysis target | $(Sanitize-Line $env:ANALYSIS_TARGET) |"
          if ($env:ANALYSIS_TARGET -eq 'Specific PR number' -and $env:PR_NUMBER) {
            $report += "| PR number | #$(Sanitize-Line $env:PR_NUMBER) |"
          }
          if ($env:ANALYSIS_TARGET -eq 'Specific git ref' -and $env:GIT_REF) {
            $report += "| Git ref | $(Sanitize-Line $env:GIT_REF) |"
          }
          $report += "| Severity threshold | $(Sanitize-Line $env:SEVERITY_THRESHOLD) |"
          $report += "| Repository | $(Sanitize-Line $env:GITHUB_REPOSITORY) |"
          $report += "| Run ID | $(Sanitize-Line $env:GITHUB_RUN_ID) |"
          $report += "| Commit | $(Sanitize-Line $(git rev-parse --short HEAD 2>$null)) |"
          $report += "| Timestamp | $(Sanitize-Line $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)) |"
          $report += ""
          $report += "---"
          $report += ""
          $report += "### Governance References"
          $report += ""
          $report += "- [iccDEV CI TanStack audit issue #1016](https://github.com/InternationalColorConsortium/iccDEV/issues/1016)"
          $report += "- [TanStack npm supply-chain compromise postmortem](https://tanstack.com/blog/npm-supply-chain-compromise-postmortem)"
          $report += "- [GitHub Actions cache isolation discussion](https://github.com/orgs/community/discussions/194493)"
          $report += "- [Trivy Supply-Chain Compromise (March 2026)](https://snyk.io/articles/trivy-github-actions-supply-chain-compromise/)"
          $report += "- [tj-actions/changed-files Compromise (March 2025)](https://github.com/advisories/GHSA-mrrh-fwg8-r2c3)"
          $report += "- [Nx Supply-Chain Attack (Feb 2025)](https://nx.dev/blog/security-incident-feb-2025)"
          $report += "- [OpenSSF Scorecard](https://securityscorecards.dev/)"
          $report += "- [GitHub Actions Security Hardening](https://docs.github.com/en/actions/reference/security/secure-use)"
          $report += "- [xsscx/governance/actions](https://github.com/xsscx/governance/tree/main/actions)"
          $report += "- ``.github/instructions/workflow-governance``"
          $report += "- ``.github/scripts/sanitize.ps1`` (PowerShell sanitizer)"
          $report += ""
          $report -join "`n" | Out-File -FilePath $env:RISK_REPORT_PATH -Append -Encoding utf8  # elements-sanitized
          Write-Host "[OK] PR Risk & Security Analysis complete (Windows)"

      - name: "Mark Prior Windows Risk Failure"
        if: failure()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          New-Item -ItemType File -Force -Path (Join-Path $env:RUNNER_TEMP "risk-analysis-windows-failed") | Out-Null

      - name: "12. Enforce Blocking Findings (Windows)"
        if: always() && (github.event_name == 'pull_request' || inputs.fail_on_findings == true)
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $reportPath = $env:RISK_REPORT_PATH
          if ([string]::IsNullOrWhiteSpace($reportPath)) {
            $reportPath = Join-Path $env:RUNNER_TEMP "risk-analysis-report-windows.md"
          }
          if (-not (Test-Path $reportPath)) {
            "[FAIL] Missing risk-analysis report for enforcement" |
              Out-File -FilePath $reportPath -Append -Encoding utf8
            exit 1
          }

          $blockingPatterns = @(
            '^\[CRITICAL\] Found .*injectable expression',
            '^\[CRITICAL\].*Unpinned actions',
            '^\[CRITICAL\].*curl/wget\|bash',
            '^\[CRITICAL\].*checkout PR head code with elevated permissions',
            '^\[CRITICAL\].*id-token: write',
            '^\[CRITICAL\].*hidden Unicode',
            '^\*\*\[CRITICAL\].*hidden Unicode',
            '^\[HIGH\] Missing BASH_ENV',
            '^\[HIGH\].*git force-push/tag-rewrite',
            '^\[HIGH\].*workflow_run \+ download-artifact',
            '^\[HIGH\].*privileged workflow_dispatch publish permissions',
            '^\[HIGH\].*write credentials with GHA cache',
            '^\[HIGH\].*release workflow uses broad cache restore keys'
          )

          function Get-RootCause {
            param([string]$Finding)
            $cause = "A blocking governance rule matched this workflow state."
            $remediation = "Review the finding, remove unsafe trust expansion, and rerun risk analysis."
            if ($Finding -like "*injectable expression*") {
              $cause = "Untrusted GitHub context or matrix data is interpolated directly inside a run block."
              $remediation = "Move the expression to an env value and consume the quoted environment variable from shell."
            } elseif ($Finding -like "*Unpinned actions*") {
              $cause = "A workflow action can be replaced upstream because it is not pinned to an immutable commit SHA."
              $remediation = "Pin every third-party action to a reviewed 40-character commit SHA."
            } elseif ($Finding -like "*curl/wget|bash*") {
              $cause = "Remote script execution bypasses review, pinning, and provenance controls."
              $remediation = "Fetch pinned artifacts, verify checksums/signatures, and execute reviewed local scripts only."
            } elseif ($Finding -like "*checkout PR head code with elevated permissions*") {
              $cause = "Untrusted pull-request code can run with privileged tokens or write-capable workflow context."
              $remediation = "Run PR head code only with read-only permissions, no secrets, and trusted scanner code checked out separately."
            } elseif ($Finding -like "*id-token: write*") {
              $cause = "OIDC federation is available in a context that can be influenced by untrusted workflow triggers."
              $remediation = "Restrict id-token: write to master-only release/publish jobs protected by a GitHub environment."
            } elseif ($Finding -like "*hidden Unicode*") {
              $cause = "A ref or workflow value contains invisible Unicode that can hide intent or confuse review."
              $remediation = "Reject hidden Unicode and require normalized ASCII ref names for automation entry points."
            } elseif ($Finding -like "*Missing BASH_ENV*") {
              $cause = "A shell step does not explicitly block startup-file injection."
              $remediation = "Set BASH_ENV: /dev/null on bash steps and use bash --noprofile --norc."
            } elseif ($Finding -like "*git force-push/tag-rewrite*") {
              $cause = "A workflow contains commands capable of rewriting shared refs or tags."
              $remediation = "Remove rewrite commands from CI or gate them behind protected manual maintainer release flows."
            } elseif ($Finding -like "*workflow_run + download-artifact*") {
              $cause = "A privileged workflow can consume artifacts from a less-trusted workflow boundary."
              $remediation = "Verify artifact provenance and never execute or trust artifacts from untrusted workflows."
            } elseif ($Finding -like "*privileged workflow_dispatch publish permissions*") {
              $cause = "Manual dispatch can reach write-capable publish permissions without both branch and environment controls."
              $remediation = "Require github.ref == refs/heads/master and a protected GitHub environment for publish jobs."
            } elseif ($Finding -like "*write credentials with GHA cache*") {
              $cause = "A write-capable job shares mutable GitHub Actions cache state without a master-only trust boundary."
              $remediation = "Namespace caches by workflow role and restrict write-capable cache producers to master-only jobs."
            } elseif ($Finding -like "*release workflow uses broad cache restore keys*") {
              $cause = "Release builds can restore cache entries from broader or lower-trust cache namespaces."
              $remediation = "Use exact release-specific cache keys with pinned dependency versions and no broad restore prefixes."
            }
            return [pscustomobject]@{ Cause = $cause; Remediation = $remediation }
          }

          $findings = New-Object System.Collections.Generic.List[string]
          foreach ($line in Get-Content -Path $reportPath -ErrorAction SilentlyContinue) {
            foreach ($pattern in $blockingPatterns) {
              if ($line -match $pattern) {
                $findings.Add($line)
                break
              }
            }
          }

          @(
            "",
            "## 12. Enforcement Gate",
            "",
            "Composite supply-chain score and privileged automation inventory are advisory.",
            ""
          ) | Out-File -FilePath $reportPath -Append -Encoding utf8

          if ($findings.Count -gt 0) {
            foreach ($finding in $findings) {
              "- ``$(Sanitize-Line $finding)``" | Out-File -FilePath $reportPath -Append -Encoding utf8
            }
            @(
              "",
              "### Root Cause Analysis",
              "",
              "| Finding | Root cause | Required remediation |",
              "|---------|------------|----------------------|"
            ) | Out-File -FilePath $reportPath -Append -Encoding utf8
            foreach ($finding in $findings) {
              $rca = Get-RootCause $finding
              "| ``$(Sanitize-Line $finding)`` | $(Sanitize-Line $rca.Cause) | $(Sanitize-Line $rca.Remediation) |" |
                Out-File -FilePath $reportPath -Append -Encoding utf8
            }
            "" | Out-File -FilePath $reportPath -Append -Encoding utf8
            "[FAIL] Blocking governance findings: $(Sanitize-Line $findings.Count)" |
              Out-File -FilePath $reportPath -Append -Encoding utf8
            exit 1
          }

          if (Test-Path (Join-Path $env:RUNNER_TEMP "risk-analysis-windows-failed")) {
            @(
              "",
              "### Root Cause Analysis",
              "",
              "| Finding | Root cause | Required remediation |",
              "|---------|------------|----------------------|",
              "| ``prior risk-analysis step failed`` | One or more scanner steps failed before enforcement completed. | Inspect the uploaded report and job log, then fix the scanner/runtime failure so the gate cannot fail open. |",
              "",
              "[FAIL] Risk-analysis step failure detected before enforcement"
            ) | Out-File -FilePath $reportPath -Append -Encoding utf8
            exit 1
          }

          "[OK] No blocking governance findings" | Out-File -FilePath $reportPath -Append -Encoding utf8

      - name: "12. Executive Risk Summary (Windows)"
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
        run: |
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }

          $sanitizerPath = Join-Path $env:TRUSTED_SCRIPTS "sanitize.ps1"
          if (Test-Path $sanitizerPath) { . $sanitizerPath }
          else {
            function Sanitize-Line { param([string]$InputString = "") return $InputString.Replace("&","&amp;").Replace("<","&lt;").Replace(">","&gt;") }
          }

          $reportPath = $env:RISK_REPORT_PATH
          if ([string]::IsNullOrWhiteSpace($reportPath)) {
            $reportPath = Join-Path $env:RUNNER_TEMP "risk-analysis-report-windows.md"
          }
          $reportDir = Split-Path -Parent $reportPath
          if (-not [string]::IsNullOrWhiteSpace($reportDir)) {
            New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          }

          $missingReport = $false
          if (-not (Test-Path $reportPath) -or (Get-Item $reportPath).Length -eq 0) {
            $missingReport = $true
            @(
              "## Risk Gate Analysis Report",
              "",
              "[FAIL] Detailed risk report was not generated."
            ) | Out-File -FilePath $reportPath -Append -Encoding utf8
          }

          $auditFailed = Test-Path (Join-Path $env:RUNNER_TEMP "risk-analysis-windows-failed")

          $blockingPatterns = @(
            '^\[CRITICAL\] Found .*injectable expression',
            '^\[CRITICAL\].*Unpinned actions',
            '^\[CRITICAL\].*curl/wget\|bash',
            '^\[CRITICAL\].*checkout PR head code with elevated permissions',
            '^\[CRITICAL\].*id-token: write',
            '^\[CRITICAL\].*hidden Unicode',
            '^\*\*\[CRITICAL\].*hidden Unicode',
            '^\[HIGH\] Missing BASH_ENV',
            '^\[HIGH\].*git force-push/tag-rewrite',
            '^\[HIGH\].*workflow_run \+ download-artifact',
            '^\[HIGH\].*privileged workflow_dispatch publish permissions',
            '^\[HIGH\].*write credentials with GHA cache',
            '^\[HIGH\].*release workflow uses broad cache restore keys'
          )

          $findings = New-Object System.Collections.Generic.List[string]
          foreach ($line in Get-Content -Path $reportPath -ErrorAction SilentlyContinue) {
            foreach ($pattern in $blockingPatterns) {
              if ($line -match $pattern) {
                $findings.Add($line)
                break
              }
            }
          }

          $result = "[PASS]"
          if ($auditFailed -or $missingReport -or $findings.Count -gt 0) {
            $result = "[FAIL]"
          }

          $summary = @()
          $summary += "## Risk Gate Analysis - Executive Summary"
          $summary += ""
          $summary += "| Field | Value |"
          $summary += "|-------|-------|"
          $summary += "| Result | $(Sanitize-Line $result) |"
          $summary += "| Platform | Windows (PowerShell) |"
          $summary += "| Enforcement enabled | $(Sanitize-Line $env:FAIL_ON_FINDINGS) |"
          $summary += "| Blocking findings | $(Sanitize-Line $findings.Count) |"
          $summary += "| Full report artifact | ``risk-analysis-report-windows`` |"
          $summary += ""

          if ($result -eq "[FAIL]") {
            $summary += "### Failure Evidence"
            $summary += ""
            if ($findings.Count -gt 0) {
              $findings | Select-Object -First 20 | ForEach-Object {
                $summary += "- ``$(Sanitize-Line $_)``"
              }
              if ($findings.Count -gt 20) {
                $summary += "- Additional findings are included in the uploaded full report."
              }
            } elseif ($missingReport) {
              $summary += "- Detailed risk report was not generated."
            } else {
              $summary += "- One or more risk-analysis steps failed before producing blocking-finding evidence."
            }
            $summary += ""
            $summary += "### Root Cause Analysis"
            $summary += ""
            $summary += "Root cause analysis is included in the uploaded full report artifact."
            $summary += ""
          }

          $summary += "Full detailed evidence is uploaded as the ``risk-analysis-report-windows`` artifact."
          $summary += ""
          $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8  # elements-sanitized

      - name: "Upload Windows Risk Report"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: risk-analysis-report-windows
          path: ${{ env.RISK_REPORT_PATH }}
          if-no-files-found: error
          retention-days: 14
