name: "ci-pr-unix"

permissions:
  contents: read
  pull-requests: read  # Required by reusable PR build callers.

on:
  workflow_call:
    inputs:
      os-list:
        description: "List of operating systems"
        required: false
        default: '["ubuntu-latest", "macos-latest"]'
        type: string
      build-types:
        description: "Build types"
        required: false
        default: '["Release", "Debug"]'
        type: string
      compilers:
        description: "Compiler list"
        required: false
        default: '["gcc", "clang"]'
        type: string

# Concurrency is set at job level so each matrix cell has its own group.
# Workflow-level concurrency cannot use github.job (empty) or matrix.* values,
# and github.workflow in a reusable workflow returns the caller's name.

env:
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1
  RUN_URL: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
  PR: ${{ github.event.number }}

jobs:
  build:
    name: "${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    concurrency:
      group: pr-unix-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os-list || '["ubuntu-latest", "macos-latest"]') }}
        compiler: ${{ fromJson(inputs.compilers || '["gcc", "clang"]') }}
        build_type: ${{ fromJson(inputs.build-types || '["Release", "Debug"]') }}
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Validate matrix inputs
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          OS="${MATRIX_OS}"
          COMP="${MATRIX_COMPILER}"
          BT="${MATRIX_BUILD_TYPE}"

          case "$OS" in
            ubuntu-latest|macos-latest) ;;
            *) echo "ERROR: invalid matrix.os: '$OS'. Allowed: ubuntu-latest, macos-latest"; exit 1 ;;
          esac
          case "$COMP" in
            gcc|clang) ;;
            *) echo "ERROR: invalid compiler: '$COMP'. Allowed: gcc, clang"; exit 1 ;;
          esac
          case "$BT" in
            Release|Debug) ;;
            *) echo "ERROR: invalid build type: '$BT'. Allowed: Release, Debug"; exit 1 ;;
          esac

      - name: Check out Repository
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Print the PR Branch Details
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          PR_BASE_REF: ${{ github.base_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_EVENT_NAME: ${{ github.event_name }}
          PR_BUILD_TYPE: ${{ matrix.build_type }}
          PR_COMPILER: ${{ matrix.compiler }}
          PR_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Triggered by:  ${PR_EVENT_NAME}"
          echo "Base branch:   ${PR_BASE_REF}"
          echo "Head branch:   ${PR_HEAD_REF}"
          echo "Commit SHA:    ${PR_HEAD_SHA}"
          echo "Build Type:    ${PR_BUILD_TYPE}"
          echo "Compiler:      ${PR_COMPILER}"
          echo "OS:            ${PR_OS}"

          {
            echo "### PR Branch Details"
            echo ""
            echo "**Triggered by:**  ${PR_EVENT_NAME}"
            echo "**Base branch:**   ${PR_BASE_REF}"
            echo "**Head branch:**   ${PR_HEAD_REF}"
            echo "**Commit SHA:**    ${PR_HEAD_SHA}"
            echo "**Build Type:**    ${PR_BUILD_TYPE}"
            echo "**Compiler:**      ${PR_COMPILER}"
            echo "**OS:**            ${PR_OS}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install Build Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake gcc g++ clang clang-tools \
            libpng-dev libxml2-dev libtiff-dev \
            nlohmann-json3-dev libwxgtk3.2-dev wx-common \
            python3 python3-pip curl git llvm

      - name: Install Build Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          brew install cmake llvm wxwidgets libpng libtiff libxml2 nlohmann-json jpeg-turbo

      - name: Set Compiler Environment Variables
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if [ "$MATRIX_COMPILER" = "gcc" ]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Configure with CMake
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Configuring CMake project..."
          mkdir -p Build
          cd Build
          cmake -DCMAKE_BUILD_TYPE="${MATRIX_BUILD_TYPE}" \
                -DCMAKE_C_COMPILER="$CC" \
                -DCMAKE_CXX_COMPILER="$CXX" \
                 Cmake
          echo "::group::CMake Cache"
          cat CMakeCache.txt || true
          echo "::endgroup::"

      - name: Build Project
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Start build..."
          cd Build
          echo "Compiler: $CC ($($CC --version | head -n 1))"
          echo "CMake build type: ${MATRIX_BUILD_TYPE}"
          jobs="$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)"
          make -j"$jobs" 2>&1 | tee build.log
          WARNING_COUNT=$(grep -cE 'warning:' build.log || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "::warning title=Compiler Warnings::${WARNING_COUNT} warning(s) detected"
            grep -E 'warning:' build.log | sort -u | sed -n '1,20p'
          else
            echo "[OK] Zero compiler warnings"
          fi

      - name: Verify Static Libraries Contain Native Objects
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          BITCODE_FOUND=0
          STATIC_POSTFIX=""
          if [ "$MATRIX_BUILD_TYPE" = "Debug" ]; then
            STATIC_POSTFIX="d"
          fi
          for lib in Build/IccProfLib/libIccProfLib2-static${STATIC_POSTFIX}.a \
                     Build/IccXML/libIccXML2-static${STATIC_POSTFIX}.a \
                     Build/IccJSON/libIccJSON2-static${STATIC_POSTFIX}.a; do
            if [ ! -f "$lib" ]; then
              echo "::error title=Missing Static Library::$lib not found"
              exit 1
            fi
            TMP_DIR="$(mktemp -d)"
            (cd "$TMP_DIR" && ar x "$GITHUB_WORKSPACE/$lib")
            for obj in "$TMP_DIR"/*.o; do
              [ -f "$obj" ] || continue
              FILE_OUT="$(file "$obj")"
              if grep -qi 'LLVM IR bitcode\|LLVM bitcode' <<< "$FILE_OUT"; then
                echo "[FAIL] LLVM bitcode in $lib: $(basename "$obj")"
                BITCODE_FOUND=1
              fi
            done
            OBJ_COUNT="$(find "$TMP_DIR" -name '*.o' | wc -l | tr -d ' ')"
            echo "[OK] $lib: $OBJ_COUNT native objects"
            rm -rf "$TMP_DIR"
          done
          if [ "$BITCODE_FOUND" -ne 0 ]; then
            echo "::error title=Static Library Bitcode::One or more static libraries contain LLVM IR bitcode instead of native objects (see issue 814)"
            exit 1
          fi

      - name: Create Profiles
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Creating profiles..."
          cd Testing
          echo "=== Updating PATH ==="
          for d in ../Build/Tools/*; do
            if [ -d "$d" ]; then
              tool_dir="$(realpath "$d")"
              export PATH="${tool_dir}:$PATH"
            fi
          done
          sh CreateAllProfiles.sh
          sh RunTests.sh
          cd HDR
          sh mkprofiles.sh
          cd ..
          cd hybrid
          sh BuildAndTest.sh
          cd ..
          cd CalcTest
          sh checkInvalidProfiles.sh
          cd ..
          cd mcs
          sh updateprev.sh
          sh updateprevWithBkgd.sh
          cd ..
          find . -iname "*.icc" | wc -l
          echo "Build complete."

      - name: Generate PR Unix Summary Report
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_COMPILER: ${{ matrix.compiler }}
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # Use canonical sanitization from .github/scripts/sanitize-sed.sh
          if [ ! -r .github/scripts/sanitize-sed.sh ]; then
            echo "ERROR: .github/scripts/sanitize-sed.sh not found or not readable" >&2
            exit 1
          fi
          # shellcheck disable=SC1091
          source .github/scripts/sanitize-sed.sh
          SANITIZED_OS=$(sanitize_line "${MATRIX_OS}")
          SANITIZED_COMPILER=$(sanitize_line "${MATRIX_COMPILER}")
          SANITIZED_BUILD_TYPE=$(sanitize_line "${MATRIX_BUILD_TYPE}")
          {
            echo "## ci-pr-unix Build Summary"
            echo "- **OS:**         $SANITIZED_OS"
            echo "- **Compiler:**   $SANITIZED_COMPILER"
            echo "- **Build Type:** $SANITIZED_BUILD_TYPE"
          } >> "$GITHUB_STEP_SUMMARY"
