name: Labeler

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  apply-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Apply PR labels
        uses: actions/labeler@25abb3cad4f14b7ac27968a495c37798860a5a1a  # v5+
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
