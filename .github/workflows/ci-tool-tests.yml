###############################################################
# iccDEV Tool Tests -- ASAN+UBSAN CTest Gate
#
# Builds iccDEV with sanitizer instrumentation and runs the
# script-backed tool suites through CTest. The CTest layer owns
# profile generation, legacy Testing/RunTests.sh, tool coverage,
# JSON/config exercises, and focused regression scripts.
###############################################################

name: iccDEV Tool Tests

permissions:
  contents: read

on:
  push:
    branches:
      - 'fix-bisect-*'
      - 'bisect-*'
    paths:
      - '.github/workflows/ci-tool-tests.yml'
      - '.github/workflows/ci-pr-wasm.yml'
      - '.github/scripts/ci-safe-apt-update.sh'
      - '.github/scripts/iccdev-tool-coverage-baseline.sh'
      - '.github/scripts/iccdev-json-cfg-tests.sh'
      - '.github/scripts/iccdev-json-parser-regression-tests.sh'
      - '.github/scripts/iccdev-stdobserver-regression-tests.sh'
      - '.github/scripts/iccdev-mluc-setter-regression-tests.sh'
      - '.github/scripts/iccdev-mluc-read-utf16-regression-tests.sh'
      - '.github/scripts/iccdev-mluc-iso-code-regression-tests.sh'
      - '.github/scripts/iccdev-pcc-zero-illuminant-regression-tests.sh'
      - '.github/scripts/iccdev-calculator-regression-tests.sh'
      - '.github/scripts/iccdev-lut16-zero-curve-regression-tests.sh'
      - '.github/scripts/iccdev-namedcolor-apply-regression-tests.sh'
      - '.github/scripts/iccdev-version-bcd-regression-tests.sh'
      - '.github/scripts/json-cli-exercise.sh'
      - '.github/ci/test-data/**'
      - '.github/ci/regression/**'
      - 'IccProfLib/**'
      - 'IccXML/**'
      - 'IccJSON/**'
      - 'Tools/**'
      - 'Testing/**'
      - 'Build/Cmake/**'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: "iccDEV Tools -- CTest ASAN+UBSAN"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    env:
      BASH_ENV: /dev/null
      BUILD_DIR: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Harden Bash environment
        env:
          BASH_ENV: /dev/null
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Workflow: ${WORKFLOW_NAME}"
          echo "Ref: ${WORKFLOW_REF}"
          echo "Commit: ${WORKFLOW_SHA}"

      - name: Install build dependencies
        env:
          BASH_ENV: /dev/null
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          bash .github/scripts/ci-safe-apt-update.sh
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang-18 clang++-18 llvm-18 \
            libxml2-dev libtiff-dev libpng-dev libjpeg-dev \
            nlohmann-json3-dev liblzma-dev libwxgtk3.2-dev \
            wx-common libssl-dev libclang-rt-18-dev

      - name: Configure CTest build
        env:
          BASH_ENV: /dev/null
          CC: clang-18
          CXX: clang++-18
          UBSAN_IGNORELIST: .github/ci/ubsan-ignorelist.txt
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake -S Build/Cmake -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_FLAGS="-O0 -g3" \
            -DCMAKE_CXX_FLAGS="-O0 -g3 -std=c++17" \
            -DENABLE_ASAN=ON \
            -DENABLE_UBSAN=ON \
            -DENABLE_INTEGER_SANITIZER=ON \
            -DSANITIZER_RECOVER=ON \
            -DUBSAN_IGNORELIST="${GITHUB_WORKSPACE}/${UBSAN_IGNORELIST}" \
            -DENABLE_TOOLS=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_WXWIDGETS=OFF \
            -DENABLE_SHARED_LIBS=ON \
            -DENABLE_STATIC_LIBS=ON \
            -Wno-dev

      - name: Build
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          cmake --build "${BUILD_DIR}" --parallel "$(nproc)" 2>&1 | tee "${BUILD_DIR}/build.log"

          mapfile -t TOOL_BINS < <(find "${BUILD_DIR}/Tools" -mindepth 2 -maxdepth 2 -type f -executable | sort)
          TOOL_COUNT="${#TOOL_BINS[@]}"
          echo "Built $TOOL_COUNT tool binaries"
          if [ "$TOOL_COUNT" -lt 14 ]; then
            echo "::warning title=Tool Count::Expected at least 14 tools, got $TOOL_COUNT"
          fi

      - name: List CTest suites
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          CTEST_LIST="${BUILD_DIR}/ctest-list.txt"
          ctest --test-dir "${BUILD_DIR}" -N --no-tests=error | tee "${CTEST_LIST}"
          if ! grep -q "^Total Tests: 18$" "${CTEST_LIST}"; then
            echo "::error title=CTest Discovery::Expected Total Tests: 18"
            cat "${CTEST_LIST}"
            exit 1
          fi

      - name: Run CTest suites
        env:
          BASH_ENV: /dev/null
          ASAN_OPTIONS: "halt_on_error=0,detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0,print_stacktrace=1"
          LLVM_PROFILE_FILE: "/dev/null"
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          ctest --test-dir "${BUILD_DIR}" \
            --output-on-failure \
            --no-tests=error \
            --output-junit "${BUILD_DIR}/ctest-results.xml"

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: iccdev-tool-ctest-logs
          path: |
            build/build.log
            build/ctest-list.txt
            build/ctest-results.xml
            build/Testing/Temporary/
            build/Testing/ctest-output/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9

      - name: Generate summary
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [ -f "$SANITIZER" ]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "### iccDEV Tool CTest Summary"
            echo ""
            echo "| Component | Value |"
            echo "|-----------|-------|"
            echo "| Runner | ubuntu-24.04 |"
            echo "| Compiler | $(sanitize_line "$(clang-18 --version 2>/dev/null | sed -n '1,1p')") |"
            echo "| CMake | $(sanitize_line "$(cmake --version 2>/dev/null | sed -n '1,1p')") |"
            echo "| Commit | $(sanitize_line "$(git log --oneline -1 | tr -cd '[:print:]')") |"
            echo "| Test command | \`ctest --test-dir build --output-on-failure --no-tests=error\` |"
            echo ""
            echo "### Manual Reproduction"
            echo ""
            echo '```bash'
            echo "cmake -S Build/Cmake -B build -DCMAKE_BUILD_TYPE=Debug \\"
            echo "  -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 \\"
            echo "  -DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DENABLE_INTEGER_SANITIZER=ON \\"
            echo "  -DSANITIZER_RECOVER=ON -DENABLE_TOOLS=ON -DENABLE_TESTS=ON \\"
            echo "  -DENABLE_WXWIDGETS=OFF -DENABLE_SHARED_LIBS=ON -DENABLE_STATIC_LIBS=ON"
            echo "cmake --build build --parallel \"\$(nproc)\""
            echo "ctest --test-dir build --output-on-failure --no-tests=error"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  wasm-parity:
    name: "WASM Parity -- Testing/CreateAllProfiles.sh -- 207 ICC"
    uses: ./.github/workflows/ci-pr-wasm.yml
    with:
      expected-icc-count: '207'
    permissions:
      contents: read
      pull-requests: read
      actions: read
