#                 All rights reserved.
#                 https://color.org
#
# Intent: Issue #987 Unicolour and MinGW compatibility gate
#
# This workflow intentionally fixes the external repository to
# waacton/Unicolour and validates only the optional ref input before checkout.
# It verifies the Unicolour managed ICC parser still accepts the same FOGRA39
# profile that issue #987 reported as failing through iccDEV ReadIccProfile().
# It also builds the native iccDEV shared library with UCRT64 MinGW and runs
# the focused issue #987 shared-export CTest probe.
#
###############################################################

name: ci-issue-987-compatibility

permissions:
  contents: read

on:
  push:
    branches:
      - issue-987
      - ci-mingw-toolchain
  workflow_dispatch:
    inputs:
      unicolour_ref:
        description: 'waacton/Unicolour branch, tag, or SHA to test'
        required: false
        default: 'main'
        type: string

concurrency:
  group: issue-987-compatibility-${{ github.run_id }}
  cancel-in-progress: false

env:
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1

jobs:
  validate-inputs:
    name: "Validate Unicolour Inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    outputs:
      unicolour_ref: ${{ steps.validate.outputs.unicolour_ref }}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate workflow_dispatch inputs
        id: validate
        env:
          BASH_ENV: /dev/null
          RAW_UNICOLOUR_REF: ${{ github.event.inputs.unicolour_ref || 'main' }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          ref="${RAW_UNICOLOUR_REF}"
          if [[ "$ref" =~ ^[0-9A-Fa-f]{7,40}$ ]]; then
            :
          elif [[ ! "$ref" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,127}$ ]]; then
            echo "::error title=Invalid Unicolour ref::Rejected ref $(sanitize_line "$ref")"
            exit 1
          fi

          case "$ref" in
            */.|*/..|-*|*//*|*@\{*|*.lock|*/|*..*|refs/*)
              echo "::error title=Invalid Unicolour ref::Rejected ref $(sanitize_line "$ref")"
              exit 1
              ;;
          esac

          safe_ref="$(sanitize_ref "$ref")"
          if [[ "$safe_ref" != "$ref" ]]; then
            echo "::error title=Invalid Unicolour ref::Rejected ref $(sanitize_line "$ref")"
            exit 1
          fi

          printf 'unicolour_ref=%s\n' "$safe_ref" >> "$GITHUB_OUTPUT"

          {
            echo "### Issue #987 Unicolour input validation"
            echo ""
            echo "- Repository: \`waacton/Unicolour\`"
            echo "- Ref: \`$(sanitize_line "$safe_ref")\`"
          } >> "$GITHUB_STEP_SUMMARY"

  unicolour-tests:
    name: "Issue #987 Unicolour ICC tests"
    needs: validate-inputs
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout Unicolour
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          repository: waacton/Unicolour
          ref: ${{ needs.validate-inputs.outputs.unicolour_ref }}
          path: unicolour
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.0.x'

      - name: Run Unicolour test suite
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
          UNICOLOUR_REF: ${{ needs.validate-inputs.outputs.unicolour_ref }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $env:DOTNET_CLI_TELEMETRY_OPTOUT = '1'
          $env:NUGET_XMLDOC_MODE = 'skip'
          $env:GH_NO_UPDATE_NOTIFIER = '1'
          $env:GH_PROMPT_DISABLED = '1'

          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_URL) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_URL
          }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_TOKEN) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_TOKEN
          }
          . .github/scripts/sanitize.ps1

          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $unicolourDir = [System.IO.Path]::GetFullPath(
            (Join-Path $workspace 'unicolour')
          )
          if (-not $unicolourDir.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Unicolour checkout escaped workspace"
          }
          if (-not (Test-Path -LiteralPath $unicolourDir)) {
            throw "Unicolour checkout missing"
          }

          $origin = git -C $unicolourDir config --get remote.origin.url
          if ($origin -notmatch 'github\.com[:/]waacton/Unicolour(\.git)?$') {
            throw "Unexpected Unicolour origin: $(Sanitize-Line $origin)"
          }

          $cpu = [Environment]::ProcessorCount
          $testProject = Join-Path $unicolourDir 'Unicolour.Tests\Unicolour.Tests.csproj'
          $testResults = Join-Path $unicolourDir 'Unicolour.Tests\TestResults'
          New-Item -ItemType Directory -Force -Path $testResults | Out-Null

          dotnet --info
          dotnet restore $testProject
          dotnet build $testProject --no-restore --configuration Debug --tl:off `
            -p:UseSharedCompilation=false
          dotnet test $testProject --no-build --no-restore --configuration Debug `
            --tl:off --logger "trx;LogFileName=issue-987-unicolour.trx" `
            --filter "FullyQualifiedName~IccProfileTests.Fogra39" `
            --blame-hang-timeout 5m --blame-hang-dump-type mini -- `
            "NUnit.NumberOfTestWorkers=$cpu"

          $trxPath = Join-Path $testResults 'issue-987-unicolour.trx'
          if (-not (Test-Path -LiteralPath $trxPath)) {
            throw "TRX result missing: $(Sanitize-Line $trxPath)"
          }

          [xml]$trx = Get-Content -Raw -Path $trxPath
          $counters = $trx.TestRun.ResultSummary.Counters
          $total = [int]$counters.total
          $passed = [int]$counters.passed
          $failed = [int]$counters.failed
          $errors = [int]$counters.error
          $timeouts = [int]$counters.timeout
          $aborted = [int]$counters.aborted

          if ($total -le 0) {
            throw "Unicolour test suite did not execute tests"
          }
          if (($failed + $errors + $timeouts + $aborted) -ne 0) {
            throw "Unicolour test suite reported failures"
          }
          if ($passed -ne $total) {
            throw "Unicolour test suite did not pass every executed test"
          }

          $definitions = @{}
          foreach ($unitTest in $trx.TestRun.TestDefinitions.UnitTest) {
            $definitions[$unitTest.id] = $unitTest
          }
          $fograPassed = $false
          foreach ($result in $trx.TestRun.Results.UnitTestResult) {
            if ($result.outcome -ne 'Passed') { continue }
            if (-not $definitions.ContainsKey($result.testId)) { continue }
            $test = $definitions[$result.testId]
            $method = $test.TestMethod
            if ($method.className -eq 'Wacton.Unicolour.Tests.IccProfileTests' -and
                $method.name -eq 'Fogra39') {
              $fograPassed = $true
              break
            }
          }
          if (-not $fograPassed) {
            throw "Issue #987 FOGRA39 ICC parser test did not pass"
          }

          $summaryLines = @(
            "### Issue #987 Unicolour ICC compatibility",
            "",
            "- Repository: ``waacton/Unicolour``",
            "- Ref: ``$(Sanitize-Line $env:UNICOLOUR_REF)``",
            "- Total tests: ``$total``",
            "- Passed tests: ``$passed``",
            "- Issue #987 signal: ``IccProfileTests.Fogra39`` passed",
            "- Workers: ``$cpu``"
          )
          $summaryLines | ForEach-Object {
            Sanitize-Print $_
          } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload Unicolour test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: issue-987-unicolour-results
          path: unicolour/Unicolour.Tests/TestResults
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9

  mingw-shared-export:
    name: "Issue #987 MinGW ${{ matrix.build_type }} ${{ matrix.linkage }}"
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release
          - RelWithDebInfo
        linkage:
          - shared
          - static
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}

    steps:
      - name: Checkout iccDEV
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0 (node24)
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup MSYS2 UCRT64 MinGW
        id: setup-msys2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: "Run MinGW issue #987 CTest"
        env:
          POWERSHELL_TELEMETRY_OPTOUT: 1
          POWERSHELL_UPDATECHECK: Off
          BUILD_TYPE: ${{ matrix.build_type }}
          LINKAGE: ${{ matrix.linkage }}
          MSYS2_LOCATION: ${{ steps.setup-msys2.outputs.msys2-location }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSDefaultParameterValues['*:ErrorAction'] = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $env:GH_NO_UPDATE_NOTIFIER = '1'
          $env:GH_PROMPT_DISABLED = '1'

          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_URL) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_URL
          }
          if (Test-Path env:ACTIONS_ID_TOKEN_REQUEST_TOKEN) {
            Remove-Item env:ACTIONS_ID_TOKEN_REQUEST_TOKEN
          }
          . .github/scripts/sanitize.ps1

          $msysRoot = [System.IO.Path]::GetFullPath($env:MSYS2_LOCATION)
          $ucrtBin = Join-Path $msysRoot 'ucrt64\bin'
          $usrBin = Join-Path $msysRoot 'usr\bin'
          $env:PATH = "$ucrtBin;$usrBin;$env:PATH"
          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $sourceDir = Join-Path $workspace 'Build\Cmake'
          $buildName = "build-mingw-issue987-$($env:BUILD_TYPE)-$($env:LINKAGE)"
          $buildDir = Join-Path $sourceDir $buildName
          $reproDir = Join-Path $buildDir 'Testing\issue-987-mingw-tool-repro'

          $cmake = Join-Path $ucrtBin 'cmake.exe'
          $ctest = Join-Path $ucrtBin 'ctest.exe'
          $gcc = Join-Path $ucrtBin 'x86_64-w64-mingw32-gcc.exe'
          $gxx = Join-Path $ucrtBin 'x86_64-w64-mingw32-g++.exe'
          $ninja = Join-Path $ucrtBin 'ninja.exe'
          $objdump = Join-Path $ucrtBin 'objdump.exe'

          foreach ($tool in @($cmake, $ctest, $gcc, $gxx, $ninja, $objdump)) {
            if (-not (Test-Path -LiteralPath $tool)) {
              throw "Required MinGW tool missing: $(Sanitize-Line $tool)"
            }
          }

          function Invoke-Native {
            param(
              [Parameter(Mandatory = $true)][string] $FilePath,
              [Parameter(Mandatory = $true)][string[]] $Arguments
            )
            & $FilePath @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "$(Sanitize-Line $FilePath) failed with exit code $LASTEXITCODE"
            }
          }

          if (Test-Path -LiteralPath $buildDir) {
            Remove-Item -Recurse -Force -LiteralPath $buildDir
          }

          $sharedLibs = if ($env:LINKAGE -eq 'shared') { 'ON' } else { 'OFF' }
          $staticLibs = 'ON'
          Invoke-Native $cmake @(
            '-S', $sourceDir,
            '-B', $buildDir,
            '-G', 'Ninja',
            "-DCMAKE_BUILD_TYPE=$($env:BUILD_TYPE)",
            "-DCMAKE_C_COMPILER=$gcc",
            "-DCMAKE_CXX_COMPILER=$gxx",
            '-DENABLE_TOOLS=ON',
            '-DENABLE_ICCXML=ON',
            '-DENABLE_ICCJSON=OFF',
            '-DENABLE_IMAGE_TOOLS=OFF',
            '-DENABLE_WXWIDGETS=OFF',
            '-DENABLE_CMM_TOOLS=OFF',
            '-DENABLE_IIS_TOOLS=OFF',
            '-DENABLE_TESTS=ON',
            "-DENABLE_SHARED_LIBS=$sharedLibs",
            "-DENABLE_STATIC_LIBS=$staticLibs"
          )
          $buildTargets = @('iccDumpProfile')
          if ($env:LINKAGE -eq 'shared') {
            $buildTargets += 'IccProfLib2'
          }
          else {
            $buildTargets += 'IccProfLib2-static'
          }
          Invoke-Native $cmake (@(
            '--build', $buildDir,
            '--target'
          ) + $buildTargets + @('--parallel'))

          Invoke-Native $ctest @(
            '--test-dir', $buildDir,
            '-N',
            '-R', '^iccdev\.windows-icc-dump-profile-smoke$',
            '--no-tests=error'
          )
          Invoke-Native $ctest @(
            '--test-dir', $buildDir,
            '-R', '^iccdev\.windows-icc-dump-profile-smoke$',
            '--output-on-failure',
            '--no-tests=error'
          )

          $ctestSignals = @('iccdev.windows-icc-dump-profile-smoke passed')
          if ($env:LINKAGE -eq 'shared') {
            Invoke-Native $ctest @(
              '--test-dir', $buildDir,
              '-N',
              '-R', '^iccdev\.issue-987-shared-mpe-export$',
              '--no-tests=error'
            )
            Invoke-Native $ctest @(
              '--test-dir', $buildDir,
              '-R', '^iccdev\.issue-987-shared-mpe-export$',
              '--output-on-failure',
              '--no-tests=error'
            )
            $ctestSignals += 'iccdev.issue-987-shared-mpe-export passed'
          }
          else {
            $ctestSignals += 'iccdev.issue-987-shared-mpe-export skipped for static-only build'
          }
          $ctestSignal = $ctestSignals -join '; '

          New-Item -ItemType Directory -Force -Path $reproDir | Out-Null
          $buildInfo = Join-Path $reproDir 'build-info.txt'
          $compilerLine = (& $gxx --version)[0]
          @(
            "Issue #987 MinGW build fingerprint",
            "MSYS2 system: UCRT64",
            "Build type: $($env:BUILD_TYPE)",
            "Linkage: $($env:LINKAGE)",
            "Shared libs: $sharedLibs",
            "Static libs: $staticLibs",
            "Compiler: $compilerLine",
            "CMake: $((& $cmake --version)[0])",
            "Ninja: $((& $ninja --version)[0])",
            "CTest signals: $ctestSignal"
          ) | Set-Content -LiteralPath $buildInfo -Encoding ascii

          if ($env:LINKAGE -eq 'shared') {
            $dllPath = Join-Path $buildDir 'IccProfLib\libIccProfLib2.dll'
            if (Test-Path -LiteralPath $dllPath) {
              & $objdump -p $dllPath > (Join-Path $reproDir 'IccProfLib2-objdump-exports.txt')
            }
          }

          $profileZip = Join-Path $reproDir 'Coated_Fogra39L_VIGC_300.zip'
          $profileUrl = 'https://github.com/user-attachments/files/27490581/Coated_Fogra39L_VIGC_300.zip'
          Invoke-WebRequest -Uri $profileUrl -OutFile $profileZip
          Expand-Archive -LiteralPath $profileZip -DestinationPath $reproDir -Force
          $profile = Get-ChildItem -LiteralPath $reproDir -Recurse -File -Filter 'Coated_Fogra39L_VIGC_300.icc' |
            Select-Object -First 1
          if (-not $profile) {
            throw "Issue #987 attached profile was not found after extraction"
          }
          $profileHash = (Get-FileHash -LiteralPath $profile.FullName -Algorithm SHA256).Hash
          $expectedHash = '6DF43849A84D2632E7900A125F657BD09364ED56775BC4740C1E39A5492D47E3'
          if ($profileHash -ne $expectedHash) {
            throw "Issue #987 profile SHA256 mismatch: $(Sanitize-Line $profileHash)"
          }
          if ($profile.Length -ne 8652444) {
            throw "Issue #987 profile size mismatch: $($profile.Length)"
          }

          $dumpTool = Join-Path $buildDir 'Tools\IccDumpProfile\iccDumpProfile.exe'
          if (-not (Test-Path -LiteralPath $dumpTool)) {
            throw "MinGW iccDumpProfile not found: $(Sanitize-Line $dumpTool)"
          }
          $toolStdout = Join-Path $reproDir 'iccDumpProfile-read-diag.stdout.log'
          $toolStderr = Join-Path $reproDir 'iccDumpProfile-read-diag.stderr.log'
          $profileInfo = Join-Path $reproDir 'profile-info.txt'

          & $dumpTool --read --diag 1 $profile.FullName > $toolStdout 2> $toolStderr
          if ($LASTEXITCODE -ne 0) {
            throw "MinGW iccDumpProfile --read --diag failed with exit code $LASTEXITCODE"
          }

          $stdoutLines = Get-Content -Path $toolStdout
          $stderrText = Get-Content -Raw -Path $toolStderr
          if ($stdoutLines -match 'Unable to parse') {
            throw "Issue #987 repro failed: MinGW iccDumpProfile could not parse the FOGRA39 profile"
          }
          if (-not ($stdoutLines -match 'Size:\s+8652444')) {
            throw "Issue #987 repro missing expected profile size"
          }
          if (-not ($stdoutLines -match 'Profile Tags \(14\)')) {
            throw "Issue #987 repro missing expected tag count"
          }
          $chadPattern = "'chad'\s+520\s+44"
          if (-not ($stdoutLines -match $chadPattern)) {
            throw "Issue #987 repro missing expected chad tag offset/size"
          }
          if (($stdoutLines -match '1936077618') -or ($stderrText -match '1936077618')) {
            throw "Issue #987 repro detected the reported invalid TagInfo.size value"
          }
          if ($stderrText -notmatch 'Header size matches file stat: 8652444 bytes') {
            throw "Issue #987 repro missing header/file-size diagnostic"
          }

          $chadLine = ($stdoutLines | Select-String -Pattern $chadPattern |
            Select-Object -First 1).Line
          @(
            "Issue #987 MinGW iccDumpProfile repro",
            "Build type: $($env:BUILD_TYPE)",
            "Linkage: $($env:LINKAGE)",
            "Profile URL: $profileUrl",
            "Profile file: $($profile.Name)",
            "Profile bytes: $($profile.Length)",
            "Profile SHA256: $profileHash",
            "Command: iccDumpProfile --read --diag 1 $($profile.Name)",
            "Expected result: ReadIccProfile succeeds, 14 tags, chad offset=520 size=44",
            "Observed chad line: $chadLine",
            "Reported bad TagInfo.size 1936077618 observed: no"
          ) | Set-Content -LiteralPath $profileInfo -Encoding ascii

          $summaryLines = @(
            "### Issue #987 MinGW CTest",
            "",
            "- MSYS2 system: ``UCRT64``",
            "- Build type: ``$(Sanitize-Line $env:BUILD_TYPE)``",
            "- Linkage: ``$(Sanitize-Line $env:LINKAGE)``",
            "- Compiler: ``$(Sanitize-Line $compilerLine)``",
            "- CTest signals: ``$(Sanitize-Line $ctestSignal)``",
            "",
            "### Issue #987 MinGW iccDEV tool repro",
            "",
            "- Tool: ``iccDumpProfile --read --diag``",
            "- Profile: ``Coated_Fogra39L_VIGC_300.icc``",
            "- Profile bytes: ``$($profile.Length)``",
            "- Profile SHA256: ``$profileHash``",
            "- ReadIccProfile result: ``OK``",
            "- Tag count: ``14``",
            "- chad tag: ``$(Sanitize-Line $chadLine)``",
            "- Reported bad TagInfo.size ``1936077618`` observed: ``no``"
          )
          $summaryLines | ForEach-Object {
            Sanitize-Print $_
          } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload MinGW CTest results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: issue-987-mingw-${{ matrix.build_type }}-${{ matrix.linkage }}-results
          path: Build/Cmake/build-mingw-issue987-${{ matrix.build_type }}-${{ matrix.linkage }}/Testing
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
