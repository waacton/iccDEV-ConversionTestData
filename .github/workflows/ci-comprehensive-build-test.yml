#
# Intent: ci-build-matrix
#         Tests all build configurations, sanitizers, and options
#         This workflow will replace ci-pr-actions in time
#
# Last Updated: 2026-04-02 14:35:21 UTC by David Hoyt
#               - Shorten Options Listing
#               - QA Cross Platform arm64 & x64
#
#  Ensure the expected outcome on Windows. 
#  This is the CMake XML Bug TODO at Line 1111
#
# All PR _must_ PASS this workflow
#
###############################################################

name: "ci-build-matrix"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build (leave empty to use --ref branch)'
        required: false
        default: ''
        type: string
      pr_number:
        description: 'Pull request number to build (overrides branch)'
        required: false
        type: number

concurrency:
  group: comprehensive-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1
  RUN_URL: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
  CHECKOUT_REF: ${{ github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number) || github.event.inputs.ref || github.ref_name || 'master' }}

jobs:
  #############################################################################
  # Job 0: Validate Inputs (defense-in-depth)
  #############################################################################
  validate-ref:
    name: "Validate checkout ref"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate CHECKOUT_REF pattern
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          CHECKOUT_REF: ${{ env.CHECKOUT_REF }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          # Defense-in-depth: inputs.ref is type:choice,
          # inputs.pr_number is type:number. Validate the derived ref.
          # Accept: master, PR refs, and valid branch names (alphanumeric, hyphens, dots, slashes, underscores).
          case "${CHECKOUT_REF}" in
            master|refs/pull/[0-9]*/head)
              echo "✅ Valid ref: ${CHECKOUT_REF}" ;;
            *)
              # Validate branch name: only safe characters, no '..' path traversal
              if [[ "${CHECKOUT_REF}" =~ ^[a-zA-Z0-9][a-zA-Z0-9._/-]*$ ]] && \
                 [[ ! "${CHECKOUT_REF}" =~ \.\. ]]; then
                echo "✅ Valid branch ref: ${CHECKOUT_REF}"
              else
                echo "❌ Unexpected CHECKOUT_REF pattern: blocked" >&2
                exit 1
              fi ;;
          esac

  #############################################################################
  # Job 1: Standard Project Builds
  #############################################################################
  standard-builds:
    needs: [validate-ref]
    name: "Standard • ${{ matrix.os }} • ${{ matrix.compiler }} • ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        build_type: [Release, Debug, RelWithDebInfo]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Dependencies (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/ccache
          key: ${{ runner.os }}-deps-${{ matrix.compiler }}-${{ hashFiles('Build/Cmake/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ matrix.compiler }}-
            ${{ runner.os }}-deps-

      - name: Cache Dependencies (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/.cache/ccache
          key: ${{ runner.os }}-deps-${{ matrix.compiler }}-${{ hashFiles('Build/Cmake/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ matrix.compiler }}-
            ${{ runner.os }}-deps-

      - name: Configure Git Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake gcc g++ clang ccache \
            libpng-dev libxml2-dev libtiff-dev \
            nlohmann-json3-dev
          ccache --zero-stats || true

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          brew install cmake llvm libpng libtiff libxml2 nlohmann-json ccache
          ccache --zero-stats || true

      - name: Disable wxWidgets (headless CI)
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          sed -i.bak 's/^  find_package(wxWidgets COMPONENTS core base REQUIRED)/  # find_package(wxWidgets COMPONENTS core base REQUIRED) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^      ADD_SUBDIRECTORY(Tools\/wxProfileDump)/      # ADD_SUBDIRECTORY(Tools\/wxProfileDump) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^    message(FATAL_ERROR "wxWidgets not found/    # message(FATAL_ERROR "wxWidgets not found/g' Build/Cmake/CMakeLists.txt

      - name: Set Compiler
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if [ "$MATRIX_COMPILER" = "gcc" ]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Configure CMake
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build && cd Build
          cmake ../Build/Cmake \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE" \
                -DENABLE_SHARED_LIBS=ON \
                -DENABLE_STATIC_LIBS=ON \
                -DENABLE_TOOLS=ON

      - name: Build
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          # Enable ccache if available
          if command -v ccache >/dev/null 2>&1; then
            export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
            if [ "$MATRIX_COMPILER" = "gcc" ]; then
              export CC="ccache gcc"
              export CXX="ccache g++"
            else
              export CC="ccache clang"
              export CXX="ccache clang++"
            fi
          fi

          cd Build
          echo "::group::Build Output"
          BUILD_START=$(date +%s)
          make -j$(nproc || sysctl -n hw.logicalcpu) 2>&1 | tee build.log
          BUILD_END=$(date +%s)
          echo "::endgroup::"
          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo "::notice title=Build Time::Build completed in ${BUILD_TIME}s"
          if grep -iE '(^.*error:|undefined reference|cannot find -l)' build.log | grep -v 'error\.h\|Error handling\|error_category'; then
            echo "::error title=Build Failed::Build errors detected in log"
            exit 1
          fi
          WARNING_COUNT=$(grep -cE 'warning:' build.log || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "::warning title=Compiler Warnings::${WARNING_COUNT} warning(s) detected in build"
            grep -E 'warning:' build.log | sort -u | sed -n '1,20p'
          else
            echo "[OK] Zero compiler warnings"
          fi
          # Show ccache stats if available
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache Statistics"
            ccache --show-stats || true
            echo "::endgroup::"
          fi

      - name: Upload Build Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: build-logs-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            Build/build.log
            Build/CMakeCache.txt
            Build/CMakeFiles/CMakeError.log
            Build/CMakeFiles/CMakeOutput.log
          retention-days: 7

      - name: Upload Build Artifacts (on success)
        if: success()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: build-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            Build/Tools/IccApplyNamedCmm/**/IccApplyNamedCmm
            Build/Tools/IccDumpProfile/**/IccDumpProfile
            Build/Tools/IccFromXml/**/IccFromXml
            Build/Tools/IccToXml/**/IccToXml
            Build/IccProfLib/libIccProfLib2*
            Build/IccXML/libIccXML2*
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9

      - name: Test Profiles
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Testing
          for d in ../Build/Tools/*; do
            [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
          done
          sh CreateAllProfiles.sh
          PROFILE_COUNT=$(find . -name "*.icc" | wc -l)
          echo "Created $PROFILE_COUNT profiles"
          if [ "$PROFILE_COUNT" -eq 0 ]; then
            echo "ERROR: No profiles created"
            exit 1
          fi

  #############################################################################
  # Job 2: Sanitizer Builds (Individual Sanitizers)
  #############################################################################
  sanitizer-builds:
    needs: [validate-ref]
    name: "Sanitizer • ${{ matrix.sanitizer }} • ${{ matrix.build_type }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, RelWithDebInfo]
        sanitizer:
          - asan
          - ubsan
          - asan-ubsan
          - asan-ubsan-integer
        exclude:
          - sanitizer: asan-ubsan
            build_type: RelWithDebInfo
          - sanitizer: asan-ubsan-integer
            build_type: RelWithDebInfo

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/ccache
          key: sanitizer-deps-${{ matrix.sanitizer }}-${{ hashFiles('Build/Cmake/CMakeLists.txt') }}
          restore-keys: |
            sanitizer-deps-${{ matrix.sanitizer }}-
            sanitizer-deps-

      - name: Configure Git Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake clang llvm \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Disable wxWidgets (headless CI)
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          sed -i.bak 's/^  find_package(wxWidgets COMPONENTS core base REQUIRED)/  # find_package(wxWidgets COMPONENTS core base REQUIRED) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^      ADD_SUBDIRECTORY(Tools\/wxProfileDump)/      # ADD_SUBDIRECTORY(Tools\/wxProfileDump) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^    message(FATAL_ERROR "wxWidgets not found/    # message(FATAL_ERROR "wxWidgets not found/g' Build/Cmake/CMakeLists.txt

      - name: Configure with Sanitizer
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_SANITIZER: ${{ matrix.sanitizer }}
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build && cd Build
          case "$MATRIX_SANITIZER" in
            asan)
              OPTS="-DENABLE_ASAN=ON"
              ;;
            ubsan)
              OPTS="-DENABLE_UBSAN=ON"
              ;;
            asan-ubsan)
              OPTS="-DENABLE_ASAN=ON -DENABLE_UBSAN=ON"
              ;;
            asan-ubsan-integer)
              OPTS="-DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DENABLE_INTEGER_SANITIZER=ON"
              ;;
          esac
          CC=clang CXX=clang++ cmake ../Build/Cmake \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE" \
                $OPTS

      - name: Build with Sanitizer
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build
          make -j$(nproc) 2>&1 | tee build.log
          if grep -iE 'error:' build.log; then
            echo "ERROR: Build failed"
            exit 1
          fi
          WARNING_COUNT=$(grep -cE 'warning:' build.log || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "::warning title=Compiler Warnings (Sanitizer Build)::${WARNING_COUNT} warning(s) detected"
            grep -E 'warning:' build.log | sort -u | sed -n '1,20p'
          else
            echo "[OK] Zero compiler warnings (sanitizer build)"
          fi

      - name: Test with Sanitizer
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Testing
          for d in ../Build/Tools/*; do
            [ -d "$d" ] && export PATH="$(realpath "$d"):$PATH"
          done
          timeout 300 sh CreateAllProfiles.sh || echo "Profile creation timed out (acceptable for sanitizer builds)"

      - name: Upload Sanitizer Build Artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: sanitizer-${{ matrix.sanitizer }}-${{ matrix.build_type }}
          path: |
            Build/Tools/IccApplyNamedCmm/IccApplyNamedCmm/IccApplyNamedCmm
            Build/Tools/IccDumpProfile/IccDumpProfile/IccDumpProfile
            Build/IccProfLib/libIccProfLib2*
            Build/build.log
          if-no-files-found: warn
          retention-days: 7
          compression-level: 9

  #############################################################################
  # Job 3: Build Option Matrix (Test Each Option Independently)
  #############################################################################
  option-matrix:
    needs: [validate-ref]
    name: "Option • ${{ matrix.option_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - option_name: "VERBOSE_CONFIG=ON"
            cmake_opts: "-DVERBOSE_CONFIG=ON"
          - option_name: "ENABLE_COVERAGE=ON"
            cmake_opts: "-DENABLE_COVERAGE=ON"
          - option_name: "ICC_ENABLE_ASSERTS=ON"
            cmake_opts: "-DICC_ENABLE_ASSERTS=ON"
          - option_name: "ICC_TRACE_NAN_ENABLED=ON"
            cmake_opts: "-DICC_TRACE_NAN_ENABLED=ON"
          - option_name: "SHARED_ONLY"
            cmake_opts: "-DENABLE_SHARED_LIBS=ON -DENABLE_STATIC_LIBS=OFF"
          - option_name: "STATIC_ONLY"
            cmake_opts: "-DENABLE_SHARED_LIBS=OFF -DENABLE_STATIC_LIBS=ON"
          # -------------------------------------------------------------------
          # LTO/IPO Validation Matrix (PR #716)
          # Tests all branches of the LTO configuration logic in CMakeLists.txt
          # -------------------------------------------------------------------
          - option_name: "LTO=OFF (user override)"
            cmake_opts: "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF"
            lto_expected: "OFF"
            lto_message: "user override"
          - option_name: "LTO=ON (user override)"
            cmake_opts: "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON"
            lto_expected: "ON"
            lto_message: "user override"
          - option_name: "LTO auto Release (should enable)"
            cmake_opts: ""
            build_type_override: "Release"
            lto_expected: "ON"
            lto_message: "enabled for Release"
          - option_name: "LTO auto Debug (should disable)"
            cmake_opts: ""
            build_type_override: "Debug"
            lto_expected: "OFF"
            lto_message: "disabled: build type"
          - option_name: "LTO auto RelWithDebInfo (should disable)"
            cmake_opts: ""
            build_type_override: "RelWithDebInfo"
            lto_expected: "OFF"
            lto_message: "disabled: build type"
          - option_name: "LTO + ASAN (should auto-disable)"
            cmake_opts: "-DENABLE_ASAN=ON"
            lto_expected: "OFF"
            lto_message: "sanitizers are enabled"
          - option_name: "LTO + Coverage (should auto-disable)"
            cmake_opts: "-DENABLE_COVERAGE=ON"
            lto_expected: "OFF"
            lto_message: "ENABLE_COVERAGE is ON"
          - option_name: "LTO=ON override + ASAN (user wins)"
            cmake_opts: "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DENABLE_ASAN=ON"
            lto_expected: "ON"
            lto_message: "user override"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake clang \
            libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Disable wxWidgets (headless CI)
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          sed -i.bak 's/^  find_package(wxWidgets COMPONENTS core base REQUIRED)/  # find_package(wxWidgets COMPONENTS core base REQUIRED) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^      ADD_SUBDIRECTORY(Tools\/wxProfileDump)/      # ADD_SUBDIRECTORY(Tools\/wxProfileDump) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^    message(FATAL_ERROR "wxWidgets not found/    # message(FATAL_ERROR "wxWidgets not found/g' Build/Cmake/CMakeLists.txt

      - name: Configure with Option
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_CMAKE_OPTS: ${{ matrix.cmake_opts }}
          MATRIX_BUILD_TYPE: ${{ matrix.build_type_override || 'Release' }}
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build && cd Build
          cmake Cmake/ \
                -DCMAKE_BUILD_TYPE="$MATRIX_BUILD_TYPE" \
                $MATRIX_CMAKE_OPTS 2>&1 | tee cmake-configure.log

      - name: Validate LTO Configuration
        if: ${{ matrix.lto_expected }}
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          LTO_EXPECTED: ${{ matrix.lto_expected }}
          LTO_MESSAGE: ${{ matrix.lto_message }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          echo "::group::LTO Validation"
          echo "Expected LTO status: ${LTO_EXPECTED}"
          echo "Expected message fragment: ${LTO_MESSAGE}"

          # Check cmake configure output for the LTO status message
          if [ ! -f Build/cmake-configure.log ]; then
            echo "::error::cmake-configure.log not found"
            exit 1
          fi

          echo "--- LTO-related cmake output ---"
          grep -i 'Link-Time Optimization\|INTERPROCEDURAL' Build/cmake-configure.log || true
          echo "--- end ---"

          # Primary validation: cmake status message (authoritative for all cases)
          # CMakeLists.txt uses set() without CACHE for auto-enable/disable, so the
          # cmake status message is the only reliable signal. CMakeCache.txt only
          # contains the variable when the user passes -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=X.
          if ! grep -q "${LTO_MESSAGE}" Build/cmake-configure.log; then
            echo "::error::Expected LTO message '${LTO_MESSAGE}' not found in cmake output"
            echo "Full cmake output:"
            cat Build/cmake-configure.log
            exit 1
          fi
          echo "✅ cmake status message confirmed: '${LTO_MESSAGE}'"

          # Secondary validation: verify actual LTO flag propagation via RULE_LAUNCH or target properties
          # For user-override cases, also check CMakeCache (only -D flags create cache entries)
          CACHE_VALUE=$(grep -E '^CMAKE_INTERPROCEDURAL_OPTIMIZATION:' Build/CMakeCache.txt | head -1 | cut -d= -f2 || echo "NOT_SET")
          RELEASE_VALUE=$(grep -E '^CMAKE_INTERPROCEDURAL_OPTIMIZATION_RELEASE:' Build/CMakeCache.txt | head -1 | cut -d= -f2 || echo "NOT_SET")
          echo "CMakeCache LTO: ${CACHE_VALUE}, Release: ${RELEASE_VALUE}"

          if grep -q "user override" <<< "${LTO_MESSAGE}"; then
            # User -D override MUST appear in CMakeCache
            if [ "${LTO_EXPECTED}" = "ON" ] && [ "${CACHE_VALUE}" != "ON" ]; then
              echo "::error::User override LTO=ON but CMakeCache shows: ${CACHE_VALUE}"
              exit 1
            elif [ "${LTO_EXPECTED}" = "OFF" ] && [ "${CACHE_VALUE}" != "OFF" ]; then
              echo "::error::User override LTO=OFF but CMakeCache shows: ${CACHE_VALUE}"
              exit 1
            fi
            echo "✅ CMakeCache confirms user override: ${CACHE_VALUE}"
          else
            # Auto-enable/disable uses set() without CACHE — NOT in CMakeCache
            echo "ℹ️  Auto-configured LTO (not in CMakeCache, validated via cmake status message)"
          fi

          # Tertiary: verify the build actually uses LTO flags when enabled
          if [ "${LTO_EXPECTED}" = "ON" ]; then
            if grep -rq 'INTERPROCEDURAL_OPTIMIZATION.*ON\|INTERPROCEDURAL_OPTIMIZATION.*TRUE' Build/CMakeFiles/; then
              echo "✅ LTO property propagated to targets"
            else
              echo "ℹ️  LTO property not found in CMakeFiles (may use global scope only)"
            fi
          fi
          echo "::endgroup::"

      - name: Build
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build
          make -j$(nproc) 2>&1 | tee build.log
          if grep -iE 'error:' build.log; then
            echo "ERROR: Build failed"
            exit 1
          fi
          WARNING_COUNT=$(grep -cE 'warning:' build.log || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "::warning title=Compiler Warnings (LTO Build)::${WARNING_COUNT} warning(s) detected"
            grep -E 'warning:' build.log | sort -u | sed -n '1,20p'
          else
            echo "[OK] Zero compiler warnings (LTO build)"
          fi

  #############################################################################
  # Job 4: Windows Build (MSVC)
  #############################################################################
  windows-build:
    needs: [validate-ref]
    name: "Windows • MSVC • ${{ matrix.build_type }}"
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      POWERSHELL_TELEMETRY_OPTOUT: "1"
      POWERSHELL_UPDATECHECK: "Off"
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN -ErrorAction SilentlyContinue }
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config --global credential.helper ""

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: Install Dependencies
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) { Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue }
          Write-Host "Fetching dependencies..."
          Start-BitsTransfer -Source "https://github.com/InternationalColorConsortium/iccDEV/releases/download/v2.3.1/vcpkg-exported-deps.zip" -Destination "deps.zip"
          tar -xf deps.zip

      - name: Configure
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) { Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue }
          cd Build/Cmake
          cmake -B build -S . `
                -DCMAKE_TOOLCHAIN_FILE="..\..\scripts\buildsystems\vcpkg.cmake" `
                -DVCPKG_MANIFEST_MODE=OFF `
                -DCMAKE_BUILD_TYPE="$env:MATRIX_BUILD_TYPE" `
                -Wno-dev

      - name: Build
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          MATRIX_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) { Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue }
          cd Build/Cmake
          cmake --build build --config "$env:MATRIX_BUILD_TYPE" -- /m /maxcpucount
          cmake --build build --config "$env:MATRIX_BUILD_TYPE" -- /m /maxcpucount

      - name: Test
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) { Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue }
          cd Build/Cmake
          $exeDirs = Get-ChildItem -Recurse -File -Include *.exe -Path .\build\ |
              Where-Object { $_.FullName -match 'icc' -and $_.FullName -notmatch '\\CMakeFiles\\' -and $_.Name -notmatch '^CMake(C|CXX)CompilerId\.exe$' } |
              ForEach-Object { Split-Path $_.FullName -Parent } |
              Sort-Object -Unique
          $env:PATH = ($exeDirs -join ';') + ';' + $env:PATH
          cd ..\..\Testing
          .\CreateAllProfiles.bat

  #############################################################################
  # Job 5: Version Header Generation Test
  #############################################################################
  version-header-test:
    needs: [validate-ref]
    name: "Version Headers • Build Directory Generation"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Environment
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake libpng-dev libxml2-dev libtiff-dev nlohmann-json3-dev

      - name: Disable wxWidgets (headless CI)
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          sed -i.bak 's/^  find_package(wxWidgets COMPONENTS core base REQUIRED)/  # find_package(wxWidgets COMPONENTS core base REQUIRED) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^      ADD_SUBDIRECTORY(Tools\/wxProfileDump)/      # ADD_SUBDIRECTORY(Tools\/wxProfileDump) /g' Build/Cmake/CMakeLists.txt
          sed -i.bak 's/^    message(FATAL_ERROR "wxWidgets not found/    # message(FATAL_ERROR "wxWidgets not found/g' Build/Cmake/CMakeLists.txt

      - name: Build
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          mkdir -p Build && cd Build
          cmake ../Build/Cmake -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Verify Version Headers in Build Directory
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          # Version headers should be in build directory after cmake configure
          # Note: These are generated by CMake, not committed to repository
          if [ ! -f "Build/IccProfLib/IccProfLibVer.h" ] && [ ! -f "IccProfLib/IccProfLibVer.h" ]; then
            echo "WARNING: IccProfLibVer.h not found (may not be generated yet)"
          fi
          if [ ! -f "Build/IccXML/IccLibXMLVer.h" ] && [ ! -f "IccXML/IccLibXML/IccLibXMLVer.h" ]; then
            echo "WARNING: IccLibXMLVer.h not found (may not be generated yet)"
          fi
          echo "✅ Version headers correctly generated in build directory"

  #############################################################################
