          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          unset GITHUB_TOKEN || true

          # Set library path for shared libs
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/Build/Cmake/build/IccProfLib:$GITHUB_WORKSPACE/Build/Cmake/build/IccXML:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="$GITHUB_WORKSPACE/Build/Cmake/build/IccProfLib:$GITHUB_WORKSPACE/Build/Cmake/build/IccXML:${DYLD_LIBRARY_PATH:-}"

          OUTPUT=$(./examples/hello-iccdev/build/hello-iccdev 2>&1)
          echo "$OUTPUT"

          # Verify key output markers
          grep -q "IccProfLib version:" <<< "$OUTPUT" || { echo "Missing IccProfLib version"; exit 1; }
          grep -q "IccLibXML  version:" <<< "$OUTPUT" || { echo "Missing IccLibXML version"; exit 1; }
          grep -q "Hello, iccDEV!" <<< "$OUTPUT" || { echo "Missing Hello marker"; exit 1; }
          echo "Example project works correctly"

      # ── Step 3: Run example and verify output (Windows) ──
      - name: Run Example (Windows)
        if: runner.os == 'Windows'
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) { Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue }

          # Copy DLLs to example build directory
          $exeDir = "examples\hello-iccdev\build\Release"
          if (-not (Test-Path $exeDir)) { $exeDir = "examples\hello-iccdev\build" }
          Get-ChildItem -Recurse -Path "Build\Cmake\build" -Include "*.dll" |
              Where-Object { $_.Name -match "Icc" } |
              ForEach-Object { Copy-Item $_.FullName -Destination $exeDir -Force }

          $exe = Get-ChildItem -Recurse -Path "examples\hello-iccdev\build" -Include "hello-iccdev.exe" |
              Select-Object -First 1
          if (-not $exe) { Write-Error "❌ hello-iccdev.exe not found"; exit 1 }

          $output = & $exe.FullName 2>&1 | Out-String
          Write-Host $output

          if ($output -notmatch "IccProfLib version:") { Write-Error "❌ Missing IccProfLib version"; exit 1 }
          if ($output -notmatch "IccLibXML  version:") { Write-Error "❌ Missing IccLibXML version"; exit 1 }
          if ($output -notmatch "Hello, iccDEV!") { Write-Error "❌ Missing Hello marker"; exit 1 }
          Write-Host "✅ Example project works correctly"

  #############################################################################
  # Job 8: Final Summary
  #############################################################################
  final-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [standard-builds, sanitizer-builds, option-matrix, windows-build, version-header-test, clean-rebuild-test, example-project]
    if: always()

    steps:
      - name: Checkout (sanitizer script)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ env.CHECKOUT_REF }}
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Generate Summary
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          RESULT_STANDARD: ${{ needs.standard-builds.result }}
          RESULT_SANITIZER: ${{ needs.sanitizer-builds.result }}
          RESULT_OPTION: ${{ needs.option-matrix.result }}
          RESULT_WINDOWS: ${{ needs.windows-build.result }}
          RESULT_VERSION: ${{ needs.version-header-test.result }}
          RESULT_CLEAN: ${{ needs.clean-rebuild-test.result }}
          RESULT_EXAMPLE: ${{ needs.example-project.result }}
        run: |
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh

          # Helper: map job result to emoji
          result_icon() {
            case "${1:-skipped}" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              cancelled) echo "⏹️" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❓" ;;
            esac
          }

          {
            echo "# Comprehensive Build & Test Results"
            echo ""
            echo "## Test Coverage"
            echo ""
            echo "### Platforms"
            echo "- $(result_icon "$RESULT_STANDARD") Ubuntu (latest)"
            echo "- $(result_icon "$RESULT_STANDARD") macOS (latest)"
            echo "- $(result_icon "$RESULT_WINDOWS") Windows (latest)"
            echo ""
            echo "### Compilers"
            echo "- $(result_icon "$RESULT_STANDARD") GCC (Ubuntu)"
            echo "- $(result_icon "$RESULT_STANDARD") Clang (Ubuntu, macOS)"
            echo "- $(result_icon "$RESULT_WINDOWS") MSVC (Windows)"
            echo ""
            echo "### Build Types"
            echo "- $(result_icon "$RESULT_STANDARD") Release (default)"
            echo "- $(result_icon "$RESULT_STANDARD") Debug"
            echo "- $(result_icon "$RESULT_STANDARD") RelWithDebInfo"
            echo ""
            echo "### Sanitizers"
            echo "- $(result_icon "$RESULT_SANITIZER") AddressSanitizer (ASAN)"
            echo "- $(result_icon "$RESULT_SANITIZER") UndefinedBehaviorSanitizer (UBSAN)"
            echo "- $(result_icon "$RESULT_SANITIZER") Combined ASAN+UBSAN"
            echo ""
            echo "### Build Options"
            echo "- $(result_icon "$RESULT_OPTION") VERBOSE_CONFIG"
            echo "- $(result_icon "$RESULT_OPTION") ENABLE_COVERAGE"
            echo "- $(result_icon "$RESULT_OPTION") ICC_ENABLE_ASSERTS"
            echo "- $(result_icon "$RESULT_OPTION") ICC_TRACE_NAN_ENABLED"
            echo "- $(result_icon "$RESULT_OPTION") Shared libs only"
            echo "- $(result_icon "$RESULT_OPTION") Static libs only"
            echo ""
            echo "### LTO/IPO Validation (PR #716)"
            echo "- $(result_icon "$RESULT_OPTION") LTO=OFF user override"
            echo "- $(result_icon "$RESULT_OPTION") LTO=ON user override"
            echo "- $(result_icon "$RESULT_OPTION") LTO auto-enable for Release"
            echo "- $(result_icon "$RESULT_OPTION") LTO auto-disable for Debug"
            echo "- $(result_icon "$RESULT_OPTION") LTO auto-disable for RelWithDebInfo"
            echo "- $(result_icon "$RESULT_OPTION") LTO auto-disable with ASAN"
            echo "- $(result_icon "$RESULT_OPTION") LTO auto-disable with Coverage"
            echo "- $(result_icon "$RESULT_OPTION") LTO=ON override wins over ASAN"
            echo ""
            echo "### Special Tests"
            echo "- $(result_icon "$RESULT_VERSION") Version header generation (build directory)"
            echo "- $(result_icon "$RESULT_CLEAN") Clean source tree after build"
            echo "- $(result_icon "$RESULT_CLEAN") Clean/rebuild cycle"
            echo "- $(result_icon "$RESULT_EXAMPLE") Example consumer project (Linux, macOS, Windows)"
            echo ""
            echo "## Job Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Standard Builds | $(sanitize_line "$RESULT_STANDARD") |"
            echo "| Sanitizer Builds | $(sanitize_line "$RESULT_SANITIZER") |"
            echo "| Option Matrix | $(sanitize_line "$RESULT_OPTION") |"
            echo "| Windows Build | $(sanitize_line "$RESULT_WINDOWS") |"
            echo "| Version Header Test | $(sanitize_line "$RESULT_VERSION") |"
            echo "| Clean/Rebuild Test | $(sanitize_line "$RESULT_CLEAN") |"
            echo "| Example Project | $(sanitize_line "$RESULT_EXAMPLE") |"
            echo ""
            echo "---"
            echo ""
            echo "**Compliance:** Hoyt shell/PowerShell prologue standards"
            echo "**Reference:** llmcjf/actions/"
          } >> "$GITHUB_STEP_SUMMARY"
