## Intent: ci-latest-release
#
## Last Updated: 2026-03-26 by David Hoyt / Copilot
#                Add push-to-master trigger
#                Add release job: zip + publish to GitHub Releases (rolling 'latest')
#                Pin softprops/action-gh-release@v2 and actions/download-artifact@v4
#                Elevate permissions to contents: write for release creation
#                Add WASM Release build (Emscripten) to release packaging
#                Add WASM dependency caches for Emscripten SDK and third-party libs
#                Use safe apt source handling for Linux release dependencies
#                Governance: sanitize-sed.sh on all GITHUB_STEP_SUMMARY writes
#
#  TODO: Extract repetitive shell commands to reusable script
#
###############################################################

name: ci-latest-release

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  linux:
    name: "Linux ${{ matrix.compiler }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout master
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false

      - name: Install Dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          export DEBIAN_FRONTEND=noninteractive
          bash .github/scripts/ci-safe-apt-update.sh
          sudo apt-get \
            -o Acquire::Retries=3 \
            -o Dpkg::Use-Pty=0 \
            install -y --no-install-recommends \
            build-essential cmake gcc g++ clang clang-tools \
            libpng-dev libxml2 libxml2-dev libtiff-dev \
            nlohmann-json3-dev libwxgtk3.2-dev wx-common \
            python3 python3-pip curl git llvm
      - name: Set Compiler
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if [ "${MATRIX_COMPILER}" = "gcc" ]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi
      - name: Print Compiler Version
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Compiler Version:" >> "$GITHUB_STEP_SUMMARY"
          "$CC" --version >> "$GITHUB_STEP_SUMMARY"
      - name: CMake Configure
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build
          cmake -DCMAKE_INSTALL_PREFIX="$HOME/.local" \
                -DCMAKE_BUILD_TYPE=Release \
                -Wno-dev Cmake/
      - name: Build
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          cd Build
          make -j"$(nproc)"
      - name: Verify CMake Cache
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if test -f Build/CMakeCache.txt; then
          echo "[OK] Build OK" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "::error ::Build failed! CMakeCache.txt not found." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: Stage bundle into Testing directory
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          stage="staging/iccDEV-Testing"
          mkdir -p "$stage"
          # 1. Copy Testing contents (exclude Fuzzing)
          for item in Testing/*; do
            [ "$(basename "$item")" = "Fuzzing" ] && continue
            cp -a "$item" "$stage/"
          done
          # 2. Copy tool binaries and libraries from build
          find Build/Tools -type f \( -perm -u+x -o -name '*.so*' -o -name '*.a' \) \
            -exec cp -a {} "$stage/" \;
          find Build/IccProfLib -type f -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccProfLib -type l -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccXML -type f -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccXML -type l -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccJSON -type f -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccJSON -type l -name '*.so*' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          # 3. Copy Testing/Readme.md, LICENSE.md and docs/
          cp Testing/Readme.md  "$stage/"
          cp LICENSE.md "$stage/"
          cp -a docs    "$stage/docs"
          # 4. Generate path.sh helper script (POSIX-compatible, resolves from script location)
          printf '%s\n' \
            "#!/bin/sh" \
            "# Resolve the directory where this script lives" \
            "if [ -n \"\${BASH_SOURCE:-}\" ]; then" \
            "  SCRIPT_DIR=\"\$(cd \"\$(dirname \"\${BASH_SOURCE[0]}\")\" && pwd)\"" \
            "else" \
            "  SCRIPT_DIR=\"\$(cd \"\$(dirname \"\$0\")\" && pwd)\"" \
            "fi" \
            "export PATH=\"\$SCRIPT_DIR:\$PATH\"" \
            "export LD_LIBRARY_PATH=\"\$SCRIPT_DIR\${LD_LIBRARY_PATH:+:\$LD_LIBRARY_PATH}\"" \
            "for d in \"\$SCRIPT_DIR\"/*/; do" \
            "  [ -d \"\$d\" ] && export PATH=\"\$d:\$PATH\"" \
            "done" \
            "echo \"PATH and LD_LIBRARY_PATH updated.\"" \
            "echo \"Tools directory: \$SCRIPT_DIR\"" \
            > "$stage/path.sh"
          chmod +x "$stage/path.sh"
          # Summary of staged bundle contents
          total=$(find "$stage" -type f | wc -l)
          echo ""
          echo "===== Staged Bundle Contents ($total files) ====="
          for ext in so 'so.*' a icc md; do
            count=$(find "$stage" -maxdepth 1 \( -type f -o -type l \) -name "*.$ext" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo ""
              echo "--- *.$ext ($count) ---"
              find "$stage" -maxdepth 1 \( -type f -o -type l \) -name "*.$ext" -printf '  %f  (%k KB)\n'
            fi
          done
          # List executables (ELF binaries without extension)
          exes=$(find "$stage" -maxdepth 1 -type f -executable ! -name '*.*' | wc -l)
          if [ "$exes" -gt 0 ]; then
            echo ""
            echo "--- executables ($exes) ---"
            find "$stage" -maxdepth 1 -type f -executable ! -name '*.*' -printf '  %f  (%k KB)\n'
          fi
          echo ""
          echo "Total: $total files staged into $stage"
          echo ""
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: iccdev-linux-${{ matrix.compiler }}
          path: staging
          if-no-files-found: warn

      - name: Summary Report
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          MATRIX_COMPILER: ${{ matrix.compiler }}
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          {
            echo "### Linux Build Summary (${MATRIX_COMPILER})"
            echo "- Build Directory: Build/"
            echo "- Artifacts Uploaded: iccdev-linux-${MATRIX_COMPILER}"
            echo "- Status: Success"
          } >> "$GITHUB_STEP_SUMMARY"
  macos:
    name: "macOS Clang"
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout master
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false

      - name: Clone repository and install dependencies
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Installing Homebrew dependencies..."
          brew install libpng nlohmann-json libxml2 wxwidgets libtiff jpeg-turbo || echo "[WARN] Some dependencies might already be installed."
          echo "[OK] Dependency installation complete."

      - name: CMake Configure
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Setting up CMake build configuration..."
          cd Build
          sudo rm -rf /Library/Frameworks/Mono.framework/Headers/png.h
          echo "export PATH=\"/opt/homebrew/opt/jpeg-turbo/bin:\$PATH\"" >> /Users/runner/.bash_profile
          export CPPFLAGS="-I/opt/homebrew/opt/jpeg-turbo/include"
          export PKG_CONFIG_PATH="/opt/homebrew/opt/jpeg-turbo/lib/pkgconfig"
          libpng_prefix="$(brew --prefix libpng)"
          jpeg_turbo_prefix="$(brew --prefix jpeg-turbo)"
          export CFLAGS="-I${libpng_prefix}/include -I${jpeg_turbo_prefix}/include"
          export LDFLAGS="-L${libpng_prefix}/lib -L${jpeg_turbo_prefix}/lib"
          cmake -DCMAKE_INSTALL_PREFIX="$HOME/.local" \
                -DCMAKE_BUILD_TYPE=Release \
                -DJPEG_LIBRARY="${jpeg_turbo_prefix}/lib/libjpeg.dylib" \
                -DJPEG_INCLUDE_DIR="${jpeg_turbo_prefix}/include" \
                -Wno-dev Cmake/
          echo "[OK] CMake configuration complete."

      - name: Build
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          echo "Starting build process..."
          cd Build
          make -j"$(sysctl -n hw.ncpu)"
          echo "Build process completed."

      - name: Stage bundle into Testing directory
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          stage="staging/iccDEV-Testing"
          mkdir -p "$stage"
          # 1. Copy Testing contents (exclude Fuzzing)
          for item in Testing/*; do
            [ "$(basename "$item")" = "Fuzzing" ] && continue
            cp -a "$item" "$stage/"
          done
          # 2. Copy tool binaries and libraries from build
          find Build/Tools -type f \( -perm -u+x -o -name '*.dylib' -o -name '*.a' \) \
            -exec cp -a {} "$stage/" \;
          find Build/IccProfLib -type f -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccProfLib -type l -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccXML -type f -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccXML -type l -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccJSON -type f -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          find Build/IccJSON -type l -name '*.dylib' \
            -exec cp -a {} "$stage/" \; 2>/dev/null || true
          # 3. Copy Testing/Readme.md, LICENSE.md and docs/
          cp Testing/Readme.md  "$stage/"
          cp LICENSE.md "$stage/"
          cp -a docs    "$stage/docs"
          # 4. Generate path.sh helper script (POSIX-compatible, resolves from script location)
          printf '%s\n' \
            "#!/bin/sh" \
            "# Resolve the directory where this script lives" \
            "if [ -n \"\${BASH_SOURCE:-}\" ]; then" \
            "  SCRIPT_DIR=\"\$(cd \"\$(dirname \"\${BASH_SOURCE[0]}\")\" && pwd)\"" \
            "else" \
            "  SCRIPT_DIR=\"\$(cd \"\$(dirname \"\$0\")\" && pwd)\"" \
            "fi" \
            "export PATH=\"\$SCRIPT_DIR:\$PATH\"" \
            "export DYLD_LIBRARY_PATH=\"\$SCRIPT_DIR\${DYLD_LIBRARY_PATH:+:\$DYLD_LIBRARY_PATH}\"" \
            "for d in \"\$SCRIPT_DIR\"/*/; do" \
            "  [ -d \"\$d\" ] && export PATH=\"\$d:\$PATH\"" \
            "done" \
            "echo \"PATH and DYLD_LIBRARY_PATH updated.\"" \
            "echo \"Tools directory: \$SCRIPT_DIR\"" \
            > "$stage/path.sh"
          chmod +x "$stage/path.sh"
          # Normalize Mach-O library references for the portable release bundle.
          find "$stage" -maxdepth 1 -type f \( -perm -111 -o -name '*.dylib' \) -print | sort |
          while IFS= read -r target; do
            target_base="$(basename "$target")"
            case "$target_base" in
              *.dylib)
                install_name_tool -id "@loader_path/$target_base" "$target" || true
                ;;
            esac
            otool -L "$target" | awk 'NR > 1 {print $1}' |
            while IFS= read -r dep; do
              case "$dep" in
                "$PWD"/Build/*|"$GITHUB_WORKSPACE"/Build/*|/Users/runner/work/iccDEV/iccDEV/Build/*)
                  install_name_tool -change "$dep" "@loader_path/$(basename "$dep")" "$target" || true
                  ;;
              esac
            done
            otool -l "$target" |
              awk '
                $1 == "cmd" && $2 == "LC_RPATH" { in_rpath = 1; next }
                in_rpath && $1 == "path" { print $2; in_rpath = 0 }
              ' |
            while IFS= read -r rpath; do
              case "$rpath" in
                "$PWD"/Build/*|"$GITHUB_WORKSPACE"/Build/*|/Users/runner/work/iccDEV/iccDEV/Build/*)
                  install_name_tool -delete_rpath "$rpath" "$target" || true
                  ;;
              esac
            done
            install_name_tool -add_rpath "@loader_path" "$target" || true
          done
          # Summary of staged bundle contents
          total=$(find "$stage" -type f | wc -l)
          echo ""
          echo "===== Staged Bundle Contents ($total files) ====="
          for ext in dylib a icc md; do
            count=$(find "$stage" -maxdepth 1 \( -type f -o -type l \) -name "*.$ext" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo ""
              echo "--- *.$ext ($count) ---"
              find "$stage" -maxdepth 1 \( -type f -o -type l \) -name "*.$ext" -exec sh -c '
                for path do
                  size=$(stat -f%z "$path" 2>/dev/null || stat -c%s "$path")
                  printf "  %s  (%s KB)\n" "$(basename "$path")" "$((size / 1024))"
                done
              ' sh {} +
            fi
          done
          # List executables (Mach-O binaries without extension)
          exes=$(find "$stage" -maxdepth 1 -type f -perm -111 ! -name '*.*' | wc -l)
          if [ "$exes" -gt 0 ]; then
            echo ""
            echo "--- executables ($exes) ---"
            find "$stage" -maxdepth 1 -type f -perm -111 ! -name '*.*' -exec sh -c '
              for path do
                size=$(stat -f%z "$path" 2>/dev/null || stat -c%s "$path")
                printf "  %s  (%s KB)\n" "$(basename "$path")" "$((size / 1024))"
              done
            ' sh {} +
          fi
          echo ""
          echo "Total: $total files staged into $stage"
          echo ""
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: iccdev-macos-clang
          path: staging
          if-no-files-found: warn
      - name: Summary Report
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          {
            echo "### macOS Build Summary"
            echo "- Build Directory: Build/"
            echo "- Artifacts Uploaded: iccdev-macos-clang"
            echo "- Status: Success"
          } >> "$GITHUB_STEP_SUMMARY"
  windows:
    name: "Windows MSVC"
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      POWERSHELL_TELEMETRY_OPTOUT: "1"
      POWERSHELL_UPDATECHECK: "Off"
    defaults:
      run:
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
    strategy:
      fail-fast: false
    steps:
      - name: Checkout PR source
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: UCI Gate 1 for Windows Powershell
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
        run: |
         git config --global credential.helper ""
         Set-StrictMode -Version Latest
         $ErrorActionPreference = 'Stop'
         $ProgressPreference = 'SilentlyContinue'

         # --- Disable telemetry sources (pwsh / dotnet / gh) ---
         $env:POWERSHELL_TELEMETRY_OPTOUT = "1"
         $env:DOTNET_CLI_TELEMETRY_OPTOUT = "1"
         $env:GH_NO_UPDATE_NOTIFIER = "1"
         $env:GH_PROMPT_DISABLED = "1"
         $env:NUGET_XMLDOC_MODE = "skip"

         # --- Validate workspace path (defense-in-depth) ---
         if (-not (Test-Path $env:GITHUB_WORKSPACE)) {
             throw "Invalid GITHUB_WORKSPACE path: $env:GITHUB_WORKSPACE"
         }

         # --- Remove tokens or uci that should not exist in PR CI ---
         foreach ($v in @(
             'GITHUB_TOKEN',
             'ACTIONS_RUNTIME_TOKEN',
             'ACTIONS_ID_TOKEN_REQUEST_URL',
             'ACTIONS_ID_TOKEN_REQUEST_TOKEN'
         )) {
             if (Test-Path "Env:$v") {
                 Remove-Item "Env:$v" -ErrorAction SilentlyContinue
             }
         }

         # --- Canonicalization then sanitize user controllable input ---
         function Canonicalize([string]$s) {
             if (-not $s) { return "" }
             $s = $s.Trim()
             $s = $s.Replace("`r","").Replace("`n","")
             # Strip C0 controls, DEL, and Unicode bidi/zero-width/formatting chars
             $s = -join ($s.ToCharArray() | Where-Object {
                 $c = [int]$_
                 $c -ge 32 -and $c -ne 127 -and
                 -not ($c -ge 0x200B -and $c -le 0x200F) -and
                 -not ($c -ge 0x2028 -and $c -le 0x202F) -and
                 -not ($c -ge 0x2060 -and $c -le 0x2069) -and
                 $c -ne 0xFEFF -and
                 -not ($c -ge 0xFFF9 -and $c -le 0xFFFB)
             })
             return $s
         }

         # --- Canonicalize PR-controlled environment values ---
         $env:GITHUB_REF      = Canonicalize $env:GITHUB_REF
         $env:GITHUB_HEAD_REF = Canonicalize $env:GITHUB_HEAD_REF
         $env:GITHUB_BASE_REF = Canonicalize $env:GITHUB_BASE_REF

         # --- Harden Git configuration ---
          git config --add safe.directory "$PWD"
          git config --global credential.helper ""

         # --- PATH hardening: limit to trusted tool locations ---
         $trustedPath = @(
             "$env:SystemRoot\system32",
             "$env:SystemRoot",
             "$env:ProgramFiles\Git\bin",
             "$env:ProgramFiles\PowerShell\7"
         ) -join ';'
         $env:PATH = $trustedPath

          Write-Host "Finished UCI Gate 1 for pwsh" -ForegroundColor Green
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0 (node24)

      - name: UCI Gate 2 for Windows Powershell - Verify Branch Context
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Write-Host "Triggered by:  $env:GITHUB_EVENT_NAME"
          Write-Host "Base branch:   $env:GITHUB_BASE_REF"
          Write-Host "Head branch:   $env:GITHUB_HEAD_REF"
          Write-Host "Commit SHA:    $env:PR_HEAD_SHA"
          Write-Host "OS:            $env:RUNNER_OS"
      - name: Install dependencies and build
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          git config --global credential.helper ""
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          if (Test-Path Env:GITHUB_TOKEN) {
            Remove-Item Env:GITHUB_TOKEN -ErrorAction SilentlyContinue
          }
          Write-Host "============================= Starting Build =============================" -ForegroundColor Green
          Write-Host "Copyright (c) 2025 International Color Consortium. All rights reserved." -ForegroundColor Green
          git branch
          git status
          Write-Host "========= Fetching Deps... ================`n"
          Start-BitsTransfer -Source "https://github.com/InternationalColorConsortium/iccDEV/releases/download/v2.3.1/vcpkg-exported-deps.zip" -Destination "deps.zip"
          Write-Host "========= Extracting Deps... ================`n"
          tar -xf deps.zip
          cd Build/Cmake
          Write-Host "========= Building... ================`n"
          cmake  -B build -S . -DCMAKE_TOOLCHAIN_FILE="..\..\scripts\buildsystems\vcpkg.cmake" -DVCPKG_MANIFEST_MODE=OFF -DCMAKE_BUILD_TYPE=Release  -Wno-dev
          cmake --build build --config Release -- /m /maxcpucount
          cmake --build build --config Release -- /m /maxcpucount
          $exeDirs = Get-ChildItem -Recurse -File -Include *.exe -Path .\build\ |
              Where-Object { $_.FullName -match 'icc' -and $_.FullName -notmatch '\\CMakeFiles\\' -and $_.Name -notmatch '^CMake(C|CXX)CompilerId\.exe$' } |
              ForEach-Object { Split-Path $_.FullName -Parent } |
              Sort-Object -Unique
          $env:PATH = ($exeDirs -join ';') + ';' + $env:PATH
          $env:PATH -split ';' | Select-String "icc"
          $toolDirs = Get-ChildItem -Recurse -File -Include *.exe -Path .\Tools\ | ForEach-Object { Split-Path -Parent $_.FullName } | Sort-Object -Unique
          $env:PATH = ($toolDirs -join ';') + ';' + $env:PATH
          $env:PATH -split ';'
      - name: Stage bundle into Testing directory
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $stage = "staging/iccDEV-Testing"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # 1. Copy the entire Testing directory contents (exclude Fuzzing)
          Get-ChildItem -Path "Testing" -Exclude "Fuzzing" |
            Copy-Item -Destination $stage -Recurse -Force
          # 2. Copy .exe and library files from the build (no .pdb in Release)
          Get-ChildItem -Path "Build/Cmake/build" -Recurse -Include *.exe,*.dll,*.lib |
            Where-Object { $_.FullName -notmatch '\\CMakeFiles\\' -and $_.Name -notmatch '^CMake(C|CXX)CompilerId\.exe$' } |
            ForEach-Object { Copy-Item $_.FullName -Destination $stage -Force }
          # 3. Copy Testing/Readme.md, LICENSE.md and docs/
          Copy-Item -Path "Testing/Readme.md"  -Destination $stage -Force
          Copy-Item -Path "LICENSE.md" -Destination $stage -Force
          Copy-Item -Path "docs"       -Destination "$stage/docs" -Recurse -Force
          # 4. Copy full IIS sample tree (web.config, html/css/js, assets/, all ps1 helpers)
          #    under staging/iccDEV-Testing/IccIisIsapi/ so web.config + demo pages
          #    resolve relative to the installed ISAPI extension.
          $iisSrc = "Tools/Winnt/IccIisIsapi"
          if (Test-Path $iisSrc) {
            $iisDst = Join-Path $stage "IccIisIsapi"
            New-Item -ItemType Directory -Force -Path $iisDst | Out-Null
            # skip source files (*.cpp/*.h/*.def) and build outputs that are
            # already captured by the flat DLL/EXE sweep above
            Get-ChildItem -Path $iisSrc -Force -Exclude '*.cpp','*.h','*.def' |
              Copy-Item -Destination $iisDst -Recurse -Force
            # Back-compat: also keep Install-IccIisIsapiSite.ps1 at the stage
            # root (existing docs reference that path).
            $iisInstaller = Join-Path $iisSrc "Install-IccIisIsapiSite.ps1"
            if (Test-Path $iisInstaller) {
              Copy-Item -Path $iisInstaller -Destination $stage -Force
            }
          }
          # 5. Generate path.bat helper script
          @'
          @echo off
          setlocal EnableDelayedExpansion
          set "SCRIPT_DIR=%~dp0"
          if "!SCRIPT_DIR:~-1!"=="\" set "SCRIPT_DIR=!SCRIPT_DIR:~0,-1!"
          :: Build new PATH with script dir and all subdirs containing .exe
          set "NEW_PATH=!SCRIPT_DIR!;!PATH!"
          for /R "!SCRIPT_DIR!" %%F in (*.exe) do (
              set "dir=%%~dpF"
              if "!dir:~-1!"=="\" set "dir=!dir:~0,-1!"
              echo !NEW_PATH! | findstr /I /C:"!dir!" >nul || set "NEW_PATH=!dir!;!NEW_PATH!"
          )
          :: Export PATH back to caller via endlocal trick
          endlocal & set "PATH=%NEW_PATH%"
          '@ | Set-Content -Path "$stage/path.bat" -Encoding ASCII
          # Summary of staged bundle contents
          $allFiles = Get-ChildItem -Path $stage -Recurse -File
          $count = $allFiles.Count
          Write-Host "`n===== Staged Bundle Contents ($count files) =====" -ForegroundColor Cyan
          foreach ($ext in @('*.exe','*.dll','*.lib','*.icc','*.md')) {
            $matched = $allFiles | Where-Object { $_.Name -like $ext }
            if ($matched) {
              Write-Host "`n--- $ext ($($matched.Count)) ---"
              $matched | ForEach-Object {
                $rel = $_.FullName.Replace((Resolve-Path $stage).Path + '\', '')
                Write-Host "  $rel  ($([math]::Round($_.Length/1KB,1)) KB)"
              }
            }
          }
          $otherExts = $allFiles |
            Where-Object { $_.Extension -notin '.exe','.dll','.lib','.icc','.md' } |
            Group-Object Extension |
            Sort-Object Count -Descending
          if ($otherExts) {
            Write-Host "`n--- Other files ---"
            foreach ($g in $otherExts) {
              Write-Host ("  {0}: {1} file(s)" -f ($g.Name ? $g.Name : '(no ext)'), $g.Count)
            }
          }
          Write-Host "`nTotal: $count files staged into $stage`n"
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: iccdev-windows-msvc
          path: staging
          if-no-files-found: warn
      - name: Host System Info
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        run: |
          $ErrorActionPreference = 'Stop'
          git config --global credential.helper ""
          if (Test-Path env:GITHUB_TOKEN) { Remove-Item env:GITHUB_TOKEN }
          systeminfo
          Get-CimInstance -ClassName Win32_Processor
      - name: Summary Report
        if: always()
        shell: pwsh -NoProfile -NoLogo -NonInteractive -Command {0}
        env:
          POWERSHELL_TELEMETRY_OPTOUT: "1"
          GH_REPOSITORY: ${{ github.repository }}
          GH_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_RUNNER_OS: ${{ runner.os }}
          GH_JOB_STATUS: ${{ job.status }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          # Source trusted sanitizer from checked-out workspace
          . .github/scripts/sanitize.ps1
          "### Windows Build Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Repository: $(Sanitize-Line $env:GH_REPOSITORY)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Commit SHA: $(Sanitize-Line $env:GH_COMMIT_SHA)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Runner OS: $(Sanitize-Line $env:GH_RUNNER_OS)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Build Directory: Build/" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Artifacts Uploaded: iccdev-windows-msvc" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Status: $(Sanitize-Line $env:GH_JOB_STATUS)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  wasm:
    name: "WASM Release (Emscripten)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      EMSDK_VERSION: latest
      WASM_DEPS_CACHE_VERSION: v1
    defaults:
      run:
        shell: bash --noprofile --norc {0}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false

      - name: Restore Emscripten SDK cache
        id: emsdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            emsdk
            ~/.emscripten
            ~/.emscripten_cache
          key: iccdev-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('.github/workflows/ci-latest-release.yml', '.github/workflows/ci-pr-wasm.yml', '.github/workflows/wasm-latest-matrix.yml') }}
          restore-keys: |
            iccdev-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-
            ci-latest-release-wasm-emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-

      - name: Install Emscripten SDK
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          if [[ -d emsdk/.git ]]; then
            git -C emsdk remote set-url origin https://github.com/emscripten-core/emsdk.git
            git -C emsdk fetch --depth 1 origin main
            git -C emsdk checkout --force FETCH_HEAD
          else
            rm -rf emsdk
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          fi
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"

      - name: Restore WASM third-party dependency cache
        id: wasm-deps-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: third_party
          key: iccdev-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-${{ hashFiles('.github/workflows/ci-latest-release.yml', '.github/workflows/ci-pr-wasm.yml', '.github/workflows/wasm-latest-matrix.yml') }}
          restore-keys: |
            iccdev-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-
            ci-latest-release-wasm-deps-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.WASM_DEPS_CACHE_VERSION }}-

      - name: Build third-party dependencies
        env:
          BASH_ENV: /dev/null
          WASM_DEPS_CACHE_HIT: ${{ steps.wasm-deps-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"
          CACHE_ACTION="rebuilt"
          deps_ready() {
            [[ -f "$THIRD_PARTY/zlib/out/lib/libz.a" ]] &&
            [[ -f "$THIRD_PARTY/libpng/out/lib/libpng16.a" ]] &&
            [[ -f "$THIRD_PARTY/libjpeg/out/lib/libjpeg.a" ]] &&
            [[ -f "$THIRD_PARTY/libtiff/out/lib/libtiff.a" ]] &&
            [[ -f "$THIRD_PARTY/libxml2/out/lib/libxml2.a" ]] &&
            [[ -d "$THIRD_PARTY/nlohmann-json/out/share/cmake/nlohmann_json" ]]
          }

          if deps_ready; then
            echo "Using cached WASM third-party dependencies from $THIRD_PARTY"
            CACHE_ACTION="reused"
          else
            echo "WASM third-party cache is missing or incomplete; rebuilding dependencies."
            rm -rf "$THIRD_PARTY"
            mkdir -p "$THIRD_PARTY" && cd "$THIRD_PARTY"

            # zlib
            git clone --depth 1 https://github.com/madler/zlib.git && cd zlib
            emconfigure ./configure --static --prefix="$THIRD_PARTY/zlib/out"
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            # libpng (checksum verified)
            curl -sLO https://download.sourceforge.net/libpng/libpng-1.6.57.tar.gz
            echo "01fdab044cdc575c74a9ef62a4042fbe24fea8bedfe8aa5c89f4467b781bbb60  libpng-1.6.57.tar.gz" | sha256sum -c -
            tar -xzf libpng-1.6.57.tar.gz && mv libpng-1.6.57 libpng && cd libpng
            CPPFLAGS="-I$THIRD_PARTY/zlib" LDFLAGS="-L$THIRD_PARTY/zlib/out/lib" \
              emconfigure ./configure --disable-shared --enable-static --prefix="$THIRD_PARTY/libpng/out"
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            # libjpeg (checksum verified)
            curl -sLO https://ijg.org/files/jpegsrc.v9e.tar.gz
            echo "4077d6a6a75aeb01884f708919d25934c93305e49f7e3f36db9129320e6f4f3d  jpegsrc.v9e.tar.gz" | sha256sum -c -
            tar -xzf jpegsrc.v9e.tar.gz && mv jpeg-9e libjpeg && cd libjpeg
            emconfigure ./configure --prefix="$THIRD_PARTY/libjpeg/out" --disable-shared --enable-static
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            # libtiff (with retry for GitLab)
            for attempt in 1 2 3; do
              if git clone --depth 1 https://gitlab.com/libtiff/libtiff.git; then
                break
              fi
              echo "::warning::libtiff clone attempt $attempt failed, retrying in 10s..."
              rm -rf libtiff
              sleep 10
            done
            if [[ ! -d libtiff ]]; then
              echo "::error::Failed to clone libtiff after 3 attempts"
              exit 1
            fi
            cd libtiff
            mkdir wasm && cd wasm
            emcmake cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libtiff/out" \
              -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
              -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
              -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
              -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a"
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            # libxml2 (CMake build with retry for GitLab)
            for attempt in 1 2 3; do
              if git clone --depth 1 https://gitlab.gnome.org/GNOME/libxml2.git; then
                break
              fi
              echo "::warning::libxml2 clone attempt $attempt failed, retrying in 10s..."
              rm -rf libxml2
              sleep 10
            done
            if [[ ! -d libxml2 ]]; then
              echo "::error::Failed to clone libxml2 after 3 attempts"
              exit 1
            fi
            cd libxml2
            mkdir wasm-build && cd wasm-build
            emcmake cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/libxml2/out" \
              -DBUILD_SHARED_LIBS=OFF \
              -DLIBXML2_WITH_PYTHON=OFF \
              -DLIBXML2_WITH_TESTS=OFF \
              -DLIBXML2_WITH_PROGRAMS=OFF \
              -DLIBXML2_WITH_LZMA=OFF \
              -DLIBXML2_WITH_ZLIB=OFF \
              -DLIBXML2_WITH_ICONV=OFF
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            # nlohmann-json (build with CMake for find_package support)
            git clone --depth 1 https://github.com/nlohmann/json.git nlohmann-json && cd nlohmann-json
            mkdir wasm && cd wasm
            emcmake cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$THIRD_PARTY/nlohmann-json/out" \
              -DJSON_BuildTests=OFF \
              -DJSON_Install=ON
            emmake make -j"$(nproc)"
            emmake make install
            cd "$THIRD_PARTY"

            find "$THIRD_PARTY" -type d -name .git -prune -print0 | xargs -0r rm -rf
            touch "$THIRD_PARTY/.ci-latest-release-wasm-deps-complete"
          fi
          cd "$GITHUB_WORKSPACE"

          # --- Sanitized step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "### Third-party dependencies (WASM)"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| cache hit | $(sanitize_line "${WASM_DEPS_CACHE_HIT:-false}") |"
            echo "| action | $(sanitize_line "$CACHE_ACTION") |"
            echo ""
            echo '```'
            find "$THIRD_PARTY" -mindepth 2 -maxdepth 2 -type d -name out | sort | while IFS= read -r dep; do
              sanitize_line "$dep"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure and Build iccDEV-WASM
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          THIRD_PARTY="$PWD/third_party"

          # --- Load sanitizer for step summary ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          mkdir -p build-wasm && cd build-wasm
          emcmake cmake ../Build/Cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TOOLS=ON \
            -DENABLE_STATIC_LIBS=ON \
            -DENABLE_SHARED_LIBS=OFF \
            -DENABLE_TESTS=OFF \
            -DLIBXML2_INCLUDE_DIR="$THIRD_PARTY/libxml2/out/include/libxml2" \
            -DLIBXML2_LIBRARY="$THIRD_PARTY/libxml2/out/lib/libxml2.a" \
            -DTIFF_INCLUDE_DIR="$THIRD_PARTY/libtiff/out/include" \
            -DTIFF_LIBRARY="$THIRD_PARTY/libtiff/out/lib/libtiff.a" \
            -DJPEG_INCLUDE_DIR="$THIRD_PARTY/libjpeg/out/include" \
            -DJPEG_LIBRARY="$THIRD_PARTY/libjpeg/out/lib/libjpeg.a" \
            -DPNG_PNG_INCLUDE_DIR="$THIRD_PARTY/libpng/out/include" \
            -DPNG_LIBRARY="$THIRD_PARTY/libpng/out/lib/libpng16.a" \
            -DZLIB_INCLUDE_DIR="$THIRD_PARTY/zlib" \
            -DZLIB_LIBRARY="$THIRD_PARTY/zlib/out/lib/libz.a" \
            -Dnlohmann_json_DIR="$THIRD_PARTY/nlohmann-json/out/share/cmake/nlohmann_json" \
            -DCMAKE_CXX_FLAGS=" \
              -I$THIRD_PARTY/libtiff/out/include \
              -I$THIRD_PARTY/libjpeg/out/include \
              -I$THIRD_PARTY/libpng/out/include \
              -I$THIRD_PARTY/zlib \
              -I$THIRD_PARTY/nlohmann-json/out/include" \
            -DCMAKE_EXE_LINKER_FLAGS=" \
              $THIRD_PARTY/libjpeg/out/lib/libjpeg.a \
              $THIRD_PARTY/libpng/out/lib/libpng16.a \
              $THIRD_PARTY/zlib/out/lib/libz.a \
              -s INITIAL_MEMORY=128MB \
              -s ALLOW_MEMORY_GROWTH=1 \
              -s FORCE_FILESYSTEM=1 \
              -s MODULARIZE=1 \
              -s EXPORT_NAME=createModule \
              -s EXPORTED_RUNTIME_METHODS=['FS','callMain'] -s EXIT_RUNTIME=0" \
            -Wno-dev

          emmake make -j"$(nproc)"

          # Report results (sanitized, 1 file per line)
          JS_COUNT=$(find . -name '*.js' -not -path '*/CMakeFiles/*' | wc -l)
          WASM_COUNT=$(find . -name '*.wasm' | wc -l)
          LIB_COUNT=$(find . -name '*.a' | wc -l)

          {
            echo "### WASM Build: Release"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| JS modules | $(sanitize_line "$JS_COUNT") |"
            echo "| WASM binaries | $(sanitize_line "$WASM_COUNT") |"
            echo "| Static libraries | $(sanitize_line "$LIB_COUNT") |"
            echo ""
            echo "#### JS Modules"
            echo '```'
            find . -name '*.js' -not -path '*/CMakeFiles/*' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
            echo "#### WASM Binaries"
            echo '```'
            find . -name '*.wasm' -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate WASM output
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          source emsdk/emsdk_env.sh

          # --- Load sanitizer ---
          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          cd build-wasm

          # Verify .wasm files exist and are valid
          mapfile -t WASM_FILES < <(find . -name '*.wasm' -type f | sort)
          if [ "${#WASM_FILES[@]}" -eq 0 ]; then
            echo "::error::No WASM files produced"
            exit 1
          fi

          # Validate each .wasm file header (magic number: 0061736d = \0asm)
          VALID=0
          INVALID=0
          for wf in "${WASM_FILES[@]}"; do
            MAGIC=$(xxd -l 4 -p "$wf" 2>/dev/null)
            if [ "$MAGIC" = "0061736d" ]; then
              SIZE=$(stat -c%s "$wf")
              echo "VALID: $(basename "$wf") ($SIZE bytes)"
              VALID=$((VALID + 1))
            else
              echo "INVALID: $(basename "$wf") (magic: $MAGIC)"
              INVALID=$((INVALID + 1))
            fi
          done

          { sanitize_line "### WASM Validation: $VALID valid, $INVALID invalid"; echo ""; } >> "$GITHUB_STEP_SUMMARY"

          if [ "$INVALID" -gt 0 ]; then
            echo "::error::$INVALID invalid WASM files found"
            exit 1
          fi

          # Run a quick smoke test with node if iccDumpProfile exists
          DUMP_JS=$(find . -name "iccDumpProfile.js" -not -path '*/CMakeFiles/*' | head -1)
          if [ -n "$DUMP_JS" ] && [ -f "$DUMP_JS" ]; then
            echo "Smoke test: iccDumpProfile --help"
            set +e
            node "$DUMP_JS" 2>&1 | sed -n '1,5p'
            echo "iccDumpProfile WASM smoke test complete"
            set -e
          fi

      - name: "Stage npm-shaped WASM bundle (issue #830)"
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          # Resolve a version string for package.json:
          #   - tag push   : strip leading 'v' from refs/tags/vX.Y.Z
          #   - other      : 0.0.0-dev+<short-sha>
          REF_NAME="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-dev+${GITHUB_SHA:0:7}"
          fi

          chmod +x Build/Cmake/wasm-package/stage.sh
          Build/Cmake/wasm-package/stage.sh build-wasm wasm-stage "$VERSION"

          {
            echo "### WASM npm-shaped bundle"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| version | $(sanitize_line "$VERSION") |"
            echo "| stage dir | wasm-stage/ |"
            echo ""
            echo "#### Top-level entries"
            echo '```'
            find wasm-stage -mindepth 1 -maxdepth 1 -printf '%f\n' | sort | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
            echo "#### Tool modules"
            echo '```'
            find wasm-stage -maxdepth 2 -name '*.js' -not -name 'index.js' -not -name 'test_all.js' \
              -exec ls -lh {} \; | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke-test staged WASM bundle (test_all.js)
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          if [[ ! -d wasm-stage ]]; then
            echo "::error::wasm-stage/ not present; staging step did not run"
            exit 1
          fi

          cd wasm-stage
          if ! node test_all.js; then
            echo "::error::test_all.js (16-tool smoke) failed in staged WASM bundle"
            exit 1
          fi

      - name: Parity gate (Testing/CreateAllProfiles.sh -> regression.js)
        env:
          BASH_ENV: /dev/null
          ICCDEV_REGRESSION_EXPECTED: '207'
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            sanitize_line() { printf '%s' "$1"; }
          fi

          cd wasm-stage
          OUT=$(mktemp)
          if node regression.js 2>&1 | tee "$OUT"; then
            {
              echo "### WASM Parity (Testing/CreateAllProfiles.sh)"
              echo '```'
              grep -E '^(Result:|PASS|FAIL|Per-dir|  +[0-9]+ )' "$OUT" \
                | while IFS= read -r line; do
                  sanitize_line "$line"
                  echo ""
                done
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### WASM Parity: FAIL"
              echo '```'
              tail -40 "$OUT" | while IFS= read -r line; do
                sanitize_line "$line"
                echo ""
              done
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::WASM regression.js parity gate failed (expected 207 .icc)"
            exit 1
          fi

      - name: "Upload WASM Artifacts (npm-shaped, issue #830)"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: iccdev-wasm-release
          path: wasm-stage/**
          if-no-files-found: error

      - name: WASM Summary Report
        if: always()
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          {
            echo "### WASM Build Summary"
            echo "- Build Type: Release"
            echo "- Artifacts: iccdev-wasm-release"
            echo "- Target: Emscripten (WASM32)"
            if [ -d build-wasm ]; then
              WASM_N=$(find build-wasm -name '*.wasm' 2>/dev/null | wc -l)
              JS_N=$(find build-wasm -name '*.js' -not -path '*/CMakeFiles/*' 2>/dev/null | wc -l)
              echo "- WASM binaries: $(sanitize_line "$WASM_N")"
              echo "- JS modules: $(sanitize_line "$JS_N")"
            fi
            echo "- Status: Success"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: "Publish Latest Release"
    needs: [linux, macos, windows, wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5  # v5.0.0
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Restore release artifact metadata
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          bash .github/scripts/ci-safe-apt-update.sh
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            patchelf

          chmod +x .github/scripts/ci-restore-release-artifact-metadata.sh
          .github/scripts/ci-restore-release-artifact-metadata.sh artifacts

      - name: Package release archives
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          mkdir -p release-assets

          for dir in artifacts/iccdev-*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            echo "--- Packaging $name ---"
            (cd "$dir" && zip -r "../../release-assets/${name}.zip" . \
              -x './binary-hardening.md' \
              -x './binary-inventory.csv' \
              -x './failures.txt' \
              -x './needed-libraries.txt' \
              -x './strings-hygiene.txt' \
              -x './binary-review/*' \
              -x 'binary-hardening.md' \
              -x 'binary-inventory.csv' \
              -x 'failures.txt' \
              -x 'needed-libraries.txt' \
              -x 'strings-hygiene.txt' \
              -x 'binary-review/*')
            echo "  Created ${name}.zip ($(du -h "release-assets/${name}.zip" | cut -f1))"
          done

          echo ""
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Generate release checksums
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

          SANITIZER="$GITHUB_WORKSPACE/.github/scripts/sanitize-sed.sh"
          if [[ -f "$SANITIZER" ]]; then
            # shellcheck disable=SC1090
            source "$SANITIZER"
          else
            escape_html() {
              local s="$1"
              s="${s//&/&amp;}" ; s="${s//</&lt;}" ; s="${s//>/&gt;}"
              s="${s//\"/&quot;}" ; s="${s//\'/&#39;}"
              printf '%s' "$s"
            }
            sanitize_line() { escape_html "$1"; }
          fi

          if ! compgen -G "release-assets/*.zip" >/dev/null; then
            echo "::error::No release zip files found for checksum generation"
            exit 1
          fi

          (
            cd release-assets
            find . -maxdepth 1 -type f -name '*.zip' -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
            find . -maxdepth 1 -type f -name '*.zip' -printf '%P\0' \
              | sort -z \
              | xargs -0 sha512sum > SHA512SUMS
          )

          {
            echo "### Release Checksums"
            echo ""
            echo "Generated \`SHA256SUMS\` and \`SHA512SUMS\` for release zip assets."
            echo ""
            echo '```'
            sed -n '1,20p' release-assets/SHA256SUMS | while IFS= read -r line; do
              sanitize_line "$line"
              echo ""
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest release archive provenance
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275  # v3.2.0
        with:
          subject-checksums: release-assets/SHA256SUMS

      - name: Delete existing latest tag
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""

          # Delete existing 'latest' release and tag if they exist
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create latest release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            ## Rolling Latest Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Event:** ${{ github.event_name }}
            **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Downloads

            | Platform | Archive |
            |----------|---------|
            | Linux (GCC) | `iccdev-linux-gcc.zip` |
            | Linux (Clang) | `iccdev-linux-clang.zip` |
            | macOS (Clang) | `iccdev-macos-clang.zip` |
            | Windows (MSVC) | `iccdev-windows-msvc.zip` |
            | WASM (Emscripten) | `iccdev-wasm-release.zip` |
            | Checksums | `SHA256SUMS`, `SHA512SUMS` |

            ### Provenance

            GitHub Artifact Attestations are generated for each release archive
            listed in `SHA256SUMS`.

            ### Install via Package Managers

            | Method | Command |
            |--------|---------|
            | **Homebrew** | `brew install iccdev` |
            | **NPM** | `npm install iccdev` |
            | **Docker Pull** | `docker pull ghcr.io/internationalcolorconsortium/iccdev:latest` |
            | **Docker Run** | `docker run -it ghcr.io/internationalcolorconsortium/iccdev:latest` |

            ---
            *Auto-published by ci-latest-release.*
          draft: false
          prerelease: false
          make_latest: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/*.zip
            release-assets/SHA256SUMS
            release-assets/SHA512SUMS

      - name: Summary Report
        if: always()
        shell: bash --noprofile --norc {0}
        env:
          BASH_ENV: /dev/null
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true
          {
            echo "### Release Summary"
            echo ""
            echo "- Tag: \`latest\`"
            echo "- Commit: \`${GITHUB_SHA:0:7}\`"
            zip_count=$(find release-assets -maxdepth 1 -type f -name '*.zip' | wc -l)
            echo "- Assets uploaded: ${zip_count} zip files"
            echo "- Provenance: GitHub Artifact Attestations generated from \`SHA256SUMS\`"
            echo ""
            for f in release-assets/*.zip; do
              [ -f "$f" ] || continue
              echo "  - \`$(basename "$f")\` ($(du -h "$f" | cut -f1))"
            done
          } >> "$GITHUB_STEP_SUMMARY"
